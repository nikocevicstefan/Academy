#root { min-height: 100vh; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, memo } = React;

/* ================================================================
   CONSTANTS & HELPERS
   ================================================================ */
const TOTAL_STEPS = 8;
const STEP_TITLES = [
  'Welcome', 'Right Triangles', 'SOH-CAH-TOA', 'Solving Triangles',
  'The Unit Circle', 'Waves', 'Identities', 'Practice'
];

const DEG = Math.PI / 180;
const RAD = 180 / Math.PI;
const TAU = 2 * Math.PI;

const SPECIAL_ANGLES = [0, 30, 45, 60, 90, 120, 135, 150, 180, 210, 225, 240, 270, 300, 315, 330, 360];

const SPECIAL_VALUES = {
  0:   { sin: '0', cos: '1', tan: '0' },
  30:  { sin: '1/2', cos: '\u221a3/2', tan: '1/\u221a3' },
  45:  { sin: '\u221a2/2', cos: '\u221a2/2', tan: '1' },
  60:  { sin: '\u221a3/2', cos: '1/2', tan: '\u221a3' },
  90:  { sin: '1', cos: '0', tan: 'undef' },
  120: { sin: '\u221a3/2', cos: '-1/2', tan: '-\u221a3' },
  135: { sin: '\u221a2/2', cos: '-\u221a2/2', tan: '-1' },
  150: { sin: '1/2', cos: '-\u221a3/2', tan: '-1/\u221a3' },
  180: { sin: '0', cos: '-1', tan: '0' },
  210: { sin: '-1/2', cos: '-\u221a3/2', tan: '1/\u221a3' },
  225: { sin: '-\u221a2/2', cos: '-\u221a2/2', tan: '1' },
  240: { sin: '-\u221a3/2', cos: '-1/2', tan: '\u221a3' },
  270: { sin: '-1', cos: '0', tan: 'undef' },
  300: { sin: '-\u221a3/2', cos: '1/2', tan: '-\u221a3' },
  315: { sin: '-\u221a2/2', cos: '\u221a2/2', tan: '-1' },
  330: { sin: '-1/2', cos: '\u221a3/2', tan: '-1/\u221a3' },
  360: { sin: '0', cos: '1', tan: '0' },
};

function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function fmt(n, d=2) { return Number.isFinite(n) ? n.toFixed(d) : '—'; }
function fmtAngle(deg) { return `${Math.round(deg)}\u00b0`; }

function saveProgress() {
  try {
    const prev = JSON.parse(localStorage.getItem('math-progress') || '[]');
    if (!prev.includes(10)) {
      prev.push(10);
      localStorage.setItem('math-progress', JSON.stringify(prev));
    }
  } catch(e) {}
}

function isAllComplete() {
  try {
    const prev = JSON.parse(localStorage.getItem('math-progress') || '[]');
    return prev.length >= 10;
  } catch(e) { return false; }
}

/* ================================================================

      background: 'rgba(7,6,11,0.85)', backdropFilter: 'blur(12px)',

    }}>
      <div style={{ maxWidth: 900, margin: '0 auto', padding: '12px 0' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
          <a href="index.html" style={{
            fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.08em',
            textTransform: 'uppercase', color: 'var(--text-tertiary)',
            textDecoration: 'none', transition: 'color 0.3s',
          }}

              flex: 1, height: 3, borderRadius: 2,

                ? 'linear-gradient(90deg, var(--accent), var(--accent-hot))'

          ))}
        </div>
      </div>
    </div>

}

/* ================================================================
   NAVIGATION
   ================================================================ */
function Navigation({ step, setStep, canNext }) {
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      padding: '32px 0', maxWidth: 900, margin: '0 auto',
    }}>
      {step > 1 ? (
        <button onClick={() => setStep(step - 1)} style={{
          fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 400,
          color: 'var(--text-secondary)', background: 'var(--bg-card)',
          border: '1px solid var(--border-subtle)', borderRadius: 10,
          padding: '10px 24px', cursor: 'pointer', transition: 'all 0.3s',
        }}
        onMouseEnter={e => { e.target.style.borderColor = 'var(--border-hover)'; e.target.style.color = 'var(--text-primary)'; }}
        onMouseLeave={e => { e.target.style.borderColor = 'var(--border-subtle)'; e.target.style.color = 'var(--text-secondary)'; }}
        >&larr; Previous</button>
      ) : <div />}
      {canNext && step < TOTAL_STEPS ? (
        <button onClick={() => setStep(step + 1)} style={{
          fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 500,
          color: '#fff', background: 'linear-gradient(135deg, var(--accent), var(--accent-hot))',
          border: 'none', borderRadius: 10, padding: '10px 28px',
          cursor: 'pointer', transition: 'all 0.3s',
          boxShadow: '0 4px 20px rgba(232,165,48,0.25)',
        }}
        onMouseEnter={e => e.target.style.boxShadow = '0 4px 30px rgba(232,165,48,0.4)'}
        onMouseLeave={e => e.target.style.boxShadow = '0 4px 20px rgba(232,165,48,0.25)'}
        >Next &rarr;</button>
      ) : null}
    </div>
  );
}

/* ================================================================
   STEP 1 — LANDING
   ================================================================ */
function LandingCanvas({ width, height }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const timeRef = useRef(0);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.scale(dpr, dpr);

    const cx = width * 0.32;
    const cy = height * 0.5;
    const r = Math.min(width, height) * 0.28;

    function draw(t) {
      timeRef.current = t;
      ctx.clearRect(0, 0, width, height);

      const angle = (t * 0.0006) % TAU;

      // Grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (let i = -5; i <= 5; i++) {
        const y = cy + i * (r / 4);
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
      }
      for (let i = -5; i <= 10; i++) {
        const x = cx + i * (r / 4);
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
      }

      // Unit circle
      ctx.strokeStyle = 'rgba(232,165,48,0.15)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, TAU);
      ctx.stroke();

      // Axes
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx - r - 20, cy); ctx.lineTo(cx + r + 20, cy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, cy - r - 20); ctx.lineTo(cx, cy + r + 20); ctx.stroke();

      // Rotating radius
      const px = cx + Math.cos(angle) * r;
      const py = cy - Math.sin(angle) * r;

      ctx.strokeStyle = 'rgba(232,165,48,0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(px, py); ctx.stroke();

      // Dot on circle
      ctx.fillStyle = '#e8a530';
      ctx.beginPath(); ctx.arc(px, py, 5, 0, TAU); ctx.fill();
      ctx.fillStyle = 'rgba(232,165,48,0.3)';
      ctx.beginPath(); ctx.arc(px, py, 10, 0, TAU); ctx.fill();

      // Projection lines
      ctx.strokeStyle = 'rgba(255,107,107,0.3)';
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, cy); ctx.stroke();
      ctx.strokeStyle = 'rgba(78,205,196,0.3)';
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(cx, py); ctx.stroke();
      ctx.setLineDash([]);

      // Sine wave
      const waveStart = cx + r + 40;
      const waveWidth = width - waveStart - 20;
      ctx.strokeStyle = 'rgba(255,107,107,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i <= waveWidth; i++) {
        const wAngle = angle - (i / waveWidth) * TAU * 1.5;
        const wy = cy - Math.sin(wAngle) * r;
        if (i === 0) ctx.moveTo(waveStart + i, wy);
        else ctx.lineTo(waveStart + i, wy);
      }
      ctx.stroke();

      // Connection line from point to wave
      ctx.strokeStyle = 'rgba(255,107,107,0.2)';
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(waveStart, py);
      ctx.stroke();
      ctx.setLineDash([]);

      // Wave start dot
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath(); ctx.arc(waveStart, py, 4, 0, TAU); ctx.fill();

      // Angle arc
      const arcR = r * 0.18;
      ctx.strokeStyle = 'rgba(232,165,48,0.4)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(cx, cy, arcR, -angle, 0);
      ctx.stroke();

      animRef.current = requestAnimationFrame(draw);
    }

    animRef.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(animRef.current);
  }, [width, height]);

  return <canvas ref={canvasRef} style={{ width, height }} />;
}

function StepLanding({ onStart }) {
  const [dims, setDims] = useState({ w: 0, h: 0 });
  const containerRef = useRef(null);

  useEffect(() => {
    const update = () => {
      if (containerRef.current) {
        const rect = containerRef.current.getBoundingClientRect();
        setDims({ w: rect.width, h: Math.min(400, window.innerHeight * 0.45) });
      }
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  return (
    <div style={{
      minHeight: '85vh', display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', textAlign: 'center',
      padding: '80px 24px 40px',
    }}>
      <div style={{
        fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.12em',
        textTransform: 'uppercase', color: 'var(--accent)',
        marginBottom: 16, animation: 'slideDown 0.8s var(--ease-out-expo) both',
      }}>
        Lesson 10 &mdash; Capstone
      </div>
      <h1 style={{
        fontFamily: 'var(--font-display)', fontSize: 'clamp(52px, 10vw, 88px)',
        fontWeight: 400, lineHeight: 1, letterSpacing: '-0.02em',
        marginBottom: 16, animation: 'fadeInUp 1s var(--ease-out-expo) 0.1s both',
      }}>
        <span style={{
          background: 'linear-gradient(135deg, var(--accent-warm) 0%, var(--accent) 40%, var(--accent-hot) 100%)',
          WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
        }}>Trigonometry</span>
      </h1>
      <p style={{
        fontFamily: 'var(--font-display)', fontStyle: 'italic',
        fontSize: 'clamp(18px, 2.5vw, 24px)', color: 'var(--text-secondary)',
        maxWidth: 500, lineHeight: 1.5, marginBottom: 40,
        animation: 'fadeInUp 1s var(--ease-out-expo) 0.25s both',
      }}>
        The study of triangles and circular motion
      </p>

      <div ref={containerRef} style={{
        width: '100%', maxWidth: 700, marginBottom: 40,
        borderRadius: 16, overflow: 'hidden',
        border: '1px solid var(--border-subtle)',
        background: 'rgba(0,0,0,0.3)',
        animation: 'fadeIn 1.2s var(--ease-out-expo) 0.4s both',
      }}>
        {dims.w > 0 && <LandingCanvas width={dims.w} height={dims.h} />}
      </div>

      <button onClick={onStart} style={{
        fontFamily: 'var(--font-body)', fontSize: 17, fontWeight: 500,
        color: '#fff', background: 'linear-gradient(135deg, var(--accent), var(--accent-hot))',
        border: 'none', borderRadius: 12, padding: '14px 44px',
        cursor: 'pointer', transition: 'all 0.3s',
        boxShadow: '0 4px 24px rgba(232,165,48,0.3)',
        animation: 'fadeInUp 1s var(--ease-out-expo) 0.5s both',
      }}
      onMouseEnter={e => e.target.style.boxShadow = '0 6px 36px rgba(232,165,48,0.5)'}
      onMouseLeave={e => e.target.style.boxShadow = '0 4px 24px rgba(232,165,48,0.3)'}
      >
        Begin &rarr;
      </button>
    </div>
  );
}

/* ================================================================
   STEP 2 — RIGHT TRIANGLES
   ================================================================ */
function StepRightTriangles() {
  const canvasRef = useRef(null);
  const [angle, setAngle] = useState(40);
  const [dragging, setDragging] = useState(false);
  const [dims, setDims] = useState({ w: 0, h: 0 });
  const containerRef = useRef(null);
  const [selectedAngle, setSelectedAngle] = useState('A');

  useEffect(() => {
    const update = () => {
      if (containerRef.current) {
        const rect = containerRef.current.getBoundingClientRect();
        setDims({ w: rect.width, h: Math.min(420, window.innerHeight * 0.5) });
      }
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || dims.w === 0) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = dims.w * dpr;
    canvas.height = dims.h * dpr;
    ctx.scale(dpr, dpr);

    const w = dims.w;
    const h = dims.h;
    const pad = 60;
    const baseLen = w * 0.45;
    const theta = angle * DEG;

    // Triangle vertices: right angle at bottom-left
    const ax = pad + 30;
    const ay = h - pad;
    const bx = ax + baseLen;
    const by = ay;
    const cx2 = bx;
    const cy2 = ay - Math.tan(theta) * baseLen;

    ctx.clearRect(0, 0, w, h);

    // Right angle marker
    const sq = 14;
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(bx - sq, by);
    ctx.lineTo(bx - sq, by - sq);
    ctx.lineTo(bx, by - sq);
    ctx.stroke();

    // Triangle fill
    ctx.fillStyle = 'rgba(232,165,48,0.04)';
    ctx.beginPath();
    ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.lineTo(cx2, cy2);
    ctx.closePath();
    ctx.fill();

    // Sides
    // Adjacent (bottom)
    ctx.strokeStyle = selectedAngle === 'A' ? 'var(--adj-color)' : (selectedAngle === 'B' ? 'var(--opp-color)' : 'rgba(255,255,255,0.3)');
    ctx.strokeStyle = selectedAngle === 'A' ? '#4ecdc4' : '#ff6b6b';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();

    // Opposite (right side, vertical)
    ctx.strokeStyle = selectedAngle === 'A' ? '#ff6b6b' : '#4ecdc4';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(cx2, cy2); ctx.stroke();

    // Hypotenuse
    ctx.strokeStyle = '#e8a530';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(cx2, cy2); ctx.stroke();

    // Labels
    ctx.font = '14px "DM Sans", sans-serif';
    ctx.textAlign = 'center';

    // Hypotenuse label
    const hMidX = (ax + cx2) / 2 - 16;
    const hMidY = (ay + cy2) / 2;
    ctx.fillStyle = '#e8a530';
    ctx.save();
    const hAngle = Math.atan2(cy2 - ay, cx2 - ax);
    ctx.translate(hMidX, hMidY);
    ctx.rotate(hAngle);
    ctx.fillText('hypotenuse', 0, -10);
    ctx.restore();

    // Adjacent / opposite labels depending on selected angle
    if (selectedAngle === 'A') {
      // A is at bottom-left
      ctx.fillStyle = '#4ecdc4';
      ctx.fillText('adjacent', (ax + bx) / 2, ay + 24);
      ctx.fillStyle = '#ff6b6b';
      ctx.fillText('opposite', bx + 44, (by + cy2) / 2);
    } else {
      // B is at top-right
      ctx.fillStyle = '#ff6b6b';
      ctx.fillText('opposite', (ax + bx) / 2, ay + 24);
      ctx.fillStyle = '#4ecdc4';
      ctx.fillText('adjacent', bx + 44, (by + cy2) / 2);
    }

    // Angle arc at A
    const arcR = 30;
    ctx.strokeStyle = selectedAngle === 'A' ? 'rgba(232,165,48,0.7)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(ax, ay, arcR, -theta, 0);
    ctx.stroke();

    ctx.fillStyle = selectedAngle === 'A' ? '#e8a530' : 'rgba(255,255,255,0.3)';
    ctx.font = 'italic 16px "Instrument Serif", serif';
    ctx.fillText(selectedAngle === 'A' ? `\u03b8 = ${Math.round(angle)}\u00b0` : `${Math.round(angle)}\u00b0`, ax + arcR + 20, ay - 8);

    // Angle arc at B (top vertex)
    const bArcR = 22;
    const bAngle = (90 - angle) * DEG;
    ctx.strokeStyle = selectedAngle === 'B' ? 'rgba(232,165,48,0.7)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx2, cy2, bArcR, Math.PI / 2, Math.PI / 2 + bAngle);
    ctx.stroke();

    ctx.fillStyle = selectedAngle === 'B' ? '#e8a530' : 'rgba(255,255,255,0.3)';
    ctx.font = 'italic 16px "Instrument Serif", serif';
    ctx.fillText(selectedAngle === 'B' ? `\u03b8 = ${Math.round(90 - angle)}\u00b0` : `${Math.round(90 - angle)}\u00b0`, cx2 - 36, cy2 + bArcR + 18);

    // Vertex labels
    ctx.font = '600 13px "DM Sans", sans-serif';
    ctx.fillStyle = 'var(--text-secondary)';
    ctx.fillText('A', ax - 14, ay + 6);
    ctx.fillText('B', cx2 + 4, cy2 - 12);
    ctx.fillText('C', bx + 14, by + 6);

    // Draggable indicator at B vertex
    ctx.fillStyle = 'rgba(232,165,48,0.8)';
    ctx.beginPath(); ctx.arc(cx2, cy2, 7, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(232,165,48,0.2)';
    ctx.beginPath(); ctx.arc(cx2, cy2, 14, 0, TAU); ctx.fill();

  }, [angle, dims, selectedAngle]);

  const handlePointer = useCallback((e) => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const pad = 60;
    const ax = pad + 30;
    const ay = dims.h - pad;
    const bx = ax + dims.w * 0.45;
    const dy = ay - my;
    const dx = bx - ax;
    let newAngle = Math.atan2(dy, dx) * RAD;
    newAngle = clamp(newAngle, 10, 80);
    setAngle(newAngle);
  }, [dims]);

  const handleDown = useCallback((e) => {
    setDragging(true);
    handlePointer(e);
  }, [handlePointer]);

  useEffect(() => {
    if (!dragging) return;
    const move = (e) => { e.preventDefault(); handlePointer(e); };
    const up = () => setDragging(false);
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    return () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
  }, [dragging, handlePointer]);

  const oppLen = Math.tan(angle * DEG);
  const hypLen = 1 / Math.cos(angle * DEG);

  return (
    <div style={{ animation: 'fadeInUp 0.7s var(--ease-out-expo) both' }}>
      <div style={{ textAlign: 'center', marginBottom: 24 }}>
        <h2 style={{
          fontFamily: 'var(--font-display)', fontSize: 'clamp(28px, 5vw, 40px)',
          fontWeight: 400, marginBottom: 8,
        }}>Right Triangles</h2>
        <p style={{ fontFamily: 'var(--font-body)', fontSize: 15, color: 'var(--text-secondary)', maxWidth: 500, margin: '0 auto', lineHeight: 1.6 }}>
          Every right triangle has three sides named relative to a chosen angle.
          Drag the vertex to reshape the triangle.
        </p>
      </div>

      <div style={{ display: 'flex', justifyContent: 'center', gap: 12, marginBottom: 20 }}>
        {['A', 'B'].map(a => (
          <button key={a} onClick={() => setSelectedAngle(a)} style={{
            fontFamily: 'var(--font-mono)', fontSize: 13,
            color: selectedAngle === a ? '#fff' : 'var(--text-secondary)',
            background: selectedAngle === a ? 'rgba(232,165,48,0.2)' : 'var(--bg-card)',
            border: `1px solid ${selectedAngle === a ? 'rgba(232,165,48,0.4)' : 'var(--border-subtle)'}`,
            borderRadius: 8, padding: '8px 20px', cursor: 'pointer', transition: 'all 0.3s',
          }}>
            View from angle {a}
          </button>
        ))}
      </div>

      <div ref={containerRef} style={{
        borderRadius: 16, overflow: 'hidden',
        border: '1px solid var(--border-subtle)', background: 'rgba(0,0,0,0.3)',
        cursor: dragging ? 'grabbing' : 'grab', touchAction: 'none',
      }}
        onPointerDown={handleDown}
      >
        {dims.w > 0 && <canvas ref={canvasRef} style={{ width: dims.w, height: dims.h }} />}
      </div>

      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12,
        marginTop: 20, maxWidth: 500, margin: '20px auto 0',
      }}>
        {[
          { label: 'Hypotenuse', color: '#e8a530', value: fmt(hypLen) },
          { label: selectedAngle === 'A' ? 'Opposite' : 'Adjacent', color: selectedAngle === 'A' ? '#ff6b6b' : '#4ecdc4', value: fmt(oppLen) },
          { label: selectedAngle === 'A' ? 'Adjacent' : 'Opposite', color: selectedAngle === 'A' ? '#4ecdc4' : '#ff6b6b', value: '1.00' },
        ].map((s, i) => (
          <div key={i} style={{
            background: 'var(--bg-card)', border: '1px solid var(--border-subtle)',
            borderRadius: 10, padding: '12px 16px', textAlign: 'center',
          }}>
            <div style={{
              fontFamily: 'var(--font-mono)', fontSize: 11, color: s.color,
              textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 4,
            }}>{s.label}</div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 20, color: 'var(--text-primary)' }}>{s.value}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ================================================================
   STEP 3 — SOH-CAH-TOA
   ================================================================ */
function StepSOHCAHTOA() {
  const [angle, setAngle] = useState(45);
  const sinVal = Math.sin(angle * DEG);
  const cosVal = Math.cos(angle * DEG);
  const tanVal = Math.tan(angle * DEG);

  const ratios = [
    { name: 'SOH', fn: 'sin', formula: 'Opposite / Hypotenuse', value: sinVal, color: '#ff6b6b',
      parts: [{ text: 'S', highlight: true, c: '#ff6b6b' }, { text: 'O', highlight: true, c: '#ff6b6b' }, { text: 'H', highlight: true, c: '#e8a530' }],
      num: 'Opposite', den: 'Hypotenuse', numC: '#ff6b6b', denC: '#e8a530' },
    { name: 'CAH', fn: 'cos', formula: 'Adjacent / Hypotenuse', value: cosVal, color: '#4ecdc4',
      parts: [{ text: 'C', highlight: true, c: '#4ecdc4' }, { text: 'A', highlight: true, c: '#4ecdc4' }, { text: 'H', highlight: true, c: '#e8a530' }],
      num: 'Adjacent', den: 'Hypotenuse', numC: '#4ecdc4', denC: '#e8a530' },
    { name: 'TOA', fn: 'tan', formula: 'Opposite / Adjacent', value: tanVal, color: '#e8a530',
      parts: [{ text: 'T', highlight: true, c: '#e8a530' }, { text: 'O', highlight: true, c: '#ff6b6b' }, { text: 'A', highlight: true, c: '#4ecdc4' }],
      num: 'Opposite', den: 'Adjacent', numC: '#ff6b6b', denC: '#4ecdc4' },
  ];

  return (
    <div style={{ animation: 'fadeInUp 0.7s var(--ease-out-expo) both' }}>
      <div style={{ textAlign: 'center', marginBottom: 32 }}>
        <h2 style={{
          fontFamily: 'var(--font-display)', fontSize: 'clamp(28px, 5vw, 40px)',
          fontWeight: 400, marginBottom: 8,
        }}>SOH-CAH-TOA</h2>
        <p style={{ fontFamily: 'var(--font-body)', fontSize: 15, color: 'var(--text-secondary)', maxWidth: 500, margin: '0 auto', lineHeight: 1.6 }}>
          The three fundamental trigonometric ratios. Adjust the angle and watch the ratios change.
        </p>
      </div>

      <div style={{ textAlign: 'center', marginBottom: 28 }}>
        <div style={{
          fontFamily: 'var(--font-display)', fontStyle: 'italic',
          fontSize: 36, color: 'var(--accent)', marginBottom: 8,
        }}>&theta; = {Math.round(angle)}&deg;</div>
        <input type="range" min="5" max="85" value={angle}
          onChange={e => setAngle(Number(e.target.value))}
          style={{ width: '100%', maxWidth: 320, accentColor: 'var(--accent)' }}
        />
      </div>

      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))',
        gap: 16, maxWidth: 760, margin: '0 auto',
      }}>
        {ratios.map((r, i) => (
          <div key={i} style={{
            background: 'var(--bg-card)', border: '1px solid var(--border-subtle)',
            borderRadius: 14, padding: '24px 20px', textAlign: 'center',
            transition: 'border-color 0.3s',
          }}>
            {/* Mnemonic */}
            <div style={{ marginBottom: 16, display: 'flex', justifyContent: 'center', gap: 2 }}>
              {r.parts.map((p, j) => (
                <span key={j} style={{
                  fontFamily: 'var(--font-display)', fontSize: 32, fontWeight: 400,
                  color: p.c, lineHeight: 1,
                }}>{p.text}</span>
              ))}
            </div>

            {/* Function name */}
            <div style={{
              fontFamily: 'var(--font-mono)', fontSize: 14, color: r.color,
              marginBottom: 12, letterSpacing: '0.04em',
            }}>
              {r.fn}(&theta;)
            </div>

            {/* Fraction display */}
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, marginBottom: 16 }}>
              <span style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: r.numC }}>{r.num}</span>
              <div style={{ width: 80, height: 1, background: 'rgba(255,255,255,0.2)' }} />
              <span style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: r.denC }}>{r.den}</span>

            {/* Value */}

              fontFamily: 'var(--font-mono)', fontSize: 28, color: 'var(--text-primary)',
