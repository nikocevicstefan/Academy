function ScanlineViz(){
  const [scanY,setScanY]=useState(-1);
  const [isAnimating,setIsAnimating]=useState(false);
  const [filledRows,setFilledRows]=useState(new Set());
  const [speed,setSpeed]=useState(1); // 0.5x, 1x, 2x, 4x
  const speedRef=useRef(1);
  speedRef.current=speed;

  const W=400,H=300;
  const polygon=[
    {x:120,y:40},{x:260,y:30},{x:340,y:70},{x:360,y:140},
    {x:320,y:220},{x:270,y:260},{x:160,y:270},{x:80,y:230},
    {x:60,y:150},{x:80,y:80}
  ];

  const gridSize=15;
  const gridCols=Math.floor(W/gridSize);
  const gridRows=Math.floor(H/gridSize);

  function getIntersections(y){
    const intersections=[];
    for(let i=0;i<polygon.length;i++){
      const j=(i+1)%polygon.length;
      const yi=polygon[i].y, yj=polygon[j].y;
      if((yi<=y&&yj>y)||(yj<=y&&yi>y)){
        const t=(y-yi)/(yj-yi);
        const x=polygon[i].x+t*(polygon[j].x-polygon[i].x);
        intersections.push(x);
      }
    }
    return intersections.sort((a,b)=>a-b);
  }

  function startAnimation(){
    setIsAnimating(true);
    setFilledRows(new Set());
    setScanY(0);
  }

  function resetAnimation(){
    setIsAnimating(false);
    setFilledRows(new Set());
    setScanY(-1);
  }

  useEffect(()=>{
    if(!isAnimating||scanY<0)return;
    if(scanY>=gridRows){
      setIsAnimating(false);
      return;
    }
    const delay=Math.max(10,80/speedRef.current);
    const t=setTimeout(()=>{
      setFilledRows(prev=>{const n=new Set(prev);n.add(scanY);return n;});
      setScanY(s=>s+1);
    },delay);
    return()=>clearTimeout(t);
  },[scanY,isAnimating,speed]);

  const filledCells=useMemo(()=>{
    const cells=new Set();
    filledRows.forEach(row=>{
      const y=row*gridSize+gridSize/2;
      const ints=getIntersections(y);
      for(let p=0;p<ints.length-1;p+=2){
        const x1=Math.ceil(ints[p]/gridSize);
        const x2=Math.floor(ints[p+1]/gridSize);
        for(let c=x1;c<=x2;c++){
          cells.add(`${row}-${c}`);
        }
      }
    });
    return cells;
  },[filledRows]);

  const currentIntersections=scanY>=0&&scanY<gridRows?getIntersections(scanY*gridSize+gridSize/2):[];
  const isDone=!isAnimating&&filledCells.size>0;

  return(
    <div style={{margin:'24px 0'}}>
      {/* Controls row */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12,flexWrap:'wrap'}}>
        <button onClick={isDone?resetAnimation:startAnimation} disabled={isAnimating} style={{
          padding:'8px 18px',borderRadius:6,border:'none',cursor:isAnimating?'default':'pointer',
          fontFamily:'var(--font-mono)',fontSize:12,fontWeight:600,
          background:isAnimating?'var(--bg4)':isDone?'var(--bg3)':'var(--blue)',
          color:isAnimating?'var(--text-dim)':isDone?'var(--text)':'#000',
          transition:'all .2s',opacity:isAnimating?0.6:1
        }}>
          {isAnimating?'Scanning...':isDone?'Reset':'Run Scanline Fill'}
        </button>

        <div style={{display:'flex',alignItems:'center',gap:4,fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-dim)'}}>
          <span>Speed:</span>
          {[0.5,1,2,4].map(s=>(
            <button key={s} onClick={()=>setSpeed(s)} style={{
              padding:'4px 8px',borderRadius:4,border:'none',cursor:'pointer',
              fontFamily:'var(--font-mono)',fontSize:11,
              background:speed===s?'var(--amber)':'var(--bg3)',
              color:speed===s?'#000':'var(--text-dim)',
              transition:'all .15s'
            }}>{s}x</button>
          ))}
        </div>

        {filledCells.size>0&&(
          <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-dim)',marginLeft:'auto'}}>
            {filledCells.size} cells filled {isDone&&'✓'}
          </span>
        )}
      </div>

      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:520,background:'var(--bg2)',borderRadius:8,border:'1px solid var(--bg4)'}}>
        {Array.from({length:gridRows},(_,r)=>
          Array.from({length:gridCols},(_,c)=>{
            const isFilled=filledCells.has(`${r}-${c}`);
            return <rect key={`${r}-${c}`} x={c*gridSize} y={r*gridSize} width={gridSize-1} height={gridSize-1}
              fill={isFilled?'rgba(96,165,250,0.45)':'rgba(255,255,255,0.02)'} rx={1}
              style={{transition:'fill .12s'}}/>;
          })
        )}

        <polygon
          points={polygon.map(p=>`${p.x},${p.y}`).join(' ')}
          fill="none" stroke="var(--amber)" strokeWidth={2} strokeDasharray="6,3"/>

        {isAnimating&&scanY>=0&&scanY<gridRows&&(
          <>
            <line x1={0} y1={scanY*gridSize+gridSize/2} x2={W} y2={scanY*gridSize+gridSize/2}
              stroke="var(--red)" strokeWidth={1.5} opacity={0.9}/>
            {currentIntersections.map((x,i)=>(
              <circle key={i} cx={x} cy={scanY*gridSize+gridSize/2} r={4}
                fill="var(--red)" stroke="#fff" strokeWidth={1}/>
            ))}
          </>
        )}
      </svg>

      <div style={{marginTop:12,fontSize:13,color:'var(--text-dim)',lineHeight:1.8}}>
        For each row, the algorithm finds where the boundary edges cross that Y-coordinate (red dots), sorts them left-to-right,
        and fills cells between each pair using the <strong style={{color:'var(--text)'}}>even-odd rule</strong>: the first crossing means "entering the polygon," the second means "leaving it," the third means "entering again," and so on. Everything between an odd-numbered crossing and the next even-numbered crossing is inside.
      </div>
    </div>
  );
}

function Step4(){
  return(
    <div>
      <SectionLabel number={4} title="Boundary Rasterization"/>

      <p style={{fontSize:16,lineHeight:1.9,marginBottom:16}}>
        The city's boundary polygon has <strong style={{color:'var(--text-bright)'}}>~23,000 vertices</strong>.
        Testing every grid cell with point-in-polygon would be ~70 billion operations.
        Instead, we use a <strong style={{color:'var(--text-bright)'}}>scanline fill algorithm</strong>.
      </p>

      <InfoCard accent="var(--blue)">
        <strong style={{color:'var(--blue)'}}>Scanline fill</strong> works like a printer — it processes one horizontal row at a time, finding where the polygon boundary crosses that row, then filling cells between crossings.
        The naive approach tests every cell against every boundary edge: 3 million cells × 23,000 edges = ~70 billion checks. Scanline fill only processes ~2,450 rows × 23,000 edges = ~56 million checks — over <strong style={{color:'var(--text-bright)'}}>1,000× faster</strong>. What would take hours finishes in seconds.
      </InfoCard>

      <h3 style={{fontFamily:'var(--font-display)',fontSize:20,color:'var(--text-bright)',margin:'32px 0 16px',fontWeight:500}}>
        Watch It Fill
      </h3>

      <ScanlineViz/>

      <h3 style={{fontFamily:'var(--font-display)',fontSize:20,color:'var(--text-bright)',margin:'32px 0 16px',fontWeight:500}}>
        The Math
      </h3>

      <p style={{fontSize:14,lineHeight:1.8,marginBottom:16}}>
        For each polygon edge crossing the scan row at latitude Y:
      </p>

      <CodeBlock label="Edge crossing formula" code={`t = (Y - lat_i) / (lat_j - lat_i)
lon_cross = lon_i + t * (lon_j - lon_i)

// Sort all crossings left-to-right
// Fill between pairs: [cross0..cross1], [cross2..cross3], ...`}/>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   STEP 5: MORPHOLOGICAL CLOSE
   ═══════════════════════════════════════════════ */
function MorphViz(){
  const [phase,setPhase]=useState('original'); // original | dilated | eroded
  const gSize=8;
  const cols=14,rows=10;

  // Create a grid with some holes
  const baseGrid=useMemo(()=>{
    const g=Array(rows).fill(null).map(()=>Array(cols).fill(0));
    // Fill a rough circle of "restricted"
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const d=Math.sqrt((c-6)**2+(r-4.5)**2);
        if(d<4)g[r][c]=1;
      }
    }
    // Punch some holes
    g[3][5]=0;g[5][7]=0;g[4][4]=0;
    return g;
  },[]);

  // Dilate
  const dilatedGrid=useMemo(()=>{
    const g=baseGrid.map(r=>[...r]);
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        if(baseGrid[r][c])continue;
        const neighbors=[
          r>0&&baseGrid[r-1][c],
          r<rows-1&&baseGrid[r+1][c],
          c>0&&baseGrid[r][c-1],
          c<cols-1&&baseGrid[r][c+1],
        ];
        if(neighbors.some(Boolean))g[r][c]=1;
      }
    }
    return g;
  },[baseGrid]);

  // Erode (from dilated)
  const erodedGrid=useMemo(()=>{
    const g=dilatedGrid.map(r=>[...r]);
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        if(!dilatedGrid[r][c])continue;
        const neighbors=[
          r>0?dilatedGrid[r-1][c]:0,
          r<rows-1?dilatedGrid[r+1][c]:0,
          c>0?dilatedGrid[r][c-1]:0,
          c<cols-1?dilatedGrid[r][c+1]:0,
        ];
        if(!neighbors.every(Boolean))g[r][c]=0;
      }
    }
    return g;
  },[dilatedGrid]);

  const currentGrid=phase==='original'?baseGrid:phase==='dilated'?dilatedGrid:erodedGrid;
  const cellPx=28;

  // Count differences
  const holesFixed=useMemo(()=>{
    let count=0;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      if(!baseGrid[r][c]&&erodedGrid[r][c])count++;
    }
    return count;
  },[baseGrid,erodedGrid]);

  return(
    <div style={{margin:'24px 0'}}>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        {[
          {id:'original',label:'Original',color:'var(--red)'},
          {id:'dilated',label:'Step 1: Dilate',color:'var(--amber)'},
          {id:'eroded',label:'Step 2: Erode',color:'var(--green)'},
        ].map(b=>(
          <button key={b.id} onClick={()=>setPhase(b.id)} style={{
            padding:'8px 14px',borderRadius:6,border:'none',cursor:'pointer',
            fontFamily:'var(--font-mono)',fontSize:12,transition:'all .2s',
            background:phase===b.id?b.color:'var(--bg3)',
            color:phase===b.id?'#000':'var(--text-dim)'
          }}>{b.label}</button>
        ))}
      </div>

      <svg viewBox={`0 0 ${cols*cellPx} ${rows*cellPx}`} style={{width:'100%',maxWidth:cols*cellPx*1.5,background:'var(--bg2)',borderRadius:8,border:'1px solid var(--bg4)'}}>
        {currentGrid.map((row,r)=>row.map((val,c)=>{
          const wasHole=!baseGrid[r][c]&&currentGrid[r][c];
          const willBeFilled=!baseGrid[r][c]&&erodedGrid[r][c];
          return(
            <rect key={`${r}-${c}`} x={c*cellPx+1} y={r*cellPx+1} width={cellPx-2} height={cellPx-2} rx={3}
              fill={val?(wasHole?'#f59e0b80':'#e0555580'):'#ffffff06'}
              stroke={phase==='original'&&willBeFilled?'var(--amber)':'transparent'}
              strokeWidth={1} strokeDasharray={phase==='original'?'3,2':''}
              style={{transition:'fill .3s'}}/>
          );
        }))}
      </svg>

      <div style={{marginTop:12,display:'flex',gap:16,flexWrap:'wrap',fontSize:12,fontFamily:'var(--font-mono)'}}>
        <span style={{color:'var(--red)'}}>■ Restricted</span>
        {phase!=='original'&&<span style={{color:'var(--amber)'}}>■ Filled gap</span>}
        {phase==='original'&&<span style={{color:'var(--amber)'}}>┅ Gap (will be fixed)</span>}
      </div>
      <div style={{marginTop:8,fontSize:13,color:'var(--text-dim)'}}>
        {phase==='original'&&`3 single-cell holes visible (dashed outline). These cells' center points landed on awkward spots in the road network, producing walking distances just over the threshold while all neighbors are under it.`}
        {phase==='dilated'&&`Dilate: every empty cell that touches a restricted neighbor becomes restricted too. This fills the holes — but notice the entire shape grew one cell outward in every direction.`}
        {phase==='eroded'&&`Erode: remove any restricted cell that touches an empty neighbor. The outer boundary shrinks back to its original position. But the filled holes stay filled (they're fully surrounded), so ${holesFixed} gaps are permanently closed.`}
      </div>
    </div>
  );
}

function Step5(){
  return(
    <div>
      <SectionLabel number={5} title="Morphological Close"/>

      <p style={{fontSize:16,lineHeight:1.9,marginBottom:16}}>
        After computing all grid distances, we noticed <strong style={{color:'var(--text-bright)'}}>single-cell holes</strong> scattered through the restricted grid — isolated "permitted" cells completely surrounded by restricted ones. Why?
      </p>

      <InfoCard accent="var(--blue)">
        <strong style={{color:'var(--blue)'}}>What causes these holes?</strong> Each grid cell's distance is measured from the cell's center point. Sometimes that center point falls on an awkward spot in the road network — like just past an intersection where Valhalla has to route <em>around</em> a block instead of straight through. The walking distance comes out to, say, 103m while all four neighbors are 82–92m. It's not that the cell is truly "permitted" — it's a quirk of where the center point landed relative to the street grid.
      </InfoCard>

      <p style={{fontSize:14,lineHeight:1.8,color:'var(--text)',margin:'20px 0 16px'}}>
        To fix these holes without moving the zone boundaries, we borrow a technique from <strong style={{color:'var(--text-bright)'}}>image processing</strong> called a <strong style={{color:'var(--text-bright)'}}>morphological close</strong>. It's a two-step operation: <em>dilate</em> (grow), then <em>erode</em> (shrink). The net effect fills small interior gaps while leaving the outer boundary unchanged.
      </p>

      <div style={{display:'grid',gap:12,margin:'16px 0'}}>
        <div style={{background:'var(--bg2)',borderRadius:8,padding:'14px 18px',borderLeft:'3px solid var(--amber)'}}>
          <div style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--amber)',fontWeight:500,marginBottom:4}}>Step 1: Dilate (grow)</div>
          <div style={{fontSize:13,color:'var(--text-dim)',lineHeight:1.7}}>Look at every empty cell. If any of its immediate neighbors (up, down, left, right) is restricted, mark it as restricted too. This fills all the holes — but it also makes the entire zone one cell bigger in every direction.</div>
        </div>
        <div style={{background:'var(--bg2)',borderRadius:8,padding:'14px 18px',borderLeft:'3px solid var(--green)'}}>
          <div style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--green)',fontWeight:500,marginBottom:4}}>Step 2: Erode (shrink)</div>
          <div style={{fontSize:13,color:'var(--text-dim)',lineHeight:1.7}}>Now look at every restricted cell in the dilated result. If any of its immediate neighbors is <em>not</em> restricted, remove the restriction. This shrinks the boundary back to its original position. The holes that were filled in step 1 stay filled, because after dilation they're completely surrounded by restricted cells and the erosion has no effect on them.</div>
        </div>
      </div>

      <h3 style={{fontFamily:'var(--font-display)',fontSize:20,color:'var(--text-bright)',margin:'32px 0 16px',fontWeight:500}}>
        Step Through the Process
      </h3>

      <MorphViz/>

      <div style={{background:'var(--bg2)',borderRadius:8,padding:20,margin:'24px 0'}}>
        <div style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--text-dim)',marginBottom:12,letterSpacing:1}}>IN PRACTICE</div>
        <KeyValue label="Gaps filled across full grid" value="~3,200" color="var(--amber)"/>
        <KeyValue label="Boundary expansion" value="0 cells" color="var(--green)"/>
        <KeyValue label="Processing time" value="< 1 second (single pass over grid)" color="var(--text)"/>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   STEP 6: MARCHING SQUARES
   ═══════════════════════════════════════════════ */
function MarchingSquaresViz(){
  const cols=10,rows=8;
  const cellPx=40;
  const [showContour,setShowContour]=useState(false);

  const grid=useMemo(()=>{
    const g=Array(rows).fill(null).map(()=>Array(cols).fill(0));
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const d=Math.sqrt((c-4.5)**2+(r-3.5)**2);
        if(d<3)g[r][c]=1;
      }
    }
    return g;
  },[]);

  // Compute contour edges using marching squares
  // Reference point = center of the 2×2 block (where 4 cells meet)
  const contourEdges=useMemo(()=>{
    const edges=[];
    for(let r=0;r<rows-1;r++){
      for(let c=0;c<cols-1;c++){
        const tl=grid[r][c],tr=grid[r][c+1],br=grid[r+1][c+1],bl=grid[r+1][c];
        const idx=(tl<<3)|(tr<<2)|(br<<1)|bl;
        if(idx===0||idx===15)continue;

        // Block center = corner shared by all 4 cells
        const cx=(c+1)*cellPx, cy=(r+1)*cellPx;
        const h=cellPx/2;

        const add=(dx1,dy1,dx2,dy2)=>edges.push({x1:cx+dx1,y1:cy+dy1,x2:cx+dx2,y2:cy+dy2});

        if(idx===1||idx===14)add(-h,0,0,h);
        else if(idx===2||idx===13)add(0,h,h,0);
        else if(idx===4||idx===11)add(h,0,0,-h);
        else if(idx===8||idx===7)add(0,-h,-h,0);
        else if(idx===3||idx===12)add(-h,0,h,0);
        else if(idx===6||idx===9)add(0,-h,0,h);
        else if(idx===5){add(-h,0,0,-h);add(0,h,h,0);}
        else if(idx===10){add(0,-h,h,0);add(-h,0,0,h);}
      }
    }
    return edges;
  },[grid]);

  // Chain edges into a closed polygon path for clean rendering
  const contourPath=useMemo(()=>{
    if(contourEdges.length===0)return'';
    const key=(x,y)=>`${Math.round(x)},${Math.round(y)}`;
    const adj=new Map();
    contourEdges.forEach((e,i)=>{
      const k1=key(e.x1,e.y1),k2=key(e.x2,e.y2);
      if(!adj.has(k1))adj.set(k1,[]);
      if(!adj.has(k2))adj.set(k2,[]);
      adj.get(k1).push({to:k2,idx:i});
      adj.get(k2).push({to:k1,idx:i});
    });
    const used=new Set();
    const pts=[];
    let cur=key(contourEdges[0].x1,contourEdges[0].y1);
    pts.push(cur);
    for(let safe=0;safe<contourEdges.length*2;safe++){
      const nbrs=adj.get(cur)||[];
      const next=nbrs.find(n=>!used.has(n.idx));
      if(!next)break;
      used.add(next.idx);
      cur=next.to;
      pts.push(cur);
    }
    return pts.map((p,i)=>(i===0?'M':'L')+p.replace(',',' ')).join(' ')+'Z';
  },[contourEdges]);

  const W=cols*cellPx, H=rows*cellPx;

  return(
    <div style={{margin:'24px 0'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
        <button onClick={()=>setShowContour(!showContour)} style={{
          padding:'8px 16px',borderRadius:6,border:'none',cursor:'pointer',
          fontFamily:'var(--font-mono)',fontSize:12,fontWeight:600,
          background:showContour?'var(--green)':'var(--bg3)',
          color:showContour?'#000':'var(--text-dim)',transition:'all .2s'
        }}>
          {showContour?'Showing Contour':'Show Contour'}
        </button>
        {showContour&&<span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-dim)'}}>
          {contourEdges.length} edge segments → 1 closed polygon
        </span>}
      </div>

      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:520,display:'block',background:'var(--bg2)',borderRadius:8,border:'1px solid var(--bg4)'}}>
        {grid.map((row,r)=>row.map((val,c)=>(
          <rect key={`${r}-${c}`} x={c*cellPx+2} y={r*cellPx+2} width={cellPx-4} height={cellPx-4} rx={4}
            fill={val?'#e0555540':'#ffffff06'}/>
        )))}

        {/* Corner dots — green where restricted meets permitted */}
        {Array.from({length:rows+1},(_,r)=>
          Array.from({length:cols+1},(_,c)=>{
            const samples=[
              r>0&&c>0?grid[r-1][c-1]:0,
              r>0&&c<cols?grid[r-1][c]:0,
              r<rows&&c<cols?grid[r][c]:0,
              r<rows&&c>0?grid[r][c-1]:0,
            ];
            const any=samples.some(Boolean);
            const all=samples.every(Boolean);
            return(
              <circle key={`d${r}-${c}`} cx={c*cellPx} cy={r*cellPx} r={showContour&&any&&!all?3:2}
                fill={showContour?(any&&!all?'var(--green)':'#ffffff10'):'#ffffff15'}/>
            );
          })
        )}

        {/* Contour as a single closed path */}
        {showContour&&contourPath&&(
          <path d={contourPath} fill="none" stroke="var(--green)" strokeWidth={2.5}
            strokeLinejoin="round" strokeLinecap="round"/>
        )}
      </svg>

      <div style={{marginTop:12,fontSize:13,color:'var(--text-dim)',lineHeight:1.8}}>
        The green dots highlight corners where restricted and permitted cells meet — these are the "interesting" spots where a boundary line is needed. The algorithm marches through each 2×2 block, decides which of 16 possible patterns it matches, and draws the corresponding line segment. When all segments connect, they form the <strong style={{color:'var(--text)'}}>polygon boundary</strong>.
      </div>
    </div>
  );
}

function Step6(){
  return(
    <div>
      <SectionLabel number={6} title="Grid to Polygon"/>

      <p style={{fontSize:16,lineHeight:1.9,marginBottom:16}}>
        We now have a binary grid — each cell is either 1 (restricted) or 0 (permitted). But the map on the frontend can't display a grid directly. It needs <strong style={{color:'var(--text-bright)'}}>polygons</strong> — shapes defined by coordinates — that it can draw as colored overlays. We need to convert the grid into polygon outlines.
      </p>

      <h3 style={{fontFamily:'var(--font-display)',fontSize:20,color:'var(--text-bright)',margin:'32px 0 16px',fontWeight:500}}>
        Marching Squares Algorithm
      </h3>

      <p style={{fontSize:14,lineHeight:1.8,color:'var(--text)',marginBottom:16}}>
        <strong style={{color:'var(--text-bright)'}}>Marching squares</strong> is an algorithm that finds boundaries in a grid. It's called "marching" because it walks through the grid one 2×2 block at a time, like a soldier marching in formation.
      </p>

      <p style={{fontSize:14,lineHeight:1.8,color:'var(--text)',marginBottom:16}}>
        At each 2×2 block, it looks at the four corner values (each is 0 or 1). With 4 corners and 2 possible values each, there are 2⁴ = <strong style={{color:'var(--text-bright)'}}>16 possible patterns</strong>. For each pattern, there's a predefined rule about where to draw a line segment — for example, if the top-left and top-right are 1 but the bottom corners are 0, draw a horizontal line across the middle. Connect all these little segments and you get a polygon boundary.
      </p>

      <p style={{fontSize:14,lineHeight:1.8,color:'var(--text)',marginBottom:16}}>
        We use a library called <strong style={{color:'var(--text-bright)'}}>d3-contour</strong> (part of the popular D3.js data visualization toolkit) which implements marching squares for us. Toggle the contour to see the polygon boundary it produces:
      </p>

      <MarchingSquaresViz/>

      <h3 style={{fontFamily:'var(--font-display)',fontSize:20,color:'var(--text-bright)',margin:'32px 0 16px',fontWeight:500}}>
        Post-Processing
      </h3>

      <p style={{fontSize:14,lineHeight:1.8,color:'var(--text)',marginBottom:16}}>
        The marching squares output is in grid coordinates (column 5, row 12). We need to transform it into geographic coordinates (latitude/longitude), clip it to the city boundary, and simplify it to reduce file size:
      </p>

      <div style={{display:'flex',flexWrap:'wrap',gap:8,margin:'16px 0',alignItems:'center'}}>
        {['Marching squares output','Transform to lat/lon','Clip to city boundary','Simplify (3m tolerance)','GeoJSON file'].map((s,i,arr)=>(
          <Fragment key={i}>
            <div style={{padding:'8px 12px',background:'var(--bg3)',borderRadius:6,fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text)'}}>{s}</div>
            {i<arr.length-1&&<span style={{color:'var(--text-dim)',fontSize:12}}>→</span>}
          </Fragment>
        ))}
      </div>

      <InfoCard accent="var(--amber)">
        <strong style={{color:'var(--amber)'}}>Why 3m simplification?</strong> Simplification removes points from the polygon to shrink the file. The grid has 15m resolution, so using the default 10m simplification would erase entire grid cells worth of detail, potentially marking restricted cells as permitted. A tighter 3m tolerance keeps the boundary faithful to the grid while still cutting file size significantly.
      </InfoCard>

      <ComparisonTable
        headers={['Metric','Isochrone','Grid-Exact']}
        rows={[
          ['Boundary style','Smooth, rounded','Angular, stepped (15m grid)'],
          ['Accuracy','~24m error','Exact to grid resolution'],
          ['restricted-zones.geojson','~180 KB','~458 KB'],
          ['Total geo/ output','~500 KB','~1.2 MB'],
        ]}
      />

      {/* Completion */}
      <div style={{textAlign:'center',margin:'48px 0 24px',padding:32,background:'var(--bg2)',borderRadius:12,border:'1px solid var(--bg4)'}}>
        <div style={{fontSize:32,fontFamily:'var(--font-display)',fontWeight:700,color:'var(--text-bright)',marginBottom:8}}>Lesson Complete</div>
        <p style={{color:'var(--text-dim)',fontSize:14,maxWidth:400,margin:'0 auto',lineHeight:1.7}}>
          You've walked through the full pipeline: from understanding the problem, through isochrone limitations, to grid-exact computation with marching squares polygon extraction.
        </p>
        <div style={{display:'flex',gap:12,justifyContent:'center',marginTop:24,flexWrap:'wrap'}}>
          <Tag color="var(--green)">Exact distances</Tag>
          <Tag color="var(--red)">Precision-critical</Tag>
          <Tag color="var(--blue)">Grid-exact</Tag>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════ */
function App(){
  const [step,setStep]=useState(0);
  const contentRef=useRef(null);
  const totalSteps=7; // 0=landing + 6 lesson steps

  const goTo=useCallback((s)=>{
    setStep(Math.max(0,Math.min(totalSteps-1,s)));
    window.scrollTo({top:0,behavior:'smooth'});
  },[]);

  const onNext=useCallback(()=>goTo(step+1),[step,goTo]);
  const onPrev=useCallback(()=>goTo(step-1),[step,goTo]);

  // Keyboard navigation
  useEffect(()=>{
    const handler=(e)=>{
      if(e.key==='ArrowRight'||e.key==='ArrowDown')onNext();
      if(e.key==='ArrowLeft'||e.key==='ArrowUp')onPrev();
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[onNext,onPrev]);

  const stepComponents=[
    <StepLanding key={0} onNext={onNext}/>,
    <Step1 key={1}/>,
    <Step2 key={2}/>,
    <Step3 key={3}/>,
    <Step4 key={4}/>,
    <Step5 key={5}/>,
    <Step6 key={6}/>,
  ];

  return(
    <div>
      <ProgressBar current={step} total={totalSteps}/>
      {step>0&&<StepDots current={step-1} total={totalSteps-1} onNavigate={(i)=>goTo(i+1)}/>}

      <div ref={contentRef} style={{
        maxWidth:720,margin:'0 auto',padding:step===0?'0':'80px 24px 80px',
        animation:'fadeIn .4s ease',
      }}>
        {stepComponents[step]}
        {step>0&&<NavButtons current={step} total={totalSteps} onPrev={onPrev} onNext={onNext}/>}
      </div>

      {/* Keyboard hint */}
      {step>0&&(
        <div style={{position:'fixed',bottom:16,left:'50%',transform:'translateX(-50%)',
          fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-dim)',opacity:.4,
          display:'flex',gap:8,alignItems:'center'}}>
          <kbd style={{padding:'2px 6px',background:'var(--bg3)',borderRadius:3,border:'1px solid var(--bg4)'}}>←</kbd>
          <kbd style={{padding:'2px 6px',background:'var(--bg3)',borderRadius:3,border:'1px solid var(--bg4)'}}>→</kbd>
          <span>to navigate</span>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
