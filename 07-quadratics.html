<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quadratic Equations — Math Foundations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #06060b;
    --bg-primary: #0a0a12;
    --bg-card: rgba(255, 255, 255, 0.03);
    --bg-card-hover: rgba(255, 255, 255, 0.06);
    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-hover: rgba(255, 255, 255, 0.12);
    --text-primary: #e8e6f0;
    --text-secondary: rgba(232, 230, 240, 0.55);
    --text-tertiary: rgba(232, 230, 240, 0.3);
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --accent: #d946a8;
    --accent-bright: #f472c4;
    --accent-dim: #9d2a7a;
    --accent-glow: rgba(217, 70, 168, 0.3);
    --accent2: #a855f7;
    --accent3: #ec4899;
    --success: #4ade80;
    --warning: #fbbf24;
    --error: #f87171;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
  }

  html {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    min-height: 100vh;
    overflow-x: hidden;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(217, 70, 168, 0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 50%, rgba(168, 85, 247, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 20% 80%, rgba(236, 72, 153, 0.03) 0%, transparent 50%),
      var(--bg-deep);
  }

  #root { min-height: 100vh; }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.3;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

  ::selection {
    background: rgba(217, 70, 168, 0.3);
    color: #fff;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseGlow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes drawParabola {
    from { stroke-dashoffset: 2000; }
    to { stroke-dashoffset: 0; }
  }
  @keyframes revealFormula {
    0% { opacity: 0; transform: scale(0.8) translateY(20px); filter: blur(8px); }
    60% { opacity: 1; transform: scale(1.05) translateY(-4px); filter: blur(0); }
    100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(217,70,168,0.2), 0 0 60px rgba(217,70,168,0.05); }
    50% { box-shadow: 0 0 30px rgba(217,70,168,0.35), 0 0 80px rgba(217,70,168,0.1); }
  }
  @keyframes colorShift {
    0%, 100% { color: var(--accent-bright); }
    33% { color: var(--accent2); }
    66% { color: var(--accent3); }
  }
  @keyframes vertexPulse {
    0%, 100% { r: 5; }
    50% { r: 7; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, Fragment } = React;

/* ═══════════════════════════════════════════
   UTILITY FUNCTIONS
   ═══════════════════════════════════════════ */

function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

function solveQuadratic(a, b, c) {
  const disc = b * b - 4 * a * c;
  if (disc > 0) {
    const r1 = (-b + Math.sqrt(disc)) / (2 * a);
    const r2 = (-b - Math.sqrt(disc)) / (2 * a);
    return { disc, roots: [Math.min(r1, r2), Math.max(r1, r2)], count: 2 };
  } else if (Math.abs(disc) < 1e-10) {
    return { disc: 0, roots: [-b / (2 * a)], count: 1 };
  }
  return { disc, roots: [], count: 0 };
}

function vertexFromStandard(a, b, c) {
  const h = -b / (2 * a);
  const k = a * h * h + b * h + c;
  return { h, k };
}

function fmt(n, decimals = 2) {
  if (Number.isInteger(n)) return String(n);
  return n.toFixed(decimals).replace(/\.?0+$/, '');
}

function generateFactorableProblem() {
  const problems = [
    { a: 1, b: -5, c: 6, factors: ['(x - 2)', '(x - 3)'], roots: [2, 3] },
    { a: 1, b: -7, c: 12, factors: ['(x - 3)', '(x - 4)'], roots: [3, 4] },
    { a: 1, b: 3, c: 2, factors: ['(x + 1)', '(x + 2)'], roots: [-1, -2] },
    { a: 1, b: -1, c: -6, factors: ['(x - 3)', '(x + 2)'], roots: [-2, 3] },
    { a: 1, b: 5, c: 6, factors: ['(x + 2)', '(x + 3)'], roots: [-3, -2] },
    { a: 1, b: -8, c: 15, factors: ['(x - 3)', '(x - 5)'], roots: [3, 5] },
    { a: 1, b: 1, c: -12, factors: ['(x + 4)', '(x - 3)'], roots: [-4, 3] },
    { a: 1, b: -2, c: -8, factors: ['(x - 4)', '(x + 2)'], roots: [-2, 4] },
  ];
  return problems[Math.floor(Math.random() * problems.length)];
}

/* ═══════════════════════════════════════════
   SHARED GRAPH COMPONENT (SVG Parabola)
   ═══════════════════════════════════════════ */

function ParabolaGraph({
  a = 1, b = 0, c = 0,
  width = 500, height = 380,
  xRange: xRangeProp, yRange: yRangeProp,
  showRoots = false, showVertex = false,
  showAxisOfSymmetry = false,
  showGrid = true, showLabels = true,
  animate = false, animKey = 0,
  secondCurve = null,
  highlightDiscriminant = false,
  interactive = false,
  onVertexDrag = null,
  style = {},
}) {
  const padding = { top: 20, right: 20, bottom: 30, left: 30 };
  const gw = width - padding.left - padding.right;
  const gh = height - padding.top - padding.bottom;

  const vertex = vertexFromStandard(a, b, c);
  const { disc, roots, count } = solveQuadratic(a, b, c);

  const xRange = xRangeProp || [vertex.h - 6, vertex.h + 6];
  const autoYMin = Math.min(vertex.k - 2, -2);
  const autoYMax = Math.max(vertex.k + 8, 8);
  const yRange = yRangeProp || [autoYMin, autoYMax];

  function toSvgX(x) { return padding.left + ((x - xRange[0]) / (xRange[1] - xRange[0])) * gw; }
  function toSvgY(y) { return padding.top + ((yRange[1] - y) / (yRange[1] - yRange[0])) * gh; }
  function fromSvgX(sx) { return xRange[0] + ((sx - padding.left) / gw) * (xRange[1] - xRange[0]); }
  function fromSvgY(sy) { return yRange[1] - ((sy - padding.top) / gh) * (yRange[1] - yRange[0]); }

  function buildPath(aa, bb, cc) {
    const steps = 200;
    let d = '';
    for (let i = 0; i <= steps; i++) {
      const x = xRange[0] + (i / steps) * (xRange[1] - xRange[0]);
      const y = aa * x * x + bb * x + cc;
      const sx = toSvgX(x);
      const sy = toSvgY(y);
      if (sy < -100 || sy > height + 100) {
        d += '';
        continue;
      }
      d += (d === '' || d.endsWith(' ')) ? `M${sx},${clamp(sy, -50, height + 50)}` : ` L${sx},${clamp(sy, -50, height + 50)}`;
    }
    return d;
  }

  const mainPath = buildPath(a, b, c);
  const secondPath = secondCurve ? buildPath(secondCurve.a, secondCurve.b, secondCurve.c) : null;

  const gridLinesX = [];
  const gridLinesY = [];
  for (let x = Math.ceil(xRange[0]); x <= Math.floor(xRange[1]); x++) gridLinesX.push(x);
  for (let y = Math.ceil(yRange[0]); y <= Math.floor(yRange[1]); y++) gridLinesY.push(y);

  const [dragging, setDragging] = useState(false);
  const svgRef = useRef(null);

  function handlePointerDown(e) {
    if (!interactive || !onVertexDrag) return;
    setDragging(true);
    e.target.setPointerCapture(e.pointerId);
  }
  function handlePointerMove(e) {
    if (!dragging || !svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    const mx = Math.round(fromSvgX(sx) * 2) / 2;
    const my = Math.round(fromSvgY(sy) * 2) / 2;
    onVertexDrag(mx, my);
  }
  function handlePointerUp() { setDragging(false); }

  return (
    <svg ref={svgRef} width={width} height={height} viewBox={`0 0 ${width} ${height}`}
      style={{ overflow: 'visible', display: 'block', margin: '0 auto', maxWidth: '100%', ...style }}
      onPointerMove={handlePointerMove}
      onPointerUp={handlePointerUp}
      onPointerLeave={handlePointerUp}
    >
      <defs>
        <clipPath id="graphClip"><rect x={padding.left} y={padding.top} width={gw} height={gh} /></clipPath>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur" /><feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
        <linearGradient id="parabolaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stopColor="#ec4899" />
          <stop offset="50%" stopColor="#d946a8" />
          <stop offset="100%" stopColor="#a855f7" />
        </linearGradient>
      </defs>

      {/* Background */}
      <rect x={padding.left} y={padding.top} width={gw} height={gh} fill="rgba(255,255,255,0.01)" rx="4" />

      {/* Grid */}
      {showGrid && (
        <g clipPath="url(#graphClip)" opacity="0.2">
          {gridLinesX.map(x => (
            <line key={`gx${x}`} x1={toSvgX(x)} y1={padding.top} x2={toSvgX(x)} y2={padding.top + gh}
              stroke="rgba(255,255,255,0.08)" strokeWidth={x === 0 ? 1 : 0.5} />
          ))}
          {gridLinesY.map(y => (
            <line key={`gy${y}`} x1={padding.left} y1={toSvgY(y)} x2={padding.left + gw} y2={toSvgY(y)}
              stroke="rgba(255,255,255,0.08)" strokeWidth={y === 0 ? 1 : 0.5} />
          ))}
        </g>
      )}

      {/* Axes */}
      {toSvgY(0) >= padding.top && toSvgY(0) <= padding.top + gh && (
        <line x1={padding.left} y1={toSvgY(0)} x2={padding.left + gw} y2={toSvgY(0)}
          stroke="rgba(255,255,255,0.2)" strokeWidth="1" />
      )}
      {toSvgX(0) >= padding.left && toSvgX(0) <= padding.left + gw && (
        <line x1={toSvgX(0)} y1={padding.top} x2={toSvgX(0)} y2={padding.top + gh}
          stroke="rgba(255,255,255,0.2)" strokeWidth="1" />
      )}

      {/* Axis labels */}
      {showLabels && (
        <g fontFamily="var(--font-mono)" fontSize="9" fill="rgba(255,255,255,0.25)">
          {gridLinesX.filter(x => x !== 0 && Math.abs(x) <= 10).map(x => (
            <text key={`lx${x}`} x={toSvgX(x)} y={toSvgY(0) + 14} textAnchor="middle">{x}</text>
          ))}
          {gridLinesY.filter(y => y !== 0 && Math.abs(y) <= 20).map(y => (
            <text key={`ly${y}`} x={toSvgX(0) - 8} y={toSvgY(y) + 3} textAnchor="end">{y}</text>
          ))}
        </g>
      )}

      {/* Axis of symmetry */}
      {showAxisOfSymmetry && (
        <line x1={toSvgX(vertex.h)} y1={padding.top} x2={toSvgX(vertex.h)} y2={padding.top + gh}
          stroke="rgba(168,85,247,0.3)" strokeWidth="1" strokeDasharray="6 4" clipPath="url(#graphClip)" />
      )}

      {/* Second curve */}
      {secondPath && (
        <path d={secondPath} fill="none" stroke="rgba(74,222,128,0.5)" strokeWidth="2"
          clipPath="url(#graphClip)" />
      )}

      {/* X axis highlight for discriminant */}
      {highlightDiscriminant && (
        <line x1={padding.left} y1={toSvgY(0)} x2={padding.left + gw} y2={toSvgY(0)}
          stroke={count === 2 ? 'rgba(74,222,128,0.4)' : count === 1 ? 'rgba(251,191,36,0.4)' : 'rgba(248,113,113,0.4)'}
          strokeWidth="2" clipPath="url(#graphClip)" />
      )}

      {/* Main parabola */}
      <path d={mainPath} fill="none" stroke="url(#parabolaGrad)" strokeWidth="2.5"
        clipPath="url(#graphClip)" filter="url(#glow)"
        style={animate ? {
          strokeDasharray: 2000,
          strokeDashoffset: 2000,
          animation: `drawParabola 2s var(--ease-out-expo) ${animKey}s forwards`,
        } : {}} />

      {/* Roots */}
      {showRoots && roots.map((r, i) => {
        const sx = toSvgX(r);
        const sy = toSvgY(0);
        if (sx < padding.left || sx > padding.left + gw) return null;
        return (
          <g key={`root${i}`}>
            <circle cx={sx} cy={sy} r="5" fill="var(--accent3)" stroke="rgba(236,72,153,0.4)" strokeWidth="2" filter="url(#glow)" />
            <text x={sx} y={sy + 18} textAnchor="middle" fontFamily="var(--font-mono)" fontSize="10" fill="var(--accent-bright)">
              x={fmt(r)}
            </text>
          </g>
        );
      })}

      {/* Vertex */}
      {showVertex && (
        <g style={{ cursor: interactive ? 'grab' : 'default' }}
          onPointerDown={handlePointerDown}>
          <circle cx={toSvgX(vertex.h)} cy={toSvgY(vertex.k)} r="5"
            fill="var(--accent2)" stroke="rgba(168,85,247,0.5)" strokeWidth="2" filter="url(#glow)"
            style={interactive ? {} : { animation: 'vertexPulse 2s ease-in-out infinite' }} />
          <text x={toSvgX(vertex.h)} y={toSvgY(vertex.k) - 12}
            textAnchor="middle" fontFamily="var(--font-mono)" fontSize="10" fill="var(--accent2)">
            ({fmt(vertex.h)}, {fmt(vertex.k)})
          </text>
        </g>
      )}
    </svg>
  );
}


/* ═══════════════════════════════════════════
   PROGRESS BAR COMPONENT
   ═══════════════════════════════════════════ */

function ProgressBar({ currentStep, totalSteps }) {
  const pct = ((currentStep) / (totalSteps - 1)) * 100;
  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: 'rgba(6,6,11,0.9)', backdropFilter: 'blur(12px)',
      borderBottom: '1px solid var(--border-subtle)',
      padding: '0 24px',
    }}>
      <div style={{ maxWidth: 900, margin: '0 auto' }}>
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '10px 0 6px',
        }}>
          <a href="index.html" style={{
            fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.06em',
            textTransform: 'uppercase', color: 'var(--text-tertiary)',
            textDecoration: 'none', transition: 'color 0.3s',
          }}
            onMouseEnter={e => e.target.style.color = 'var(--accent-bright)'}
            onMouseLeave={e => e.target.style.color = 'var(--text-tertiary)'}
          >
            &larr; Back to Lessons
          </a>
          <span style={{
            fontFamily: 'var(--font-mono)', fontSize: 11,
            color: 'var(--text-tertiary)', letterSpacing: '0.06em',
          }}>
            {currentStep + 1} / {totalSteps}
          </span>
        </div>
        <div style={{ height: 2, background: 'rgba(255,255,255,0.06)', borderRadius: 1, marginBottom: 2 }}>
          <div style={{
            height: '100%', width: `${pct}%`, borderRadius: 1,
            background: 'linear-gradient(90deg, #ec4899, #d946a8, #a855f7)',
            transition: 'width 0.6s var(--ease-out-expo)',
          }} />
        </div>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════
   NAVIGATION BUTTONS
   ═══════════════════════════════════════════ */

function NavButtons({ onPrev, onNext, prevLabel, nextLabel, nextDisabled = false }) {
  const btnBase = {
    fontFamily: 'var(--font-mono)', fontSize: 13, letterSpacing: '0.04em',
    padding: '12px 28px', borderRadius: 10, cursor: 'pointer',
    transition: 'all 0.3s var(--ease-out-expo)', border: 'none',
    fontWeight: 500,
  };

  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      marginTop: 48, gap: 16, flexWrap: 'wrap',
    }}>
      {onPrev ? (
        <button onClick={onPrev} style={{
          ...btnBase,
          background: 'rgba(255,255,255,0.04)',
          color: 'var(--text-secondary)',
          border: '1px solid var(--border-subtle)',
        }}
          onMouseEnter={e => { e.target.style.background = 'rgba(255,255,255,0.08)'; e.target.style.color = 'var(--text-primary)'; }}
          onMouseLeave={e => { e.target.style.background = 'rgba(255,255,255,0.04)'; e.target.style.color = 'var(--text-secondary)'; }}
        >
          &larr; {prevLabel || 'Previous'}
        </button>
      ) : <div />}
      {onNext && (
        <button onClick={onNext} disabled={nextDisabled} style={{
          ...btnBase,
          background: nextDisabled ? 'rgba(255,255,255,0.04)' : 'linear-gradient(135deg, var(--accent), var(--accent2))',
          color: nextDisabled ? 'var(--text-tertiary)' : '#fff',
          opacity: nextDisabled ? 0.5 : 1,
          cursor: nextDisabled ? 'not-allowed' : 'pointer',
        }}
          onMouseEnter={e => { if (!nextDisabled) e.target.style.transform = 'translateY(-1px)'; }}
          onMouseLeave={e => { e.target.style.transform = 'translateY(0)'; }}
        >
          {nextLabel || 'Next'} &rarr;
        </button>
      )}
    </div>
  );
}


/* ═══════════════════════════════════════════
   STEP 1: LANDING
   ═══════════════════════════════════════════ */

function StepLanding({ onNext }) {
  const [animPhase, setAnimPhase] = useState(0);

  useEffect(() => {
    const t1 = setTimeout(() => setAnimPhase(1), 300);
    const t2 = setTimeout(() => setAnimPhase(2), 800);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  return (
    <div style={{ textAlign: 'center', padding: '80px 0 40px' }}>
      {/* Animated parabola hero */}
      <div style={{
        position: 'relative', width: 400, height: 300, margin: '0 auto 48px',
        opacity: animPhase >= 1 ? 1 : 0, transition: 'opacity 0.8s ease',
      }}>
        <svg width="400" height="300" viewBox="0 0 400 300" style={{ display: 'block', margin: '0 auto' }}>
          <defs>
            <linearGradient id="heroParabGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor="#ec4899" stopOpacity="0.2" />
              <stop offset="50%" stopColor="#d946a8" />
              <stop offset="100%" stopColor="#a855f7" stopOpacity="0.2" />
            </linearGradient>
            <filter id="heroGlow">
              <feGaussianBlur stdDeviation="6" result="blur" />
              <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
            <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="var(--accent-bright)" stopOpacity="0.6" />
              <stop offset="100%" stopColor="var(--accent-bright)" stopOpacity="0" />
            </radialGradient>
          </defs>

          {/* Subtle grid */}
          {Array.from({length: 9}, (_, i) => (
            <line key={`hg${i}`} x1={44 * (i+1)} y1="0" x2={44 * (i+1)} y2="300"
              stroke="rgba(255,255,255,0.02)" strokeWidth="0.5" />
          ))}
          {Array.from({length: 6}, (_, i) => (
            <line key={`hgy${i}`} x1="0" y1={50 * (i+1)} x2="400" y2={50 * (i+1)}
              stroke="rgba(255,255,255,0.02)" strokeWidth="0.5" />
          ))}

          {/* X axis */}
          <line x1="20" y1="220" x2="380" y2="220" stroke="rgba(255,255,255,0.1)" strokeWidth="1" />
          {/* Y axis */}
          <line x1="200" y1="20" x2="200" y2="280" stroke="rgba(255,255,255,0.1)" strokeWidth="1" />

          {/* Parabola path */}
          <path
            d="M 20,20 Q 110,380 200,220 Q 290,60 380,20"
            fill="none" stroke="url(#heroParabGrad)" strokeWidth="3" strokeLinecap="round"
            filter="url(#heroGlow)"

function ProjectileMotionExample() {
  const canvasRef = useRef(null);
  const [velocity, setVelocity] = useState(30);
  const [angle, setAngle] = useState(45);
  const [firing, setFiring] = useState(false);
  const [projT, setProjT] = useState(0);
  const animRef = useRef(null);

  const g = 9.81;
  const rad = angle * Math.PI / 180;
  const vx = velocity * Math.cos(rad);
  const vy = velocity * Math.sin(rad);
  const tFlight = (2 * vy) / g;
  const rangeVal = vx * tFlight;
  const maxH = (vy * vy) / (2 * g);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const W = canvas.parentElement.clientWidth || 500;
    const H = 300;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const padL = 50, padR = 20, padB = 40, padT = 20;
    const gw = W - padL - padR;
    const gh = H - padT - padB;

    const maxRange = Math.max(rangeVal * 1.15, 50);
    const maxHeight = Math.max(maxH * 1.3, 20);

    function toX(x) { return padL + (x / maxRange) * gw; }
    function toY(y) { return padT + gh - (y / maxHeight) * gh; }

    ctx.clearRect(0, 0, W, H);

    // Ground
    ctx.strokeStyle = '#4ade80';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(padL, toY(0));
    ctx.lineTo(W - padR, toY(0));
    ctx.stroke();

    // Ground fill
    ctx.fillStyle = 'rgba(74, 222, 128, 0.04)';
    ctx.fillRect(padL, toY(0), gw, padB);

    // Axis labels
    ctx.font = '10px JetBrains Mono, monospace';
    ctx.fillStyle = 'rgba(232, 230, 240, 0.3)';
    ctx.textAlign = 'center';
    const xSteps = 5;
    for (let i = 0; i <= xSteps; i++) {
      const val = (maxRange / xSteps) * i;
      ctx.fillText(Math.round(val) + 'm', toX(val), toY(0) + 16);
    }
    ctx.textAlign = 'right';
    const ySteps = 4;
    for (let i = 0; i <= ySteps; i++) {
      const val = (maxHeight / ySteps) * i;
      ctx.fillText(Math.round(val) + 'm', padL - 6, toY(val) + 4);
    }

    // Cannon body
    ctx.save();
    ctx.translate(toX(0), toY(0));
    ctx.rotate(-rad);
    ctx.fillStyle = 'rgba(232, 230, 240, 0.3)';
    ctx.fillRect(0, -4, 30, 8);
    ctx.fillStyle = 'rgba(232, 230, 240, 0.15)';
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Parabolic trail (dotted)
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = '#f472c4';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const trailSteps = 120;
    for (let i = 0; i <= trailSteps; i++) {
      const t = (tFlight / trailSteps) * i;
      const px = vx * t;
      const py = vy * t - 0.5 * g * t * t;
      if (py < 0) break;
      const sx = toX(px);
      const sy = toY(py);
      if (i === 0) ctx.moveTo(sx, sy);
      else ctx.lineTo(sx, sy);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Max height marker
    const peakT = vy / g;
    const peakX = vx * peakT;
    const peakSx = toX(peakX);
    const peakSy = toY(maxH);
    ctx.setLineDash([3, 3]);
    ctx.strokeStyle = 'rgba(251, 191, 36, 0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(peakSx, toY(0));
    ctx.lineTo(peakSx, peakSy);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.arc(peakSx, peakSy, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.font = '10px JetBrains Mono, monospace';
    ctx.fillStyle = '#fbbf24';
    ctx.textAlign = 'center';
    ctx.fillText('max: ' + maxH.toFixed(1) + 'm', peakSx, peakSy - 10);

    // Range marker
    ctx.fillStyle = 'rgba(168, 133, 247, 0.7)';
    ctx.textAlign = 'center';
    ctx.fillText('range: ' + rangeVal.toFixed(1) + 'm', toX(rangeVal / 2), toY(0) + 30);

    // Animated projectile
    if (firing && projT <= tFlight) {
      const px = vx * projT;
      const py = vy * projT - 0.5 * g * projT * projT;
      if (py >= 0) {
        const sx = toX(px);
        const sy = toY(py);
        // Glow
        const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 14);
        grad.addColorStop(0, 'rgba(244, 114, 196, 0.6)');
        grad.addColorStop(1, 'rgba(244, 114, 196, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(sx, sy, 14, 0, Math.PI * 2);
        ctx.fill();
        // Ball
        ctx.fillStyle = '#f472c4';
        ctx.beginPath();
        ctx.arc(sx, sy, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

  }, [velocity, angle, projT, firing]);

  useEffect(() => {
    if (!firing) return;
    const tFlightLocal = (2 * velocity * Math.sin(angle * Math.PI / 180)) / g;
    let start = null;
    function animate(ts) {
      if (!start) start = ts;
      const elapsed = (ts - start) / 1000;
      setProjT(elapsed);
      if (elapsed < tFlightLocal) {
        animRef.current = requestAnimationFrame(animate);
      } else {
        setProjT(tFlightLocal);
        setFiring(false);
      }
    }
    animRef.current = requestAnimationFrame(animate);
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [firing]);

  function handleFire() {
    setProjT(0);
    setFiring(true);
  }

  return (
    <div>
      <p style={{ fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.7, maxWidth: 600, marginBottom: 16 }}>
        Every object thrown, launched, or kicked follows a parabolic arc {'\u2014'} this is <strong style={{ color: 'var(--text-primary)', fontWeight: 500 }}>projectile motion</strong>, and it{'\u2019'}s governed by a quadratic equation. Gravity pulls the object down with a constant acceleration (<span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent-bright)' }}>9.8 m/s{'\u00B2'}</span>), creating the <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent-bright)' }}>x{'\u00B2'}</span> term that defines the parabola. The launch angle and speed determine how high and far the projectile travels. Galileo first described this in the 1630s, and it remains one of the most elegant demonstrations of why quadratic equations appear in nature.
      </p>
      <div style={{ background: 'var(--bg-card)', borderRadius: 10, padding: '14px 16px', border: '1px solid var(--border-subtle)', marginBottom: 16, fontSize: 13 }}>
        <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.7 }}>
          <strong style={{ color: 'var(--text-primary)', fontWeight: 500 }}>What you{'\u2019'}re seeing:</strong> A cannon fires a projectile that traces a parabolic arc across the screen. Adjust the initial velocity and launch angle with the sliders, then hit {'\u2018'}Fire{'\u2019'} to watch the trajectory. The dotted trail is the parabola. The vertex (highest point) is labeled with the maximum height. Notice that <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent-bright)' }}>45{'\u00B0'}</span> gives maximum range {'\u2014'} this is a famous result that comes directly from the quadratic formula.
        </p>
      </div>
      <canvas ref={canvasRef} style={{ width: '100%', borderRadius: 8, display: 'block', background: 'rgba(0,0,0,0.15)' }} />
      <div style={{ marginTop: 14, display: 'flex', gap: 16, flexWrap: 'wrap', alignItems: 'flex-end' }}>
        <div style={{ flex: 1, minWidth: 120 }}>
          <label style={{ display: 'block', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--accent-bright)', marginBottom: 4 }}>
            v{'\u2080'} = {velocity} m/s
          </label>
          <input type="range" min="10" max="50" step="1" value={velocity}
            onChange={e => { setVelocity(parseInt(e.target.value)); setFiring(false); }}
            style={{ width: '100%', accentColor: '#f472c4' }} />
        </div>
        <div style={{ flex: 1, minWidth: 120 }}>
          <label style={{ display: 'block', fontFamily: 'var(--font-mono)', fontSize: 11, color: '#a78bfa', marginBottom: 4 }}>
            {'\u03B8'} = {angle}{'\u00B0'}
          </label>
          <input type="range" min="15" max="75" step="1" value={angle}
            onChange={e => { setAngle(parseInt(e.target.value)); setFiring(false); }}
            style={{ width: '100%', accentColor: '#a78bfa' }} />
        </div>
        <button onClick={handleFire} disabled={firing} style={{
          fontFamily: 'var(--font-mono)', fontSize: 12, padding: '8px 22px',
          borderRadius: 8, border: 'none', cursor: firing ? 'not-allowed' : 'pointer',
          background: firing ? 'rgba(255,255,255,0.06)' : 'linear-gradient(135deg, var(--accent), var(--accent2))',
          color: firing ? 'var(--text-tertiary)' : '#fff', transition: 'all 0.2s',
        }}>
          {firing ? 'Firing...' : 'Fire'}
        </button>
      </div>
      <div style={{ marginTop: 12, padding: '10px 14px', borderRadius: 8, background: 'rgba(255,255,255,0.02)', border: '1px solid var(--border-subtle)' }}>
        <p style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-secondary)', lineHeight: 1.7 }}>
          y = x{'\u00B7'}tan({'\u03B8'}) - (g{'\u00B7'}x{'\u00B2'})/(2v{'\u2080'}{'\u00B2'}cos{'\u00B2'}{'\u03B8'})
        </p>
        <div style={{ display: 'flex', gap: 16, marginTop: 6, fontFamily: 'var(--font-mono)', fontSize: 11 }}>
          <span style={{ color: '#fbbf24' }}>Max height: {maxH.toFixed(1)}m</span>
          <span style={{ color: '#a855f7' }}>Range: {rangeVal.toFixed(1)}m</span>
          <span style={{ color: 'var(--text-tertiary)' }}>Flight: {tFlight.toFixed(2)}s</span>
        </div>
      </div>
      <p style={{ marginTop: 16, fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--text-tertiary)', lineHeight: 1.7, maxWidth: 600 }}>
        <strong style={{ color: 'var(--text-primary)', fontWeight: 500 }}>Why it matters:</strong> Projectile math is used by everyone from basketball players (intuiting arc trajectories) to artillery officers (calculating firing solutions) to NASA engineers (plotting rocket stages). The key insight is that horizontal and vertical motion are independent: horizontal velocity is constant, but vertical velocity changes due to gravity. Combining them creates the parabola <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent-bright)' }}>y = x{'\u00B7'}tan({'\u03B8'}) - gx{'\u00B2'}/(2v{'\u2080'}{'\u00B2'}cos{'\u00B2'}{'\u03B8'})</span>.
      </p>
    </div>
  );
}

function SatelliteDishExample() {
  const canvasRef = useRef(null);
  const [aParam, setAParam] = useState(0.5);
  const [rayPhase, setRayPhase] = useState(0);
  const animRef = useRef(null);

  // Focus of y = a*x^2 is at (0, 1/(4a))
  const focusY = 1 / (4 * aParam);

  useEffect(() => {
    let running = true;
    let phase = 0;
    function tick() {
      if (!running) return;
      phase += 0.008;
      if (phase > 1) phase = 0;
      setRayPhase(phase);
      animRef.current = requestAnimationFrame(tick);
    }
    animRef.current = requestAnimationFrame(tick);
    return () => { running = false; if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const W = canvas.parentElement.clientWidth || 500;
    const H = 280;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const cx = W / 2;
    const cy = H - 40;
    const scale = Math.min(W * 0.35, 160);

    function toX(x) { return cx + x * scale; }
    function toY(y) { return cy - y * scale; }

    ctx.clearRect(0, 0, W, H);

    // Draw the dish cross-section (parabola y = a*x^2)
    ctx.strokeStyle = 'rgba(232, 230, 240, 0.5)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    const dishSteps = 100;
    const xMax = Math.sqrt(Math.min(2.0 / aParam, 8));
    for (let i = 0; i <= dishSteps; i++) {
      const x = -xMax + (2 * xMax / dishSteps) * i;
      const y = aParam * x * x;
      if (y > 2.5) continue;
      const sx = toX(x);
      const sy = toY(y);
      if (i === 0 || y > 2.5) ctx.moveTo(sx, sy);
      else ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // Dish fill (subtle)
    ctx.fillStyle = 'rgba(217, 70, 168, 0.04)';
    ctx.beginPath();
    for (let i = 0; i <= dishSteps; i++) {
      const x = -xMax + (2 * xMax / dishSteps) * i;
      const y = aParam * x * x;
      if (y > 2.5) continue;
      const sx = toX(x);
      const sy = toY(y);
      if (i === 0) ctx.moveTo(sx, sy);
      else ctx.lineTo(sx, sy);
    }
    ctx.lineTo(toX(xMax), cy);
    ctx.lineTo(toX(-xMax), cy);
    ctx.closePath();
    ctx.fill();

    // Focus point with glow
    const focusSx = toX(0);
    const focusSy = toY(focusY);
    const focGrad = ctx.createRadialGradient(focusSx, focusSy, 0, focusSx, focusSy, 18);
    focGrad.addColorStop(0, 'rgba(251, 191, 36, 0.6)');
    focGrad.addColorStop(1, 'rgba(251, 191, 36, 0)');
    ctx.fillStyle = focGrad;
    ctx.beginPath();
    ctx.arc(focusSx, focusSy, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.arc(focusSx, focusSy, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.font = '10px JetBrains Mono, monospace';
    ctx.fillStyle = '#fbbf24';
    ctx.textAlign = 'left';
    ctx.fillText('focus', focusSx + 10, focusSy - 4);
    ctx.fillText('(0, ' + focusY.toFixed(2) + ')', focusSx + 10, focusSy + 10);

    // Signal rays: parallel lines from top, reflecting off dish to focus
    const numRays = 7;
    for (let i = 0; i < numRays; i++) {
      const xHit = -xMax * 0.85 + (2 * xMax * 0.85 / (numRays - 1)) * i;
      const yHit = aParam * xHit * xHit;
      if (yHit > 2.4) continue;
      const hitSx = toX(xHit);
      const hitSy = toY(yHit);

      // Incoming ray (from top, parallel, going down)
      const rayTopY = H * 0;
      const rayProgress = clamp(rayPhase * 2.5, 0, 1);
      const incomingEndY = rayTopY + (hitSy - rayTopY) * rayProgress;

      ctx.strokeStyle = 'rgba(74, 222, 128, ' + (0.25 + 0.15 * rayProgress) + ')';
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(hitSx, rayTopY);
      ctx.lineTo(hitSx, incomingEndY);
      ctx.stroke();

      // Arrow head on incoming ray
      if (rayProgress > 0.3) {
        const arrowY = rayTopY + (hitSy - rayTopY) * Math.min(rayProgress, 0.6);
        ctx.fillStyle = 'rgba(74, 222, 128, 0.5)';
        ctx.beginPath();
        ctx.moveTo(hitSx, arrowY + 6);
        ctx.lineTo(hitSx - 3, arrowY - 2);
        ctx.lineTo(hitSx + 3, arrowY - 2);
        ctx.closePath();
        ctx.fill();
      }

      // Reflected ray (from hit point to focus)
      if (rayProgress >= 1.0) {
        const reflProgress = clamp((rayPhase - 0.4) * 2.5, 0, 1);
        const refEndX = hitSx + (focusSx - hitSx) * reflProgress;
        const refEndY = hitSy + (focusSy - hitSy) * reflProgress;

        ctx.strokeStyle = 'rgba(244, 114, 196, ' + (0.3 + 0.2 * reflProgress) + ')';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(hitSx, hitSy);
        ctx.lineTo(refEndX, refEndY);
        ctx.stroke();
      }
    }

    // Vertex label
    ctx.fillStyle = 'rgba(168, 85, 247, 0.7)';
    ctx.textAlign = 'center';
    ctx.fillText('vertex (0, 0)', toX(0), toY(0) + 16);

  }, [aParam, rayPhase]);

  return (
    <div>
      <p style={{ fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.7, maxWidth: 600, marginBottom: 16 }}>

      </p>
      <div style={{ background: 'var(--bg-card)', borderRadius: 10, padding: '14px 16px', border: '1px solid var(--border-subtle)', marginBottom: 16, fontSize: 13 }}>
        <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.7 }}>
          <strong style={{ color: 'var(--text-primary)', fontWeight: 500 }}>What you{'\u2019'}re seeing:</strong> The cross-section shows a parabolic dish with parallel signal rays arriving from above. Watch how every ray reflects off the curved surface and converges at the glowing focus point. As you adjust the curvature parameter {'\u2018'}a{'\u2019'} with the slider, the dish becomes flatter or steeper, and the focus moves farther from or closer to the vertex. A shallow dish (small a) has a distant focus {'\u2014'} good for large receivers. A deep dish (large a) has a close focus {'\u2014'} good for compact designs.
        </p>
      </div>
      <canvas ref={canvasRef} style={{ width: '100%', borderRadius: 8, display: 'block', background: 'rgba(0,0,0,0.15)' }} />
      <div style={{ marginTop: 14 }}>
        <label style={{ display: 'block', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--accent-bright)', marginBottom: 4 }}>
          Curvature (a) = {aParam.toFixed(2)}
        </label>
        <input type="range" min="0.15" max="1.5" step="0.05" value={aParam}
          onChange={e => setAParam(parseFloat(e.target.value))}
          style={{ width: '100%', accentColor: '#f472c4' }} />
      </div>
      <div style={{ marginTop: 12, padding: '10px 14px', borderRadius: 8, background: 'rgba(255,255,255,0.02)', border: '1px solid var(--border-subtle)' }}>
        <p style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-secondary)', lineHeight: 1.7 }}>
          y = {aParam.toFixed(2)}(x - 0){'\u00B2'} + 0
        </p>
        <div style={{ display: 'flex', gap: 16, marginTop: 6, fontFamily: 'var(--font-mono)', fontSize: 11 }}>
          <span style={{ color: '#fbbf24' }}>Focus: (0, {focusY.toFixed(2)})</span>

        <strong style={{ color: 'var(--text-primary)', fontWeight: 500 }}>Practical applications:</strong> The Arecibo radio telescope in Puerto Rico was a 305-meter parabolic dish that detected signals from billions of light-years away. Your car{'\u2019'}s headlights work in reverse: a bulb sits at the focus, and light reflects off the parabolic mirror into parallel beams. Solar cookers use the same principle {'\u2014'} focusing sunlight to a point hot enough to boil water. All of this is described by the vertex form of a quadratic equation.
      </p>
    </div>
  );
}

function StepFactoring({ onPrev, onNext }) {
  const [problem, setProblem] = useState(() => generateFactorableProblem());

  const [animStep, setAnimStep] = useState(0);

  function checkAnswer() {
    const check = (a, b) => {
      const normalize = s => s.replace(/\s/g, '').toLowerCase();
      const na = normalize(a);
      const nb = normalize(b);
      const f1 = normalize(problem.factors[0]);
      const f2 = normalize(problem.factors[1]);
      return (na === f1 && nb === f2) || (na === f2 && nb === f1);
    };
    if (check(userF1, userF2)) {
      setSolved(true);
      setAnimStep(0);
      const interval = setInterval(() => {
        setAnimStep(prev => {
          if (prev >= 4) { clearInterval(interval); return 4; }
          return prev + 1;
        });
      }, 600);
    }
  }

  function newProblem() {
    setProblem(generateFactorableProblem());
    setUserF1(''); setUserF2('');

function StepQuadraticFormula({ onPrev, onNext }) {
  const [revealed, setRevealed] = useState(false);
  const [calcA, setCalcA] = useState('1');
  const [calcB, setCalcB] = useState('-5');
  const [calcC, setCalcC] = useState('6');
  const [calcStep, setCalcStep] = useState(0);

  const a = parseFloat(calcA) || 1;
  const b = parseFloat(calcB) || 0;
  const c = parseFloat(calcC) || 0;
  const disc = b * b - 4 * a * c;
  const sqrtDisc = disc >= 0 ? Math.sqrt(disc) : NaN;
  const r1 = disc >= 0 ? (-b + sqrtDisc) / (2 * a) : NaN;
  const r2 = disc >= 0 ? (-b - sqrtDisc) / (2 * a) : NaN;

  useEffect(() => {
    setCalcStep(0);
  }, [calcA, calcB, calcC]);

  function animateCalc() {
    setCalcStep(0);
    let step = 0;
    const interval = setInterval(() => {
      step++;
      setCalcStep(step);
      if (step >= 5) clearInterval(interval);
    }, 700);
  }

  return (
    <div style={{ animation: 'fadeInUp 0.6s var(--ease-out-expo) both' }}>
      <h2 style={{
        fontFamily: 'var(--font-display)', fontSize: 'clamp(28px, 4vw, 40px)',
        fontWeight: 400, marginBottom: 8,
      }}>
        The <span style={{ fontStyle: 'italic', color: 'var(--accent-bright)' }}>Quadratic Formula</span>
      </h2>
      <p style={{
        fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 300,
        color: 'var(--text-secondary)', lineHeight: 1.7, marginBottom: 32, maxWidth: 600,
      }}>
        Not every quadratic can be factored easily. The quadratic formula works for <em>every</em> quadratic equation.
      </p>

      {/* Dramatic formula reveal */}
      {!revealed ? (
        <div style={{ textAlign: 'center', marginBottom: 40 }}>
          <button onClick={() => setRevealed(true)} style={{
            fontFamily: 'var(--font-mono)', fontSize: 15, fontWeight: 500,
            padding: '16px 48px', borderRadius: 12,
            border: 'none', cursor: 'pointer', color: '#fff',
            background: 'linear-gradient(135deg, var(--accent), var(--accent2))',
            boxShadow: '0 0 40px var(--accent-glow), 0 0 80px rgba(168,85,247,0.15)',
            animation: 'glowPulse 2s ease-in-out infinite',
            transition: 'all 0.3s var(--ease-out-expo)',
          }}
            onMouseEnter={e => e.target.style.transform = 'scale(1.05)'}
            onMouseLeave={e => e.target.style.transform = 'scale(1)'}
          >
            Reveal the Formula
          </button>
        </div>
      ) : (
        <div style={{
          textAlign: 'center', marginBottom: 40, padding: '40px 20px',
          background: 'rgba(255,255,255,0.02)', borderRadius: 20,

              { text: disc >= 0 ? `\u221a(${fmt(disc)}) = ${fmt(sqrtDisc)}` : `\u221a(${fmt(disc)}) = not real`, color: disc >= 0 ? '#4ade80' : '#f87171' },
              { text: disc >= 0 ? `x = (${fmt(-b)} \u00b1 ${fmt(sqrtDisc)}) / ${fmt(2*a)}` : 'No real solutions', color: 'var(--accent-bright)' },

/* ═══════════════════════════════════════════
   STEP 6: THE DISCRIMINANT (KEY VIZ)
   ═══════════════════════════════════════════ */

function StepDiscriminant({ onPrev, onNext }) {
  const [discValue, setDiscValue] = useState(4);

  // Build a, b, c from discriminant value with a=1, b=0
  // disc = b^2 - 4ac => with a=1, b=0: disc = -4c => c = -disc/4
  const a = 1;
  const b = 0;
  const c = -discValue / 4;
  const { roots, count } = solveQuadratic(a, b, c);

  const caseLabel = count === 2 ? 'Two Real Solutions' : count === 1 ? 'One Real Solution' : 'No Real Solutions';
  const caseColor = count === 2 ? '#4ade80' : count === 1 ? '#fbbf24' : '#f87171';
  const caseBg = count === 2 ? 'rgba(74,222,128,0.08)' : count === 1 ? 'rgba(251,191,36,0.08)' : 'rgba(248,113,113,0.08)';
  const caseBorder = count === 2 ? 'rgba(74,222,128,0.25)' : count === 1 ? 'rgba(251,191,36,0.25)' : 'rgba(248,113,113,0.25)';

  return (
    <div style={{ animation: 'fadeInUp 0.6s var(--ease-out-expo) both' }}>
      <h2 style={{
        fontFamily: 'var(--font-display)', fontSize: 'clamp(28px, 4vw, 40px)',
        fontWeight: 400, marginBottom: 8,
      }}>
        The <span style={{ fontStyle: 'italic', color: 'var(--accent-bright)' }}>Discriminant</span>
      </h2>
      <p style={{
        fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 300,
        color: 'var(--text-secondary)', lineHeight: 1.7, marginBottom: 16, maxWidth: 600,
      }}>
        The expression under the square root, <span style={{
          fontFamily: 'var(--font-mono)', color: '#fbbf24',
        }}>b&sup2; &minus; 4ac</span>, is called the <strong style={{ color: 'var(--text-primary)' }}>discriminant</strong>.
        It tells us how many solutions the equation has.
      </p>

      {/* Three cases summary */}
      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8,
        marginBottom: 24,
      }}>
        {[
          { label: '\u0394 > 0', desc: '2 solutions', color: '#4ade80', icon: '\u2022\u2022' },
          { label: '\u0394 = 0', desc: '1 solution', color: '#fbbf24', icon: '\u2022' },
          { label: '\u0394 < 0', desc: '0 solutions', color: '#f87171', icon: '\u00d8' },
        ].map((item, i) => (
          <div key={i} style={{
            textAlign: 'center', padding: '14px 10px', borderRadius: 10,
            background: `${item.color}08`, border: `1px solid ${item.color}20`,
          }}>
            <div style={{
              fontFamily: 'var(--font-mono)', fontSize: 18, color: item.color, marginBottom: 4,
            }}>{item.icon}</div>
            <div style={{
              fontFamily: 'var(--font-mono)', fontSize: 13, fontWeight: 500, color: item.color,
            }}>{item.label}</div>
            <div style={{
              fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--text-secondary)', marginTop: 2,
            }}>{item.desc}</div>
          </div>
        ))}
      </div>

      {/* Discriminant slider */}
      <div style={{
        background: 'rgba(255,255,255,0.02)', borderRadius: 16,
        border: '1px solid var(--border-subtle)', padding: '24px',
      }}>
        {/* Current state badge */}
        <div style={{
          textAlign: 'center', marginBottom: 16,
        }}>
          <span style={{
            display: 'inline-block', padding: '6px 18px', borderRadius: 100,
            fontFamily: 'var(--font-mono)', fontSize: 14, fontWeight: 500,
            color: caseColor, background: caseBg, border: `1px solid ${caseBorder}`,
            transition: 'all 0.3s ease',
          }}>
            {caseLabel} &mdash; {'\u0394'} = {fmt(discValue)}
          </span>
        </div>

        {/* Slider */}
        <div style={{ maxWidth: 400, margin: '0 auto 20px', textAlign: 'center' }}>
          <input type="range" min="-8" max="16" step="0.5" value={discValue}
            onChange={e => setDiscValue(parseFloat(e.target.value))}
            style={{ width: '100%', accentColor: caseColor }} />
          <div style={{
            display: 'flex', justifyContent: 'space-between',
            fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--text-tertiary)',
            marginTop: 4,
          }}>
            <span>Negative</span>
            <span style={{ color: '#fbbf24' }}>{'\u2190'} Zero {'\u2192'}</span>
            <span>Positive</span>
          </div>
        </div>

        <ParabolaGraph
          a={a} b={b} c={c}
          xRange={[-5, 5]} yRange={[-3, 8]}
          showRoots={count > 0} showVertex={true}
          highlightDiscriminant={true}
          width={500} height={340}
        />

        <p style={{
          textAlign: 'center', fontFamily: 'var(--font-body)', fontSize: 13,
          color: 'var(--text-secondary)', marginTop: 12,
        }}>
          {count === 2 && `The parabola crosses the x-axis at x = ${roots.map(r => fmt(r)).join(' and x = ')}.`}
          {count === 1 && `The parabola touches the x-axis at exactly one point: x = ${fmt(roots[0])}.`}
          {count === 0 && 'The parabola does not cross the x-axis. There are no real solutions.'}
        </p>
      </div>

      <NavButtons onPrev={onPrev} onNext={onNext} />
    </div>
  );
}


/* ═══════════════════════════════════════════
   STEP 7: VERTEX FORM
   ═══════════════════════════════════════════ */

function StepVertexForm({ onPrev, onNext }) {
  const [h, setH] = useState(2);
  const [k, setK] = useState(-3);
  const [aVal, setAVal] = useState(1);

  // vertex form: y = a(x - h)^2 + k
  // standard form: y = a*x^2 - 2ah*x + (ah^2 + k)
  const stdB = -2 * aVal * h;
  const stdC = aVal * h * h + k;

  return (
    <div style={{ animation: 'fadeInUp 0.6s var(--ease-out-expo) both' }}>
      <h2 style={{
        fontFamily: 'var(--font-display)', fontSize: 'clamp(28px, 4vw, 40px)',
        fontWeight: 400, marginBottom: 8,
      }}>
        <span style={{ fontStyle: 'italic', color: 'var(--accent-bright)' }}>Vertex</span> Form
      </h2>
      <p style={{
        fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 300,
        color: 'var(--text-secondary)', lineHeight: 1.7, marginBottom: 24, maxWidth: 600,
      }}>
        Vertex form makes it easy to read the vertex (highest or lowest point) directly from the equation.
      </p>

      {/* Equation display */}
      <div style={{
        textAlign: 'center', marginBottom: 24, padding: '24px 20px',
        background: 'rgba(255,255,255,0.02)', borderRadius: 16,
        border: '1px solid var(--border-subtle)',
      }}>
        <div style={{
          fontFamily: 'var(--font-display)', fontStyle: 'italic',
          fontSize: 'clamp(22px, 4vw, 34px)', marginBottom: 12,
        }}>
          <span style={{ color: 'var(--text-secondary)' }}>y = </span>
          <span style={{ color: '#f472c4' }}>{aVal !== 1 ? (aVal === -1 ? '\u2212' : fmt(aVal)) : ''}</span>
          <span style={{ color: 'var(--text-secondary)' }}>(x </span>
          <span style={{ color: '#a78bfa' }}>{h >= 0 ? `\u2212 ${fmt(h)}` : `+ ${fmt(-h)}`}</span>
          <span style={{ color: 'var(--text-secondary)' }}>)&sup2; </span>
          <span style={{ color: '#38bdf8' }}>{k >= 0 ? `+ ${fmt(k)}` : `\u2212 ${fmt(-k)}`}</span>
        </div>
        <div style={{
          fontFamily: 'var(--font-mono)', fontSize: 13, color: 'var(--text-tertiary)',
        }}>
          Vertex at (<span style={{ color: '#a78bfa' }}>{fmt(h)}</span>, <span style={{ color: '#38bdf8' }}>{fmt(k)}</span>)
        </div>
        <div style={{
          fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--text-tertiary)', marginTop: 8,
        }}>
          Standard form: y = {fmt(aVal)}x&sup2; {stdB >= 0 ? '+' : '\u2212'} {fmt(Math.abs(stdB))}x {stdC >= 0 ? '+' : '\u2212'} {fmt(Math.abs(stdC))}
        </div>
      </div>

      {/* Controls */}
      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16,
        maxWidth: 500, margin: '0 auto 24px',
      }}>
        <div>
          <label style={{
            display: 'block', fontFamily: 'var(--font-mono)', fontSize: 11,
            color: '#f472c4', marginBottom: 4,
          }}>a = {fmt(aVal)}</label>
          <input type="range" min="-3" max="3" step="0.5" value={aVal}
            onChange={e => setAVal(parseFloat(e.target.value) || 0.5)}
            style={{ width: '100%', accentColor: '#f472c4' }} />
        </div>
        <div>
          <label style={{
            display: 'block', fontFamily: 'var(--font-mono)', fontSize: 11,
            color: '#a78bfa', marginBottom: 4,
          }}>h = {fmt(h)}</label>
          <input type="range" min="-5" max="5" step="0.5" value={h}
            onChange={e => setH(parseFloat(e.target.value))}
            style={{ width: '100%', accentColor: '#a78bfa' }} />
        </div>
        <div>
          <label style={{
            display: 'block', fontFamily: 'var(--font-mono)', fontSize: 11,
            color: '#38bdf8', marginBottom: 4,
          }}>k = {fmt(k)}</label>
          <input type="range" min="-8" max="8" step="0.5" value={k}
            onChange={e => setK(parseFloat(e.target.value))}
            style={{ width: '100%', accentColor: '#38bdf8' }} />
        </div>
      </div>

      {/* Graph with draggable vertex */}
      <div style={{
        background: 'rgba(255,255,255,0.02)', borderRadius: 16,
        border: '1px solid var(--border-subtle)', padding: 20,
      }}>
        <p style={{
          fontFamily: 'var(--font-mono)', fontSize: 11, textAlign: 'center',
          color: 'var(--text-tertiary)', marginBottom: 8, letterSpacing: '0.06em',
        }}>
          Drag the vertex point or use sliders
        </p>
        <ParabolaGraph
          a={aVal || 0.5} b={stdB} c={stdC}

          interactive={true}
          onVertexDrag={(newH, newK) => { setH(newH); setK(newK); }}
          width={500} height={360}
        />
      </div>

      <RealWorldPanel examples={[
        { title: 'Satellite Dish', content: <SatelliteDishExample /> },
      ]} />

      <NavButtons onPrev={onPrev} onNext={onNext} />
    </div>
  );
}

              textAlign: 'center', color: 'var(--accent-bright)', marginBottom: 12,
            }}>
              Solve: {fmt(problem.a)}x&sup2; {problem.b >= 0 ? '+' : '\u2212'} {fmt(Math.abs(problem.b))}x {problem.c >= 0 ? '+' : '\u2212'} {fmt(Math.abs(problem.c))} = 0
            </p>
            {!showSolution ? (
              <div style={{ textAlign: 'center' }}>
                <button onClick={() => setShowSolution(true)} style={{
                  fontFamily: 'var(--font-mono)', fontSize: 12, padding: '8px 18px',
                  borderRadius: 8, cursor: 'pointer',
                  border: '1px solid var(--border-subtle)',
                  background: 'rgba(255,255,255,0.04)', color: 'var(--text-secondary)',
                }}>Show Solution</button>
              </div>
            ) : (
              <div style={{
                fontFamily: 'var(--font-mono)', fontSize: 13, textAlign: 'center',
                lineHeight: 2,
              }}>
                {(() => {
                  const pa = problem.a, pb = problem.b, pc = problem.c;
                  const pd = pb * pb - 4 * pa * pc;
                  const steps = [
                    { text: `a=${fmt(pa)}, b=${fmt(pb)}, c=${fmt(pc)}`, color: 'var(--text-secondary)' },
                    { text: `\u0394 = (${fmt(pb)})\u00b2 \u2212 4(${fmt(pa)})(${fmt(pc)}) = ${fmt(pd)}`, color: '#fbbf24' },
                  ];
                  if (pd >= 0) {
                    const sr = Math.sqrt(pd);
                    const x1 = (-pb + sr) / (2 * pa);
                    const x2 = (-pb - sr) / (2 * pa);
                    steps.push({ text: `\u221a\u0394 = ${fmt(sr)}`, color: '#4ade80' });
                    if (pd > 0) {
                      steps.push({ text: `x = (${fmt(-pb)} \u00b1 ${fmt(sr)}) / ${fmt(2*pa)}`, color: 'var(--accent-bright)' });
                      steps.push({ text: `x\u2081 = ${fmt(x1)}, x\u2082 = ${fmt(x2)}`, color: 'var(--success)' });
                    } else {
                      steps.push({ text: `x = ${fmt(x1)}`, color: 'var(--success)' });
                    }
                  } else {
                    steps.push({ text: 'No real solutions (\u0394 < 0)', color: '#f87171' });
                  }
                  return steps.map((s, i) => (
                    <div key={i} style={{ color: s.color }}>{s.text}</div>
                  ));
                })()}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Completion */}
      <div style={{ textAlign: 'center', marginTop: 48 }}>
        <button onClick={onFinish} style={{
          fontFamily: 'var(--font-mono)', fontSize: 14, fontWeight: 500,
          padding: '14px 40px', borderRadius: 12,
          border: 'none', cursor: 'pointer', color: '#fff',
          background: 'linear-gradient(135deg, var(--success), #22d3ee)',
          boxShadow: '0 0 30px rgba(74,222,128,0.2)',
          transition: 'all 0.3s var(--ease-out-expo)',
        }}
          onMouseEnter={e => e.target.style.transform = 'translateY(-2px)'}
          onMouseLeave={e => e.target.style.transform = 'translateY(0)'}
        >
          Complete Lesson
        </button>
      </div>

      <NavButtons onPrev={onPrev} prevLabel="Back" />
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:32,padding:'16px 0',borderTop:'1px solid var(--border-subtle)'}}>
        <a href="06-polynomials.html" style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--accent-bright)',textDecoration:'none',transition:'opacity 0.2s',opacity:0.8}} onMouseEnter={e=>e.target.style.opacity='1'} onMouseLeave={e=>e.target.style.opacity='0.8'}>&larr; Previous Lesson: Polynomials &amp; Factoring</a>
        <a href="08-functions.html" style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--accent-bright)',textDecoration:'none',transition:'opacity 0.2s',opacity:0.8}} onMouseEnter={e=>e.target.style.opacity='1'} onMouseLeave={e=>e.target.style.opacity='0.8'}>Next Lesson: Functions &amp; Transformations &rarr;</a>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════ */

const TOTAL_STEPS = 8;
const STEP_NAMES = [
  'Landing', 'Parabola Shape', 'Standard Form', 'Factoring',
  'Quadratic Formula', 'Discriminant', 'Vertex Form', 'Sandbox',
];

function App() {
  const [step, setStep] = useState(0);

  function goTo(s) {
    setStep(s);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function handleFinish() {
    try {
      const visited = JSON.parse(localStorage.getItem('math-progress') || '[]');
      if (!visited.includes(7)) {
        visited.push(7);
        localStorage.setItem('math-progress', JSON.stringify(visited));
      }
    } catch {}
    window.location.href = 'index.html';
  }

  return (
    <div style={{ position: 'relative', zIndex: 1 }}>
      {step > 0 && <ProgressBar currentStep={step} totalSteps={TOTAL_STEPS} />}

      <div style={{
        maxWidth: 700, margin: '0 auto',
        padding: step > 0 ? '72px 20px 60px' : '0 20px 60px',
      }}>
        {step === 0 && <StepLanding onNext={() => goTo(1)} />}
        {step === 1 && <StepParabolaShape onPrev={() => goTo(0)} onNext={() => goTo(2)} />}
        {step === 2 && <StepStandardForm onPrev={() => goTo(1)} onNext={() => goTo(3)} />}
        {step === 3 && <StepFactoring onPrev={() => goTo(2)} onNext={() => goTo(4)} />}
        {step === 4 && <StepQuadraticFormula onPrev={() => goTo(3)} onNext={() => goTo(5)} />}
        {step === 5 && <StepDiscriminant onPrev={() => goTo(4)} onNext={() => goTo(6)} />}
        {step === 6 && <StepVertexForm onPrev={() => goTo(5)} onNext={() => goTo(7)} />}
        {step === 7 && <StepSandbox onPrev={() => goTo(6)} onFinish={handleFinish} />}
      </div>

      {/* Footer */}
      <footer style={{
        textAlign: 'center', padding: '40px 24px 32px',
        borderTop: '1px solid var(--border-subtle)',
      }}>
        <p style={{
          fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--text-tertiary)',
          fontWeight: 300,
        }}>
          Lesson 7 of 10 &mdash; Quadratic Equations
        </p>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
