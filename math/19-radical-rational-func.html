<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Radical & Rational Functions — Math Foundations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #06060b;
  --bg-primary: #0a0a12;
  --bg-card: rgba(255, 255, 255, 0.03);
  --bg-card-hover: rgba(255, 255, 255, 0.06);
  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);
  --text-primary: #e8e6f0;
  --text-secondary: rgba(232, 230, 240, 0.55);
  --text-tertiary: rgba(232, 230, 240, 0.3);
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --accent: #f59e0b;
  --accent-bright: #fbbf24;
  --accent-dim: #b45309;
  --accent-glow: rgba(245, 158, 11, 0.3);
  --accent-bg: rgba(245, 158, 11, 0.06);
  --accent2: #f97316;
  --accent3: #eab308;
  --success: #4ade80;
  --warning: #fbbf24;
  --error: #f87171;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

html {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  overflow-x: hidden;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(245,158,11,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 50%, rgba(249,115,22,0.04) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(234,179,8,0.03) 0%, transparent 50%),
    var(--bg-deep);
}

#root { min-height: 100vh; }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.3;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

::selection { background: rgba(245, 158, 11, 0.3); color: #fff; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulseGlow {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes breathe {
  0%, 100% { box-shadow: 0 0 20px rgba(245,158,11,0.1); }
  50% { box-shadow: 0 0 30px rgba(245,158,11,0.25); }
}

button { cursor: pointer; }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, memo } = React;

/* ================================================================
   CONSTANTS & HELPERS
   ================================================================ */
const TOTAL_STEPS = 3;
const STEP_TITLES = [
  'Welcome',
  'Asymptotes & Holes',
  'Summary & Practice'
];

function saveProgress() {
  try {
    const prev = JSON.parse(localStorage.getItem('math-progress') || '[]');
    if (!prev.includes('mf2-06')) {
      prev.push('mf2-06');
      localStorage.setItem('math-progress', JSON.stringify(prev));
    }
  } catch(e) {}
}

/* ================================================================
   GRID BACKGROUND
   ================================================================ */
function GridBackground() {
  return (
    <div style={{ position:'fixed', inset:0, zIndex:0, pointerEvents:'none', opacity:0.35 }}>
      <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
            <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.015)" strokeWidth="1"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
      </svg>
    </div>
  );
}

/* ================================================================
   ROUGH DRAFT BANNER
   ================================================================ */
function DraftBanner() {
  return (
    <div style={{
      position:'fixed', top:12, right:16, zIndex:200,
      fontFamily:'var(--font-mono)', fontSize:10, fontWeight:500,
      letterSpacing:'0.12em', textTransform:'uppercase',
      color:'var(--accent)', background:'rgba(245,158,11,0.08)',
      border:'1px solid rgba(245,158,11,0.2)',
      borderRadius:6, padding:'4px 10px',
      backdropFilter:'blur(8px)',
    }}>
      Rough Draft
    </div>
  );
}

/* ================================================================
   PROGRESS BAR
   ================================================================ */
function ProgressBar({ step, total }) {
  return (
    <div style={{
      position:'sticky', top:0, zIndex:100,
      background:'rgba(6,6,11,0.85)', backdropFilter:'blur(16px)',
      borderBottom:'1px solid var(--border-subtle)',
      padding:'12px 24px',
    }}>
      <div style={{
        maxWidth:900, margin:'0 auto',
        display:'flex', alignItems:'center', gap:12,
      }}>
        <a href="index.html" style={{
          fontFamily:'var(--font-mono)', fontSize:11, letterSpacing:'0.06em',
          textTransform:'uppercase', color:'var(--text-tertiary)',
          textDecoration:'none', whiteSpace:'nowrap',
          transition:'color 0.3s ease',
        }}
        onMouseEnter={e => e.target.style.color='var(--accent)'}
        onMouseLeave={e => e.target.style.color='var(--text-tertiary)'}
        >
          &larr; Lessons
        </a>
        <div style={{ flex:1, display:'flex', alignItems:'center', gap:4 }}>
          {Array.from({length:total}, (_,i) => (
            <div key={i} style={{
              flex:1, height:3, borderRadius:2,
              background: i < step ? 'var(--accent)' : i === step ? 'var(--accent-dim)' : 'rgba(255,255,255,0.06)',
              transition:'background 0.5s var(--ease-out-expo)',
              position:'relative',
              overflow:'hidden',
            }}>
              {i === step && (
                <div style={{
                  position:'absolute', inset:0, borderRadius:2,
                  background:'linear-gradient(90deg, var(--accent), var(--accent-bright))',
                  animation:'breathe 2s ease-in-out infinite',
                  transformOrigin:'left',
                }}/>
              )}
            </div>
          ))}
        </div>
        <span style={{
          fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-tertiary)',
          letterSpacing:'0.04em', whiteSpace:'nowrap',
        }}>
          {step + 1} / {total}
        </span>
      </div>
    </div>
  );
}

/* ================================================================
   NAVIGATION BUTTONS
   ================================================================ */
function NavButtons({ step, setStep, total }) {
  return (
    <div style={{
      display:'flex', justifyContent:'space-between', alignItems:'center',
      marginTop:48, gap:16,
    }}>
      {step > 0 ? (
        <button onClick={() => setStep(step - 1)} style={{
          display:'flex', alignItems:'center', gap:8,
          fontFamily:'var(--font-body)', fontSize:15, fontWeight:400,
          color:'var(--text-secondary)', background:'none',
          border:'1px solid var(--border-subtle)', borderRadius:12,
          padding:'12px 24px', transition:'all 0.3s var(--ease-out-expo)',
        }}
        onMouseEnter={e => { e.currentTarget.style.borderColor='var(--accent-dim)'; e.currentTarget.style.color='var(--text-primary)'; }}
        onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border-subtle)'; e.currentTarget.style.color='var(--text-secondary)'; }}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Previous
        </button>
      ) : <div />}
      {step < total - 1 ? (
        <button onClick={() => setStep(step + 1)} style={{
          display:'flex', alignItems:'center', gap:8,
          fontFamily:'var(--font-body)', fontSize:15, fontWeight:500,
          color:'#fff', background:'linear-gradient(135deg, var(--accent-dim), var(--accent))',
          border:'none', borderRadius:12,
          padding:'12px 28px', transition:'all 0.3s var(--ease-out-expo)',
          boxShadow:'0 4px 20px rgba(245,158,11,0.2)',
        }}
        onMouseEnter={e => { e.currentTarget.style.boxShadow='0 6px 28px rgba(245,158,11,0.35)'; e.currentTarget.style.transform='translateY(-1px)'; }}
        onMouseLeave={e => { e.currentTarget.style.boxShadow='0 4px 20px rgba(245,158,11,0.2)'; e.currentTarget.style.transform='translateY(0)'; }}
        >
          Next
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      ) : (
        <button onClick={() => {
          saveProgress();
          window.location.href = 'index.html';
        }} style={{
          display:'flex', alignItems:'center', gap:8,
          fontFamily:'var(--font-body)', fontSize:15, fontWeight:500,
          color:'#fff', background:'linear-gradient(135deg, var(--success), var(--accent))',
          border:'none', borderRadius:12,
          padding:'12px 28px', transition:'all 0.3s var(--ease-out-expo)',
          boxShadow:'0 4px 20px rgba(74,222,128,0.2)',
        }}
        onMouseEnter={e => { e.currentTarget.style.boxShadow='0 6px 28px rgba(74,222,128,0.35)'; e.currentTarget.style.transform='translateY(-1px)'; }}
        onMouseLeave={e => { e.currentTarget.style.boxShadow='0 4px 20px rgba(74,222,128,0.2)'; e.currentTarget.style.transform='translateY(0)'; }}
        >
          Complete Lesson
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      )}
    </div>
  );
}

/* ================================================================
   SECTION HEADER
   ================================================================ */
function SectionHeader({ title, subtitle }) {
  return (
    <div style={{ marginBottom:32, animation:'fadeInUp 0.7s var(--ease-out-expo) both' }}>
      <h2 style={{
        fontFamily:'var(--font-display)', fontSize:'clamp(32px, 5vw, 48px)',
        fontWeight:400, lineHeight:1.1, letterSpacing:'-0.01em',
        marginBottom:12,
        background:'linear-gradient(135deg, var(--text-primary) 0%, var(--accent-bright) 100%)',
        WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
      }}>
        {title}
      </h2>
      {subtitle && (
        <p style={{
          fontFamily:'var(--font-body)', fontSize:'clamp(15px, 1.8vw, 18px)',
          fontWeight:300, color:'var(--text-secondary)', lineHeight:1.6,
          maxWidth:580,
        }}>
          {subtitle}
        </p>
      )}
    </div>
  );
}

/* ================================================================
   CARD WRAPPER
   ================================================================ */
function Card({ children, style }) {
  return (
    <div style={{
      background:'var(--bg-card)', border:'1px solid var(--border-subtle)',
      borderRadius:16, padding:'clamp(20px, 3vw, 32px)',
      backdropFilter:'blur(8px)', position:'relative', overflow:'hidden',
      ...style,
    }}>
      {children}
    </div>
  );
}

/* ================================================================
   CONCEPT BOX (Key Insight / Common Mistake)
   ================================================================ */
function ConceptBox({ children, color, label }) {
  const c = color || 'var(--accent)';
  return (
    <div style={{
      background:`${c}08`, border:`1px solid ${c}20`, borderRadius:12,
      padding:'16px 20px', marginBottom:20, position:'relative',
      borderLeft:`3px solid ${c}60`,
    }}>
      {label && (
        <div style={{
          fontFamily:'var(--font-mono)', fontSize:11, fontWeight:500,
          letterSpacing:'0.1em', textTransform:'uppercase',
          color: c, marginBottom:8, opacity:0.8,
        }}>
          {label}
        </div>
      )}
      {children}
    </div>
  );
}

/* ================================================================
   MATH EXPRESSION INLINE
   ================================================================ */
function M({ children }) {
  return (
    <span style={{
      fontFamily:'var(--font-mono)', fontSize:'0.92em',
      color:'var(--accent-bright)', padding:'1px 4px',
      background:'rgba(245,158,11,0.06)', borderRadius:4,
    }}>
      {children}
    </span>
  );
}

/* ================================================================
   MATH BLOCK (centered display equation)
   ================================================================ */
function MathBlock({ children, style }) {
  return (
    <div style={{
      fontFamily:'var(--font-mono)', fontSize:'clamp(15px, 1.8vw, 18px)',
      color:'var(--accent-bright)', textAlign:'center',
      padding:'20px 16px', margin:'20px 0',
      background:'rgba(245,158,11,0.04)',
      border:'1px solid rgba(245,158,11,0.1)',
      borderRadius:12, lineHeight:1.8,
      ...style,
    }}>
      {children}
    </div>
  );
}

/* ================================================================
   WORKED EXAMPLE
   ================================================================ */
function WorkedExample({ title, children }) {
  return (
    <Card style={{ marginBottom:20 }}>
      {title && (
        <div style={{
          fontFamily:'var(--font-mono)', fontSize:12, fontWeight:500,
          letterSpacing:'0.08em', textTransform:'uppercase',
          color:'var(--accent)', marginBottom:12,
        }}>
          {title}
        </div>
      )}
      {children}
    </Card>
  );
}

/* ================================================================
   PARAGRAPH
   ================================================================ */
function P({ children, style }) {
  return (
    <p style={{
      fontFamily:'var(--font-body)', fontSize:16, fontWeight:300,
      color:'var(--text-secondary)', lineHeight:1.75, marginBottom:16,
      ...style,
    }}>
      {children}
    </p>
  );
}

/* ================================================================
   VISUALIZATION PLACEHOLDER
   ================================================================ */
function VisualizationPlaceholder({ label }) {
  return (
    <div style={{
      border:'1px dashed rgba(245,158,11,0.2)',
      borderRadius:12, padding:'32px 24px',
      textAlign:'center', margin:'24px 0',
      background:'rgba(245,158,11,0.02)',
    }}>
      <div style={{
        fontFamily:'var(--font-mono)', fontSize:12, fontWeight:500,
        letterSpacing:'0.06em', textTransform:'uppercase',
        color:'var(--text-tertiary)', marginBottom:8,
      }}>
        Interactive Visualization
      </div>
      <div style={{
        fontFamily:'var(--font-body)', fontSize:14, fontWeight:300,
        color:'var(--text-tertiary)', fontStyle:'italic',
      }}>
        {label}
      </div>
    </div>
  );
}


/* ================================================================
   STEP 0 — LANDING
   ================================================================ */
function StepLanding({ onStart }) {
  return (
    <div style={{ textAlign:'center', padding:'clamp(40px, 8vh, 80px) 0' }}>
      {/* Floating symbols */}
      <div style={{ position:'relative', height:0 }}>
        {['f(x)', 'y \u2192 \u221E', '\u2260 0', 'asymptote', '\u221A x', 'holes'].map((s, i) => (
          <span key={i} style={{
            position:'absolute', fontFamily:'var(--font-display)',
            fontSize:`${16 + Math.random()*14}px`,
            color:`rgba(245,158,11,${0.04 + Math.random()*0.06})`,
            left:`${10 + (i*15)%80}%`, top:`${-30 + (i*23)%60}px`,
            animation:`float ${3.5 + i*0.6}s ease-in-out infinite`,
            animationDelay:`${i*0.3}s`, pointerEvents:'none',
          }}>{s}</span>
        ))}
      </div>

      <div style={{
        display:'inline-flex', alignItems:'center', gap:8,
        padding:'6px 16px', borderRadius:100,
        border:'1px solid var(--border-subtle)',
        background:'rgba(255,255,255,0.02)',
        fontFamily:'var(--font-mono)', fontSize:12,
        letterSpacing:'0.08em', textTransform:'uppercase',
        color:'var(--text-secondary)', marginBottom:36,
        animation:'slideDown 0.8s var(--ease-out-expo) both',
      }}>
        <span style={{
          width:6, height:6, borderRadius:'50%', background:'var(--accent)',
          boxShadow:'0 0 8px var(--accent)',
          animation:'pulseGlow 2s ease-in-out infinite',
        }} />
        Lesson 19
      </div>

      <h1 style={{
        fontFamily:'var(--font-display)',
        fontSize:'clamp(44px, 7vw, 80px)',
        fontWeight:400, lineHeight:1.05,
        letterSpacing:'-0.02em', marginBottom:24,
        animation:'fadeInUp 1s var(--ease-out-expo) 0.1s both',
      }}>
        <span style={{
          background:'linear-gradient(135deg, #e8e6f0 0%, rgba(232,230,240,0.6) 100%)',
          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
        }}>Radical & Rational</span>
        <br/>
        <span style={{
          fontStyle:'italic',
          background:'linear-gradient(135deg, var(--accent), var(--accent2))',
          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
        }}>Functions</span>
      </h1>

      <p style={{
        fontFamily:'var(--font-body)', fontSize:'clamp(15px, 2vw, 19px)',
        fontWeight:300, color:'var(--text-secondary)',
        maxWidth:480, margin:'0 auto 20px', lineHeight:1.65,
        animation:'fadeInUp 1s var(--ease-out-expo) 0.25s both',
      }}>
        Graph and analyze rational and radical functions -- asymptotes, holes, and end behavior.
      </p>

      {/* Draft badge */}
      <div style={{
        display:'inline-block', marginBottom:48,
        animation:'fadeInUp 1s var(--ease-out-expo) 0.35s both',
      }}>
        <span style={{
          fontFamily:'var(--font-mono)', fontSize:11, fontWeight:500,
          letterSpacing:'0.1em', textTransform:'uppercase',
          color:'var(--accent-dim)', background:'rgba(245,158,11,0.06)',
          border:'1px solid rgba(245,158,11,0.15)',
          borderRadius:6, padding:'4px 12px',
        }}>
          Rough Draft
        </span>
      </div>

      <div style={{ animation:'fadeInUp 1s var(--ease-out-expo) 0.45s both' }}>
        {/* Decorative fraction display */}
        <div style={{
          maxWidth:360, margin:'0 auto 48px',
          display:'flex', justifyContent:'center', gap:40,
        }}>
          {[
            { num:'f(x)', den:'\u221Ax' },
            { num:'x\u00B2 - 1', den:'x - 1' },
            { num:'1', den:'x\u00B2' },
          ].map((frac, i) => (
            <div key={i} style={{
              display:'flex', flexDirection:'column', alignItems:'center', gap:2,
              fontFamily:'var(--font-mono)', fontSize:16,
              color: i === 1 ? 'var(--accent-bright)' : 'var(--text-tertiary)',
              opacity: i === 1 ? 1 : 0.5,
              animation:`float ${3 + i*0.5}s ease-in-out infinite`,
              animationDelay:`${i*0.4}s`,
            }}>
              <span>{frac.num}</span>
              <div style={{
                width:'100%', height:1,
                background: i === 1 ? 'var(--accent)' : 'var(--text-tertiary)',
                opacity: i === 1 ? 0.6 : 0.3,
              }}/>
              <span>{frac.den}</span>
            </div>
          ))}
        </div>
      </div>

      <button onClick={onStart} style={{
        fontFamily:'var(--font-body)', fontSize:17, fontWeight:500,
        color:'#fff', background:'linear-gradient(135deg, var(--accent-dim), var(--accent))',
        border:'none', borderRadius:14, padding:'16px 44px',
        boxShadow:'0 4px 24px rgba(245,158,11,0.25)',
        transition:'all 0.3s var(--ease-out-expo)',
        animation:'fadeInUp 1s var(--ease-out-expo) 0.55s both',
      }}
      onMouseEnter={e => { e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 8px 32px rgba(245,158,11,0.35)'; }}
      onMouseLeave={e => { e.currentTarget.style.transform='translateY(0)'; e.currentTarget.style.boxShadow='0 4px 24px rgba(245,158,11,0.25)'; }}
      >
        Begin Lesson
      </button>
    </div>
  );
}




/* ================================================================
   STEP 5 — VERTICAL ASYMPTOTES & HOLES
   ================================================================ */
function Step5Asymptotes() {
  return (
    <div style={{ animation:'fadeIn 0.5s ease both' }}>
      <SectionHeader
        title="Asymptotes & Holes"
        subtitle="When the denominator equals zero, something interesting happens on the graph."
      />

      <P>
        When you graph a rational expression, the values where the denominator equals zero create
        dramatic features on the graph. There are two possibilities depending on whether the numerator
        is also zero at that point. Understanding these features is essential for sketching rational
        function graphs and for understanding their behavior.
      </P>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, margin:'24px 0' }}>
        <Card>
          <div style={{
            fontFamily:'var(--font-mono)', fontSize:12, fontWeight:500,
            letterSpacing:'0.08em', textTransform:'uppercase',
            color:'var(--accent)', marginBottom:12,
          }}>
            Vertical Asymptote
          </div>
          <P style={{ marginBottom:8 }}>
            When the denominator = 0 but the numerator <M>{'\u2260'} 0</M> at that point, the graph
            shoots off toward infinity. The function values grow without bound as <M>x</M> approaches
            the restricted value. The graph has a vertical line it approaches but never touches.
          </P>
          <MathBlock style={{ fontSize:14, padding:'12px' }}>
            {'Q(x) = 0, P(x) \u2260 0'}<br/>
            {'\u2192 Vertical Asymptote'}
          </MathBlock>
        </Card>

        <Card>
          <div style={{
            fontFamily:'var(--font-mono)', fontSize:12, fontWeight:500,
            letterSpacing:'0.08em', textTransform:'uppercase',
            color:'var(--success)', marginBottom:12,
          }}>
            Hole (Removable)
          </div>
          <P style={{ marginBottom:8 }}>
            When both the numerator = 0 and the denominator = 0 at the same point, the common factor
            cancels. The graph looks continuous except for a single missing point -- a "hole" or
            removable discontinuity. The function is simply undefined at that one value.
          </P>
          <MathBlock style={{ fontSize:14, padding:'12px' }}>
            {'Q(x) = 0, P(x) = 0'}<br/>
            {'\u2192 Hole (removable discontinuity)'}
          </MathBlock>
        </Card>
      </div>

      <WorkedExample title="Example: Both Features in One Function">
        <P style={{ marginBottom:8, color:'var(--text-primary)' }}>
          Analyze: <M>(x - 2) / ((x - 2)(x + 1))</M>
        </P>
        <P style={{ marginBottom:8 }}>
          The denominator is zero when <M>x = 2</M> or <M>x = -1</M>.
        </P>
        <div style={{ display:'flex', gap:16, margin:'16px 0' }}>
          <div style={{
            flex:1, padding:'12px 16px', borderRadius:10,
            background:'rgba(74,222,128,0.06)', border:'1px solid rgba(74,222,128,0.15)',
          }}>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:13, color:'var(--success)', marginBottom:4 }}>
              x = 2: Hole
            </div>
            <P style={{ fontSize:14, marginBottom:0 }}>
              Both numerator and denominator equal zero. The factor <M>(x - 2)</M> cancels, leaving
              a hole at the point <M>(2, 1/3)</M>.
            </P>
          </div>
          <div style={{
            flex:1, padding:'12px 16px', borderRadius:10,
            background:'rgba(245,158,11,0.06)', border:'1px solid rgba(245,158,11,0.15)',
          }}>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:13, color:'var(--accent)', marginBottom:4 }}>
              x = -1: Vertical Asymptote
            </div>
            <P style={{ fontSize:14, marginBottom:0 }}>
              The denominator is zero but the numerator <M>(-1 - 2 = -3)</M> is not. The graph
              shoots toward infinity near <M>x = -1</M>.
            </P>
          </div>
        </div>
      </WorkedExample>

      <P>
        Rational functions also have <strong style={{ color:'var(--accent-bright)' }}>horizontal asymptotes</strong>{' '}
        that describe the function's behavior as <M>x</M> goes toward positive or negative infinity.
        The rule depends on comparing the degrees of the numerator and denominator:
      </P>

      <Card style={{ marginBottom:20 }}>
        <div style={{
          display:'grid', gap:1, background:'var(--border-subtle)', borderRadius:10, overflow:'hidden',
        }}>
          {[
            { cond:'Degree of numerator < degree of denominator', result:'y = 0', note:'Horizontal asymptote at zero' },
            { cond:'Degree of numerator = degree of denominator', result:'y = (leading coeff of num) / (leading coeff of den)', note:'Ratio of leading coefficients' },
            { cond:'Degree of numerator > degree of denominator', result:'No horizontal asymptote', note:'Oblique/slant asymptote instead' },
          ].map((row, i) => (
            <div key={i} style={{
              display:'grid', gridTemplateColumns:'1fr auto',
              gap:16, padding:'14px 18px', background:'var(--bg-deep)',
              alignItems:'center',
            }}>
              <div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:14, fontWeight:400, color:'var(--text-primary)', marginBottom:2 }}>
                  {row.cond}
                </div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:13, fontWeight:300, color:'var(--text-tertiary)' }}>
                  {row.note}
                </div>
              </div>
              <div style={{
                fontFamily:'var(--font-mono)', fontSize:13,
                color:'var(--accent-bright)', whiteSpace:'nowrap',
              }}>
                {row.result}
              </div>
            </div>
          ))}
        </div>
      </Card>

      <ConceptBox label="Key Insight">
        <P style={{ marginBottom:0 }}>
          To determine the full picture of a rational function's graph, you need: (1) the vertical
          asymptotes (denominator-only zeros), (2) the holes (common zeros), (3) the horizontal or
          oblique asymptote (degree comparison), (4) the x-intercepts (numerator zeros), and (5) the
          y-intercept (evaluate at x = 0). With these five pieces of information, you can sketch a
          reasonable graph by hand.
        </P>
      </ConceptBox>

      {/* TODO: Interactive -- graph with asymptotes and holes marked */}
      <VisualizationPlaceholder label="Interactive graph: enter a rational function, see vertical asymptotes (dashed lines), holes (open circles), and horizontal asymptotes plotted" />
    </div>
  );
}
