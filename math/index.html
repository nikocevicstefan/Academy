/* ── One-time migration from old numeric progress IDs to new string IDs ── */
(function migrateProgress() {
  try {
    const raw = JSON.parse(localStorage.getItem('math-progress') || '[]');
    if (raw.length === 0) return;
    if (raw.some(v => typeof v === 'number')) {
      const MAP = { 1:'mf1-05a', 2:'mf1-05b', 3:'mf1-06a', 4:'mf1-06b', 5:'mf1-04', 6:'mf1-11', 7:'mf2-01', 8:'mf1-08', 9:'mf2-08', 10:'mf2-09', 11:'mf1-07', 12:'mf2-05', 13:'mf2-07', 14:'mf2-14' };
      const migrated = raw.map(v => typeof v === 'number' ? (MAP[v] || v) : v).filter(Boolean);
      const unique = [...new Set(migrated)];
      localStorage.setItem('math-progress', JSON.stringify(unique));
    }
  } catch(e) {}
})();

const ALL_LESSONS = COURSES.flatMap(c => c.lessons);

/* ── Progress hook ── */
function useProgress() {
  const [visited, setVisited] = useState(() => {
    try { return JSON.parse(localStorage.getItem('math-progress') || '[]'); }
    catch { return []; }
  });
  const resetProgress = useCallback(() => {
    setVisited([]);
    localStorage.removeItem('math-progress');
  }, []);
  return { visited, resetProgress };
}

/* ── Intersection Observer hook ── */
function useInView() {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setInView(true); obs.unobserve(el); }
    }, { threshold: 0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, inView];
}

/* ── Animated mini icons per lesson ── */
function LessonIcon({ id, active }) {
  const ref = useRef(null);
  const raf = useRef(null);
  const col = active ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.25)';
  const colBright = active ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.4)';
  const S = 44;
  const dpr = typeof window !== 'undefined' ? window.devicePixelRatio || 1 : 1;

  useEffect(() => {
    const c = ref.current;
    if (!c) return;
    c.width = S * dpr;
    c.height = S * dpr;
    const ctx = c.getContext('2d');
    ctx.scale(dpr, dpr);
    let t = Math.random() * 100;
    let running = true;

    function draw() {
      if (!running) return;
      ctx.clearRect(0, 0, S, S);
      ctx.lineWidth = 1.2;
      ctx.lineCap = 'round';
      ctx.strokeStyle = col;
      ctx.fillStyle = col;
      const cx = S / 2, cy = S / 2;

      switch (id) {
        /* ── MF1 Icons ── */
        case 'mf1-01': { // Fractions — pie chart divided into sections
          const r = 12;
          ctx.strokeStyle = col;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.stroke();
          // divider lines
          const slices = 4;
          const spin = t * 0.008;
          for (let i = 0; i < slices; i++) {
            const a = spin + (i / slices) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
            ctx.stroke();
          }
          // fill one slice
          ctx.fillStyle = active ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)';
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, r, spin, spin + Math.PI / 2);
          ctx.closePath();
          ctx.fill();
          break;
        }
        case 'mf1-02': { // Ratios — two bars of different lengths
          const barY1 = cy - 6;
          const barY2 = cy + 3;
          const barH = 5;
          const w1 = 14 + Math.sin(t * 0.02) * 3;
          const w2 = 24 - Math.sin(t * 0.02) * 3;
          ctx.fillStyle = col;
          ctx.fillRect(8, barY1, w1, barH);
          ctx.fillStyle = colBright;
          ctx.fillRect(8, barY2, w2, barH);
          // colon
          ctx.fillStyle = col;
          ctx.font = '10px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(':', S - 10, cy + 2);
          break;
        }
        case 'mf1-03': { // Number system — number line with + and - sides
          const y = cy + 2;
          ctx.beginPath();
          ctx.moveTo(6, y);
          ctx.lineTo(S - 6, y);
          ctx.stroke();
          // center tick (zero)
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(cx, y - 5);
          ctx.lineTo(cx, y + 5);
          ctx.stroke();
          ctx.lineWidth = 1.2;
          // ticks on both sides
          for (let i = 1; i <= 3; i++) {
            const off = i * 7;
            ctx.beginPath();
            ctx.moveTo(cx - off, y - 3);
            ctx.lineTo(cx - off, y + 3);
            ctx.moveTo(cx + off, y - 3);
            ctx.lineTo(cx + off, y + 3);
            ctx.stroke();
          }
          // + and - labels
          ctx.fillStyle = colBright;
          ctx.font = '9px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('\u2212', 10, y - 8);
          ctx.fillText('+', S - 10, y - 8);
          // sliding dot
          const px = cx + Math.sin(t * 0.025) * 14;
          ctx.fillStyle = colBright;
          ctx.beginPath();
          ctx.arc(px, y, 2.5, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
        case 'mf1-04': { // Exponents — exponential growth dots (old case 5)
          const count = 6;
          for (let i = 0; i < count; i++) {
            const x = 8 + i * 6;
            const h = Math.pow(1.5, i) * 2;
            const bounce = Math.sin(t * 0.03 + i * 0.5) * 1.5;
            ctx.fillStyle = i < count - 1 ? col : colBright;
            ctx.beginPath();
            ctx.arc(x, cy + 6 - h + bounce, 1.5 + i * 0.3, 0, Math.PI * 2);
            ctx.fill();
          }
          break;
        }
        case 'mf1-05a': { // Equations — balance beam (old case 1)
          const tilt = Math.sin(t * 0.02) * 0.15;
          ctx.beginPath();
          ctx.moveTo(cx, cy + 8);
          ctx.lineTo(cx - 5, cy + 14);
          ctx.lineTo(cx + 5, cy + 14);
          ctx.closePath();
          ctx.fill();
          ctx.save();
          ctx.translate(cx, cy + 8);
          ctx.rotate(tilt);
          ctx.beginPath();
          ctx.moveTo(-16, 0);
          ctx.lineTo(16, 0);
          ctx.stroke();
          ctx.fillStyle = colBright;
          ctx.fillRect(-17, -6, 5, 6);
          ctx.fillRect(12, -6, 5, 6);
          ctx.restore();
          break;
        }
        case 'mf1-05b': { // Inequalities — number line with slider (old case 2)
          const y = cy + 2;
          ctx.beginPath();
          ctx.moveTo(6, y);
          ctx.lineTo(S - 6, y);
          ctx.stroke();
          for (let i = 0; i < 5; i++) {
            const tx = 10 + i * 7;
            ctx.beginPath();
            ctx.moveTo(tx, y - 3);
            ctx.lineTo(tx, y + 3);
            ctx.stroke();
          }
          const px = 12 + (Math.sin(t * 0.025) * 0.5 + 0.5) * 20;
          ctx.fillStyle = colBright;
          ctx.beginPath();
          ctx.arc(px, y, 2.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = active ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.03)';
          ctx.fillRect(px, y - 4, S - 6 - px, 8);
          break;
        }
        case 'mf1-06a': { // Graphing linear — line on coord plane (old case 3)
          ctx.beginPath();
          ctx.moveTo(8, cy);
          ctx.lineTo(S - 6, cy);
          ctx.moveTo(cx, 6);
          ctx.lineTo(cx, S - 6);
          ctx.stroke();
          const m = 0.8;
          const bOff = Math.sin(t * 0.015) * 4;
          ctx.strokeStyle = colBright;
          ctx.beginPath();
          ctx.moveTo(8, cy - (m * (8 - cx) + bOff));
          ctx.lineTo(S - 6, cy - (m * (S - 6 - cx) + bOff));
          ctx.stroke();
          break;
        }
        case 'mf1-06b': { // Systems — two lines crossing (old case 4)
          ctx.globalAlpha = 0.3;
          ctx.beginPath();
          ctx.moveTo(8, cy);
          ctx.lineTo(S - 6, cy);
          ctx.moveTo(cx, 6);
          ctx.lineTo(cx, S - 6);
          ctx.stroke();
          ctx.globalAlpha = 1;
          const a1 = 0.6 + Math.sin(t * 0.012) * 0.2;
          ctx.strokeStyle = col;
          ctx.beginPath();
          ctx.moveTo(6, cy - a1 * (6 - cx));
          ctx.lineTo(S - 6, cy - a1 * (S - 6 - cx));
          ctx.stroke();
          ctx.strokeStyle = colBright;
          ctx.beginPath();
          ctx.moveTo(6, cy + 0.5 * (6 - cx) + 4);
          ctx.lineTo(S - 6, cy + 0.5 * (S - 6 - cx) + 4);
          ctx.stroke();
          ctx.fillStyle = colBright;
          ctx.beginPath();
          ctx.arc(cx + 2, cy - 2, 2, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
        case 'mf1-07': { // Radical/rational expressions — fraction bar (old case 11)
          ctx.beginPath();
          ctx.moveTo(8, cy);
          ctx.lineTo(S - 8, cy);
          ctx.stroke();
          const nx = cx + Math.sin(t * 0.03) * 4;
          ctx.fillStyle = colBright;
          ctx.font = '10px serif';
          ctx.textAlign = 'center';
          ctx.fillText('x+1', nx, cy - 5);
          ctx.fillText('x\u00b2', nx, cy + 13);
          break;
        }
        case 'mf1-08': { // Functions — function machine (old case 8)
          ctx.strokeStyle = col;
          ctx.strokeRect(cx - 8, cy - 7, 16, 14);
          ctx.fillStyle = colBright;
          ctx.font = "9px 'JetBrains Mono'";
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('f', cx, cy);
          const inX = cx - 16 + Math.sin(t * 0.03) * 2;
          ctx.strokeStyle = col;
          ctx.beginPath();
          ctx.moveTo(6, cy);
          ctx.lineTo(inX, cy);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(inX - 3, cy - 2);
          ctx.lineTo(inX, cy);
          ctx.lineTo(inX - 3, cy + 2);
          ctx.stroke();
          const outX = cx + 16 - Math.sin(t * 0.03) * 2;
          ctx.beginPath();
          ctx.moveTo(outX, cy);
          ctx.lineTo(S - 6, cy);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(S - 9, cy - 2);
          ctx.lineTo(S - 6, cy);
          ctx.lineTo(S - 9, cy + 2);
          ctx.stroke();
          ctx.textBaseline = 'alphabetic';
          break;
        }
        case 'mf1-09': { // Absolute value — V shape
          const depth = 4 + Math.sin(t * 0.02) * 2;
          ctx.strokeStyle = colBright;
          ctx.beginPath();
          ctx.moveTo(8, cy - 8);
          ctx.lineTo(cx, cy + depth);
          ctx.lineTo(S - 8, cy - 8);
          ctx.stroke();
          // vertex dot
          ctx.fillStyle = colBright;
          ctx.beginPath();
          ctx.arc(cx, cy + depth, 2, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
        case 'mf1-10': { // Exponential functions — growth curve
          ctx.strokeStyle = colBright;
          ctx.beginPath();
          for (let i = 0; i < S - 12; i++) {
            const x = 6 + i;
            const base = 1.06 + Math.sin(t * 0.01) * 0.01;
            const y = cy + 12 - Math.pow(base, i) * 0.6;
            i === 0 ? ctx.moveTo(x, Math.max(6, y)) : ctx.lineTo(x, Math.max(6, y));
          }
          ctx.stroke();
          // horizontal asymptote
          ctx.strokeStyle = active ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.06)';
          ctx.setLineDash([2, 2]);
          ctx.beginPath();
          ctx.moveTo(6, cy + 12);
          ctx.lineTo(S - 6, cy + 12);
          ctx.stroke();
          ctx.setLineDash([]);
          break;
        }
        case 'mf1-11': { // Polynomials — area model grid (old case 6)
          const gx = 10, gy = 12, gw = 24, gh = 18;
          ctx.strokeStyle = col;
          ctx.strokeRect(gx, gy, gw, gh);
          const split = Math.sin(t * 0.02) * 2 + gw * 0.55;
          ctx.beginPath();
          ctx.moveTo(gx + split, gy);
          ctx.lineTo(gx + split, gy + gh);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(gx, gy + gh * 0.5);
          ctx.lineTo(gx + gw, gy + gh * 0.5);
          ctx.stroke();
          ctx.fillStyle = active ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.02)';
          ctx.fillRect(gx + 1, gy + 1, split - 1, gh * 0.5 - 1);
          ctx.fillStyle = active ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.04)';
          ctx.fillRect(gx + split + 1, gy + 1, gw - split - 1, gh * 0.5 - 1);
          break;
        }
        case 'mf1-12': { // Geometry fundamentals — angle with arc
          const ox = 10, oy = cy + 10;
          // two rays
          ctx.strokeStyle = colBright;
          ctx.beginPath();
          ctx.moveTo(ox, oy);
          ctx.lineTo(S - 8, oy);
          ctx.stroke();
          const angle = 0.7 + Math.sin(t * 0.015) * 0.2;
          ctx.beginPath();
          ctx.moveTo(ox, oy);
          ctx.lineTo(ox + Math.cos(angle) * 28, oy - Math.sin(angle) * 28);
          ctx.stroke();
          // arc
          ctx.strokeStyle = col;
          ctx.beginPath();
          ctx.arc(ox, oy, 10, -angle, 0);
          ctx.stroke();
          // angle dot
          ctx.fillStyle = colBright;
          ctx.beginPath();
          ctx.arc(ox, oy, 2, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
        case 'mf1-13': { // Polygons — triangle
          const wobble = Math.sin(t * 0.02) * 2;
          ctx.strokeStyle = colBright;
          ctx.beginPath();
          ctx.moveTo(cx, 10 + wobble);
          ctx.lineTo(8, S - 10);
          ctx.lineTo(S - 8, S - 10);
          ctx.closePath();
          ctx.stroke();
          // fill
          ctx.fillStyle = active ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.02)';
          ctx.fill();
          break;
        }

        /* ── MF2 Icons ── */
        case 'mf2-01': { // Quadratics — parabola (old case 7)
          ctx.strokeStyle = colBright;
          ctx.beginPath();
          const a = 0.04 + Math.sin(t * 0.015) * 0.01;
          for (let px = 4; px < S - 4; px++) {
            const x = px - cx;
            const y = cy - 6 - a * x * x;
            if (px === 4) ctx.moveTo(px, y);
            else ctx.lineTo(px, y);
          }
          ctx.stroke();
          ctx.fillStyle = colBright;
          ctx.beginPath();
          ctx.arc(cx, cy - 6, 2, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
        case 'mf2-02': { // Polynomials II — cubic curve
          ctx.strokeStyle = colBright;
          ctx.beginPath();
          for (let px = 4; px < S - 4; px++) {
            const x = (px - cx) / 10;
            const y = cy - (x * x * x - 1.5 * x + Math.sin(t * 0.015) * 0.3) * 5;
            if (px === 4) ctx.moveTo(px, Math.min(Math.max(y, 4), S - 4));
            else ctx.lineTo(px, Math.min(Math.max(y, 4), S - 4));
          }
          ctx.stroke();
          break;
        }
        case 'mf2-03': { // Complex numbers — "i" on complex plane
          // axes
          ctx.globalAlpha = 0.3;
          ctx.beginPath();
          ctx.moveTo(8, cy);
          ctx.lineTo(S - 6, cy);
          ctx.moveTo(cx, 6);
          ctx.lineTo(cx, S - 6);
          ctx.stroke();
          ctx.globalAlpha = 1;
          // "i" label
          ctx.fillStyle = colBright;
          ctx.font = "11px 'Instrument Serif'";
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('i', cx + 4, cy - 10);
          // rotating point on complex plane
          const angle = t * 0.02;
          const r = 10;
          const ptx = cx + Math.cos(angle) * r;
          const pty = cy - Math.sin(angle) * r;
          ctx.fillStyle = colBright;
          ctx.beginPath();
          ctx.arc(ptx, pty, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.textBaseline = 'alphabetic';
          break;
        }
        case 'mf2-04': { // Functions II — reflected curve
          // original curve
          ctx.strokeStyle = col;
          ctx.beginPath();
          for (let px = 6; px < S - 6; px++) {
            const x = (px - cx) / 8;
            const y = cy - (x * x * 0.6) * 4;
            if (px === 6) ctx.moveTo(px, y);
            else ctx.lineTo(px, Math.max(6, y));
          }
          ctx.stroke();
          // reflected curve (with animation shift)
          const shift = Math.sin(t * 0.02) * 3;
          ctx.strokeStyle = colBright;
          ctx.beginPath();
          for (let px = 6; px < S - 6; px++) {
            const x = (px - cx) / 8;
            const y = cy + (x * x * 0.6) * 4 + shift;
            if (px === 6) ctx.moveTo(px, y);
            else ctx.lineTo(px, Math.min(S - 6, y));
          }
          ctx.stroke();
          // mirror axis
          ctx.strokeStyle = active ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.06)';
          ctx.setLineDash([2, 2]);
          ctx.beginPath();
          ctx.moveTo(6, cy);
          ctx.lineTo(S - 6, cy);
          ctx.stroke();
          ctx.setLineDash([]);
          break;
        }
        case 'mf2-05': { // Exponentials & Logarithms (old case 12)
          ctx.beginPath();
          for (let i = 0; i < S - 12; i++) {
            const x = 6 + i;
            const y = cy + 10 - Math.pow(1.08, i) * 0.5;
            i === 0 ? ctx.moveTo(x, Math.max(6, y)) : ctx.lineTo(x, Math.max(6, y));
          }
          ctx.strokeStyle = colBright;
          ctx.stroke();
          ctx.fillStyle = col;
          ctx.font = '9px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('log', cx, cy + 14);
          break;
        }
        case 'mf2-06': { // Radical/rational functions — curve with asymptote
          // vertical asymptote
          ctx.strokeStyle = active ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.06)';
          ctx.setLineDash([2, 2]);
          ctx.beginPath();
          ctx.moveTo(cx, 6);
          ctx.lineTo(cx, S - 6);
          ctx.stroke();
          ctx.setLineDash([]);
          // 1/x-style curve (right side)
          ctx.strokeStyle = colBright;
          ctx.beginPath();
          let first = true;
          for (let px = cx + 3; px < S - 4; px++) {
            const x = px - cx;
            const y = cy - (8 / x + Math.sin(t * 0.015) * 0.5);
            if (first) { ctx.moveTo(px, y); first = false; }
            else ctx.lineTo(px, y);
          }
          ctx.stroke();
          // left side
          ctx.beginPath();
          first = true;
          for (let px = 4; px < cx - 3; px++) {
            const x = px - cx;
            const y = cy - (8 / x + Math.sin(t * 0.015) * 0.5);
            if (first) { ctx.moveTo(px, y); first = false; }
            else ctx.lineTo(px, y);
          }
          ctx.stroke();
          break;
        }
        case 'mf2-07': { // Sequences — dots in pattern (old case 13)
          for (let i = 0; i < 5; i++) {
            const x = 8 + i * 7.5;
            const y = cy + 2 - i * 2.5 + Math.sin(t * 0.02 + i) * 2;
            ctx.fillStyle = i < 3 ? colBright : col;
            ctx.beginPath();
            ctx.arc(x, y, 2.2, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.fillStyle = col;
          ctx.font = '13px serif';
          ctx.textAlign = 'center';
          ctx.fillText('\u03a3', cx + 8, cy + 14);
          break;
        }
        case 'mf2-08': { // Geometry & Solid — distance points (old case 9)
          const p1x = 10 + Math.sin(t * 0.015) * 2;
          const p1y = cy + 8;
          const p2x = S - 12;
          const p2y = cy - 8 + Math.cos(t * 0.015) * 2;
          ctx.setLineDash([2, 2]);
          ctx.strokeStyle = col;
          ctx.beginPath();
          ctx.moveTo(p1x, p1y);
          ctx.lineTo(p2x, p2y);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = colBright;
          ctx.beginPath();
          ctx.arc(p1x, p1y, 2.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(p2x, p2y, 2.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = col;
          ctx.beginPath();
          ctx.arc((p1x + p2x) / 2, (p1y + p2y) / 2, 1.5, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
        case 'mf2-09': { // Trigonometry — unit circle (old case 10)
          const r = 13;
          ctx.strokeStyle = col;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.stroke();
          const angle = t * 0.025;
          const px = cx + Math.cos(angle) * r;
          const py = cy - Math.sin(angle) * r;
          ctx.fillStyle = colBright;
          ctx.beginPath();
          ctx.arc(px, py, 2.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = colBright;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(px, py);
          ctx.stroke();
          ctx.strokeStyle = active ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.1)';
          ctx.setLineDash([1, 2]);
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(px, cy);
          ctx.stroke();
          ctx.setLineDash([]);
          break;
        }
        case 'mf2-10': { // Vectors — arrow
          const angle = 0.5 + Math.sin(t * 0.015) * 0.3;
          const len = 22;
          const ex = cx + Math.cos(angle) * len * 0.5;
          const ey = cy - Math.sin(angle) * len * 0.5;
          const sx = cx - Math.cos(angle) * len * 0.5;
          const sy = cy + Math.sin(angle) * len * 0.5;
          // shaft
          ctx.strokeStyle = colBright;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.lineTo(ex, ey);
          ctx.stroke();
          // arrowhead
          const headLen = 6;
          const ha1 = angle + Math.PI + 0.4;
          const ha2 = angle + Math.PI - 0.4;
          ctx.beginPath();
          ctx.moveTo(ex + Math.cos(ha1) * headLen, ey - Math.sin(ha1) * headLen);
          ctx.lineTo(ex, ey);
          ctx.lineTo(ex + Math.cos(ha2) * headLen, ey - Math.sin(ha2) * headLen);
          ctx.stroke();
          ctx.lineWidth = 1.2;
          // origin dot
          ctx.fillStyle = col;
          ctx.beginPath();
          ctx.arc(sx, sy, 2, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
        case 'mf2-11': { // Limits — curve approaching a point
          // horizontal asymptote
          ctx.strokeStyle = active ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.06)';
          ctx.setLineDash([2, 2]);
          ctx.beginPath();
          ctx.moveTo(6, cy - 6);
          ctx.lineTo(S - 6, cy - 6);
          ctx.stroke();
          ctx.setLineDash([]);
          // curve approaching from left
          ctx.strokeStyle = colBright;
          ctx.beginPath();
          for (let px = 6; px < S - 6; px++) {
            const x = (px - 6) / (S - 12);
            const y = cy - 6 + 12 * Math.exp(-3 * x) * Math.sin(t * 0.015);
            const baseY = cy - 6 + 10 / (1 + Math.exp(6 * (x - 0.3)));
            if (px === 6) ctx.moveTo(px, baseY);
            else ctx.lineTo(px, baseY);
          }
          ctx.stroke();
          // limit point (open circle)
          ctx.strokeStyle = colBright;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(S - 10, cy - 6 + Math.sin(t * 0.03) * 1, 2.5, 0, Math.PI * 2);
          ctx.stroke();
          ctx.lineWidth = 1.2;
          break;
        }
        case 'mf2-12': { // Calculus — tangent line to curve
          // curve
          ctx.strokeStyle = col;
          ctx.beginPath();
          for (let px = 6; px < S - 6; px++) {
            const x = (px - cx) / 10;
            const y = cy - (x * x - 1) * 5;
            if (px === 6) ctx.moveTo(px, y);
            else ctx.lineTo(px, Math.min(Math.max(y, 4), S - 4));
          }
          ctx.stroke();
          // tangent point slides
          const tx = cx + Math.sin(t * 0.02) * 8;
          const txn = (tx - cx) / 10;
          const ty = cy - (txn * txn - 1) * 5;
          const slope = 2 * txn * 5 / 10;
          // tangent line
          ctx.strokeStyle = colBright;
          ctx.beginPath();
          ctx.moveTo(tx - 12, ty + slope * 12);
          ctx.lineTo(tx + 12, ty - slope * 12);
          ctx.stroke();
          // point
          ctx.fillStyle = colBright;
          ctx.beginPath();
          ctx.arc(tx, ty, 2.5, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
        case 'mf2-13': { // Statistics — bar chart
          const bars = [0.4, 0.7, 1.0, 0.6, 0.3];
          const barW = 5;
          const gap = 2;
          const totalW = bars.length * barW + (bars.length - 1) * gap;
          const startX = cx - totalW / 2;
          const baseY = cy + 10;
          const maxH = 22;
          for (let i = 0; i < bars.length; i++) {
            const bx = startX + i * (barW + gap);
            const h = bars[i] * maxH + Math.sin(t * 0.02 + i * 0.8) * 1.5;
            ctx.fillStyle = i === 2 ? colBright : col;
            ctx.fillRect(bx, baseY - h, barW, h);
          }
          // base line
          ctx.strokeStyle = col;
          ctx.beginPath();
          ctx.moveTo(startX - 2, baseY);
          ctx.lineTo(startX + totalW + 2, baseY);
          ctx.stroke();
          break;
        }
        case 'mf2-14': { // Probability — dice (old case 14)
          const sz = 14;
          const dx = cx - sz/2, dy = cy - sz/2;
          ctx.strokeStyle = col;
          ctx.strokeRect(dx, dy, sz, sz);
          const dots = [[0.5,0.5],[0.2,0.2],[0.8,0.8]];
          ctx.fillStyle = colBright;
          dots.forEach(([px,py]) => {
            ctx.beginPath();
            ctx.arc(dx + px * sz, dy + py * sz, 1.5, 0, Math.PI * 2);
            ctx.fill();
          });
          ctx.fillStyle = col;
          ctx.font = '8px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('P(x)', cx, cy + 16);
          break;
        }
      }
      t++;
      raf.current = requestAnimationFrame(draw);
    }
    raf.current = requestAnimationFrame(draw);
    return () => { running = false; cancelAnimationFrame(raf.current); };
  }, [id, active]);

  return (
    <canvas
      ref={ref}
      style={{ width: S, height: S, flexShrink: 0 }}
    />
  );
}

/* ── Lesson row component ── */
function LessonRow({ lesson, index, isVisited }) {
  const [ref, inView] = useInView();
  const [hovered, setHovered] = useState(false);

  return (
    <div ref={ref} style={{
      opacity: inView ? 1 : 0,
      transform: inView ? 'translateY(0)' : 'translateY(16px)',
      transition: 'opacity 0.5s ease ' + (index * 0.04) + 's, transform 0.5s ease ' + (index * 0.04) + 's',
    }}>
      <a
        href={lesson.file}
        onMouseEnter={() => setHovered(true)}
        onMouseLeave={() => setHovered(false)}
        style={{
          display: 'grid',
          gridTemplateColumns: '32px 44px 1fr auto',
          alignItems: 'center',
          gap: 16,
          padding: '18px 12px',
          textDecoration: 'none',
          color: 'inherit',
          borderBottom: '1px solid var(--border)',
          background: hovered ? 'rgba(255,255,255,0.02)' : 'transparent',
          transition: 'background 0.2s ease',
        }}
      >
        {/* Number / check */}
        <span style={{
          fontFamily: 'var(--font-mono)',
          fontSize: 13,
          color: isVisited ? 'var(--green)' : 'var(--text-faint)',
          textAlign: 'center',
        }}>
          {isVisited ? '\u2713' : lesson.num}
        </span>

        {/* Animated icon */}
        <LessonIcon id={lesson.id} active={hovered} />

        {/* Content */}
        <div>
          <div style={{
            fontFamily: 'var(--font-display)',
            fontSize: 20,
            color: hovered ? '#fff' : 'var(--text)',
            transition: 'color 0.2s',
            marginBottom: 2,
          }}>
            {lesson.title}
          </div>
          <div style={{
            fontSize: 14,
            fontWeight: 300,
            color: 'var(--text-dim)',
            lineHeight: 1.4,
          }}>
            {lesson.desc}
          </div>
          {lesson.draft && (
            <span style={{
              display: 'inline-block', marginTop: 4,
              fontFamily: 'var(--font-mono)', fontSize: 10,
              color: 'var(--accent)', opacity: 0.7,
              letterSpacing: '0.08em', textTransform: 'uppercase',
            }}>Draft</span>
          )}
        </div>

        {/* Arrow */}
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke={hovered ? 'var(--text)' : 'var(--text-faint)'}
          strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"
          style={{
            transition: 'stroke 0.2s, transform 0.2s',
            transform: hovered ? 'translateX(3px)' : 'translateX(0)',
          }}>
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const { visited, resetProgress } = useProgress();
  const totalLessons = ALL_LESSONS.length;
  const pct = Math.round((visited.length / totalLessons) * 100);

  const courseCompleted = (ci) => COURSES[ci].lessons.filter(l => visited.includes(l.id)).length;
  const coursePct = (ci) => Math.round((courseCompleted(ci) / COURSES[ci].lessons.length) * 100);

  return (
    <div style={{ maxWidth: 660, margin: '0 auto', padding: '0 24px' }}>
      {/* Back link */}
      <div style={{
        padding: '24px 0 0',
        animation: 'fadeIn 0.4s ease both',
      }}>
        <a href="../index.html" style={{
          fontFamily: 'var(--font-mono)',
          fontSize: 12,
          color: 'var(--text-faint)',
          textDecoration: 'none',
          display: 'inline-flex',
          alignItems: 'center',
          gap: 6,
          transition: 'color 0.2s',
        }}
        onMouseEnter={e => e.currentTarget.style.color = 'var(--text)'}
        onMouseLeave={e => e.currentTarget.style.color = 'var(--text-faint)'}
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          Academy
        </a>
      </div>

      <header style={{
        padding: '48px 0 60px',
        borderBottom: '1px solid var(--border)',
        animation: 'fadeIn 0.6s ease both',
      }}>
        <h1 style={{
          fontFamily: 'var(--font-display)',
          fontSize: 'clamp(36px, 6vw, 52px)',
          fontWeight: 400,
          color: '#fff',
          lineHeight: 1.1,
          marginBottom: 12,
        }}>
          Mathematical Foundations
        </h1>
        <p style={{
          fontSize: 16,
          fontWeight: 300,
          color: 'var(--text-dim)',
          lineHeight: 1.5,
          maxWidth: 480,
          marginBottom: 28,
        }}>
          27 chapters from fractions through calculus. Interactive visualizations, step-by-step problem solving.
        </p>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{
            width: 120, height: 3, borderRadius: 2,
            background: 'rgba(255,255,255,0.08)',
            overflow: 'hidden',
          }}>
            <div style={{
              height: '100%', width: pct + '%',
              background: visited.length === totalLessons ? 'var(--green)' : 'var(--accent)',
              borderRadius: 2,
              transition: 'width 0.5s ease',
            }} />
          </div>
          <span style={{
            fontFamily: 'var(--font-mono)',
            fontSize: 12,
            color: 'var(--text-faint)',
          }}>
            {visited.length}/{totalLessons}
          </span>
        </div>
      </header>

      {/* Course sections */}
      {COURSES.map((course, ci) => (
        <div key={ci} style={{ marginTop: ci > 0 ? 48 : 0 }}>
          <div style={{ padding: '24px 0 16px', borderBottom: '1px solid var(--border)' }}>
            <h2 style={{
              fontFamily: 'var(--font-display)',
              fontSize: 'clamp(24px, 4vw, 32px)',
              fontWeight: 400,
              color: '#fff',
              marginBottom: 4,
            }}>
              {course.title}
            </h2>
            <p style={{
              fontSize: 14,
              fontWeight: 300,
              color: 'var(--text-dim)',
              lineHeight: 1.4,
            }}>
              {course.desc}
            </p>
            {/* Mini progress for this course */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 12 }}>
              <div style={{
                width: 80, height: 2, borderRadius: 1,
                background: 'rgba(255,255,255,0.06)',
                overflow: 'hidden',
              }}>
                <div style={{
                  height: '100%', width: coursePct(ci) + '%',
                  background: 'var(--accent)',
                  borderRadius: 1,
                  transition: 'width 0.5s ease',
                }} />
              </div>
              <span style={{
                fontFamily: 'var(--font-mono)',
                fontSize: 11,
                color: 'var(--text-faint)',
              }}>
                {courseCompleted(ci)}/{course.lessons.length}
              </span>
            </div>
          </div>
          {course.lessons.map((lesson, i) => (
            <LessonRow key={lesson.id} lesson={lesson} index={i} isVisited={visited.includes(lesson.id)} />
          ))}
        </div>
      ))}

      <footer style={{
        padding: '32px 0 48px',
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'center',
      }}>
        <span style={{
          fontFamily: 'var(--font-mono)',
          fontSize: 11,
          color: 'var(--text-faint)',
        }}>
          {visited.length === totalLessons ? 'All lessons complete.' : ''}
        </span>
        {visited.length > 0 && (
          <button
            onClick={resetProgress}
            style={{
              fontFamily: 'var(--font-mono)',
              fontSize: 11,
              color: 'var(--text-faint)',
              background: 'none',
              border: 'none',
              cursor: 'pointer',
              padding: '4px 0',
              transition: 'color 0.2s',
            }}
            onMouseEnter={e => e.target.style.color = 'var(--text)'}
            onMouseLeave={e => e.target.style.color = 'var(--text-faint)'}
          >
            Reset progress
          </button>
        )}
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
