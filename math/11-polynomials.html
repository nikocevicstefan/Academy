<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Polynomials & Factoring — Math Foundations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #06060b;
    --bg-primary: #0a0a12;
    --bg-card: rgba(255, 255, 255, 0.03);
    --bg-card-hover: rgba(255, 255, 255, 0.06);
    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-hover: rgba(255, 255, 255, 0.12);
    --text-primary: #e8e6f0;
    --text-secondary: rgba(232, 230, 240, 0.55);
    --text-tertiary: rgba(232, 230, 240, 0.3);
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --accent: #e2b84a;
    --accent-bright: #f5cc5a;
    --accent-dim: #b8943a;
    --accent-glow: rgba(226, 184, 74, 0.15);
    --term-x2: #e2b84a;
    --term-x: #5bbef5;
    --term-const: #e87ce8;
    --term-x3: #5be8a0;
    --term-x4: #f58a5b;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
  }

  html {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    min-height: 100vh;
    overflow-x: hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(226, 184, 74, 0.05) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 50%, rgba(226, 184, 74, 0.03) 0%, transparent 50%),
      var(--bg-deep);
  }

  #root { min-height: 100vh; }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.3;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

  ::selection {
    background: rgba(226, 184, 74, 0.3);
    color: #fff;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseGlow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes termAssemble {
    0% { opacity: 0; transform: translateY(30px) scale(0.8) rotate(-5deg); }
    60% { opacity: 1; transform: translateY(-4px) scale(1.02) rotate(1deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes gridCellFill {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes factorPull {
    0% { opacity: 1; transform: translateX(0); }
    50% { transform: translateX(-20px); opacity: 0.6; }
    100% { transform: translateX(0); opacity: 1; }
  }
  @keyframes successPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .drop-zone { transition: all 0.2s ease; }
  .drop-zone.drag-over {
    background: var(--accent-glow) !important;
    border-color: var(--accent) !important;
    transform: scale(1.05);
  }

  button { cursor: pointer; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, Fragment } = React;

/* ====================================================================
   CONSTANTS & HELPERS
   ==================================================================== */
const TOTAL_STEPS = 7;
const STEP_TITLES = [
  'Landing', 'What Are Polynomials?', 'Adding & Subtracting',
  'Multiplying (Area Model)', 'Factoring Basics', 'Special Patterns', 'Practice'
];

const TERM_COLORS = {
  'x^4': '#f58a5b',
  'x^3': '#5be8a0',
  'x^2': '#e2b84a',
  'x^1': '#5bbef5',
  'x^0': '#e87ce8',
};

function getTermColor(degree) {
  return TERM_COLORS[`x^${degree}`] || '#e8e6f0';
}

function termToString(coeff, variable, degree) {
  if (degree === 0) return `${coeff}`;
  const c = coeff === 1 ? '' : coeff === -1 ? '-' : `${coeff}`;
  const v = variable || 'x';
  if (degree === 1) return `${c}${v}`;
  return `${c}${v}^${degree}`;
}

/* ====================================================================
   PROGRESS BAR
   ==================================================================== */
function ProgressBar({ step, totalSteps }) {
  return (
    <div style={{
      position: 'sticky', top: 0, zIndex: 100,
      background: 'rgba(6,6,11,0.85)', backdropFilter: 'blur(16px)',
      borderBottom: '1px solid var(--border-subtle)',
      padding: '12px 24px',
    }}>
      <div style={{
        maxWidth: 900, margin: '0 auto',
        display: 'flex', alignItems: 'center', gap: 16,
      }}>
        <a href="index.html" style={{
          fontFamily: 'var(--font-mono)', fontSize: 11,
          letterSpacing: '0.08em', textTransform: 'uppercase',
          color: 'var(--text-tertiary)', textDecoration: 'none',
          transition: 'color 0.3s',
          whiteSpace: 'nowrap',
        }}
        onMouseEnter={e => e.target.style.color = 'var(--accent)'}
        onMouseLeave={e => e.target.style.color = 'var(--text-tertiary)'}
        >Back to Lessons</a>

        <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 4 }}>
          {Array.from({ length: totalSteps }, (_, i) => (
            <div key={i} style={{
              flex: 1, height: 3, borderRadius: 2,
              background: i < step ? 'var(--accent)' : i === step ? 'rgba(226,184,74,0.4)' : 'rgba(255,255,255,0.06)',
              transition: 'background 0.5s var(--ease-out-expo)',
            }} />
          ))}
        </div>

        <span style={{
          fontFamily: 'var(--font-mono)', fontSize: 11,
          color: 'var(--text-tertiary)', whiteSpace: 'nowrap',
        }}>{step + 1}/{totalSteps}</span>
      </div>
    </div>
  );
}

/* ====================================================================
   NAVIGATION BUTTONS
   ==================================================================== */
function NavButtons({ step, setStep, canProceed = true }) {
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      marginTop: 48, gap: 16,
    }}>
      {step > 0 ? (
        <button onClick={() => setStep(step - 1)} style={{
          fontFamily: 'var(--font-body)', fontSize: 14, fontWeight: 400,
          color: 'var(--text-secondary)',
          background: 'var(--bg-card)', border: '1px solid var(--border-subtle)',
          padding: '12px 28px', borderRadius: 10,
          transition: 'all 0.3s ease',
        }}
        onMouseEnter={e => { e.target.style.borderColor = 'var(--border-hover)'; e.target.style.color = 'var(--text-primary)'; }}
        onMouseLeave={e => { e.target.style.borderColor = 'var(--border-subtle)'; e.target.style.color = 'var(--text-secondary)'; }}
        >Previous</button>
      ) : <div />}

      {step < TOTAL_STEPS - 1 ? (
        <button onClick={() => canProceed && setStep(step + 1)} style={{
          fontFamily: 'var(--font-body)', fontSize: 14, fontWeight: 500,
          color: canProceed ? '#0a0a12' : 'var(--text-tertiary)',
          background: canProceed ? 'var(--accent)' : 'rgba(255,255,255,0.05)',
          border: 'none',
          padding: '12px 32px', borderRadius: 10,
          transition: 'all 0.3s ease',
          opacity: canProceed ? 1 : 0.5,
        }}
        onMouseEnter={e => { if (canProceed) e.target.style.background = 'var(--accent-bright)'; }}
        onMouseLeave={e => { if (canProceed) e.target.style.background = 'var(--accent)'; }}
        >Next</button>
      ) : null}
    </div>
  );
}

/* ====================================================================
   REAL-WORLD PANEL (collapsible)
   ==================================================================== */
function RealWorldPanel({ examples }) {
  const [open, setOpen] = useState(false);
  const [tab, setTab] = useState(0);
  const contentRef = useRef(null);
  const [contentHeight, setContentHeight] = useState(0);

  useEffect(() => {
    if (contentRef.current) setContentHeight(contentRef.current.scrollHeight);
  }, [open, tab]);

  return (
    <div style={{
      margin: '24px 0', borderRadius: 12,
      border: '1px solid ' + (open ? 'var(--accent-dim)' : 'var(--border-subtle)'),
      background: 'var(--bg-card)', overflow: 'hidden', transition: 'border-color 0.3s',
    }}>
      <button onClick={() => setOpen(!open)} style={{
        width: '100%', display: 'flex', alignItems: 'center', gap: 10,
        padding: '14px 18px', background: 'none', border: 'none',
        cursor: 'pointer', color: 'var(--text-primary)', fontFamily: 'var(--font-body)',
        fontSize: 14, fontWeight: 500, textAlign: 'left',
      }}>
        <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" style={{ transition: 'transform 0.3s', transform: open ? 'rotate(90deg)' : 'rotate(0deg)', flexShrink: 0 }}>
          <path d="M9 18l6-6-6-6" />
        </svg>
        <span>Real-World Applications</span>
        <span style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)' }}>
          {examples.length} example{examples.length !== 1 ? 's' : ''}
        </span>
      </button>
      <div style={{
        maxHeight: open ? contentHeight + 40 : 0,
        overflow: 'hidden',
        transition: 'max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
      }}>
        <div ref={contentRef} style={{ padding: '0 18px 18px' }}>
          <div style={{ display: 'flex', gap: 6, marginBottom: 16, flexWrap: 'wrap' }}>
            {examples.map((ex, i) => (
              <button key={i} onClick={() => setTab(i)} style={{
                padding: '6px 14px', borderRadius: 6, border: '1px solid',
                borderColor: tab === i ? 'var(--accent-dim)' : 'var(--border-subtle)',
                background: tab === i ? 'var(--accent-glow)' : 'transparent',
                color: tab === i ? 'var(--accent)' : 'var(--text-tertiary)',
                fontFamily: 'var(--font-mono)', fontSize: 12,
                cursor: 'pointer', transition: 'all 0.2s',
              }}>{ex.title}</button>
            ))}
          </div>
          <div style={{ animation: 'fadeIn 0.3s' }}>
            {examples[tab] && examples[tab].content}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ====================================================================
   ROLLER COASTER EXAMPLE
   ==================================================================== */
function RollerCoasterExample() {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const [a, setA] = useState(0.5);
  const [b, setB] = useState(-1.2);
  const [c, setC] = useState(0.0);
  const [d, setD] = useState(3.0);
  const [playing, setPlaying] = useState(true);
  const tRef = useRef(0);
  const coeffRef = useRef({ a, b, c, d });
  const playingRef = useRef(playing);

  useEffect(() => { coeffRef.current = { a, b, c, d }; }, [a, b, c, d]);
  useEffect(() => { playingRef.current = playing; }, [playing]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.parentElement.offsetWidth || 500;
    const H = 300;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);

    const padL = 40, padR = 20, padT = 30, padB = 40;
    const gw = W - padL - padR;
    const gh = H - padT - padB;

    function poly(x) {
      const { a, b, c, d } = coeffRef.current;
      return a * x * x * x + b * x * x + c * x + d;
    }

    function xToCanvas(x) { return padL + ((x + 3) / 6) * gw; }
    function yToCanvas(y) {
      const minY = -6, maxY = 8;
      return padT + gh - ((y - minY) / (maxY - minY)) * gh;
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      // Sky gradient
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#0a0f2e');
      skyGrad.addColorStop(0.7, '#141833');
      skyGrad.addColorStop(1, '#1a2040');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // Stars
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      for (let i = 0; i < 20; i++) {
        const sx = ((i * 137 + 47) % W);
        const sy = ((i * 89 + 23) % (H * 0.5));
        ctx.beginPath();
        ctx.arc(sx, sy, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }

      // Ground
      ctx.fillStyle = '#1a2a1a';
      const groundY = yToCanvas(-6);
      ctx.fillRect(0, groundY, W, H - groundY);

      // Grid lines (subtle)
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      for (let y = -4; y <= 8; y += 2) {
        const cy = yToCanvas(y);
        ctx.beginPath(); ctx.moveTo(padL, cy); ctx.lineTo(W - padR, cy); ctx.stroke();
      }

      // Support beams
      ctx.strokeStyle = 'rgba(226,184,74,0.15)';
      ctx.lineWidth = 1.5;
      for (let x = -2.5; x <= 2.5; x += 0.5) {
        const cx = xToCanvas(x);
        const yVal = poly(x);
        const cy = yToCanvas(yVal);
        const baseY = yToCanvas(-6);
        if (yVal > -6) {
          ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, baseY); ctx.stroke();
        }
      }

      // Track (thick curve)
      ctx.strokeStyle = '#e2b84a';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      let first = true;
      for (let px = 0; px <= gw; px += 1) {
        const x = (px / gw) * 6 - 3;
        const y = poly(x);
        const cx = padL + px;
        const cy = yToCanvas(y);
        if (first) { ctx.moveTo(cx, cy); first = false; }
        else ctx.lineTo(cx, cy);
      }
      ctx.stroke();

      // Track outline (thinner, lighter)
      ctx.strokeStyle = 'rgba(245,204,90,0.3)';
      ctx.lineWidth = 7;
      ctx.beginPath();
      first = true;
      for (let px = 0; px <= gw; px += 2) {
        const x = (px / gw) * 6 - 3;
        const y = poly(x);
        const cx = padL + px;
        const cy = yToCanvas(y);
        if (first) { ctx.moveTo(cx, cy); first = false; }
        else ctx.lineTo(cx, cy);
      }
      ctx.stroke();

      // Redraw main track on top
      ctx.strokeStyle = '#e2b84a';
      ctx.lineWidth = 3;
      ctx.beginPath();
      first = true;
      for (let px = 0; px <= gw; px += 1) {
        const x = (px / gw) * 6 - 3;
        const y = poly(x);
        const cx = padL + px;
        const cy = yToCanvas(y);
        if (first) { ctx.moveTo(cx, cy); first = false; }
        else ctx.lineTo(cx, cy);
      }
      ctx.stroke();

      // Car
      const carX = tRef.current;
      const carY = poly(carX);
      const cx = xToCanvas(carX);
      const cy = yToCanvas(carY);

      // Derivative for rotation
      const { a: ca, b: cb, c: cc } = coeffRef.current;
      const slope = 3 * ca * carX * carX + 2 * cb * carX + cc;
      const angle = Math.atan(slope);

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-angle);
      // Car body
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.roundRect(-14, -16, 28, 12, 4);
      ctx.fill();
      // Car top
      ctx.fillStyle = '#ff5252';
      ctx.beginPath();
      ctx.roundRect(-10, -24, 20, 10, 3);
      ctx.fill();
      // Wheels
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(-8, -4, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(8, -4, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#666';
      ctx.beginPath(); ctx.arc(-8, -4, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(8, -4, 2, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // Animate car position
      if (playingRef.current) {
        tRef.current += 0.012;
        if (tRef.current > 3) tRef.current = -3;
      }

      animRef.current = requestAnimationFrame(draw);
    }

    draw();
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, []);

  const sliders = [
    { label: 'a', value: a, set: setA, min: -1, max: 1, step: 0.1, color: 'var(--term-x3)' },
    { label: 'b', value: b, set: setB, min: -2, max: 2, step: 0.1, color: 'var(--term-x2)' },
    { label: 'c', value: c, set: setC, min: -3, max: 3, step: 0.1, color: 'var(--term-x)' },
    { label: 'd', value: d, set: setD, min: -4, max: 6, step: 0.1, color: 'var(--term-const)' },
  ];

  return (
    <div>
      <p style={{ fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--text-primary)', lineHeight: 1.7, marginBottom: 12 }}>
        A roller coaster's profile is a polynomial curve brought to life. The track's height at each point along the ride can be described by a polynomial like{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>ax{'\u00B3'} + bx{'\u00B2'} + cx + d</span>.
        {' '}The <span style={{ color: 'var(--text-primary)', fontWeight: 500 }}>cubic term</span> creates the dramatic rises and plunges,
        the <span style={{ color: 'var(--text-primary)', fontWeight: 500 }}>quadratic term</span> shapes the broad hills,
        the <span style={{ color: 'var(--text-primary)', fontWeight: 500 }}>linear term</span> adds tilt,
        and the <span style={{ color: 'var(--text-primary)', fontWeight: 500 }}>constant</span> shifts everything up or down.
        Real coaster designers use polynomials with dozens of terms to craft smooth, thrilling profiles that keep riders safe while maximizing the sensation of speed.
      </p>
      <div style={{
        background: 'rgba(255,255,255,0.02)', border: '1px solid var(--border-subtle)',
        borderRadius: 10, padding: '12px 14px', marginBottom: 14,
        fontSize: 13, fontFamily: 'var(--font-body)', color: 'var(--text-secondary)', lineHeight: 1.7,
      }}>
        <span style={{ color: 'var(--text-primary)', fontWeight: 500 }}>What you're seeing: </span>
        The curve below is a cubic polynomial with four adjustable coefficients. A tiny car rides along the track, tilting with the slope at each point. The vertical beams show the support structure. Try making{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>'a'</span> negative to flip the coaster's direction, increase{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>'b'</span> to add a big hill, or zero out all but{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>'d'</span> to see a flat line — the simplest polynomial.
      </div>
      <div style={{ position: 'relative', marginBottom: 12 }}>
        <canvas ref={canvasRef} style={{ width: '100%', borderRadius: 10, display: 'block' }} />
        <button onClick={() => setPlaying(!playing)} style={{
          position: 'absolute', top: 8, right: 8, width: 32, height: 32,
          borderRadius: 8, border: '1px solid var(--border-subtle)',
          background: 'rgba(10,10,18,0.7)', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          {playing ? (
            <svg width={14} height={14} viewBox="0 0 24 24" fill="var(--accent)" stroke="none">
              <rect x="6" y="4" width="4" height="16" rx="1" />
              <rect x="14" y="4" width="4" height="16" rx="1" />
            </svg>
          ) : (
            <svg width={14} height={14} viewBox="0 0 24 24" fill="var(--accent)" stroke="none">
              <polygon points="6,4 20,12 6,20" />
            </svg>
          )}
        </button>
      </div>
      {/* Equation display */}
      <div style={{
        fontFamily: 'var(--font-mono)', fontSize: 13, textAlign: 'center',
        marginBottom: 12, padding: '8px 12px', borderRadius: 8,
        background: 'rgba(255,255,255,0.02)', border: '1px solid var(--border-subtle)',
      }}>
        <span style={{ color: 'var(--text-tertiary)' }}>y = </span>
        <span style={{ color: 'var(--term-x3)' }}>{a.toFixed(1)}</span>
        <span style={{ color: 'var(--text-tertiary)' }}>x{'\u00B3'} + </span>
        <span style={{ color: 'var(--term-x2)' }}>{b.toFixed(1)}</span>

              onChange={e => s.set(parseFloat(e.target.value))}

        ))}
      </div>
      <p style={{ marginTop: 16, fontSize: 13, fontFamily: 'var(--font-body)', color: 'rgba(232, 230, 240, 0.45)', lineHeight: 1.7 }}>
        <span style={{ color: 'var(--text-secondary)', fontWeight: 500 }}>Why it matters: </span>
        Polynomial curves are used far beyond amusement parks. Road engineers design highway curves as polynomials to ensure smooth transitions between straight sections. Animators use{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>cubic polynomials</span> (called splines) to make characters move fluidly between keyframes. Font designers define every letter as a series of polynomial curves. The smooth, controllable nature of polynomials makes them the universal language of curves.
      </p>
    </div>
  );
}

/* ====================================================================
   OPEN-TOP BOX VOLUME EXAMPLE
   ==================================================================== */
function OpenTopBoxExample() {
  const canvasRef = useRef(null);
  const [x, setX] = useState(4);

  const sheetW = 30, sheetH = 20;

  function volume(t) {
    return t * (sheetH - 2 * t) * (sheetW - 2 * t);
  }

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.parentElement.offsetWidth || 500;
    const H = 350;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);

    const halfW = W / 2;
    const flatH = 155;
    const boxH = 155;
    const graphH = H - flatH - 20;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, W, H);

    // ---- LEFT: flat sheet ----
    const fScale = Math.min((halfW - 30) / sheetW, (flatH - 20) / sheetH);
    const fLeft = 15 + ((halfW - 30) - sheetW * fScale) / 2;
    const fTop = 10 + ((flatH - 20) - sheetH * fScale) / 2;
    const fw = sheetW * fScale;
    const fh = sheetH * fScale;
    const cx = x * fScale;

    // Full sheet
    ctx.fillStyle = 'rgba(226,184,74,0.08)';
    ctx.strokeStyle = 'rgba(226,184,74,0.4)';
    ctx.lineWidth = 1.5;
    ctx.fillRect(fLeft, fTop, fw, fh);
    ctx.strokeRect(fLeft, fTop, fw, fh);

    // Cut corners (colored)
    ctx.fillStyle = 'rgba(255,107,107,0.25)';
    ctx.strokeStyle = 'rgba(255,107,107,0.6)';
    ctx.lineWidth = 1;
    // Top-left
    ctx.fillRect(fLeft, fTop, cx, cx);
    ctx.strokeRect(fLeft, fTop, cx, cx);
    // Top-right
    ctx.fillRect(fLeft + fw - cx, fTop, cx, cx);
    ctx.strokeRect(fLeft + fw - cx, fTop, cx, cx);
    // Bottom-left
    ctx.fillRect(fLeft, fTop + fh - cx, cx, cx);
    ctx.strokeRect(fLeft, fTop + fh - cx, cx, cx);
    // Bottom-right
    ctx.fillRect(fLeft + fw - cx, fTop + fh - cx, cx, cx);
    ctx.strokeRect(fLeft + fw - cx, fTop + fh - cx, cx, cx);

    // Fold lines (dashed)
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(226,184,74,0.3)';
    ctx.lineWidth = 1;
    // Horizontal fold lines
    ctx.beginPath(); ctx.moveTo(fLeft + cx, fTop + cx); ctx.lineTo(fLeft + fw - cx, fTop + cx); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fLeft + cx, fTop + fh - cx); ctx.lineTo(fLeft + fw - cx, fTop + fh - cx); ctx.stroke();
    // Vertical fold lines
    ctx.beginPath(); ctx.moveTo(fLeft + cx, fTop + cx); ctx.lineTo(fLeft + cx, fTop + fh - cx); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fLeft + fw - cx, fTop + cx); ctx.lineTo(fLeft + fw - cx, fTop + fh - cx); ctx.stroke();
    ctx.setLineDash([]);

    // Dimension labels on flat sheet
    ctx.fillStyle = 'var(--text-secondary)';
    ctx.font = '11px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(232,230,240,0.5)';
    ctx.fillText(sheetW.toString(), fLeft + fw / 2, fTop + fh + 14);
    ctx.save();
    ctx.translate(fLeft - 8, fTop + fh / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText(sheetH.toString(), 0, 0);
    ctx.restore();
    // x labels
    ctx.fillStyle = '#ff6b6b';
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.fillText('x=' + x.toFixed(1), fLeft + cx / 2, fTop + cx / 2 + 4);

    // Label
    ctx.fillStyle = 'rgba(232,230,240,0.35)';
    ctx.font = '11px "DM Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Flat Sheet', halfW / 2, flatH + 2);

    // ---- RIGHT: 3D isometric box ----
    const boxBaseW = (sheetW - 2 * x);
    const boxBaseH = (sheetH - 2 * x);
    const boxDepth = x;
    const isoScale = Math.min((halfW - 50) / 20, (boxH - 40) / 16);
    const isoX = halfW + halfW / 2;
    const isoY = boxH - 20;
    const angX = 0.9;
    const angY = 0.45;

    function iso(bx, by, bz) {
      return [
        isoX + (bx - by * Math.cos(angX)) * isoScale,
        isoY - (bz + by * Math.sin(angY)) * isoScale,
      ];
    }

    if (boxBaseW > 0 && boxBaseH > 0 && boxDepth > 0) {
      const bw = boxBaseW * 0.5;
      const bh = boxBaseH * 0.5;
      const bd = boxDepth * 0.8;

      // Bottom face
      const bl = iso(-bw / 2, 0, 0);
      const br = iso(bw / 2, 0, 0);
      const brf = iso(bw / 2, bh, 0);
      const blf = iso(-bw / 2, bh, 0);
      ctx.beginPath();
      ctx.moveTo(bl[0], bl[1]); ctx.lineTo(br[0], br[1]);
      ctx.lineTo(brf[0], brf[1]); ctx.lineTo(blf[0], blf[1]);
      ctx.closePath();
      ctx.fillStyle = 'rgba(226,184,74,0.12)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(226,184,74,0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Left wall
      const tl = iso(-bw / 2, 0, bd);
      const tlf = iso(-bw / 2, bh, bd);
      ctx.beginPath();
      ctx.moveTo(bl[0], bl[1]); ctx.lineTo(tl[0], tl[1]);
      ctx.lineTo(tlf[0], tlf[1]); ctx.lineTo(blf[0], blf[1]);
      ctx.closePath();
      ctx.fillStyle = 'rgba(226,184,74,0.06)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(226,184,74,0.3)';
      ctx.stroke();

      // Front wall
      ctx.beginPath();
      ctx.moveTo(blf[0], blf[1]); ctx.lineTo(tlf[0], tlf[1]);
      const trf = iso(bw / 2, bh, bd);
      ctx.lineTo(trf[0], trf[1]); ctx.lineTo(brf[0], brf[1]);
      ctx.closePath();
      ctx.fillStyle = 'rgba(226,184,74,0.1)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(226,184,74,0.35)';
      ctx.stroke();

      // Right wall
      const tr = iso(bw / 2, 0, bd);
      ctx.beginPath();
      ctx.moveTo(br[0], br[1]); ctx.lineTo(tr[0], tr[1]);
      ctx.lineTo(trf[0], trf[1]); ctx.lineTo(brf[0], brf[1]);
      ctx.closePath();
      ctx.fillStyle = 'rgba(226,184,74,0.08)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(226,184,74,0.3)';
      ctx.stroke();

      // Back wall
      ctx.beginPath();
      ctx.moveTo(bl[0], bl[1]); ctx.lineTo(tl[0], tl[1]);
      ctx.lineTo(tr[0], tr[1]); ctx.lineTo(br[0], br[1]);
      ctx.closePath();
      ctx.fillStyle = 'rgba(226,184,74,0.04)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(226,184,74,0.2)';
      ctx.stroke();

      // Dimension labels on box
      ctx.fillStyle = 'rgba(91,190,245,0.8)';
      ctx.font = '10px "JetBrains Mono", monospace';
      ctx.textAlign = 'center';
      const midBot = iso(0, bh + 1.5, 0);
      ctx.fillText((sheetW - 2 * x).toFixed(1), midBot[0], midBot[1]);
      ctx.fillStyle = 'rgba(91,232,160,0.8)';
      const midSide = iso(-bw / 2 - 1.5, bh / 2, 0);
      ctx.fillText((sheetH - 2 * x).toFixed(1), midSide[0], midSide[1]);
      ctx.fillStyle = 'rgba(232,124,232,0.8)';
      const midH = iso(bw / 2 + 1, 0, bd / 2);
      ctx.fillText(x.toFixed(1), midH[0], midH[1]);
    }

    // Label
    ctx.fillStyle = 'rgba(232,230,240,0.35)';
    ctx.font = '11px "DM Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Folded Box', halfW + halfW / 2, flatH + 2);

    // ---- BOTTOM: Volume graph ----
    const gPadL = 50, gPadR = 20, gPadT = flatH + 20, gPadB = 16;
    const gW = W - gPadL - gPadR;
    const gH = H - gPadT - gPadB;
    const maxX = 10;

    // Find max volume for scaling
    let maxV = 0;
    for (let t = 0; t <= maxX; t += 0.1) {
      const v = volume(t);
      if (v > maxV) maxV = v;
    }
    maxV = Math.max(maxV, 100);

    // Axes
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(gPadL, gPadT); ctx.lineTo(gPadL, H - gPadB);
    ctx.lineTo(W - gPadR, H - gPadB);
    ctx.stroke();

    // Y axis labels
    ctx.fillStyle = 'rgba(232,230,240,0.3)';
    ctx.font = '9px "JetBrains Mono", monospace';
    ctx.textAlign = 'right';
    for (let v = 0; v <= maxV; v += Math.ceil(maxV / 4 / 100) * 100) {
      const gy = H - gPadB - (v / maxV) * gH;
      ctx.fillText(Math.round(v).toString(), gPadL - 6, gy + 3);
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.beginPath(); ctx.moveTo(gPadL, gy); ctx.lineTo(W - gPadR, gy); ctx.stroke();
    }

    // X axis label
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(232,230,240,0.3)';
    ctx.fillText('cut size (x)', gPadL + gW / 2, H - 2);

    // Volume curve
    ctx.strokeStyle = '#5be8a0';
    ctx.lineWidth = 2;
    ctx.beginPath();
    let firstPt = true;
    for (let px = 0; px <= gW; px += 1) {
      const t = (px / gW) * maxX;
      const v = volume(t);
      const gx = gPadL + px;
      const gy = H - gPadB - (Math.max(0, v) / maxV) * gH;
      if (firstPt) { ctx.moveTo(gx, gy); firstPt = false; }
      else ctx.lineTo(gx, gy);
    }
    ctx.stroke();

    // Find max volume point
    let bestT = 0, bestV = 0;
    for (let t = 0.1; t < maxX; t += 0.05) {
      const v = volume(t);
      if (v > bestV) { bestV = v; bestT = t; }
    }

    // Max volume dot
    const maxDotX = gPadL + (bestT / maxX) * gW;
    const maxDotY = H - gPadB - (bestV / maxV) * gH;
    ctx.fillStyle = '#5be8a0';
    ctx.beginPath(); ctx.arc(maxDotX, maxDotY, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(91,232,160,0.6)';
    ctx.font = '9px "JetBrains Mono", monospace';
    ctx.textAlign = 'left';
    ctx.fillText('max ' + Math.round(bestV), maxDotX + 8, maxDotY - 4);

    // Current point
    const curV = volume(x);
    const curDotX = gPadL + (x / maxX) * gW;
    const curDotY = H - gPadB - (Math.max(0, curV) / maxV) * gH;
    // Vertical line
    ctx.strokeStyle = 'rgba(226,184,74,0.3)';
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(curDotX, H - gPadB); ctx.lineTo(curDotX, curDotY); ctx.stroke();
    ctx.setLineDash([]);
    // Dot
    ctx.fillStyle = '#e2b84a';
    ctx.beginPath(); ctx.arc(curDotX, curDotY, 5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(226,184,74,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(curDotX, curDotY, 8, 0, Math.PI * 2); ctx.stroke();

    // Volume label
    ctx.fillStyle = 'rgba(232,230,240,0.7)';
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    const labelDir = curDotX > W / 2 ? -1 : 1;
    ctx.fillText('V=' + Math.round(curV), curDotX + labelDir * 35, curDotY - 8);

  }, [x]);

  const curVolume = volume(x);
  const bw = sheetW - 2 * x;
  const bh = sheetH - 2 * x;

  return (
    <div>
      <p style={{ fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--text-primary)', lineHeight: 1.7, marginBottom: 12 }}>
        Here's a classic optimization problem that requires polynomial multiplication. You have a flat{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>{sheetW}{'\u00D7'}{sheetH} cm</span> sheet of cardboard. By cutting equal squares of size{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>x</span> from each corner and folding up the sides, you create an open-top box. The volume is{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>V = x(20 - 2x)(30 - 2x)</span> — a product of three linear factors that multiplies out to a cubic polynomial. The question every packaging engineer asks: what cut size{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>x</span> maximizes the volume?
      </p>
      <div style={{
        background: 'rgba(255,255,255,0.02)', border: '1px solid var(--border-subtle)',
        borderRadius: 10, padding: '12px 14px', marginBottom: 14,
        fontSize: 13, fontFamily: 'var(--font-body)', color: 'var(--text-secondary)', lineHeight: 1.7,
      }}>
        <span style={{ color: 'var(--text-primary)', fontWeight: 500 }}>What you're seeing: </span>
        The left panel shows the flat cardboard with colored cut corners. The right panel shows the resulting 3D box after folding. Below, the volume curve plots{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>V</span> against{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>x</span>. Notice the curve has a peak — that's the maximum volume. At{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>x = 0</span> (no cuts), the box has no height and zero volume. At{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>x = 10</span> (cuts meet in the middle), the box collapses to nothing. The sweet spot is somewhere in between, and the graph reveals exactly where.
      </div>
      <canvas ref={canvasRef} style={{ width: '100%', borderRadius: 10, display: 'block', marginBottom: 12 }} />
      {/* Slider */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 10 }}>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--accent)', width: 18 }}>x</span>
        <input type="range" min={0} max={10} step={0.1} value={x}
          onChange={e => setX(parseFloat(e.target.value))}
          style={{ flex: 1, accentColor: '#e2b84a', height: 4 }}
        />
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--text-tertiary)', width: 32, textAlign: 'right' }}>{x.toFixed(1)}</span>
      </div>
      {/* Info */}
      <div style={{
        display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8,
        fontFamily: 'var(--font-mono)', fontSize: 11, textAlign: 'center',
      }}>
        <div style={{ padding: '8px', borderRadius: 6, background: 'rgba(91,190,245,0.08)', border: '1px solid rgba(91,190,245,0.15)' }}>
          <div style={{ color: 'rgba(91,190,245,0.6)', marginBottom: 2 }}>Width</div>
          <div style={{ color: '#5bbef5' }}>{bw > 0 ? bw.toFixed(1) : '--'}</div>
        </div>
        <div style={{ padding: '8px', borderRadius: 6, background: 'rgba(91,232,160,0.08)', border: '1px solid rgba(91,232,160,0.15)' }}>
          <div style={{ color: 'rgba(91,232,160,0.6)', marginBottom: 2 }}>Length</div>
          <div style={{ color: '#5be8a0' }}>{bh > 0 ? bh.toFixed(1) : '--'}</div>
        </div>
        <div style={{ padding: '8px', borderRadius: 6, background: 'rgba(226,184,74,0.08)', border: '1px solid rgba(226,184,74,0.15)' }}>
          <div style={{ color: 'rgba(226,184,74,0.6)', marginBottom: 2 }}>Volume</div>
          <div style={{ color: 'var(--accent)' }}>{curVolume > 0 ? Math.round(curVolume) : '--'}</div>
        </div>
      </div>
      <p style={{ marginTop: 16, fontSize: 13, fontFamily: 'var(--font-body)', color: 'rgba(232, 230, 240, 0.45)', lineHeight: 1.7 }}>
        <span style={{ color: 'var(--text-secondary)', fontWeight: 500 }}>Real-world connection: </span>
        This problem appears constantly in manufacturing. Amazon engineers optimize box dimensions to minimize cardboard waste while fitting products snugly. Food companies design cereal boxes to maximize shelf visibility (surface area) while meeting volume requirements. Every time you multiply polynomial expressions like{' '}
        <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>(20 - 2x)(30 - 2x)</span>, you're doing exactly what packaging engineers do — turning geometric constraints into an equation they can optimize.
      </p>
    </div>
  );
}

/* ====================================================================
   STEP 1: WHAT ARE POLYNOMIALS?
   ==================================================================== */
function StepWhatAre({ step, setStep }) {
  const [showBreakdown, setShowBreakdown] = useState(false);
  const [dragState, setDragState] = useState({ dragging: null, placed: {} });
  const [showExamples, setShowExamples] = useState(false);

  useEffect(() => {
    setTimeout(() => setShowBreakdown(true), 600);
    setTimeout(() => setShowExamples(true), 1200);
  }, []);

  const polyParts = [
    { text: '3', label: 'coefficient', color: 'var(--accent)', x: 0 },
    { text: 'x', label: 'variable', color: 'var(--term-x)', x: 1 },
    { text: '\u00b2', label: 'exponent (degree)', color: '#5be8a0', x: 2 },
  ];

  const labels = ['coefficient', 'variable', 'exponent (degree)'];
  const allPlaced = labels.every(l => Object.values(dragState.placed).includes(l));

  const handleDragStart = (label) => {
    setDragState(prev => ({ ...prev, dragging: label }));
  };

  const handleDrop = (targetIdx) => {
    if (!dragState.dragging) return;
    const correctLabel = polyParts[targetIdx].label;
    if (dragState.dragging === correctLabel) {
      setDragState(prev => ({
        dragging: null,
        placed: { ...prev.placed, [targetIdx]: correctLabel }
      }));
    } else {
      setDragState(prev => ({ ...prev, dragging: null }));
    }
  };

  const examples = [
    { name: 'Monomial', expr: '7x\u00b3', terms: 1, desc: 'One term' },
    { name: 'Binomial', expr: 'x\u00b2 - 4', terms: 2, desc: 'Two terms' },
    { name: 'Trinomial', expr: '2x\u00b2 + 3x - 1', terms: 3, desc: 'Three terms' },
  ];

  return (
    <div style={{ animation: 'fadeInUp 0.6s var(--ease-out-expo)' }}>
      <h2 style={{
        fontFamily: 'var(--font-display)', fontSize: 'clamp(28px, 5vw, 40px)',
        fontWeight: 400, marginBottom: 12,
      }}>
        What Are <span style={{ fontStyle: 'italic', color: 'var(--accent)' }}>Polynomials</span>?
      </h2>
      <p style={{
        fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 300,
        color: 'var(--text-secondary)', lineHeight: 1.7, marginBottom: 36, maxWidth: 600,
      }}>
        A polynomial is an expression made up of <strong style={{ color: 'var(--text-primary)', fontWeight: 500 }}>terms</strong> that
        are added or subtracted. Each term has a coefficient, a variable, and an exponent.
      </p>

      {/* Breakdown visual */}
      <div style={{
        background: 'var(--bg-card)', border: '1px solid var(--border-subtle)',
        borderRadius: 16, padding: 'clamp(24px, 4vw, 40px)', marginBottom: 32,
        opacity: showBreakdown ? 1 : 0, transform: showBreakdown ? 'translateY(0)' : 'translateY(16px)',
        transition: 'all 0.6s var(--ease-out-expo)',
      }}>
        <div style={{
          fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--text-tertiary)',
          textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 20,
        }}>Anatomy of a term</div>

        {/* Large term display */}
        <div style={{
          display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
          gap: 4, marginBottom: 32, fontSize: 'clamp(48px, 10vw, 80px)',
          fontFamily: 'var(--font-display)',
        }}>
          {polyParts.map((p, i) => (
            <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
              <span style={{
                color: p.color, lineHeight: 1,
                textShadow: `0 0 30px ${p.color}30`,
              }}>{p.text}</span>
              {/* Drop zone */}
              <div
                className="drop-zone"
                onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }}
                onDragLeave={e => e.currentTarget.classList.remove('drag-over')}
                onDrop={e => { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); handleDrop(i); }}
                style={{
                  marginTop: 12, padding: '6px 14px', borderRadius: 8, minWidth: 100, textAlign: 'center',
                  fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.04em',
                  border: dragState.placed[i] ? `1px solid ${p.color}50` : '1px dashed var(--border-hover)',
                  background: dragState.placed[i] ? `${p.color}15` : 'transparent',
                  color: dragState.placed[i] ? p.color : 'var(--text-tertiary)',
                }}
              >
                {dragState.placed[i] || '?'}
              </div>
            </div>
          ))}
        </div>

        {/* Draggable labels */}
        <div style={{
          display: 'flex', justifyContent: 'center', gap: 12, flexWrap: 'wrap',
        }}>
          {labels.filter(l => !Object.values(dragState.placed).includes(l)).map(l => (
            <div key={l} draggable
              onDragStart={() => handleDragStart(l)}
              style={{
                padding: '8px 16px', borderRadius: 8,
                background: 'rgba(255,255,255,0.04)', border: '1px solid var(--border-subtle)',
                fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--text-secondary)',
                cursor: 'grab', userSelect: 'none',
                transition: 'all 0.2s ease',
              }}
              onMouseEnter={e => { e.target.style.borderColor = 'var(--accent)'; e.target.style.color = 'var(--accent)'; }}
              onMouseLeave={e => { e.target.style.borderColor = 'var(--border-subtle)'; e.target.style.color = 'var(--text-secondary)'; }}
            >{l}</div>
          ))}
        </div>
        {allPlaced && (
          <div style={{
            marginTop: 20, textAlign: 'center', color: '#5be8a0',
            fontFamily: 'var(--font-mono)', fontSize: 13,
            animation: 'fadeIn 0.4s ease',
          }}>Correct! Each part has a role in defining the term.</div>
        )}
      </div>

      {/* The "degree" concept */}
      <div style={{
        background: 'var(--bg-card)', border: '1px solid var(--border-subtle)',
        borderRadius: 16, padding: 'clamp(20px, 3vw, 32px)', marginBottom: 32,
        opacity: showBreakdown ? 1 : 0, transition: 'all 0.6s var(--ease-out-expo) 0.2s',
      }}>
        <p style={{ fontFamily: 'var(--font-body)', fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.7 }}>
          The <strong style={{ color: 'var(--accent)', fontWeight: 500 }}>degree</strong> of a polynomial is the highest exponent.
          For example, <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--term-x2)' }}>3x&#178; + 5x - 2</span> has degree <strong style={{ color: 'var(--text-primary)' }}>2</strong> (a quadratic).
        </p>
      </div>

      {/* Examples */}
      {showExamples && (
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))',
          gap: 16, animation: 'fadeInUp 0.6s var(--ease-out-expo)',
        }}>
          {examples.map((ex, i) => (
            <div key={i} style={{
              background: 'var(--bg-card)', border: '1px solid var(--border-subtle)',
              borderRadius: 14, padding: '20px 24px', textAlign: 'center',
            }}>
              <div style={{
                fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--accent)',
                textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 8,
              }}>{ex.name}</div>
              <div style={{
                fontFamily: 'var(--font-display)', fontSize: 24, color: 'var(--text-primary)',
                marginBottom: 8,
              }}>{ex.expr}</div>
              <div style={{
                fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--text-tertiary)',
              }}>{ex.desc}</div>
            </div>
          ))}
        </div>
      )}

      <RealWorldPanel examples={[
        { title: 'Roller Coaster', content: <RollerCoasterExample /> },
      ]} />

      <NavButtons step={step} setStep={setStep} />
    </div>
  );
}

/* ====================================================================
   STEP 2: ADDING & SUBTRACTING
   ==================================================================== */
function StepAddSubtract({ step, setStep }) {
  const [phase, setPhase] = useState(0); // 0=show, 1=interactive
  const [combined, setCombined] = useState({});
  const [dragTerm, setDragTerm] = useState(null);

  const poly1 = [
    { id: 'a1', coeff: 3, deg: 2, text: '3x\u00b2' },
    { id: 'a2', coeff: 5, deg: 1, text: '5x' },
    { id: 'a3', coeff: -2, deg: 0, text: '-2' },
  ];
  const poly2 = [
    { id: 'b1', coeff: 1, deg: 2, text: 'x\u00b2' },
    { id: 'b2', coeff: -3, deg: 1, text: '-3x' },
    { id: 'b3', coeff: 7, deg: 0, text: '7' },
  ];

  const buckets = [
    { deg: 2, label: 'x\u00b2 terms', result: '4x\u00b2', ids: ['a1','b1'] },
    { deg: 1, label: 'x terms', result: '2x', ids: ['a2','b2'] },
    { deg: 0, label: 'constants', result: '5', ids: ['a3','b3'] },
  ];

  const allCombined = buckets.every(b => combined[b.deg] && combined[b.deg].length === 2);

  const handleDrop2 = (deg) => {
    if (!dragTerm) return;
    if (dragTerm.deg !== deg) { setDragTerm(null); return; }
    setCombined(prev => {
      const cur = prev[deg] || [];
      if (cur.includes(dragTerm.id)) return prev;
      return { ...prev, [deg]: [...cur, dragTerm.id] };
    });
    setDragTerm(null);
  };

  const placedIds = Object.values(combined).flat();

  return (
    <div style={{ animation: 'fadeInUp 0.6s var(--ease-out-expo)' }}>
      <h2 style={{
        fontFamily: 'var(--font-display)', fontSize: 'clamp(28px, 5vw, 40px)',
        fontWeight: 400, marginBottom: 12,
      }}>
        Adding &amp; <span style={{ fontStyle: 'italic', color: 'var(--accent)' }}>Subtracting</span>
      </h2>
      <p style={{
        fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 300,
        color: 'var(--text-secondary)', lineHeight: 1.7, marginBottom: 12, maxWidth: 600,
      }}>
        To add polynomials, <strong style={{ color: 'var(--text-primary)', fontWeight: 500 }}>combine like terms</strong> --
        terms with the same variable and degree. Drag each term to its matching group.
      </p>

      {/* Problem display */}
      <div style={{
        background: 'var(--bg-card)', border: '1px solid var(--border-subtle)',
        borderRadius: 16, padding: 'clamp(20px, 3vw, 32px)', marginBottom: 24,
        textAlign: 'center',
      }}>
        <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--text-tertiary)', marginBottom: 12, textTransform: 'uppercase', letterSpacing: '0.1em' }}>Add these polynomials</div>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 'clamp(20px, 4vw, 28px)', marginBottom: 8 }}>
          (<span style={{ color: getTermColor(2) }}>3x&#178;</span> + <span style={{ color: getTermColor(1) }}>5x</span> - <span style={{ color: getTermColor(0) }}>2</span>)
          {' '}<span style={{ color: 'var(--text-tertiary)' }}>+</span>{' '}
          (<span style={{ color: getTermColor(2) }}>x&#178;</span> - <span style={{ color: getTermColor(1) }}>3x</span> + <span style={{ color: getTermColor(0) }}>7</span>)
        </div>
      </div>

      {/* Draggable terms */}
      <div style={{
        display: 'flex', flexWrap: 'wrap', gap: 10, justifyContent: 'center', marginBottom: 24,
      }}>
        {[...poly1, ...poly2].filter(t => !placedIds.includes(t.id)).map(t => (
          <div key={t.id} draggable
            onDragStart={() => setDragTerm(t)}
            style={{
              padding: '10px 18px', borderRadius: 10,
              background: `${getTermColor(t.deg)}12`,
              border: `1px solid ${getTermColor(t.deg)}30`,
              color: getTermColor(t.deg),
              fontFamily: 'var(--font-display)', fontSize: 20,
              cursor: 'grab', userSelect: 'none',
            }}
          >{t.text}</div>
        ))}
      </div>

      {/* Drop buckets */}
      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))',
        gap: 16, marginBottom: 24,
      }}>
        {buckets.map(b => {
          const items = combined[b.deg] || [];
          const full = items.length === 2;
          return (
            <div key={b.deg}
              className="drop-zone"
              onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }}
              onDragLeave={e => e.currentTarget.classList.remove('drag-over')}
              onDrop={e => { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); handleDrop2(b.deg); }}
              style={{
                padding: 20, borderRadius: 14, textAlign: 'center',
                background: full ? `${getTermColor(b.deg)}08` : 'var(--bg-card)',
                border: `1px ${full ? 'solid' : 'dashed'} ${full ? getTermColor(b.deg) + '40' : 'var(--border-subtle)'}`,
                minHeight: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              }}
            >
              <div style={{
                fontFamily: 'var(--font-mono)', fontSize: 11, color: getTermColor(b.deg),
                textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 12, opacity: 0.7,
              }}>{b.label}</div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', justifyContent: 'center' }}>
                {items.map(id => {
                  const t = [...poly1, ...poly2].find(t => t.id === id);
                  return (
                    <span key={id} style={{
                      padding: '6px 12px', borderRadius: 8,
                      background: `${getTermColor(b.deg)}15`,
                      color: getTermColor(b.deg),
                      fontFamily: 'var(--font-display)', fontSize: 18,
                    }}>{t.text}</span>
                  );
                })}
              </div>
              {full && (
                <div style={{
                  marginTop: 12, fontFamily: 'var(--font-display)', fontSize: 22,
                  color: getTermColor(b.deg), animation: 'fadeIn 0.3s ease',
                }}>= {b.result}</div>
              )}
            </div>
          );
        })}
      </div>

      {allCombined && (
        <div style={{
          textAlign: 'center', padding: 24, background: 'var(--bg-card)',
          border: '1px solid rgba(91,232,160,0.2)', borderRadius: 14,
          animation: 'fadeInUp 0.4s var(--ease-out-expo)',
        }}>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, color: '#5be8a0', marginBottom: 8 }}>
            = 4x&#178; + 2x + 5
          </div>
          <div style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--text-secondary)' }}>
            Like terms combined. The result is a trinomial of degree 2.
          </div>
        </div>
      )}

      <NavButtons step={step} setStep={setStep} />
    </div>
  );
}

/* ====================================================================
   STEP 3: MULTIPLYING POLYNOMIALS — AREA MODEL (star feature)
   ==================================================================== */
function StepMultiply({ step, setStep }) {
  const [mode, setMode] = useState('demo'); // demo | interactive
  const [demoPhase, setDemoPhase] = useState(0);
  const [userAnswers, setUserAnswers] = useState({});
  const [showFOIL, setShowFOIL] = useState(false);

  // Demo: (2x + 3)(x + 4)
  const demoTop = [{ text: 'x', coeff: 1, deg: 1 }, { text: '4', coeff: 4, deg: 0 }];
  const demoLeft = [{ text: '2x', coeff: 2, deg: 1 }, { text: '3', coeff: 3, deg: 0 }];
  const demoCells = [
    [{ text: '2x\u00b2', coeff: 2, deg: 2 }, { text: '8x', coeff: 8, deg: 1 }],
    [{ text: '3x', coeff: 3, deg: 1 }, { text: '12', coeff: 12, deg: 0 }],
  ];

  useEffect(() => {
    if (mode !== 'demo') return;
    const timers = [
      setTimeout(() => setDemoPhase(1), 600),
      setTimeout(() => setDemoPhase(2), 1200),
      setTimeout(() => setDemoPhase(3), 1800),
      setTimeout(() => setDemoPhase(4), 2400),
      setTimeout(() => setDemoPhase(5), 3200),
    ];
    return () => timers.forEach(clearTimeout);
  }, [mode]);

  // Interactive: (x + 5)(x - 2)
  const intTop = [{ text: 'x', id: 't0' }, { text: '-2', id: 't1' }];
  const intLeft = [{ text: 'x', id: 'l0' }, { text: '5', id: 'l1' }];
  const intCorrect = {
    '0-0': 'x\u00b2', '0-1': '-2x',
    '1-0': '5x', '1-1': '-10',
  };
  const intResult = 'x\u00b2 + 3x - 10';

  const normalizeAnswer = (s) => s.replace(/\s/g,'').replace(/\u00b2/g,'^2').replace(/\u00b3/g,'^3');
  const allCorrect = Object.keys(intCorrect).every(k =>
    userAnswers[k] && normalizeAnswer(userAnswers[k]) === normalizeAnswer(intCorrect[k])
  );

  const cellStyle = (r, c, filled) => ({
    width: 'clamp(80px, 18vw, 120px)', height: 'clamp(60px, 14vw, 80px)',
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    borderRadius: 10,
    background: filled ? `${getTermColor(demoCells[r]?.[c]?.deg ?? 1)}10` : 'rgba(255,255,255,0.02)',
    border: `1px solid ${filled ? getTermColor(demoCells[r]?.[c]?.deg ?? 1) + '30' : 'var(--border-subtle)'}`,
    fontFamily: 'var(--font-display)', fontSize: 'clamp(18px, 4vw, 24px)',
    color: filled ? getTermColor(demoCells[r]?.[c]?.deg ?? 1) : 'var(--text-tertiary)',
    transition: 'all 0.5s var(--ease-out-expo)',
    animation: filled ? 'gridCellFill 0.4s var(--ease-out-expo)' : 'none',
  });

  return (
    <div style={{ animation: 'fadeInUp 0.6s var(--ease-out-expo)' }}>
      <h2 style={{
        fontFamily: 'var(--font-display)', fontSize: 'clamp(28px, 5vw, 40px)',
        fontWeight: 400, marginBottom: 12,
      }}>
        The <span style={{ fontStyle: 'italic', color: 'var(--accent)' }}>Area Model</span>
      </h2>
      <p style={{
        fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 300,
        color: 'var(--text-secondary)', lineHeight: 1.7, marginBottom: 24, maxWidth: 600,
      }}>
        Multiply polynomials using a grid. Each cell is the product of its row and column headers.
        Then combine like terms for the final answer.
      </p>

      {/* Mode toggle */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 28 }}>
        {[['demo', 'Watch Demo'], ['interactive', 'Try It']].map(([m, label]) => (
          <button key={m} onClick={() => { setMode(m); setDemoPhase(0); }} style={{
            fontFamily: 'var(--font-mono)', fontSize: 12,
            padding: '8px 20px', borderRadius: 8,
            background: mode === m ? 'var(--accent)' : 'var(--bg-card)',
            color: mode === m ? '#0a0a12' : 'var(--text-secondary)',
            border: mode === m ? 'none' : '1px solid var(--border-subtle)',
            fontWeight: mode === m ? 500 : 400,
            transition: 'all 0.3s ease',
          }}>{label}</button>
        ))}
      </div>

      {mode === 'demo' ? (
        /* ---- DEMO MODE ---- */
        <div style={{
          background: 'var(--bg-card)', border: '1px solid var(--border-subtle)',
          borderRadius: 16, padding: 'clamp(20px, 4vw, 40px)',
        }}>
          <div style={{
            fontFamily: 'var(--font-display)', fontSize: 22, textAlign: 'center', marginBottom: 28,
          }}>
            (<span style={{ color: getTermColor(1) }}>2x</span> + <span style={{ color: getTermColor(0) }}>3</span>)
            (<span style={{ color: getTermColor(1) }}>x</span> + <span style={{ color: getTermColor(0) }}>4</span>)
          </div>

          {/* Grid */}
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 24 }}>
            <div>
              {/* Header row */}
              <div style={{ display: 'flex', gap: 8, marginLeft: 'clamp(80px, 18vw, 120px)', marginBottom: 8 }}>
                {demoTop.map((h, i) => (
                  <div key={i} style={{
                    width: 'clamp(80px, 18vw, 120px)', textAlign: 'center',
                    fontFamily: 'var(--font-display)', fontSize: 20,
                    color: demoPhase >= 1 ? getTermColor(h.deg) : 'var(--text-tertiary)',
                    opacity: demoPhase >= 1 ? 1 : 0.3,
                    transition: 'all 0.5s var(--ease-out-expo)',
                  }}>{h.text}</div>
                ))}
              </div>
              {/* Grid rows */}
              {demoLeft.map((lh, r) => (
                <div key={r} style={{ display: 'flex', gap: 8, marginBottom: 8, alignItems: 'center' }}>
                  <div style={{
                    width: 'clamp(72px, 16vw, 112px)', textAlign: 'center',
                    fontFamily: 'var(--font-display)', fontSize: 20,
                    color: demoPhase >= 1 ? getTermColor(lh.deg) : 'var(--text-tertiary)',
                    opacity: demoPhase >= 1 ? 1 : 0.3,
                    transition: 'all 0.5s var(--ease-out-expo)',
                  }}>{lh.text}</div>
                  {demoCells[r].map((cell, c) => {
                    const cellPhase = r * 2 + c + 2;
                    return (
                      <div key={c} style={cellStyle(r, c, demoPhase >= cellPhase)}>
                        {demoPhase >= cellPhase ? cell.text : '\u00b7'}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>

          {/* Combination step */}
          {demoPhase >= 5 && (
            <div style={{ textAlign: 'center', animation: 'fadeInUp 0.5s var(--ease-out-expo)' }}>
              <div style={{
                fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-tertiary)',
                textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 12,
              }}>Combine like terms</div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, marginBottom: 8 }}>
                <span style={{ color: getTermColor(2) }}>2x&#178;</span>
                {' + '}
                <span style={{ color: getTermColor(1), textDecoration: 'underline', textDecorationColor: getTermColor(1) + '40' }}>8x + 3x</span>
                {' + '}
                <span style={{ color: getTermColor(0) }}>12</span>
              </div>
              <div style={{
                fontFamily: 'var(--font-display)', fontSize: 28,
                color: '#5be8a0', marginTop: 12,
              }}>
                = 2x&#178; + 11x + 12
              </div>
            </div>
          )}
        </div>
      ) : (
        /* ---- INTERACTIVE MODE ---- */
        <div style={{
          background: 'var(--bg-card)', border: '1px solid var(--border-subtle)',
          borderRadius: 16, padding: 'clamp(20px, 4vw, 40px)',
        }}>
          <div style={{
            fontFamily: 'var(--font-display)', fontSize: 22, textAlign: 'center', marginBottom: 28,
          }}>
            (<span style={{ color: getTermColor(1) }}>x</span> + <span style={{ color: getTermColor(0) }}>5</span>)
            (<span style={{ color: getTermColor(1) }}>x</span> - <span style={{ color: getTermColor(0) }}>2</span>)
          </div>

          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 24 }}>
            <div>
              {/* Header */}
              <div style={{ display: 'flex', gap: 8, marginLeft: 'clamp(80px, 18vw, 120px)', marginBottom: 8 }}>
                {intTop.map((h, i) => (
                  <div key={i} style={{
                    width: 'clamp(80px, 18vw, 120px)', textAlign: 'center',
                    fontFamily: 'var(--font-display)', fontSize: 20,
                    color: i === 0 ? getTermColor(1) : getTermColor(0),
                  }}>{h.text}</div>
                ))}
              </div>
              {/* Rows */}
              {intLeft.map((lh, r) => (
                <div key={r} style={{ display: 'flex', gap: 8, marginBottom: 8, alignItems: 'center' }}>
                  <div style={{
                    width: 'clamp(72px, 16vw, 112px)', textAlign: 'center',
                    fontFamily: 'var(--font-display)', fontSize: 20,
                    color: r === 0 ? getTermColor(1) : getTermColor(0),
                  }}>{lh.text}</div>
                  {[0, 1].map(c => {
                    const key = `${r}-${c}`;
                    const val = userAnswers[key] || '';
                    const correct = normalizeAnswer(val) === normalizeAnswer(intCorrect[key]);
                    const attempted = val.length > 0;
                    return (
                      <div key={c} style={{
                        width: 'clamp(80px, 18vw, 120px)', height: 'clamp(60px, 14vw, 80px)',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        borderRadius: 10,
                        background: attempted && correct ? 'rgba(91,232,160,0.08)' : 'rgba(255,255,255,0.02)',
                        border: `1px solid ${attempted ? (correct ? 'rgba(91,232,160,0.4)' : 'rgba(255,80,80,0.3)') : 'var(--border-subtle)'}`,
                      }}>
                        <input
                          value={val}
                          onChange={e => setUserAnswers(prev => ({ ...prev, [key]: e.target.value }))}
                          placeholder={`${intLeft[r].text} \u00b7 ${intTop[c].text}`}
                          style={{
                            width: '90%', background: 'transparent', border: 'none',
                            textAlign: 'center', outline: 'none',
                            fontFamily: 'var(--font-display)', fontSize: 18,
                            color: attempted && correct ? '#5be8a0' : 'var(--text-primary)',
                          }}
                        />
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>

          {allCorrect && (
            <div style={{
              textAlign: 'center', animation: 'fadeInUp 0.4s var(--ease-out-expo)',
              marginTop: 8,
            }}>
              <div style={{
                fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-tertiary)',
                textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 10,
              }}>Combined result</div>
              <div style={{
                fontFamily: 'var(--font-display)', fontSize: 28, color: '#5be8a0',
              }}>= {intResult}</div>
            </div>
          )}

          {/* FOIL connection */}
          <button onClick={() => setShowFOIL(!showFOIL)} style={{
            display: 'block', margin: '24px auto 0', fontFamily: 'var(--font-mono)',
            fontSize: 11, color: 'var(--accent)', background: 'none',
            border: '1px solid var(--accent-glow)', padding: '8px 18px',
            borderRadius: 8, letterSpacing: '0.06em', textTransform: 'uppercase',
          }}>
            {showFOIL ? 'Hide' : 'Show'} FOIL Connection
          </button>
          {showFOIL && (
            <div style={{
              marginTop: 16, padding: 20, borderRadius: 12,
              background: 'rgba(226,184,74,0.05)', border: '1px solid rgba(226,184,74,0.15)',
              animation: 'fadeIn 0.3s ease',
            }}>
              <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.7 }}>
                <strong style={{ color: 'var(--accent)' }}>FOIL</strong> is just a special case of the area model for two binomials:
                <strong style={{ color: 'var(--text-primary)' }}> F</strong>irst,{' '}
                <strong style={{ color: 'var(--text-primary)' }}>O</strong>utside,{' '}
                <strong style={{ color: 'var(--text-primary)' }}>I</strong>nside,{' '}
                <strong style={{ color: 'var(--text-primary)' }}>L</strong>ast -- each maps to a cell in the 2x2 grid.
              </p>
            </div>
          )}
        </div>
      )}

      <RealWorldPanel examples={[
        { title: 'Box Volume', content: <OpenTopBoxExample /> },
      ]} />

      <NavButtons step={step} setStep={setStep} />
    </div>
  );
}

/* ====================================================================
   STEP 4: FACTORING BASICS
   ==================================================================== */
function StepFactoring({ step, setStep }) {

  const [factoredInput, setFactoredInput] = useState('');

    const t3 = setTimeout(() => setAnimPhase(3), 1900);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, []);

  // Check GCF: 8x^2 + 12x => GCF is 4x
  const checkGCF = (val) => {
    setGcfInput(val);
    setGcfCorrect(val.replace(/\s/g,'') === '4x');

  const checkFactored = (val) => {

          {gcfCorrect && (
            <div style={{ animation: 'fadeIn 0.3s ease' }}>
              <label style={{

      <NavButtons step={step} setStep={setStep} />

}

/* ====================================================================
   STEP 5: SPECIAL PATTERNS
   ==================================================================== */
function StepSpecial({ step, setStep }) {
  const [activePattern, setActivePattern] = useState(0);
  const [answers, setAnswers] = useState({});

  const patterns = [
    {
      name: 'Difference of Squares',
      formula: 'a\u00b2 - b\u00b2 = (a + b)(a - b)',
      example: 'x\u00b2 - 9',
      answer: '(x+3)(x-3)',
      alts: ['(x-3)(x+3)'],
      color: 'var(--term-x2)',
    },
    {
      name: 'Perfect Square Trinomial',
      formula: 'a\u00b2 + 2ab + b\u00b2 = (a + b)\u00b2',
      example: 'x\u00b2 + 6x + 9',
      answer: '(x+3)^2',
      alts: ['(x+3)\u00b2'],
      color: 'var(--term-x)',
    },
    {
      name: 'Difference Pattern 2',
      formula: 'a\u00b2 - 2ab + b\u00b2 = (a - b)\u00b2',
      example: 'x\u00b2 - 10x + 25',
      answer: '(x-5)^2',
      alts: ['(x-5)\u00b2'],
      color: 'var(--term-const)',
    },
  ];

  const p = patterns[activePattern];

  const checkAnswer = (val) => {
    const norm = (s) => s.replace(/\s/g,'').replace(/\u00b2/g,'^2').replace(/\u00b3/g,'^3');
    const v = norm(val);
    return v === norm(p.answer) || (p.alts && p.alts.some(a => v === norm(a)));
  };

  return (
    <div style={{ animation: 'fadeInUp 0.6s var(--ease-out-expo)' }}>
      <h2 style={{
        fontFamily: 'var(--font-display)', fontSize: 'clamp(28px, 5vw, 40px)',
        fontWeight: 400, marginBottom: 12,
      }}>
        Special <span style={{ fontStyle: 'italic', color: 'var(--accent)' }}>Patterns</span>
      </h2>
      <p style={{
        fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 300,
        color: 'var(--text-secondary)', lineHeight: 1.7, marginBottom: 32, maxWidth: 600,
      }}>
        Certain polynomial forms can be factored instantly using pattern recognition.
      </p>

      {/* Pattern tabs */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 24, flexWrap: 'wrap' }}>
        {patterns.map((pat, i) => (
          <button key={i} onClick={() => setActivePattern(i)} style={{
            fontFamily: 'var(--font-mono)', fontSize: 11,
            padding: '8px 16px', borderRadius: 8,
            background: activePattern === i ? `${pat.color}` : 'var(--bg-card)',
            color: activePattern === i ? '#0a0a12' : 'var(--text-secondary)',
            border: activePattern === i ? 'none' : '1px solid var(--border-subtle)',
            fontWeight: activePattern === i ? 600 : 400,
            transition: 'all 0.3s ease',
          }}>{pat.name}</button>
        ))}
      </div>

      {/* Pattern card */}
      <div style={{
        background: 'var(--bg-card)', border: `1px solid ${p.color}20`,
        borderRadius: 16, padding: 'clamp(24px, 4vw, 40px)', marginBottom: 28,
      }}>
        {/* Formula */}
        <div style={{
          textAlign: 'center', marginBottom: 32,
          fontFamily: 'var(--font-display)', fontSize: 'clamp(20px, 4vw, 28px)',
          color: p.color,
        }}>{p.formula}</div>

        {/* Geometric visual */}
        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 32 }}>
          {activePattern === 0 ? (
            /* Difference of squares: big square minus small square */
            <svg width="200" height="200" viewBox="0 0 200 200">
              <rect x="10" y="10" width="140" height="140" fill={`${p.color}15`} stroke={p.color} strokeWidth="1.5" rx="4" />
              <text x="80" y="90" fill={p.color} fontFamily="var(--font-display)" fontSize="20" textAnchor="middle">a&#178;</text>
              <rect x="100" y="100" width="60" height="60" fill="rgba(255,80,80,0.12)" stroke="#ff6b6b" strokeWidth="1.5" rx="4" />
              <text x="130" y="137" fill="#ff6b6b" fontFamily="var(--font-display)" fontSize="16" textAnchor="middle">b&#178;</text>
              <text x="80" y="190" fill="var(--text-tertiary)" fontFamily="var(--font-mono)" fontSize="11" textAnchor="middle">a&#178; - b&#178;</text>
            </svg>
          ) : (
            /* Perfect square: (a+b)^2 grid */
            <svg width="200" height="200" viewBox="0 0 200 200">
              <rect x="10" y="10" width="110" height="110" fill={`${p.color}12`} stroke={p.color} strokeWidth="1.5" rx="4" />
              <text x="65" y="72" fill={p.color} fontFamily="var(--font-display)" fontSize="16" textAnchor="middle">a&#178;</text>
              <rect x="120" y="10" width="70" height="110" fill="rgba(226,184,74,0.1)" stroke="var(--accent)" strokeWidth="1" rx="4" />
              <text x="155" y="72" fill="var(--accent)" fontFamily="var(--font-display)" fontSize="14" textAnchor="middle">ab</text>
              <rect x="10" y="120" width="110" height="70" fill="rgba(226,184,74,0.1)" stroke="var(--accent)" strokeWidth="1" rx="4" />
              <text x="65" y="162" fill="var(--accent)" fontFamily="var(--font-display)" fontSize="14" textAnchor="middle">ab</text>
              <rect x="120" y="120" width="70" height="70" fill="rgba(232,124,232,0.1)" stroke="var(--term-const)" strokeWidth="1.5" rx="4" />
              <text x="155" y="162" fill="var(--term-const)" fontFamily="var(--font-display)" fontSize="14" textAnchor="middle">b&#178;</text>
            </svg>
          )}
        </div>

        {/* Interactive */}
        <div style={{ maxWidth: 400, margin: '0 auto' }}>
