<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Systems of Equations — Interactive Lesson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #07070c;
  --bg-primary: #0a0a12;
  --bg-surface: #111119;
  --bg-elevated: #18182a;
  --bg-card: #1a1a2e;
  --border-subtle: rgba(255,255,255,0.06);
  --border-medium: rgba(255,255,255,0.1);
  --text-primary: #e8e6f0;
  --text-secondary: #9896a8;
  --text-muted: #5f5d6e;
  --accent: #e8913a;
  --accent-light: #f0a85c;
  --accent-glow: rgba(232, 145, 58, 0.15);
  --accent-deep: #c47020;
  --line-a: #5eaaff;
  --line-a-glow: rgba(94,170,255,0.2);
  --line-b: #ff6b8a;
  --line-b-glow: rgba(255,107,138,0.2);
  --success: #4ade80;
  --error: #f87171;
  --warning: #fbbf24;
  --font-display: 'Crimson Pro', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-glow: 0 0 40px rgba(232, 145, 58, 0.08);
  --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

html { font-size: 16px; }
body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(232,145,58,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(94,170,255,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

#root { position: relative; z-index: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-30px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(232,145,58,0.15); }
  50% { box-shadow: 0 0 35px rgba(232,145,58,0.3); }
}
@keyframes drawLine {
  from { stroke-dashoffset: 2000; }
  to { stroke-dashoffset: 0; }
}
@keyframes dotPulse {
  0%, 100% { r: 5; opacity: 1; }
  50% { r: 8; opacity: 0.7; }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.anim-fade-in { animation: fadeIn 0.5s var(--transition-smooth) forwards; }
.anim-fade-up { animation: fadeInUp 0.6s var(--transition-smooth) forwards; }
.anim-slide-left { animation: slideInLeft 0.5s var(--transition-smooth) forwards; }
.anim-slide-right { animation: slideInRight 0.5s var(--transition-smooth) forwards; }

/* Layout */
.lesson-container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.lesson-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0;
  border-bottom: 1px solid var(--border-subtle);
}

.back-link {
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: var(--text-muted);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
  letter-spacing: 0.02em;
}
.back-link:hover { color: var(--text-secondary); }
.back-link svg { width: 14px; height: 14px; }

/* Progress */
.progress-bar-container {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  max-width: 380px;
  margin: 0 24px;
}

.progress-step {
  flex: 1;
  height: 3px;
  background: var(--border-subtle);
  border-radius: 2px;
  transition: background 0.4s var(--transition-smooth);
  position: relative;
}
.progress-step.active {
  background: var(--accent);
  box-shadow: 0 0 8px rgba(232,145,58,0.3);
}
.progress-step.completed { background: var(--accent-deep); }

.step-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

/* Content Area */
.step-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 40px 0 100px;
}

/* Navigation Footer */
.nav-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to top, var(--bg-deep) 60%, transparent);
  padding: 20px 24px 24px;
  display: flex;
  justify-content: center;
  gap: 12px;
  z-index: 100;
}

.nav-btn {
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 600;
  padding: 12px 28px;
  border-radius: var(--radius-md);
  border: none;
  cursor: pointer;
  transition: all 0.25s var(--transition-smooth);
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: 0.01em;
}
.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.nav-btn.secondary {
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--border-subtle);
}
.nav-btn.secondary:not(:disabled):hover {
  background: var(--bg-card);
  color: var(--text-primary);
  border-color: var(--border-medium);
}
.nav-btn.primary {
  background: var(--accent);
  color: #fff;
}
.nav-btn.primary:not(:disabled):hover {
  background: var(--accent-light);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(232,145,58,0.3);
}
.nav-btn svg { width: 16px; height: 16px; }

/* Typography */
.section-title {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 300;
  line-height: 1.2;
  color: var(--text-primary);
  margin-bottom: 16px;
  letter-spacing: -0.01em;
}
.section-title em {
  font-style: italic;
  color: var(--accent-light);
}

.section-subtitle {
  font-family: var(--font-body);
  font-size: 1.05rem;
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 600px;
  margin-bottom: 32px;
}

/* Cards */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 28px;
  margin-bottom: 20px;
}
.card-title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 12px;
}

/* Equation display */
.equation-block {
  font-family: var(--font-mono);
  font-size: 1.2rem;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  text-align: center;
  line-height: 2;
  letter-spacing: 0.02em;
  margin: 16px 0;
}
.eq-var-x { color: var(--line-a); }
.eq-var-y { color: var(--line-b); }
.eq-op { color: var(--text-muted); }
.eq-num { color: var(--text-primary); }
.eq-result { color: var(--accent-light); }
.eq-highlight {
  background: var(--accent-glow);
  border-radius: 4px;
  padding: 2px 6px;
}

/* Graph area */
.graph-container {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin: 20px 0;
  position: relative;
}

.graph-svg {
  width: 100%;
  display: block;
}

/* Sliders */
.slider-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin: 16px 0;
}
.slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.slider-label {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-secondary);
  min-width: 80px;
  letter-spacing: 0.03em;
}
.slider-value {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--text-primary);
  min-width: 36px;
  text-align: right;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: var(--bg-elevated);
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid var(--bg-deep);
  transition: transform 0.15s;
}
input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
}
input[type="range"].line-a::-webkit-slider-thumb { background: var(--line-a); }
input[type="range"].line-b::-webkit-slider-thumb { background: var(--line-b); }

/* Buttons */
.btn {
  font-family: var(--font-body);
  font-weight: 600;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.2s var(--transition-smooth);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-accent {
  background: var(--accent);
  color: #fff;
  padding: 14px 32px;
  font-size: 1rem;
}
.btn-accent:hover {
  background: var(--accent-light);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(232,145,58,0.3);
}
.btn-outline {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border-medium);
  padding: 10px 20px;
  font-size: 0.85rem;
}
.btn-outline:hover {
  color: var(--text-primary);
  border-color: var(--text-muted);
}
.btn-outline.active {
  color: var(--accent);
  border-color: var(--accent);
  background: var(--accent-glow);
}
.btn-sm {
  padding: 8px 16px;
  font-size: 0.8rem;
  border-radius: var(--radius-sm);
}

/* Feedback */
.feedback {
  padding: 14px 20px;
  border-radius: var(--radius-md);
  font-size: 0.9rem;
  margin: 12px 0;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.5;
}
.feedback.correct {
  background: rgba(74,222,128,0.08);
  border: 1px solid rgba(74,222,128,0.2);
  color: var(--success);
}
.feedback.incorrect {
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  color: var(--error);
}
.feedback.info {
  background: rgba(94,170,255,0.08);
  border: 1px solid rgba(94,170,255,0.2);
  color: var(--line-a);
}

/* Inputs */
.input-field {
  font-family: var(--font-mono);
  font-size: 1rem;
  background: var(--bg-elevated);
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s;
  width: 70px;
  text-align: center;
}
.input-field:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* Step animation container */
.step-anim-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin: 16px 0;
}
.step-anim-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  background: var(--bg-elevated);
  border-radius: var(--radius-md);
  border-left: 3px solid var(--border-subtle);
  opacity: 0;
  transform: translateX(-10px);
  transition: all 0.4s var(--transition-smooth);
}
.step-anim-row.visible {
  opacity: 1;
  transform: translateX(0);
}
.step-anim-row.active {
  border-left-color: var(--accent);
  background: rgba(232,145,58,0.05);
}
.step-anim-row.completed {
  border-left-color: var(--success);
}
.step-num {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  min-width: 24px;
}
.step-eq {
  font-family: var(--font-mono);
  font-size: 1rem;
  flex: 1;
}
.step-desc {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-style: italic;
}

/* Tags / Chips */
.tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 4px 10px;
  border-radius: 100px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.tag-blue { background: var(--line-a-glow); color: var(--line-a); }
.tag-pink { background: var(--line-b-glow); color: var(--line-b); }
.tag-amber { background: var(--accent-glow); color: var(--accent); }

/* Landing hero */
.hero-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 24px;
  padding: 40px 0;
}
.hero-title {
  font-family: var(--font-display);
  font-size: 3.5rem;
  font-weight: 300;
  line-height: 1.15;
  letter-spacing: -0.02em;
}
.hero-subtitle {
  font-family: var(--font-display);
  font-size: 1.35rem;
  font-weight: 300;
  font-style: italic;
  color: var(--text-muted);
  margin-top: -8px;
}
.hero-graph {
  width: 320px;
  height: 240px;
  margin: 20px 0;
}

/* Two-column layout */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin: 20px 0;
}
@media (max-width: 700px) {
  .two-col { grid-template-columns: 1fr; }
  .hero-title { font-size: 2.5rem; }
}

/* Method selector */
.method-selector {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin: 16px 0;
}

/* Difficulty selector */
.difficulty-selector {
  display: flex;
  gap: 8px;
  margin: 12px 0;
}
.diff-btn {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 6px 14px;
  border-radius: 100px;
  border: 1px solid var(--border-medium);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.diff-btn:hover { border-color: var(--text-muted); }
.diff-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* Completion card */
.completion-card {
  text-align: center;
  padding: 60px 40px;
  background: linear-gradient(135deg, var(--bg-surface), var(--bg-elevated));
  border: 1px solid var(--accent-deep);
  border-radius: var(--radius-xl);
  margin: 40px 0;
}
.completion-icon {
  font-size: 3rem;
  margin-bottom: 16px;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── Utility Helpers ───────────────────────────────────────────
function roundTo(n, d = 2) { return Math.round(n * 10**d) / 10**d; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

function solveSystem(m1, b1, m2, b2) {
  if (Math.abs(m1 - m2) < 1e-9) {
    if (Math.abs(b1 - b2) < 1e-9) return { type: 'infinite' };
    return { type: 'none' };
  }
  const x = (b2 - b1) / (m1 - m2);
  const y = m1 * x + b1;
  return { type: 'unique', x: roundTo(x), y: roundTo(y) };
}

function formatEq(m, b, label = '') {
  const ms = m === 1 ? '' : m === -1 ? '-' : m.toString();
  const bs = b === 0 ? '' : b > 0 ? ` + ${b}` : ` - ${Math.abs(b)}`;
  return `y = ${ms}x${bs}`;
}

// ─── SVG Graph Component ──────────────────────────────────────
function CoordinateGraph({ width = 500, height = 400, xRange = [-8, 8], yRange = [-6, 6],
  lines = [], points = [], showGrid = true, interactive = false, children, id }) {
  const [xMin, xMax] = xRange;
  const [yMin, yMax] = yRange;
  const pad = 40;
  const gw = width - 2 * pad;
  const gh = height - 2 * pad;

  const toSvgX = useCallback(x => pad + ((x - xMin) / (xMax - xMin)) * gw, [xMin, xMax, gw]);
  const toSvgY = useCallback(y => pad + ((yMax - y) / (yMax - yMin)) * gh, [yMin, yMax, gh]);

  const gridLines = useMemo(() => {
    if (!showGrid) return null;
    const g = [];
    for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
      g.push(<line key={`vg${x}`} x1={toSvgX(x)} y1={pad} x2={toSvgX(x)} y2={pad + gh}
        stroke={x === 0 ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.04)'}
        strokeWidth={x === 0 ? 1.5 : 0.5} />);
      if (x !== 0 && x % 2 === 0) {
        g.push(<text key={`vl${x}`} x={toSvgX(x)} y={toSvgY(0) + 16}
          fill="rgba(255,255,255,0.25)" fontSize="10" textAnchor="middle"
          fontFamily="var(--font-mono)">{x}</text>);
      }
    }
    for (let y = Math.ceil(yMin); y <= Math.floor(yMax); y++) {
      g.push(<line key={`hg${y}`} x1={pad} y1={toSvgY(y)} x2={pad + gw} y2={toSvgY(y)}
        stroke={y === 0 ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.04)'}
        strokeWidth={y === 0 ? 1.5 : 0.5} />);
      if (y !== 0 && y % 2 === 0) {
        g.push(<text key={`hl${y}`} x={toSvgX(0) - 10} y={toSvgY(y) + 4}
          fill="rgba(255,255,255,0.25)" fontSize="10" textAnchor="end"
          fontFamily="var(--font-mono)">{y}</text>);
      }
    }
    return g;
  }, [xMin, xMax, yMin, yMax, toSvgX, toSvgY, showGrid, gw, gh]);

  const renderedLines = lines.map((l, i) => {
    const x1 = xMin - 1, x2 = xMax + 1;
    const y1 = l.m * x1 + l.b, y2 = l.m * x2 + l.b;
    return (
      <line key={`line${i}`}
        x1={toSvgX(x1)} y1={toSvgY(y1)} x2={toSvgX(x2)} y2={toSvgY(y2)}
        stroke={l.color || '#fff'} strokeWidth={2.5} strokeLinecap="round"
        style={{ filter: `drop-shadow(0 0 6px ${l.color || '#fff'}40)` }}
        strokeDasharray={l.dash ? '8 4' : 'none'}
      />
    );
  });

  const renderedPoints = points.map((p, i) => (
    <g key={`pt${i}`}>
      <circle cx={toSvgX(p.x)} cy={toSvgY(p.y)} r={6}
        fill={p.color || 'var(--accent)'} stroke="var(--bg-deep)" strokeWidth={2}
        style={{ filter: `drop-shadow(0 0 8px ${p.color || 'var(--accent)'}80)` }} />
      {p.label && (
        <text x={toSvgX(p.x) + 12} y={toSvgY(p.y) - 10}
          fill={p.color || 'var(--accent)'} fontSize="12" fontFamily="var(--font-mono)"
          fontWeight="600">{p.label}</text>
      )}
    </g>
  ));

  return (
    <svg viewBox={`0 0 ${width} ${height}`} className="graph-svg" id={id}
      style={{ background: 'var(--bg-elevated)', borderRadius: 'var(--radius-md)' }}>
      <defs>
        <clipPath id={`clip-${id || 'g'}`}>
          <rect x={pad} y={pad} width={gw} height={gh} />
        </clipPath>
      </defs>
      {gridLines}
      <g clipPath={`url(#clip-${id || 'g'})`}>
        {renderedLines}
        {renderedPoints}
        {children && children({ toSvgX, toSvgY, pad, gw, gh })}
      </g>
    </svg>
  );
}

// ─── Hero Animation ───────────────────────────────────────────
function HeroAnimation() {
  const [t, setT] = useState(0);
  useEffect(() => {
    let raf;
    const start = Date.now();
    const tick = () => {
      setT((Date.now() - start) / 1000);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  const m1 = 0.6, b1 = -1;
  const m2Off = Math.sin(t * 0.5) * 0.3;
  const m2 = -0.8 + m2Off, b2 = 2 + Math.sin(t * 0.3) * 0.5;
  const sol = solveSystem(m1, b1, m2, b2);

  return (
    <CoordinateGraph width={320} height={240} xRange={[-6, 6]} yRange={[-5, 5]} id="hero-graph"
      lines={[
        { m: m1, b: b1, color: 'var(--line-a)' },
        { m: m2, b: b2, color: 'var(--line-b)' },
      ]}
      points={sol.type === 'unique' ? [{ x: sol.x, y: sol.y, color: 'var(--accent)' }] : []}
    />
  );
}

// ─── Supply & Demand Example ──────────────────────────────────
function SupplyDemandExample() {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const [costShift, setCostShift] = useState(0);
  const [popShift, setPopShift] = useState(0);
  const [canvasW, setCanvasW] = useState(500);
  const H = 300;

  useEffect(() => {
    const handleResize = () => {
      if (containerRef.current) {
        setCanvasW(containerRef.current.offsetWidth);
      }
    };
    handleResize();
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvasW;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const pad = { top: 30, right: 30, bottom: 50, left: 60 };
    const gw = W - pad.left - pad.right;
    const gh = H - pad.top - pad.bottom;

    // Supply: P = 2Q + 10 + costShift  (upward sloping)
    // Demand: P = -3Q + 60 + popShift  (downward sloping)
    const supplyB = 10 + costShift;
    const demandB = 60 + popShift;
    const supplyM = 2;
    const demandM = -3;

    // Ranges
    const qMin = 0, qMax = 20;
    const pMin = 0, pMax = 80;

    function toX(q) { return pad.left + (q - qMin) / (qMax - qMin) * gw; }
    function toY(p) { return pad.top + (pMax - p) / (pMax - pMin) * gh; }

    // Clear
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#111119';
    ctx.fillRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 0.5;
    for (let q = 0; q <= qMax; q += 5) {
      ctx.beginPath();
      ctx.moveTo(toX(q), pad.top);
      ctx.lineTo(toX(q), pad.top + gh);
      ctx.stroke();
    }
    for (let p = 0; p <= pMax; p += 10) {
      ctx.beginPath();
      ctx.moveTo(pad.left, toY(p));
      ctx.lineTo(pad.left + gw, toY(p));
      ctx.stroke();
    }

    // Axes
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top);
    ctx.lineTo(pad.left, pad.top + gh);
    ctx.lineTo(pad.left + gw, pad.top + gh);
    ctx.stroke();

    // Axis labels
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '11px "DM Sans", sans-serif';
    ctx.textAlign = 'center';
    for (let q = 0; q <= qMax; q += 5) {
      ctx.fillText(q, toX(q), pad.top + gh + 18);
    }
    ctx.textAlign = 'right';
    for (let p = 0; p <= pMax; p += 20) {
      ctx.fillText('$' + p, pad.left - 8, toY(p) + 4);
    }

    // Axis titles
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '12px "DM Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Quantity', pad.left + gw / 2, H - 6);
    ctx.save();
    ctx.translate(16, pad.top + gh / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Price ($)', 0, 0);
    ctx.restore();

    // Equilibrium calculation
    // supplyM * Q + supplyB = demandM * Q + demandB
    // (supplyM - demandM) * Q = demandB - supplyB
    const eqQ = (demandB - supplyB) / (supplyM - demandM);
    const eqP = supplyM * eqQ + supplyB;

    // Shaded surplus/shortage areas (between curves)
    if (eqQ > 0 && eqQ < qMax && eqP > 0 && eqP < pMax) {
      // Surplus area (above equilibrium price on supply side)
      ctx.fillStyle = 'rgba(94,170,255,0.06)';
      ctx.beginPath();
      ctx.moveTo(toX(0), toY(supplyB));
      ctx.lineTo(toX(eqQ), toY(eqP));
      ctx.lineTo(toX(0), toY(demandB));
      ctx.closePath();
      ctx.fill();
    }

    // Supply curve (blue)
    ctx.strokeStyle = '#5eaaff';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = 'rgba(94,170,255,0.3)';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    let started = false;
    for (let q = qMin; q <= qMax; q += 0.5) {
      const p = supplyM * q + supplyB;
      if (p >= pMin && p <= pMax) {
        if (!started) { ctx.moveTo(toX(q), toY(p)); started = true; }
        else ctx.lineTo(toX(q), toY(p));
      }
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Demand curve (pink)
    ctx.strokeStyle = '#ff6b8a';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = 'rgba(255,107,138,0.3)';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    started = false;
    for (let q = qMin; q <= qMax; q += 0.5) {
      const p = demandM * q + demandB;
      if (p >= pMin && p <= pMax) {
        if (!started) { ctx.moveTo(toX(q), toY(p)); started = true; }
        else ctx.lineTo(toX(q), toY(p));
      }
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Equilibrium point
    if (eqQ >= qMin && eqQ <= qMax && eqP >= pMin && eqP <= pMax) {
      // Dashed lines to axes
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = 'rgba(232,145,58,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(toX(eqQ), toY(eqP));
      ctx.lineTo(toX(eqQ), pad.top + gh);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(toX(eqQ), toY(eqP));
      ctx.lineTo(pad.left, toY(eqP));
      ctx.stroke();
      ctx.setLineDash([]);

      // Dot
      ctx.beginPath();
      ctx.arc(toX(eqQ), toY(eqP), 6, 0, Math.PI * 2);
      ctx.fillStyle = '#e8913a';
      ctx.shadowColor = 'rgba(232,145,58,0.5)';
      ctx.shadowBlur = 12;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#07070c';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Label
      ctx.fillStyle = '#e8913a';
      ctx.font = 'bold 11px "JetBrains Mono", monospace';
      ctx.textAlign = 'left';
      ctx.fillText('Equilibrium', toX(eqQ) + 10, toY(eqP) - 12);
      ctx.fillStyle = '#f0a85c';
      ctx.font = '10px "JetBrains Mono", monospace';
      ctx.fillText('Q=' + roundTo(eqQ, 1) + ', P=$' + roundTo(eqP, 1), toX(eqQ) + 10, toY(eqP) + 2);
    }

    // Curve labels
    ctx.font = 'bold 11px "DM Sans", sans-serif';
    const sLabelQ = Math.min(qMax - 2, 15);
    const sLabelP = supplyM * sLabelQ + supplyB;
    if (sLabelP >= pMin && sLabelP <= pMax) {
      ctx.fillStyle = '#5eaaff';
      ctx.textAlign = 'left';
      ctx.fillText('Supply', toX(sLabelQ) + 4, toY(sLabelP) - 8);
    }
    const dLabelQ = Math.min(qMax - 2, 2);
    const dLabelP = demandM * dLabelQ + demandB;
    if (dLabelP >= pMin && dLabelP <= pMax) {
      ctx.fillStyle = '#ff6b8a';
      ctx.textAlign = 'left';
      ctx.fillText('Demand', toX(dLabelQ) + 4, toY(dLabelP) - 8);
    }

  }, [canvasW, costShift, popShift]);

  const supplyB = 10 + costShift;
  const demandB = 60 + popShift;
  const eqQ = (demandB - supplyB) / (2 - (-3));
  const eqP = 2 * eqQ + supplyB;

  return (
    <div ref={containerRef}>
      <p style={{
        fontSize: 14,
        lineHeight: 1.7,
        color: 'var(--text-secondary)',
        marginBottom: 16,
      }}>
        When Adam Smith wrote about markets in 1776, he described two competing forces: sellers want high prices (<span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>supply</span>), buyers want low prices (<span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>demand</span>). Each is a <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>linear equation</span> relating price to quantity. The magic of a <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>system of equations</span> is finding where both are satisfied simultaneously {'\u2014'} the equilibrium point. Every market price, from gasoline to concert tickets, settles at this intersection.
      </p>

      <div style={{
        background: 'rgba(94,170,255,0.06)',
        border: '1px solid rgba(94,170,255,0.12)',
        borderRadius: 'var(--radius-md)',
        padding: 14,
        marginBottom: 16,
        fontSize: 14,
        lineHeight: 1.7,
        color: 'var(--text-secondary)',
      }}>
        <strong style={{ color: 'var(--text-primary)', fontSize: 13, fontFamily: 'var(--font-mono)', letterSpacing: '0.03em', display: 'block', marginBottom: 6 }}>What you're seeing</strong>
        Two lines on the graph represent supply (upward: higher price motivates more production) and demand (downward: higher price discourages buyers). Their intersection is the <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>equilibrium</span> {'\u2014'} the price and quantity where the market balances. Use the sliders to simulate real events: increasing "Production Cost" shifts supply up (more expensive to make), while increasing "Popularity" shifts demand up (more people want it). Watch how the equilibrium slides to a new position each time.
      </div>

      <canvas ref={canvasRef} style={{
        width: '100%',
        borderRadius: 'var(--radius-md)',
        display: 'block',
      }} />

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginTop: 16 }}>
        <div>
          <div className="slider-row">
            <span className="slider-label" style={{ color: '#5eaaff', minWidth: 100 }}>Prod. Cost</span>
            <input type="range" className="line-a" min={-15} max={20} step={1} value={costShift}
              onChange={e => setCostShift(Number(e.target.value))} />
            <span className="slider-value">{costShift >= 0 ? '+' : ''}{costShift}</span>
          </div>
        </div>
        <div>
          <div className="slider-row">
            <span className="slider-label" style={{ color: '#ff6b8a', minWidth: 100 }}>Popularity</span>
            <input type="range" className="line-b" min={-20} max={15} step={1} value={popShift}
              onChange={e => setPopShift(Number(e.target.value))} />
            <span className="slider-value">{popShift >= 0 ? '+' : ''}{popShift}</span>
          </div>
        </div>
      </div>

      <div style={{
        marginTop: 12,
        display: 'flex',
        gap: 16,
        fontSize: '0.82rem',
        fontFamily: 'var(--font-mono)',
      }}>
        <span style={{ color: '#5eaaff' }}>P = 2Q + {supplyB}</span>
        <span style={{ color: '#ff6b8a' }}>P = -3Q + {demandB}</span>
        {eqQ > 0 && (
          <span style={{ color: 'var(--accent)' }}>
            Eq: Q={roundTo(eqQ, 1)}, P=${roundTo(eqP, 1)}
          </span>
        )}
      </div>

      <p style={{
        marginTop: 16,
        fontSize: 13,
        lineHeight: 1.7,
        color: 'var(--text-muted)',
        borderTop: '1px solid var(--border-subtle)',
        paddingTop: 12,
      }}>
        <strong style={{ color: 'var(--text-secondary)', fontFamily: 'var(--font-mono)', fontSize: 12, letterSpacing: '0.03em' }}>Why it matters</strong><br/>
        This isn't just theory. When a drought ruins coffee crops, the <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>supply curve</span> shifts left {'\u2014'} the new equilibrium means higher prices and less coffee sold. When a new smartphone launches, <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>demand</span> shifts right {'\u2014'} prices rise until production catches up. Economists solve these systems to predict inflation, set trade policy, and understand recessions. The intersection of two lines determines billions of dollars in global markets.
      </p>

      <p style={{
        marginTop: 14,
        fontSize: '0.78rem',
        color: 'var(--text-muted)',
        lineHeight: 1.6,
        fontStyle: 'italic',
        borderTop: '1px solid var(--border-subtle)',
        paddingTop: 12,
      }}>
        Adam Smith, 1776 {'\u2014'} <em>The Wealth of Nations</em> introduced supply and demand
        as the fundamental mechanism of price discovery. The equilibrium point is where
        the system of supply and demand equations is solved simultaneously.
      </p>
    </div>
  );
}

// ─── Diet Planning Example ────────────────────────────────────
function DietPlanningExample() {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const [proteinReq, setProteinReq] = useState(60);
  const [calLimit, setCalLimit] = useState(600);
  const [canvasW, setCanvasW] = useState(500);
  const H = 300;

  useEffect(() => {
    const handleResize = () => {
      if (containerRef.current) {
        setCanvasW(containerRef.current.offsetWidth);
      }
    };
    handleResize();
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvasW;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const pad = { top: 30, right: 30, bottom: 50, left: 60 };
    const gw = W - pad.left - pad.right;
    const gh = H - pad.top - pad.bottom;

    // Variables: x = servings of chicken, y = servings of rice
    // Constraint 1 (protein): 30x + 5y >= proteinReq  => y >= (proteinReq - 30x) / 5
    // Constraint 2 (calories): 200x + 150y <= calLimit => y <= (calLimit - 200x) / 150
    // Also x >= 0, y >= 0

    const xMax = 5, yMax = 6;
    function toX(v) { return pad.left + (v / xMax) * gw; }
    function toY(v) { return pad.top + (yMax - v) / yMax * gh; }

    // Clear
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#111119';
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= xMax; x++) {
      ctx.beginPath();
      ctx.moveTo(toX(x), pad.top);
      ctx.lineTo(toX(x), pad.top + gh);
      ctx.stroke();
    }
    for (let y = 0; y <= yMax; y++) {
      ctx.beginPath();
      ctx.moveTo(pad.left, toY(y));
      ctx.lineTo(pad.left + gw, toY(y));
      ctx.stroke();
    }

    // Axes
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top);
    ctx.lineTo(pad.left, pad.top + gh);
    ctx.lineTo(pad.left + gw, pad.top + gh);
    ctx.stroke();

    // Axis labels
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '11px "DM Sans", sans-serif';
    ctx.textAlign = 'center';
    for (let x = 0; x <= xMax; x++) {
      ctx.fillText(x, toX(x), pad.top + gh + 18);
    }
    ctx.textAlign = 'right';
    for (let y = 0; y <= yMax; y++) {
      ctx.fillText(y, pad.left - 8, toY(y) + 4);
    }

    // Axis titles
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '12px "DM Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Chicken (servings)', pad.left + gw / 2, H - 6);
    ctx.save();
    ctx.translate(16, pad.top + gh / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Rice (servings)', 0, 0);
    ctx.restore();

    // Protein line: 30x + 5y = proteinReq => y = (proteinReq - 30x) / 5
    // Calorie line: 200x + 150y = calLimit => y = (calLimit - 200x) / 150

    function proteinY(x) { return (proteinReq - 30 * x) / 5; }
    function calorieY(x) { return (calLimit - 200 * x) / 150; }

    // Feasible region: protein >= req (above protein line), calorie <= limit (below calorie line), x>=0, y>=0
    // Find intersection of the two constraint lines
    // 30x + 5y = proteinReq
    // 200x + 150y = calLimit
    // From first: y = (proteinReq - 30x) / 5
    // Sub into second: 200x + 150 * (proteinReq - 30x) / 5 = calLimit
    // 200x + 30*(proteinReq - 30x) = calLimit
    // 200x + 30*proteinReq - 900x = calLimit
    // -700x = calLimit - 30*proteinReq
    // x = (30*proteinReq - calLimit) / 700
    const intX = (30 * proteinReq - calLimit) / 700;
    const intY = (proteinReq - 30 * intX) / 5;

    // Shade feasible region
    // Feasible: above protein line AND below calorie line AND x>=0 AND y>=0
    ctx.fillStyle = 'rgba(74,222,128,0.08)';
    ctx.beginPath();

    // Build polygon of feasible region by scanning
    // The vertices of the feasible polygon:
    const polyPts = [];

    // Check each boundary intersection
    // Protein line: y = (proteinReq - 30x) / 5
    // At x=0: y = proteinReq/5
    // At y=0: x = proteinReq/30

    // Calorie line: y = (calLimit - 200x) / 150
    // At x=0: y = calLimit/150
    // At y=0: x = calLimit/200

    const pAtX0 = proteinReq / 5;  // protein y-intercept
    const pAtY0 = proteinReq / 30; // protein x-intercept
    const cAtX0 = calLimit / 150;  // calorie y-intercept
    const cAtY0 = calLimit / 200;  // calorie x-intercept

    // Feasible region vertices depend on configuration
    // We need: y >= proteinY(x), y <= calorieY(x), x >= 0, y >= 0
    // Walk counterclockwise
    if (intX >= 0 && intX <= xMax && intY >= 0 && intY <= yMax) {
      // Standard case: intersection is in the visible range
      // From protein x-intercept, go up along protein line to intersection, then along calorie line
      if (pAtY0 <= cAtY0 && pAtY0 >= 0 && pAtY0 <= xMax) {
        // Start at protein x-intercept on x-axis
        polyPts.push([pAtY0, 0]);
      }
      // Go along protein line up to intersection
      if (pAtX0 <= cAtX0 && pAtX0 >= 0) {
        // Protein y-intercept is below calorie y-intercept: add it
        polyPts.push([0, pAtX0]);
        // Along y-axis up to calorie y-intercept
        if (cAtX0 >= 0 && cAtX0 <= yMax) {
          polyPts.push([0, cAtX0]);
        }
      } else if (pAtX0 > cAtX0) {
        // Protein y-intercept is above calorie y-intercept
        // The feasible region touches y-axis between cAtX0 and pAtX0? No - above protein AND below calorie.
        // If pAtX0 > cAtX0, there might be no feasible at x=0
      }
      // Intersection point
      polyPts.push([intX, intY]);
      // From intersection along calorie line to x-axis
      if (cAtY0 >= 0 && cAtY0 <= xMax && cAtY0 >= pAtY0) {
        polyPts.push([cAtY0, 0]);
      }
    }

    if (polyPts.length >= 3) {
      ctx.beginPath();
      ctx.moveTo(toX(polyPts[0][0]), toY(polyPts[0][1]));
      for (let i = 1; i < polyPts.length; i++) {
        ctx.lineTo(toX(polyPts[i][0]), toY(polyPts[i][1]));
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(74,222,128,0.1)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(74,222,128,0.2)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Protein constraint line (blue)
    ctx.strokeStyle = '#5eaaff';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(94,170,255,0.3)';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    let started = false;
    for (let x = 0; x <= xMax; x += 0.1) {
      const y = proteinY(x);
      if (y >= -0.5 && y <= yMax + 0.5) {
        const py = Math.max(0, Math.min(yMax, y));
        if (!started) { ctx.moveTo(toX(x), toY(py)); started = true; }
        else ctx.lineTo(toX(x), toY(py));
      }
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Calorie constraint line (pink)
    ctx.strokeStyle = '#ff6b8a';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(255,107,138,0.3)';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    started = false;
    for (let x = 0; x <= xMax; x += 0.1) {
      const y = calorieY(x);
      if (y >= -0.5 && y <= yMax + 0.5) {
        const py = Math.max(0, Math.min(yMax, y));
        if (!started) { ctx.moveTo(toX(x), toY(py)); started = true; }
        else ctx.lineTo(toX(x), toY(py));
      }
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Line labels
    ctx.font = 'bold 10px "DM Sans", sans-serif';
    const plx = 0.5;
    const ply = proteinY(plx);
    if (ply >= 0 && ply <= yMax) {
      ctx.fillStyle = '#5eaaff';
      ctx.textAlign = 'left';
      ctx.fillText('Protein ' + '\u2265' + ' ' + proteinReq + 'g', toX(plx) + 4, toY(ply) - 8);
    }
    const clx = 0.3;
    const cly = calorieY(clx);
    if (cly >= 0 && cly <= yMax) {
      ctx.fillStyle = '#ff6b8a';
      ctx.textAlign = 'left';
      ctx.fillText('Calories ' + '\u2264' + ' ' + calLimit, toX(clx) + 4, toY(cly) + 18);
    }

    // Intersection / optimal point
    if (intX >= 0 && intX <= xMax && intY >= 0 && intY <= yMax) {
      // Dot
      ctx.beginPath();
      ctx.arc(toX(intX), toY(intY), 6, 0, Math.PI * 2);
      ctx.fillStyle = '#e8913a';
      ctx.shadowColor = 'rgba(232,145,58,0.5)';
      ctx.shadowBlur = 12;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#07070c';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Draw small chicken icon (simple drumstick shape)
      const iconX = toX(intX) + 14;
      const iconY = toY(intY) - 20;
      ctx.fillStyle = '#e8913a';
      ctx.beginPath();
      ctx.ellipse(iconX, iconY, 6, 4, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#e8913a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(iconX - 4, iconY + 3);
      ctx.lineTo(iconX - 9, iconY + 10);
      ctx.stroke();

      // Draw small bowl icon (rice)
      const bowlX = iconX + 18;
      const bowlY = iconY;
      ctx.strokeStyle = '#e8913a';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(bowlX, bowlY + 2, 6, 0, Math.PI);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bowlX - 6, bowlY + 2);
      ctx.lineTo(bowlX + 6, bowlY + 2);
      ctx.stroke();
      // Rice grains
      ctx.fillStyle = '#f0a85c';
      ctx.beginPath();
      ctx.ellipse(bowlX - 2, bowlY - 1, 2, 1, 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(bowlX + 2, bowlY, 2, 1, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // Label
      ctx.fillStyle = '#e8913a';
      ctx.font = 'bold 11px "JetBrains Mono", monospace';
      ctx.textAlign = 'left';
      ctx.fillText('Optimal', toX(intX) + 12, toY(intY) + 16);
    }

  }, [canvasW, proteinReq, calLimit]);

  const intX = (30 * proteinReq - calLimit) / 700;
  const intY = (proteinReq - 30 * intX) / 5;
  const feasible = intX >= 0 && intY >= 0;

  return (
    <div ref={containerRef}>
      <p style={{
        fontSize: 14,
        lineHeight: 1.7,
        color: 'var(--text-secondary)',
        marginBottom: 16,
      }}>
        Nutritionists face a classic system-of-equations problem: find a meal that meets protein requirements while staying under a calorie limit. Each constraint is a <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>linear equation</span> in two variables (servings of chicken and rice). The <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>feasible region</span> {'\u2014'} where both constraints are satisfied {'\u2014'} is a shape on the graph, and the optimal meal sits at the intersection of the boundary lines. This is the foundation of <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>linear programming</span>, used by hospitals, armies, and school cafeterias worldwide.
      </p>

      <div style={{
        background: 'rgba(94,170,255,0.06)',
        border: '1px solid rgba(94,170,255,0.12)',
        borderRadius: 'var(--radius-md)',
        padding: 14,
        marginBottom: 16,
        fontSize: 14,
        lineHeight: 1.7,
        color: 'var(--text-secondary)',
      }}>
        <strong style={{ color: 'var(--text-primary)', fontSize: 13, fontFamily: 'var(--font-mono)', letterSpacing: '0.03em', display: 'block', marginBottom: 6 }}>What you're seeing</strong>
        The graph plots chicken servings (x-axis) against rice servings (y-axis). The blue line marks the minimum protein requirement {'\u2014'} you need to be above it. The pink line marks the maximum calorie limit {'\u2014'} you need to be below it. The shaded green region shows all valid meal combinations. The highlighted intersection point is the exact solution to the system: the meal that hits the protein target at the lowest calorie cost.
      </div>

      <canvas ref={canvasRef} style={{
        width: '100%',
        borderRadius: 'var(--radius-md)',
        display: 'block',
      }} />

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginTop: 16 }}>
        <div>
          <div className="slider-row">
            <span className="slider-label" style={{ color: '#5eaaff', minWidth: 110 }}>Protein Req</span>
            <input type="range" className="line-a" min={30} max={100} step={5} value={proteinReq}
              onChange={e => setProteinReq(Number(e.target.value))} />
            <span className="slider-value">{proteinReq}g</span>
          </div>
        </div>
        <div>
          <div className="slider-row">
            <span className="slider-label" style={{ color: '#ff6b8a', minWidth: 110 }}>Calorie Limit</span>
            <input type="range" className="line-b" min={300} max={900} step={25} value={calLimit}
              onChange={e => setCalLimit(Number(e.target.value))} />
            <span className="slider-value">{calLimit}</span>
          </div>
        </div>
      </div>

      <div style={{
        marginTop: 12,
        fontSize: '0.82rem',
        fontFamily: 'var(--font-mono)',
        lineHeight: 1.8,
      }}>
        <div style={{ color: '#5eaaff' }}>
          30x + 5y {'\u2265'} {proteinReq} <span style={{ color: 'var(--text-muted)', fontSize: '0.75rem' }}>(protein)</span>
        </div>
        <div style={{ color: '#ff6b8a' }}>
          200x + 150y {'\u2264'} {calLimit} <span style={{ color: 'var(--text-muted)', fontSize: '0.75rem' }}>(calories)</span>
        </div>
        {feasible && intX >= 0 && intY >= 0 ? (
          <div style={{ color: 'var(--accent)', marginTop: 4 }}>
            {'\u2192'} {roundTo(intX, 1)} servings chicken + {roundTo(intY, 1)} servings rice
          </div>
        ) : (
          <div style={{ color: 'var(--error)', marginTop: 4 }}>
            No feasible solution with current constraints
          </div>
        )}
      </div>

      <p style={{
        marginTop: 16,
        fontSize: 13,
        lineHeight: 1.7,
        color: 'var(--text-muted)',
        borderTop: '1px solid var(--border-subtle)',
        paddingTop: 12,
      }}>
        <strong style={{ color: 'var(--text-secondary)', fontFamily: 'var(--font-mono)', fontSize: 12, letterSpacing: '0.03em' }}>Real-world connection</strong><br/>
        Airlines use exactly this approach to plan meals for thousands of passengers: minimize cost while meeting nutrition standards, respecting weight limits, and accommodating dietary restrictions. Each constraint adds another line to the graph. With 50 food items and 20 constraints, computers solve these systems in milliseconds {'\u2014'} but the core math is the same two-line intersection you see here.
      </p>

      <p style={{
        marginTop: 14,
        fontSize: '0.78rem',
        color: 'var(--text-muted)',
        lineHeight: 1.6,
        fontStyle: 'italic',
        borderTop: '1px solid var(--border-subtle)',
        paddingTop: 12,
      }}>
        The shaded region shows all feasible meal combinations. The intersection of the constraint
        lines (the system solution) gives the optimal balance point. Adjust the constraints to see how
        dietary needs change the solution.
      </p>
    </div>
  );
}

          <div>
