<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logarithms & Exponentials — Math Foundations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #06060b;
    --bg-primary: #0a0a12;
    --bg-card: rgba(255, 255, 255, 0.03);
    --bg-card-hover: rgba(255, 255, 255, 0.06);
    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-hover: rgba(255, 255, 255, 0.12);
    --text-primary: #e8e6f0;
    --text-secondary: rgba(232, 230, 240, 0.55);
    --text-tertiary: rgba(232, 230, 240, 0.3);
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --accent: #10b981;
    --accent-bright: #34d399;
    --accent-dim: #047857;
    --accent-glow: rgba(16, 185, 129, 0.3);
    --accent-bg: rgba(16, 185, 129, 0.06);
    --accent2: #06b6d4;
    --accent3: #14b8a6;
    --success: #4ade80;
    --warning: #fbbf24;
    --error: #f87171;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  html {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    scroll-behavior: smooth;
  }

  body {
    min-height: 100vh;
    overflow-x: hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(16, 185, 129, 0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 50%, rgba(6, 182, 212, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 20% 80%, rgba(20, 184, 166, 0.03) 0%, transparent 50%),
      var(--bg-deep);
  }

  #root { min-height: 100vh; }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.3;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

  ::selection { background: rgba(16, 185, 129, 0.3); color: #fff; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseGlow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes celebratePop {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes confettiFall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 20px rgba(16,185,129,0.1); }
    50% { box-shadow: 0 0 30px rgba(16,185,129,0.25); }
  }

  button { cursor: pointer; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ================================================================
   CONSTANTS & HELPERS
   ================================================================ */
const TOTAL_STEPS = 8;
const STEP_TITLES = [
  'Landing',
  'Exponential Functions',
  'What Is a Logarithm?',
  'Properties of Logarithms',
  'Solving Exponential Equations',
  'The Number e',
  'Logarithmic Scales',
  'Practice'
];

/* ================================================================
   GRID BACKGROUND
   ================================================================ */
function GridBackground() {
  return (
    <div style={{ position:'fixed', inset:0, zIndex:0, pointerEvents:'none', opacity:0.35 }}>
      <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
            <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.015)" strokeWidth="1"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
      </svg>
    </div>

}

/* ================================================================
   PROGRESS BAR
   ================================================================ */
function ProgressBar({ step, total }) {
  return (
    <div style={{
      position:'sticky', top:0, zIndex:100,
      background:'rgba(6,6,11,0.85)', backdropFilter:'blur(16px)',
      borderBottom:'1px solid var(--border-subtle)',
      padding:'12px 24px',
    }}>
      <div style={{
        maxWidth:900, margin:'0 auto',
        display:'flex', alignItems:'center', gap:12,
      }}>
        <a href="index.html" style={{
          fontFamily:'var(--font-mono)', fontSize:11, letterSpacing:'0.06em',
          textTransform:'uppercase', color:'var(--text-tertiary)',
          textDecoration:'none', whiteSpace:'nowrap',
          transition:'color 0.3s ease',
        }}
        onMouseEnter={e => e.target.style.color='var(--accent)'}
        onMouseLeave={e => e.target.style.color='var(--text-tertiary)'}
        >
          &larr; Lessons
        </a>
        <div style={{ flex:1, display:'flex', alignItems:'center', gap:4 }}>
          {Array.from({length:total}, (_,i) => (
            <div key={i} style={{
              flex:1, height:3, borderRadius:2,
              background: i < step ? 'var(--accent)' : i === step ? 'var(--accent-dim)' : 'rgba(255,255,255,0.06)',
              transition:'background 0.5s var(--ease-out-expo)',
              position:'relative',
              overflow:'hidden',
            }}>
              {i === step && (
                <div style={{
                  position:'absolute', inset:0, borderRadius:2,
                  background:'linear-gradient(90deg, var(--accent), var(--accent-bright))',
                  animation:'breathe 2s ease-in-out infinite',
                  transformOrigin:'left',
                }}/>
              )}
            </div>
          ))}
        </div>
        <span style={{
          fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-tertiary)',
          letterSpacing:'0.04em', whiteSpace:'nowrap',
        }}>
          {step + 1} / {total}
        </span>
      </div>
    </div>
  );
}

/* ================================================================
   NAVIGATION BUTTONS
   ================================================================ */
function NavButtons({ step, setStep, total }) {
  return (
    <div style={{
      display:'flex', justifyContent:'space-between', alignItems:'center',
      marginTop:48, gap:16,
    }}>
      {step > 0 ? (
        <button onClick={() => setStep(step - 1)} style={{
          display:'flex', alignItems:'center', gap:8,
          fontFamily:'var(--font-body)', fontSize:15, fontWeight:400,
          color:'var(--text-secondary)', background:'none',
          border:'1px solid var(--border-subtle)', borderRadius:12,
          padding:'12px 24px', transition:'all 0.3s var(--ease-out-expo)',
        }}
        onMouseEnter={e => { e.currentTarget.style.borderColor='var(--accent-dim)'; e.currentTarget.style.color='var(--text-primary)'; }}
        onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border-subtle)'; e.currentTarget.style.color='var(--text-secondary)'; }}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Previous
        </button>
      ) : <div />}
      {step < total - 1 ? (
        <button onClick={() => setStep(step + 1)} style={{
          display:'flex', alignItems:'center', gap:8,
          fontFamily:'var(--font-body)', fontSize:15, fontWeight:500,
          color:'#fff', background:'linear-gradient(135deg, var(--accent-dim), var(--accent))',
          border:'none', borderRadius:12,
          padding:'12px 28px', transition:'all 0.3s var(--ease-out-expo)',
          boxShadow:'0 4px 20px rgba(16,185,129,0.2)',
        }}
        onMouseEnter={e => { e.currentTarget.style.boxShadow='0 6px 28px rgba(16,185,129,0.35)'; e.currentTarget.style.transform='translateY(-1px)'; }}
        onMouseLeave={e => { e.currentTarget.style.boxShadow='0 4px 20px rgba(16,185,129,0.2)'; e.currentTarget.style.transform='translateY(0)'; }}
        >
          Next
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      ) : (
        <button onClick={() => {
          try {
            const progress = JSON.parse(localStorage.getItem('math-progress') || '[]');
            if (!progress.includes('mf2-05')) {
              progress.push('mf2-05');
              localStorage.setItem('math-progress', JSON.stringify(progress));
            }
          } catch(e) {}
          window.location.href = 'index.html';
        }} style={{
          display:'flex', alignItems:'center', gap:8,
          fontFamily:'var(--font-body)', fontSize:15, fontWeight:500,
          color:'#fff', background:'linear-gradient(135deg, var(--accent), var(--accent-bright))',
          border:'none', borderRadius:12,
          padding:'12px 28px', transition:'all 0.3s var(--ease-out-expo)',
          boxShadow:'0 4px 20px rgba(16,185,129,0.2)',
        }}
        onMouseEnter={e => { e.currentTarget.style.boxShadow='0 6px 28px rgba(16,185,129,0.35)'; e.currentTarget.style.transform='translateY(-1px)'; }}
        onMouseLeave={e => { e.currentTarget.style.boxShadow='0 4px 20px rgba(16,185,129,0.2)'; e.currentTarget.style.transform='translateY(0)'; }}
        >
          Complete Lesson
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      )}
    </div>
  );
}

/* ================================================================

    <div style={{ marginBottom:32, animation:'fadeInUp 0.7s var(--ease-out-expo) both' }}>

        fontFamily:'var(--font-display)', fontSize:'clamp(32px, 5vw, 48px)',
        fontWeight:400, lineHeight:1.1, letterSpacing:'-0.01em',
        marginBottom:12,
        background:'linear-gradient(135deg, var(--text-primary) 0%, var(--accent-bright) 100%)',
        WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
      }}>
        {title}
      </h2>
      {subtitle && (
        <p style={{
          fontFamily:'var(--font-body)', fontSize:'clamp(15px, 1.8vw, 18px)',
          fontWeight:300, color:'var(--text-secondary)', lineHeight:1.6,
          maxWidth:580,

          {subtitle}

}

}

/* ================================================================
   MATH EXPRESSION (inline mono with accent)
   ================================================================ */
function M({ children }) {

};

const P_SECONDARY = {
  ...P_STYLE,
  color:'var(--text-secondary)',
};

/* ================================================================

   ================================================================ */

/* ================================================================
   STEP 1 -- EXPONENTIAL FUNCTIONS
   ================================================================ */
function Step1Exponentials() {
  return (
    <div style={{ animation:'fadeIn 0.5s ease both' }}>
      <DraftBanner />
      <SectionHeader
        title="Exponential Functions"
        subtitle="Functions where the variable lives in the exponent. They model everything from bank accounts to pandemics."
      />

      <Card style={{ marginBottom:24 }}>
        <p style={P_STYLE}>
          An <strong style={{ color:'var(--accent-bright)' }}>exponential function</strong> has the form <M>y = b^x</M>, where <M>b {'>'} 0</M> and <M>b {'\u2260'} 1</M>. The base <M>b</M> is a fixed positive number, and the variable <M>x</M> appears in the exponent. This is fundamentally different from polynomial functions like <M>x{'\u00B2'}</M> or <M>x{'\u00B3'}</M>, where the variable is in the base and the exponent is fixed.
        </p>
        <p style={P_STYLE}>
          When <M>b {'>'} 1</M>, the function models <strong style={{ color:'var(--accent-bright)' }}>exponential growth</strong>. The output gets larger and larger, faster and faster. You see this pattern in population growth, compound interest, viral spread, and nuclear chain reactions. Each step multiplies the previous value by the same factor, so the curve sweeps upward with increasing steepness.
        </p>
        <p style={P_STYLE}>
          When <M>0 {'<'} b {'<'} 1</M>, the function models <strong style={{ color:'var(--accent-bright)' }}>exponential decay</strong>. The output shrinks toward zero but never quite reaches it. This describes radioactive decay, depreciation of assets, Newton's law of cooling, and how medications leave your bloodstream. The curve drops steeply at first, then levels off as it approaches zero asymptotically.
        </p>
      </Card>

      <KeyInsight>
        <p style={{ ...P_STYLE, marginBottom:0 }}>
          The defining property of exponential functions is a <strong style={{ color:'var(--accent-bright)' }}>constant ratio</strong> of change. A linear function adds the same amount each step (constant difference). An exponential function <em>multiplies</em> by the same amount each step (constant ratio). This is why exponentials eventually overtake any polynomial -- multiplication compounds in a way that addition cannot.
        </p>
      </KeyInsight>

      <Card style={{ marginBottom:24 }}>
        <p style={P_STYLE}>
          <strong style={{ color:'var(--accent-bright)' }}>Example: Compound Interest.</strong> Suppose you invest $1,000 at 5% annual interest. Each year, the balance is multiplied by 1.05. The formula is <M>A = 1000(1.05)^t</M>, where <M>t</M> is years.
        </p>
        <div style={{
          background:'var(--bg-card)', border:'1px solid var(--border-subtle)',
          borderRadius:10, padding:'16px 20px', marginBottom:16,
          fontFamily:'var(--font-mono)', fontSize:14, color:'var(--accent-bright)',
          lineHeight:1.8,

        </p>

/* ================================================================
   STEP 3 -- PROPERTIES OF LOGARITHMS
   ================================================================ */
function Step3Properties() {
  return (
    <div style={{ animation:'fadeIn 0.5s ease both' }}>

        </p>

        <div style={{
          background:'rgba(16, 185, 129, 0.04)',
          border:'1px solid rgba(16, 185, 129, 0.12)',
          borderRadius:12, padding:'20px 24px', marginBottom:20,
        }}>
          <div style={{
            fontFamily:'var(--font-mono)', fontSize:10, letterSpacing:'0.1em',
            textTransform:'uppercase', color:'var(--accent-bright)',
            marginBottom:14, fontWeight:500,
          }}>
            The Three Laws of Logarithms
          </div>
          <div style={{
            fontFamily:'var(--font-mono)', fontSize:15, color:'var(--text-primary)',
            lineHeight:2.4,
          }}>
            <strong style={{ color:'var(--accent-bright)' }}>Product Rule:</strong> &nbsp; log_b(M {'\u00B7'} N) = log_b(M) + log_b(N)<br/>
            <strong style={{ color:'var(--accent-bright)' }}>Quotient Rule:</strong> &nbsp; log_b(M / N) = log_b(M) - log_b(N)<br/>
            <strong style={{ color:'var(--accent-bright)' }}>Power Rule:</strong> &nbsp; log_b(M^p) = p {'\u00B7'} log_b(M)
          </div>
        </div>

        <p style={P_STYLE}>
          The <strong style={{ color:'var(--accent-bright)' }}>Product Rule</strong> says that the log of a product equals the sum of the logs. Multiplication becomes addition. For example, <M>log(50 {'\u00B7'} 200) = log(50) + log(200)</M>. This is exactly what slide rules exploited: by adding physical lengths (representing logarithms), engineers could multiply numbers mechanically.
        </p>
        <p style={P_STYLE}>
          The <strong style={{ color:'var(--accent-bright)' }}>Quotient Rule</strong> is the mirror image: the log of a quotient equals the difference of the logs. Division becomes subtraction. So <M>log(5000 / 25) = log(5000) - log(25)</M>.
        </p>
        <p style={P_STYLE}>
          The <strong style={{ color:'var(--accent-bright)' }}>Power Rule</strong> pulls exponents down as multipliers. <M>log(x{'\u00B3'}) = 3 {'\u00B7'} log(x)</M>. This is the most powerful of the three rules for solving equations, because it lets us bring the variable down from an exponent where it is trapped.
        </p>
      </Card>

      <KeyInsight>
        <p style={{ ...P_STYLE, marginBottom:8 }}>
          <strong style={{ color:'var(--accent-bright)' }}>Historical note:</strong> John Napier invented logarithms in 1614 to simplify the astronomical calculations needed for navigation. Before calculators, scientists and engineers used printed log tables to turn multiplications into additions. Henry Briggs later computed the first table of common (base-10) logarithms. For over 350 years, log tables and slide rules were the primary computational tools of science.
        </p>
      </KeyInsight>

      <Card>
        <p style={P_STYLE}>
          There is one more essential formula: the <strong style={{ color:'var(--accent-bright)' }}>Change of Base</strong> rule. Your calculator has buttons for <M>log</M> (base 10) and <M>ln</M> (base e), but what if you need <M>log{'\u2082'}(50)</M>? The change of base formula lets you convert:
        </p>
        <div style={{
          background:'var(--bg-card)', border:'1px solid var(--border-subtle)',
          borderRadius:10, padding:'16px 20px', marginBottom:16,
          fontFamily:'var(--font-mono)', fontSize:15, color:'var(--accent-bright)',
          lineHeight:1.8, textAlign:'center',
        }}>
          log_b(x) = log(x) / log(b) = ln(x) / ln(b)
        </div>
        <p style={P_SECONDARY}>
          For example, <M>log{'\u2082'}(50) = ln(50) / ln(2) {'\u2248'} 3.912 / 0.693 {'\u2248'} 5.64</M>. This means <M>2^5.64 {'\u2248'} 50</M>. The change of base formula works because the ratio of logarithms is the same regardless of which base you use for the computation -- the base cancels out.
        </p>
      </Card>

      <TodoPlaceholder text="Interactive -- log property explorer, expand/condense expressions" />
    </div>
  );
}

/* ================================================================
   STEP 5 -- THE NUMBER e AND NATURAL LOGARITHMS
   ================================================================ */
function Step5NumberE() {
  return (
    <div style={{ animation:'fadeIn 0.5s ease both' }}>
      <DraftBanner />
      <SectionHeader
        title="The Number e"
        subtitle="Euler's number: the base of natural growth, hiding in compound interest and every corner of mathematics."
      />

      <Card style={{ marginBottom:24 }}>
        <p style={P_STYLE}>
          The number <M>e {'\u2248'} 2.71828182845...</M> is one of the most important constants in mathematics, on par with <M>{'\u03C0'}</M>. It is irrational (its decimal expansion never terminates or repeats) and transcendental (it is not the root of any polynomial with integer coefficients). But where does it come from?
        </p>
        <p style={P_STYLE}>
          Imagine depositing $1 in a bank that offers 100% annual interest. If interest compounds once a year, you get <M>$2</M>. But what if it compounds more frequently?
        </p>
        <div style={{
          background:'var(--bg-card)', border:'1px solid var(--border-subtle)',
          borderRadius:10, padding:'20px 24px', marginBottom:16,
          fontFamily:'var(--font-mono)', fontSize:14, color:'var(--text-primary)',
          lineHeight:2.0,
        }}>
          <span style={{ color:'var(--text-tertiary)', fontSize:12 }}>A = (1 + 1/n)^n</span><br/><br/>
          <span style={{ color:'var(--text-secondary)' }}>Annually &nbsp;&nbsp;&nbsp;(n=1): &nbsp;&nbsp;</span> <span style={{ color:'var(--accent-bright)' }}>$2.000000</span><br/>
          <span style={{ color:'var(--text-secondary)' }}>Monthly &nbsp;&nbsp;&nbsp;(n=12): &nbsp;</span> <span style={{ color:'var(--accent-bright)' }}>$2.613035</span><br/>
          <span style={{ color:'var(--text-secondary)' }}>Daily &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(n=365): </span> <span style={{ color:'var(--accent-bright)' }}>$2.714567</span><br/>
          <span style={{ color:'var(--text-secondary)' }}>Hourly &nbsp;&nbsp;&nbsp;&nbsp;(n=8760):</span> <span style={{ color:'var(--accent-bright)' }}>$2.718127</span><br/>
          <span style={{ color:'var(--text-secondary)' }}>Per second (n=31.5M): </span> <span style={{ color:'var(--accent-bright)' }}>$2.718282</span><br/>
          <span style={{ color:'var(--text-secondary)' }}>n {'\u2192'} {'\u221E'}: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span style={{ color:'var(--accent-bright)' }}>$e {'\u2248'} 2.71828...</span>
        </div>
        <p style={P_STYLE}>
          As you compound more and more frequently, the amount does not grow without bound. It converges to a specific limit: the number <M>e</M>. This is the mathematical definition: <M>e = lim(n{'\u2192'}{'\u221E'}) (1 + 1/n)^n</M>. The formula for <strong style={{ color:'var(--accent-bright)' }}>continuous compounding</strong> is <M>A = P {'\u00B7'} e^(rt)</M>, where <M>P</M> is principal, <M>r</M> is the rate, and <M>t</M> is time.
        </p>
      </Card>

      <Card style={{ marginBottom:24 }}>
        <p style={P_STYLE}>
          The natural logarithm <M>ln(x)</M> is the logarithm with base <M>e</M>. The "natural" in its name is not arbitrary: <M>e</M> is the most natural base for logarithms because of its deep connections to rates of change. In calculus, the derivative of <M>e^x</M> is <M>e^x</M> itself -- it is the only function that is its own rate of change. And the derivative of <M>ln(x)</M> is the beautifully simple <M>1/x</M>.
        </p>
        <p style={P_STYLE}>
          The key inverse relationships to internalize are:
        </p>
        <div style={{
          background:'var(--bg-card)', border:'1px solid var(--border-subtle)',
          borderRadius:10, padding:'16px 20px', marginBottom:16,
          fontFamily:'var(--font-mono)', fontSize:15, color:'var(--accent-bright)',
          lineHeight:2.0, textAlign:'center',
        }}>
          ln(e) = 1 &nbsp;&nbsp;&nbsp; e^(ln(x)) = x &nbsp;&nbsp;&nbsp; ln(e^x) = x
        </div>
        <p style={P_SECONDARY}>
          These identities say that <M>e^x</M> and <M>ln(x)</M> undo each other. Applying <M>ln</M> to <M>e^(something)</M> strips away the <M>e</M> and gives you the something. Applying <M>e^(something)</M> to <M>ln(x)</M> strips away the <M>ln</M> and gives you <M>x</M>. This is exactly how inverse functions work.
        </p>
      </Card>

      <KeyInsight>
        <p style={{ ...P_STYLE, marginBottom:0 }}>
          The number <M>e</M> shows up far beyond finance. It governs radioactive decay (<M>N = N{'\u2080'} {'\u00B7'} e^(-{'\u03BB'}t)</M>), population growth in biology, the bell curve (normal distribution) in statistics, electrical signal processing, and the arrangement of leaves around a stem. Whenever a quantity changes at a rate proportional to its current value, <M>e</M> is there. It is the mathematical signature of natural growth and decay.
        </p>
      </KeyInsight>

      <TodoPlaceholder text="Interactive -- compound interest frequency slider approaching e" />
    </div>
  );
}

      <KeyInsight>

          Logarithmic scales are not a mere convenience. They reflect how human perception actually works. We perceive loudness, brightness, and pitch logarithmically -- a sound must increase in power by a factor of 10 for us to perceive it as "twice as loud." Our senses are built to detect ratios, not differences. Logarithmic scales match the mathematics to the biology.
        </p>
      </KeyInsight>

      <TodoPlaceholder text="Interactive -- log scale explorer with real-world examples" />
    </div>
  );
}

/* ================================================================

function App() {
  const [step, setStep] = useState(0);

  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [step]);

  // Save progress when reaching last step
  useEffect(() => {
    if (step === TOTAL_STEPS - 1) {
      try {
        const progress = JSON.parse(localStorage.getItem('math-progress') || '[]');
        if (!progress.includes('mf2-05')) {
          progress.push('mf2-05');
          localStorage.setItem('math-progress', JSON.stringify(progress));
        }
      } catch(e) {}
    }
  }, [step]);

  function renderStep() {
    switch(step) {
      case 0: return <StepLanding onStart={() => setStep(1)} />;
      case 1: return <Step1Exponentials />;
      case 2: return <Step2WhatIsLog />;
      case 3: return <Step3Properties />;
      case 4: return <Step4Solving />;
      case 5: return <Step5NumberE />;
      case 6: return <Step6LogScales />;
      case 7: return <Step7Practice />;
      default: return <StepLanding onStart={() => setStep(1)} />;
    }
  }

  return (
    <div style={{ position:'relative', zIndex:1 }}>
      <GridBackground />
      <ProgressBar step={step} total={TOTAL_STEPS} />

      <div style={{
        maxWidth:780, margin:'0 auto',
        padding:'clamp(24px, 4vh, 48px) 20px 60px',
      }}>
        <div key={step}>
          {renderStep()}
        </div>

        {step > 0 && (
          <NavButtons step={step} setStep={setStep} total={TOTAL_STEPS} />
        )}
        {step === TOTAL_STEPS - 1 && (
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:32,padding:'16px 0',borderTop:'1px solid var(--border-subtle)'}}>
            <a href="17-functions-ii.html" style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--accent)',textDecoration:'none',transition:'opacity 0.2s',opacity:0.8}} onMouseEnter={e=>e.target.style.opacity='1'} onMouseLeave={e=>e.target.style.opacity='0.8'}>&larr; Previous Lesson: Functions II</a>
            <a href="19-radical-rational-func.html" style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--accent)',textDecoration:'none',transition:'opacity 0.2s',opacity:0.8}} onMouseEnter={e=>e.target.style.opacity='1'} onMouseLeave={e=>e.target.style.opacity='0.8'}>Next Lesson: Radical &amp; Rational Functions &rarr;</a>
          </div>
        )}
      </div>

      {/* Footer */}
      <footer style={{
        textAlign:'center', padding:'40px 24px 32px',
        borderTop:'1px solid var(--border-subtle)', marginTop:20,

        }}>
          Lesson 12 &mdash; Logarithms &amp; Exponential Functions &mdash; Rough Draft
        </p>
      </footer>
    </div>
  );
}
