<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Radical & Rational Expressions — Math Foundations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #06060b;
  --bg-primary: #0a0a12;
  --bg-card: rgba(255, 255, 255, 0.03);
  --bg-card-hover: rgba(255, 255, 255, 0.06);
  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);
  --text-primary: #e8e6f0;
  --text-secondary: rgba(232, 230, 240, 0.55);
  --text-tertiary: rgba(232, 230, 240, 0.3);
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --accent: #f59e0b;
  --accent-bright: #fbbf24;
  --accent-dim: #b45309;
  --accent-glow: rgba(245, 158, 11, 0.3);
  --accent-bg: rgba(245, 158, 11, 0.06);
  --accent2: #f97316;
  --accent3: #eab308;
  --success: #4ade80;
  --warning: #fbbf24;
  --error: #f87171;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

html {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  overflow-x: hidden;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(245,158,11,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 50%, rgba(249,115,22,0.04) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(234,179,8,0.03) 0%, transparent 50%),
    var(--bg-deep);
}

#root { min-height: 100vh; }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.3;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

::selection { background: rgba(245, 158, 11, 0.3); color: #fff; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulseGlow {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes breathe {
  0%, 100% { box-shadow: 0 0 20px rgba(245,158,11,0.1); }
  50% { box-shadow: 0 0 30px rgba(245,158,11,0.25); }
}

button { cursor: pointer; }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, memo } = React;

/* ================================================================
   CONSTANTS & HELPERS
   ================================================================ */
const TOTAL_STEPS = 7;
const STEP_TITLES = [
  'Welcome',
  'What Is a Rational Expression?',
  'Simplifying',
  'Multiplying & Dividing',
  'Adding & Subtracting',
  'Solving Rational Equations',
  'Practice'
];

function saveProgress() {
  try {
    const prev = JSON.parse(localStorage.getItem('math-progress') || '[]');
    if (!prev.includes('mf1-07')) {
      prev.push('mf1-07');
      localStorage.setItem('math-progress', JSON.stringify(prev));
    }
  } catch(e) {}
}

/* ================================================================
   GRID BACKGROUND
   ================================================================ */
function GridBackground() {
  return (
    <div style={{ position:'fixed', inset:0, zIndex:0, pointerEvents:'none', opacity:0.35 }}>
      <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
            <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.015)" strokeWidth="1"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
      </svg>
    </div>
  );
}

/* ================================================================
   ROUGH DRAFT BANNER
   ================================================================ */
function DraftBanner() {
  return (
    <div style={{
      position:'fixed', top:12, right:16, zIndex:200,
      fontFamily:'var(--font-mono)', fontSize:10, fontWeight:500,
      letterSpacing:'0.12em', textTransform:'uppercase',
      color:'var(--accent)', background:'rgba(245,158,11,0.08)',
      border:'1px solid rgba(245,158,11,0.2)',
      borderRadius:6, padding:'4px 10px',
      backdropFilter:'blur(8px)',
    }}>
      Rough Draft
    </div>
  );
}

/* ================================================================
   PROGRESS BAR
   ================================================================ */
function ProgressBar({ step, total }) {
  return (
    <div style={{
      position:'sticky', top:0, zIndex:100,
      background:'rgba(6,6,11,0.85)', backdropFilter:'blur(16px)',
      borderBottom:'1px solid var(--border-subtle)',
      padding:'12px 24px',
    }}>
      <div style={{
        maxWidth:900, margin:'0 auto',
        display:'flex', alignItems:'center', gap:12,
      }}>
        <a href="index.html" style={{
          fontFamily:'var(--font-mono)', fontSize:11, letterSpacing:'0.06em',
          textTransform:'uppercase', color:'var(--text-tertiary)',
          textDecoration:'none', whiteSpace:'nowrap',
          transition:'color 0.3s ease',
        }}
        onMouseEnter={e => e.target.style.color='var(--accent)'}
        onMouseLeave={e => e.target.style.color='var(--text-tertiary)'}
        >
          &larr; Lessons
        </a>
        <div style={{ flex:1, display:'flex', alignItems:'center', gap:4 }}>
          {Array.from({length:total}, (_,i) => (
            <div key={i} style={{
              flex:1, height:3, borderRadius:2,
              background: i < step ? 'var(--accent)' : i === step ? 'var(--accent-dim)' : 'rgba(255,255,255,0.06)',
              transition:'background 0.5s var(--ease-out-expo)',
              position:'relative',
              overflow:'hidden',
            }}>
              {i === step && (
                <div style={{
                  position:'absolute', inset:0, borderRadius:2,
                  background:'linear-gradient(90deg, var(--accent), var(--accent-bright))',
                  animation:'breathe 2s ease-in-out infinite',
                  transformOrigin:'left',
                }}/>
              )}
            </div>
          ))}
        </div>
        <span style={{
          fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-tertiary)',
          letterSpacing:'0.04em', whiteSpace:'nowrap',
        }}>
          {step + 1} / {total}
        </span>
      </div>
    </div>
  );
}

/* ================================================================
   NAVIGATION BUTTONS
   ================================================================ */
function NavButtons({ step, setStep, total }) {
  return (
    <div style={{
      display:'flex', justifyContent:'space-between', alignItems:'center',
      marginTop:48, gap:16,
    }}>
      {step > 0 ? (
        <button onClick={() => setStep(step - 1)} style={{
          display:'flex', alignItems:'center', gap:8,
          fontFamily:'var(--font-body)', fontSize:15, fontWeight:400,
          color:'var(--text-secondary)', background:'none',
          border:'1px solid var(--border-subtle)', borderRadius:12,
          padding:'12px 24px', transition:'all 0.3s var(--ease-out-expo)',
        }}
        onMouseEnter={e => { e.currentTarget.style.borderColor='var(--accent-dim)'; e.currentTarget.style.color='var(--text-primary)'; }}
        onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border-subtle)'; e.currentTarget.style.color='var(--text-secondary)'; }}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Previous
        </button>
      ) : <div />}
      {step < total - 1 ? (
        <button onClick={() => setStep(step + 1)} style={{
          display:'flex', alignItems:'center', gap:8,
          fontFamily:'var(--font-body)', fontSize:15, fontWeight:500,
          color:'#fff', background:'linear-gradient(135deg, var(--accent-dim), var(--accent))',
          border:'none', borderRadius:12,
          padding:'12px 28px', transition:'all 0.3s var(--ease-out-expo)',
          boxShadow:'0 4px 20px rgba(245,158,11,0.2)',
        }}
        onMouseEnter={e => { e.currentTarget.style.boxShadow='0 6px 28px rgba(245,158,11,0.35)'; e.currentTarget.style.transform='translateY(-1px)'; }}
        onMouseLeave={e => { e.currentTarget.style.boxShadow='0 4px 20px rgba(245,158,11,0.2)'; e.currentTarget.style.transform='translateY(0)'; }}
        >
          Next
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      ) : (
        <button onClick={() => {
          saveProgress();
          window.location.href = 'index.html';
        }} style={{
          display:'flex', alignItems:'center', gap:8,
          fontFamily:'var(--font-body)', fontSize:15, fontWeight:500,
          color:'#fff', background:'linear-gradient(135deg, var(--success), var(--accent))',
          border:'none', borderRadius:12,
          padding:'12px 28px', transition:'all 0.3s var(--ease-out-expo)',
          boxShadow:'0 4px 20px rgba(74,222,128,0.2)',
        }}
        onMouseEnter={e => { e.currentTarget.style.boxShadow='0 6px 28px rgba(74,222,128,0.35)'; e.currentTarget.style.transform='translateY(-1px)'; }}
        onMouseLeave={e => { e.currentTarget.style.boxShadow='0 4px 20px rgba(74,222,128,0.2)'; e.currentTarget.style.transform='translateY(0)'; }}
        >
          Complete Lesson
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      )}
    </div>
  );
}

/* ================================================================
   SECTION HEADER
   ================================================================ */
function SectionHeader({ title, subtitle }) {
  return (
    <div style={{ marginBottom:32, animation:'fadeInUp 0.7s var(--ease-out-expo) both' }}>
      <h2 style={{
        fontFamily:'var(--font-display)', fontSize:'clamp(32px, 5vw, 48px)',
        fontWeight:400, lineHeight:1.1, letterSpacing:'-0.01em',
        marginBottom:12,
        background:'linear-gradient(135deg, var(--text-primary) 0%, var(--accent-bright) 100%)',
        WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
      }}>
        {title}
      </h2>
      {subtitle && (
        <p style={{
          fontFamily:'var(--font-body)', fontSize:'clamp(15px, 1.8vw, 18px)',
          fontWeight:300, color:'var(--text-secondary)', lineHeight:1.6,
          maxWidth:580,
        }}>
          {subtitle}
        </p>
      )}
    </div>
  );
}

/* ================================================================
   CARD WRAPPER
   ================================================================ */
function Card({ children, style }) {
  return (
    <div style={{
      background:'var(--bg-card)', border:'1px solid var(--border-subtle)',
      borderRadius:16, padding:'clamp(20px, 3vw, 32px)',
      backdropFilter:'blur(8px)', position:'relative', overflow:'hidden',
      ...style,
    }}>
      {children}
    </div>
  );
}

/* ================================================================
   CONCEPT BOX (Key Insight / Common Mistake)
   ================================================================ */
function ConceptBox({ children, color, label }) {
  const c = color || 'var(--accent)';
  return (
    <div style={{
      background:`${c}08`, border:`1px solid ${c}20`, borderRadius:12,
      padding:'16px 20px', marginBottom:20, position:'relative',
      borderLeft:`3px solid ${c}60`,
    }}>
      {label && (
        <div style={{
          fontFamily:'var(--font-mono)', fontSize:11, fontWeight:500,
          letterSpacing:'0.1em', textTransform:'uppercase',
          color: c, marginBottom:8, opacity:0.8,
        }}>
          {label}
        </div>
      )}
      {children}
    </div>
  );
}

/* ================================================================
   MATH EXPRESSION INLINE
   ================================================================ */
function M({ children }) {
  return (
    <span style={{
      fontFamily:'var(--font-mono)', fontSize:'0.92em',
      color:'var(--accent-bright)', padding:'1px 4px',
      background:'rgba(245,158,11,0.06)', borderRadius:4,
    }}>
      {children}
    </span>
  );
}

/* ================================================================
   MATH BLOCK (centered display equation)
   ================================================================ */
function MathBlock({ children, style }) {
  return (
    <div style={{
      fontFamily:'var(--font-mono)', fontSize:'clamp(15px, 1.8vw, 18px)',
      color:'var(--accent-bright)', textAlign:'center',
      padding:'20px 16px', margin:'20px 0',
      background:'rgba(245,158,11,0.04)',
      border:'1px solid rgba(245,158,11,0.1)',
      borderRadius:12, lineHeight:1.8,
      ...style,
    }}>
      {children}
    </div>
  );
}

/* ================================================================
   WORKED EXAMPLE
   ================================================================ */
function WorkedExample({ title, children }) {
  return (
    <Card style={{ marginBottom:20 }}>
      {title && (
        <div style={{
          fontFamily:'var(--font-mono)', fontSize:12, fontWeight:500,
          letterSpacing:'0.08em', textTransform:'uppercase',
          color:'var(--accent)', marginBottom:12,
        }}>
          {title}
        </div>
      )}
      {children}
    </Card>
  );
}

/* ================================================================
   PARAGRAPH
   ================================================================ */
function P({ children, style }) {
  return (
    <p style={{
      fontFamily:'var(--font-body)', fontSize:16, fontWeight:300,
      color:'var(--text-secondary)', lineHeight:1.75, marginBottom:16,
      ...style,
    }}>
      {children}
    </p>

}

/* ================================================================
   VISUALIZATION PLACEHOLDER
   ================================================================ */
function VisualizationPlaceholder({ label }) {
  return (
    <div style={{
      border:'1px dashed rgba(245,158,11,0.2)',
      borderRadius:12, padding:'32px 24px',
      textAlign:'center', margin:'24px 0',
      background:'rgba(245,158,11,0.02)',
    }}>
      <div style={{
        fontFamily:'var(--font-mono)', fontSize:12, fontWeight:500,
        letterSpacing:'0.06em', textTransform:'uppercase',
        color:'var(--text-tertiary)', marginBottom:8,
      }}>
        Interactive Visualization
      </div>
      <div style={{
        fontFamily:'var(--font-body)', fontSize:14, fontWeight:300,
        color:'var(--text-tertiary)', fontStyle:'italic',
      }}>
        {label}
      </div>
    </div>
  );
}


/* ================================================================
   STEP 0 — LANDING
   ================================================================ */
function StepLanding({ onStart }) {
  return (
    <div style={{ textAlign:'center', padding:'clamp(40px, 8vh, 80px) 0' }}>

      <div style={{ position:'relative', height:0 }}>
        {['p/q', 'x+1', '\u2260 0', '\u00F7', 'LCD', '\u221E'].map((s, i) => (
          <span key={i} style={{
            position:'absolute', fontFamily:'var(--font-display)',

            animationDelay:`${i*0.3}s`, pointerEvents:'none',
          }}>{s}</span>
        ))}
      </div>

      <div style={{
        display:'inline-flex', alignItems:'center', gap:8,
        padding:'6px 16px', borderRadius:100,
        border:'1px solid var(--border-subtle)',
        background:'rgba(255,255,255,0.02)',
        fontFamily:'var(--font-mono)', fontSize:12,
        letterSpacing:'0.08em', textTransform:'uppercase',
        color:'var(--text-secondary)', marginBottom:36,
        animation:'slideDown 0.8s var(--ease-out-expo) both',
      }}>
        <span style={{
          width:6, height:6, borderRadius:'50%', background:'var(--accent)',
          boxShadow:'0 0 8px var(--accent)',
          animation:'pulseGlow 2s ease-in-out infinite',
        }} />
        Lesson 7
      </div>

      <h1 style={{

        fontWeight:400, lineHeight:1.05,
        letterSpacing:'-0.02em', marginBottom:24,

      }}>
        <span style={{
          background:'linear-gradient(135deg, #e8e6f0 0%, rgba(232,230,240,0.6) 100%)',
          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
        }}>Radical & Rational</span>
        <br/>
        <span style={{
          fontStyle:'italic',
          background:'linear-gradient(135deg, var(--accent), var(--accent2))',
          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
        }}>Expressions</span>
      </h1>

      <p style={{
        fontFamily:'var(--font-body)', fontSize:'clamp(15px, 2vw, 19px)',
        fontWeight:300, color:'var(--text-secondary)',
        maxWidth:480, margin:'0 auto 20px', lineHeight:1.65,
        animation:'fadeInUp 1s var(--ease-out-expo) 0.25s both',
      }}>
        Simplify, combine, and solve with rational and radical expressions.
      </p>

      {/* Draft badge */}
      <div style={{
        display:'inline-block', marginBottom:48,
        animation:'fadeInUp 1s var(--ease-out-expo) 0.35s both',
      }}>
        <span style={{
          fontFamily:'var(--font-mono)', fontSize:11, fontWeight:500,
          letterSpacing:'0.1em', textTransform:'uppercase',
          color:'var(--accent-dim)', background:'rgba(245,158,11,0.06)',
          border:'1px solid rgba(245,158,11,0.15)',
          borderRadius:6, padding:'4px 12px',
        }}>
          Rough Draft

      <div style={{ animation:'fadeInUp 1s var(--ease-out-expo) 0.45s both' }}>

        <div style={{
          maxWidth:360, margin:'0 auto 48px',

        }}>

              <span>{frac.num}</span>
              <div style={{

      </div>

      <button onClick={onStart} style={{
        fontFamily:'var(--font-body)', fontSize:17, fontWeight:500,

/* ================================================================
   STEP 1 — WHAT IS A RATIONAL EXPRESSION?
   ================================================================ */
function Step1WhatIs() {
  return (
    <div style={{ animation:'fadeIn 0.5s ease both' }}>
      <SectionHeader
        title="What Is a Rational Expression?"
        subtitle="Just like a rational number is a ratio of integers, a rational expression is a ratio of polynomials."
      />

      <P>
        You already know fractions like <M>3/4</M> or <M>7/2</M>. A <strong style={{ color:'var(--accent-bright)' }}>rational expression</strong> is
        the same idea, except the numerator and denominator are polynomials instead of plain numbers. The
        word "rational" comes from "ratio" -- it is literally a ratio of two polynomial expressions.
      </P>

      <P>
        Any time you see one polynomial divided by another, you are looking at a rational expression.
        These appear constantly in algebra, calculus, physics, and engineering. Mastering them means
        mastering the art of working with algebraic fractions.
      </P>

      <ConceptBox label="Definition">
        <P style={{ marginBottom:0 }}>
          A <strong style={{ color:'var(--accent-bright)' }}>rational expression</strong> has the form{' '}
          <M>P(x) / Q(x)</M>, where <M>P(x)</M> and <M>Q(x)</M> are polynomials
          and <M>Q(x) {'\u2260'} 0</M>.
        </P>
      </ConceptBox>

      <P>Here are some examples of rational expressions:</P>

      <div style={{ display:'flex', gap:16, flexWrap:'wrap', justifyContent:'center', margin:'24px 0' }}>
        {[
          { num:'x + 1', den:'x - 2', note:'Linear over linear' },
          { num:'x\u00B2 + 3x', den:'x + 5', note:'Quadratic over linear' },
          { num:'5', den:'x - 1', note:'Constant over linear' },
          { num:'x\u00B3 - 1', den:'x\u00B2 + x + 1', note:'Cubic over quadratic' },
        ].map((ex, i) => (
          <Card key={i} style={{ flex:'0 0 auto', minWidth:140, textAlign:'center', padding:'16px 20px' }}>
            <div style={{
              fontFamily:'var(--font-mono)', fontSize:17,
              color:'var(--accent-bright)', marginBottom:8,
              display:'flex', flexDirection:'column', alignItems:'center', gap:3,
            }}>
              <span>{ex.num}</span>
              <div style={{ width:'80%', height:1, background:'var(--accent)', opacity:0.4 }}/>
              <span>{ex.den}</span>
            </div>
            <div style={{
              fontFamily:'var(--font-body)', fontSize:12, fontWeight:300,
              color:'var(--text-tertiary)',
            }}>
              {ex.note}
            </div>
          </Card>
        ))}
      </div>

      <P>
        The most critical rule with rational expressions is this: <strong style={{ color:'var(--error)' }}>the denominator
        can never equal zero</strong>. Division by zero is undefined in mathematics, so any value of{' '}
        <M>x</M> that makes the denominator zero must be excluded from the domain. These excluded values
        are called <strong style={{ color:'var(--accent-bright)' }}>domain restrictions</strong>.
      </P>

      <ConceptBox label="Key Insight" color="var(--warning)">
        <P style={{ marginBottom:8 }}>
          For the expression <M>(x + 1) / (x - 2)</M>, the denominator <M>x - 2 = 0</M> when{' '}
          <M>x = 2</M>. So the domain is all real numbers except <M>x = 2</M>.
        </P>
        <P style={{ marginBottom:0 }}>
          Always state domain restrictions when working with rational expressions. Factor the denominator
          and set each factor equal to zero to find the restricted values.
        </P>
      </ConceptBox>

      <P>
        Finding domain restrictions is a skill you will use repeatedly. For <M>5 / (x{'\u00B2'} - 9)</M>,
        factor the denominator: <M>(x - 3)(x + 3)</M>. Setting each factor to zero
        gives <M>x {'\u2260'} 3</M> and <M>x {'\u2260'} -3</M>. Those two values are excluded from
        the domain because they would create division by zero.
      </P>

      {/* TODO: Interactive visualization -- type in a rational expression, see its graph with asymptote */}
      <VisualizationPlaceholder label="Type in a rational expression and see its graph with vertical asymptotes highlighted" />
    </div>
  );
}


/* ================================================================
   STEP 2 — SIMPLIFYING
   ================================================================ */
function Step2Simplifying() {
  return (
    <div style={{ animation:'fadeIn 0.5s ease both' }}>
      <SectionHeader
        title="Simplifying"
        subtitle="Factor, then cancel common factors between numerator and denominator."
      />

      <P>
        Simplifying a rational expression works exactly like simplifying a numeric fraction. With{' '}
        <M>6/8</M> you factor out the common factor of 2 to get <M>3/4</M>. With rational expressions,
        you factor the numerator and denominator as polynomials, then cancel any factors they share.
      </P>

      <P>
        The process has three steps: (1) factor the numerator completely, (2) factor the denominator
        completely, and (3) divide out (cancel) any common factors. After canceling, what remains is
        the simplified form. But remember: the domain restrictions from the original expression still
        apply, even after simplification.
      </P>

      <WorkedExample title="Example 1">
        <P style={{ marginBottom:8, color:'var(--text-primary)' }}>
          Simplify: <M>(x{'\u00B2'} - 9) / (x + 3)</M>
        </P>
        <MathBlock>
          {'(x\u00B2 - 9) / (x + 3)'}<br/>
          {'= (x - 3)(x + 3) / (x + 3)'}<br/>
          {'= x - 3'}
        </MathBlock>
        <P style={{ marginBottom:0 }}>
          The numerator is a difference of squares: <M>x{'\u00B2'} - 9 = (x - 3)(x + 3)</M>. The
          factor <M>(x + 3)</M> appears in both numerator and denominator, so it cancels. The
          simplified form is <M>x - 3</M>, but with the restriction that <M>x {'\u2260'} -3</M>{' '}
          because the original denominator would be zero there.
        </P>
      </WorkedExample>

      <WorkedExample title="Example 2">
        <P style={{ marginBottom:8, color:'var(--text-primary)' }}>
          Simplify: <M>(2x{'\u00B2'} + 4x) / (2x)</M>
        </P>
        <MathBlock>
          {'(2x\u00B2 + 4x) / (2x)'}<br/>
          {'= 2x(x + 2) / (2x)'}<br/>
          {'= x + 2'}
        </MathBlock>
        <P style={{ marginBottom:0 }}>
          Factor <M>2x</M> from the numerator to get <M>2x(x + 2)</M>. Cancel the common
          factor <M>2x</M>. The result is <M>x + 2</M>, with the restriction <M>x {'\u2260'} 0</M>.
        </P>
      </WorkedExample>

      <ConceptBox label="Common Mistake" color="var(--error)">
        <P style={{ marginBottom:8, color:'var(--text-primary)', fontWeight:400 }}>
          You can only cancel <strong>factors</strong>, not <strong>terms</strong>.
        </P>
        <P style={{ marginBottom:8 }}>
          A factor is something multiplied. A term is something added or subtracted. In the
          expression <M>(x + 3) / (x + 5)</M>, the <M>x</M>'s are terms being added, not factors
          being multiplied. You absolutely cannot "cancel the x's" to get <M>3/5</M>.
        </P>
        <MathBlock style={{ background:'rgba(248,113,113,0.06)', borderColor:'rgba(248,113,113,0.15)' }}>
          <span style={{ color:'var(--error)' }}>{'(x + 3) / (x + 5) \u2260 3/5'}</span>
          <span style={{ color:'var(--text-tertiary)', fontSize:14 }}>{' '} WRONG!
          </span>
        </MathBlock>
        <P style={{ marginBottom:0 }}>
          This is one of the most common errors in all of algebra. Only entire factors that multiply
          the rest of the expression can be canceled. If it is connected by addition or subtraction,
          it is a term and cannot be canceled.
        </P>
      </ConceptBox>

      <P>
        Another helpful check: after simplifying, you can plug in a test value (other than a restricted
        one) into both the original and simplified expressions. If they give the same result, you are
        likely on the right track. If they differ, you made an error in factoring or canceling.
      </P>

      {/* TODO: Interactive -- drag to factor and cancel steps */}
      <VisualizationPlaceholder label="Drag-and-drop factoring: factor numerator and denominator, then drag to cancel common factors" />
    </div>
  );
}


/* ================================================================
   STEP 3 — MULTIPLYING & DIVIDING
   ================================================================ */
function Step3MultiplyDivide() {
  return (
    <div style={{ animation:'fadeIn 0.5s ease both' }}>
      <SectionHeader
        title="Multiplying & Dividing"
        subtitle="Multiply straight across. Divide by flipping the second fraction."
      />

      <P>
        Multiplying rational expressions follows the same rule as multiplying numeric fractions:
        multiply the numerators together and multiply the denominators together. Before doing so,
        it is always wise to factor everything first and cancel common factors. This prevents the
        product from becoming unnecessarily complex.
      </P>

      <ConceptBox label="Rule: Multiplication">
        <MathBlock style={{ margin:'8px 0', background:'transparent', border:'none', padding:'8px 0' }}>
          {'(A / B) \u00D7 (C / D) = (A \u00D7 C) / (B \u00D7 D)'}
        </MathBlock>
        <P style={{ marginBottom:0 }}>
          Factor all numerators and denominators first, cancel common factors across all four positions,
          then multiply what remains.
        </P>
      </ConceptBox>

      <WorkedExample title="Multiplication Example">
        <P style={{ marginBottom:8, color:'var(--text-primary)' }}>
          Simplify: <M>(x / (x + 1)) {'\u00D7'} ((x + 1) / x{'\u00B2'})</M>
        </P>
        <MathBlock>
          {'x / (x + 1) \u00D7 (x + 1) / x\u00B2'}<br/>
          {'= x(x + 1) / ((x + 1) \u00D7 x\u00B2)'}<br/>
          {'= 1 / x'}
        </MathBlock>
        <P style={{ marginBottom:0 }}>
          The factor <M>(x + 1)</M> cancels between the first denominator and the second numerator. One
          factor of <M>x</M> cancels between the first numerator and the second denominator. What
          remains is <M>1/x</M>. The restrictions are <M>x {'\u2260'} 0</M> and <M>x {'\u2260'} -1</M>.
        </P>
      </WorkedExample>

      <P>
        Division of rational expressions uses the same principle you learned with numeric fractions:
        dividing by a fraction is the same as multiplying by its reciprocal. Flip the second fraction
        (swap its numerator and denominator), then multiply.
      </P>

      <ConceptBox label="Rule: Division">
        <MathBlock style={{ margin:'8px 0', background:'transparent', border:'none', padding:'8px 0' }}>
          {'(A / B) \u00F7 (C / D) = (A / B) \u00D7 (D / C) = (AD) / (BC)'}
        </MathBlock>
        <P style={{ marginBottom:0 }}>
          "Multiply by the reciprocal." Flip the divisor, then proceed as with multiplication.
          Don't forget: the new denominator <M>C</M> also cannot be zero.
        </P>
      </ConceptBox>

      <WorkedExample title="Division Example">
        <P style={{ marginBottom:8, color:'var(--text-primary)' }}>
          Simplify: <M>(x{'\u00B2'} / (x + 3)) {'\u00F7'} (x / (x - 1))</M>
        </P>
        <MathBlock>
          {'x\u00B2 / (x + 3) \u00F7 x / (x - 1)'}<br/>
          {'= x\u00B2 / (x + 3) \u00D7 (x - 1) / x'}<br/>
          {'= x\u00B2(x - 1) / (x(x + 3))'}<br/>
          {'= x(x - 1) / (x + 3)'}
        </MathBlock>
        <P style={{ marginBottom:0 }}>
          Flip the second fraction to get <M>(x - 1) / x</M>, then multiply. One factor of{' '}
          <M>x</M> cancels from <M>x{'\u00B2'}</M> in the numerator with the <M>x</M> in the
          denominator. The result is <M>x(x - 1) / (x + 3)</M>. The restrictions
          are <M>x {'\u2260'} 0</M>, <M>x {'\u2260'} -3</M>, and <M>x {'\u2260'} 1</M>.
        </P>
      </WorkedExample>

      <ConceptBox label="Key Insight">
        <P style={{ marginBottom:0 }}>
          Always factor before multiplying. If you multiply the numerators and denominators first without
          factoring, you will get a much more complex expression that is harder to simplify afterward.
          Factor first, cancel, then multiply what is left. This keeps the algebra manageable.
        </P>
      </ConceptBox>

      {/* TODO: Interactive -- step-by-step multiply/divide builder */}
      <VisualizationPlaceholder label="Step-by-step multiply/divide builder: choose operation, see each cancellation highlighted" />
    </div>
  );
}


/* ================================================================
   STEP 4 — ADDING & SUBTRACTING
   ================================================================ */
function Step4AddSubtract() {
  return (
    <div style={{ animation:'fadeIn 0.5s ease both' }}>
      <SectionHeader
        title="Adding & Subtracting"
        subtitle="Find a common denominator, rewrite each fraction, then combine numerators."
      />

      <P>
        Adding and subtracting rational expressions requires a <strong style={{ color:'var(--accent-bright)' }}>common
        denominator</strong>, just like adding numeric fractions. You cannot simply add numerators if the
        denominators are different. The strategy is to find the Least Common Denominator (LCD), rewrite
        each fraction with that LCD, then combine the numerators over the shared denominator.
      </P>

      <P>
        The LCD is found by factoring each denominator, then taking the highest power of every distinct
        factor that appears. For example, if one denominator has <M>(x + 1)</M> and the other
        has <M>(x - 1)</M>, the LCD is <M>(x + 1)(x - 1)</M>. If one denominator
        has <M>(x + 1){'\u00B2'}</M> and the other has <M>(x + 1)</M>, the LCD
        is <M>(x + 1){'\u00B2'}</M> because you take the higher power.
      </P>

      <ConceptBox label="Strategy">
        <ol style={{
          fontFamily:'var(--font-body)', fontSize:15, fontWeight:300,
          color:'var(--text-secondary)', lineHeight:1.75, paddingLeft:20,
        }}>
          <li style={{ marginBottom:6 }}>Factor every denominator completely.</li>
          <li style={{ marginBottom:6 }}>Identify the LCD: include each factor at its highest power.</li>
          <li style={{ marginBottom:6 }}>Multiply each fraction's numerator and denominator by whatever is missing from the LCD.</li>
          <li style={{ marginBottom:6 }}>Combine the numerators over the common denominator.</li>
          <li>Simplify the resulting numerator (combine like terms, factor if possible).</li>
        </ol>
      </ConceptBox>

      <WorkedExample title="Example 1: Addition">
        <P style={{ marginBottom:8, color:'var(--text-primary)' }}>
          Add: <M>1/(x + 1) + 1/(x - 1)</M>
        </P>
        <MathBlock>
          {'1/(x + 1) + 1/(x - 1)'}<br/>
          {'LCD = (x + 1)(x - 1)'}<br/>
          {'= (x - 1)/((x + 1)(x - 1)) + (x + 1)/((x + 1)(x - 1))'}<br/>
          {'= (x - 1 + x + 1) / ((x + 1)(x - 1))'}<br/>
          {'= 2x / (x\u00B2 - 1)'}
        </MathBlock>
        <P style={{ marginBottom:0 }}>
          The LCD is <M>(x + 1)(x - 1)</M>. Multiply the first fraction by <M>(x - 1)/(x - 1)</M>{' '}
          and the second by <M>(x + 1)/(x + 1)</M>. The numerators combine
          to <M>x - 1 + x + 1 = 2x</M>. The denominator can also be written
          as <M>x{'\u00B2'} - 1</M>.
        </P>
      </WorkedExample>

      <WorkedExample title="Example 2: Subtraction">
        <P style={{ marginBottom:8, color:'var(--text-primary)' }}>
          Subtract: <M>3/x - 2/(x + 4)</M>
        </P>
        <MathBlock>
          {'3/x - 2/(x + 4)'}<br/>
          {'LCD = x(x + 4)'}<br/>
          {'= 3(x + 4) / (x(x + 4)) - 2x / (x(x + 4))'}<br/>
          {'= (3x + 12 - 2x) / (x(x + 4))'}<br/>
          {'= (x + 12) / (x(x + 4))'}
        </MathBlock>
        <P style={{ marginBottom:0 }}>
          The LCD is <M>x(x + 4)</M>. Multiply the first fraction's numerator and denominator
          by <M>(x + 4)</M>, giving <M>3(x + 4) = 3x + 12</M>. Multiply the second
          by <M>x</M>, giving <M>2x</M>. Subtract: <M>3x + 12 - 2x = x + 12</M>.
        </P>
      </WorkedExample>

      <ConceptBox label="Common Mistake" color="var(--error)">
        <P style={{ marginBottom:0 }}>
          When subtracting, be extremely careful to distribute the negative sign across the entire
          second numerator. A common error is to write <M>3x + 12 - 2x</M> when it should
          be <M>3x + 12 - 2x</M> (which happens to be the same here). But if the second numerator
          were <M>2x + 1</M>, the subtraction would yield <M>3x + 12 - 2x - 1 = x + 11</M>.
          Forgetting to distribute the minus sign to every term in the second numerator is a very
          frequent source of errors.
        </P>
      </ConceptBox>

      <P>
        After combining, always check whether the resulting numerator can be factored and simplified
        with the denominator. Sometimes a factor cancels, giving a simpler final answer. And always
        state the domain restrictions inherited from the original denominators.
      </P>

      {/* TODO: Interactive -- LCD finder and fraction combiner */}
      <VisualizationPlaceholder label="LCD finder: enter two denominators, see the LCD computed step-by-step, then combine fractions" />
    </div>
  );
}



/* ================================================================
   STEP 6 — SOLVING RATIONAL EQUATIONS
   ================================================================ */
function Step6Solving() {
  return (
    <div style={{ animation:'fadeIn 0.5s ease both' }}>
      <SectionHeader
        title="Solving Rational Equations"
        subtitle="Clear the fractions by multiplying both sides by the LCD, then check for extraneous solutions."
      />

      <P>
        A rational <em>equation</em> is different from a rational <em>expression</em>. An equation has
        an equals sign and you are solving for specific values of <M>x</M>. The standard strategy is
        to multiply every term on both sides by the Least Common Denominator to eliminate all fractions,
        transforming the equation into a polynomial equation you already know how to solve.
      </P>

      <ConceptBox label="Strategy">
        <ol style={{
          fontFamily:'var(--font-body)', fontSize:15, fontWeight:300,
          color:'var(--text-secondary)', lineHeight:1.75, paddingLeft:20,
        }}>
          <li style={{ marginBottom:6 }}>Identify the LCD of all rational expressions in the equation.</li>
          <li style={{ marginBottom:6 }}>Multiply every term on both sides by the LCD.</li>
          <li style={{ marginBottom:6 }}>Simplify -- the denominators should cancel, leaving a polynomial equation.</li>
          <li style={{ marginBottom:6 }}>Solve the resulting polynomial equation.</li>
          <li><strong style={{ color:'var(--error)' }}>Check every solution</strong> in the original equation. Reject any that make a denominator zero.</li>
        </ol>
      </ConceptBox>

      <P>
        That last step is absolutely critical. When you multiply both sides by the LCD (which contains
        variables), you may introduce solutions that do not actually satisfy the original equation. These
        are called <strong style={{ color:'var(--error)' }}>extraneous solutions</strong>. If a solution
        makes any original denominator equal to zero, it must be rejected.
      </P>

      <WorkedExample title="Example 1: Valid Solutions">
        <P style={{ marginBottom:8, color:'var(--text-primary)' }}>
          Solve: <M>1/x + 1/(x + 2) = 1</M>
        </P>
        <MathBlock>
          {'LCD = x(x + 2)'}<br/>
          {'Multiply both sides: (x + 2) + x = x(x + 2)'}<br/>
          {'2x + 2 = x\u00B2 + 2x'}<br/>
          {'2 = x\u00B2'}<br/>
          {'x = \u00B1\u221A2'}
        </MathBlock>
        <P style={{ marginBottom:8 }}>
          Check: <M>x = {'\u221A'}2 {'\u2248'} 1.414</M>. Neither <M>{'\u221A'}2</M> nor <M>-{'\u221A'}2</M>{' '}
          makes any denominator zero (<M>x = 0</M> or <M>x = -2</M> would be problematic, but{' '}
          <M>{'\u00B1'}{'\u221A'}2</M> are neither). Both solutions are valid.
        </P>
        <div style={{
          display:'inline-block', padding:'6px 14px', borderRadius:8,
          background:'rgba(74,222,128,0.08)', border:'1px solid rgba(74,222,128,0.2)',
          fontFamily:'var(--font-mono)', fontSize:14, color:'var(--success)',
        }}>
          x = {'\u221A'}2 and x = -{'\u221A'}2 (both valid)
        </div>
      </WorkedExample>

      <WorkedExample title="Example 2: Extraneous Solution">
        <P style={{ marginBottom:8, color:'var(--text-primary)' }}>
          Solve: <M>x/(x - 3) = 3/(x - 3) + 2</M>
        </P>
        <MathBlock>
          {'LCD = (x - 3)'}<br/>
          {'Multiply both sides: x = 3 + 2(x - 3)'}<br/>
          {'x = 3 + 2x - 6'}<br/>
          {'x = 2x - 3'}<br/>
          {'-x = -3'}<br/>
          {'x = 3'}
        </MathBlock>
        <P style={{ marginBottom:8 }}>
          Check: plugging <M>x = 3</M> back into the original equation gives <M>3/(3-3) = 3/0</M>,
          which is undefined. The solution <M>x = 3</M> makes the original denominator zero.
        </P>
        <div style={{
          display:'inline-block', padding:'6px 14px', borderRadius:8,
          background:'rgba(248,113,113,0.08)', border:'1px solid rgba(248,113,113,0.2)',
          fontFamily:'var(--font-mono)', fontSize:14, color:'var(--error)',
        }}>
          x = 3 is EXTRANEOUS -- No Solution
        </div>
      </WorkedExample>

      <ConceptBox label="Common Mistake" color="var(--error)">
        <P style={{ marginBottom:0 }}>
          Forgetting to check solutions is the single most common error with rational equations. Every
          time you solve a rational equation, you must substitute each answer back into the original
          equation and verify that no denominator becomes zero. Extraneous solutions are not rare edge
          cases -- they appear frequently, especially when variables are in the denominators.
        </P>
      </ConceptBox>

      <P>
        Some rational equations, after clearing fractions, produce quadratic equations. Use the
        quadratic formula, factoring, or completing the square to solve them. Then check every
        candidate solution against the original denominators. It is entirely possible for a rational
        equation to have two solutions, one solution, or no solutions at all.
      </P>

      {/* TODO: Interactive -- equation solver with extraneous solution checker */}
      <VisualizationPlaceholder label="Rational equation solver: enter an equation, see step-by-step solution with automatic extraneous solution detection" />
    </div>
  );
}

        <P style={{ textAlign:'center', maxWidth:420, margin:'0 auto' }}>
          You now have the tools to simplify, combine, and solve rational expressions. These skills
          will be essential as you continue into more advanced mathematics.
        </P>
      </div>
    </div>
  );
}


/* ================================================================
   APP
   ================================================================ */
function App() {
  const [step, setStep] = useState(0);

  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [step]);

  useEffect(() => {
    if (step === TOTAL_STEPS - 1) {
      saveProgress();
    }
  }, [step]);

  function renderStep() {
    switch(step) {
      case 0: return <StepLanding onStart={() => setStep(1)} />;
      case 1: return <Step1WhatIs />;
      case 2: return <Step2Simplifying />;
      case 3: return <Step3MultiplyDivide />;
      case 4: return <Step4AddSubtract />;
      case 5: return <Step6Solving />;
      case 6: return <Step7Practice />;
      default: return <StepLanding onStart={() => setStep(1)} />;
    }
  }

  return (
    <div style={{ position:'relative', zIndex:1 }}>
      <GridBackground />
      <DraftBanner />
      <ProgressBar step={step} total={TOTAL_STEPS} />

      <div style={{
        maxWidth:780, margin:'0 auto',
        padding:'clamp(24px, 4vh, 48px) 20px 60px',
      }}>
        <div key={step}>
          {renderStep()}
        </div>

        {step > 0 && (
          <NavButtons step={step} setStep={setStep} total={TOTAL_STEPS} />
        )}
        {step === TOTAL_STEPS - 1 && (
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:32,padding:'16px 0',borderTop:'1px solid var(--border-subtle)'}}>
            <a href="06b-systems.html" style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--accent)',textDecoration:'none',transition:'opacity 0.2s',opacity:0.8}} onMouseEnter={e=>e.target.style.opacity='1'} onMouseLeave={e=>e.target.style.opacity='0.8'}>&larr; Previous: Systems of Linear Equations</a>
            <a href="08-functions.html" style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--accent)',textDecoration:'none',transition:'opacity 0.2s',opacity:0.8}} onMouseEnter={e=>e.target.style.opacity='1'} onMouseLeave={e=>e.target.style.opacity='0.8'}>Next: Functions &rarr;</a>
          </div>
        )}
      </div>

      {/* Footer */}
      <footer style={{
        textAlign:'center', padding:'40px 24px 32px',
        borderTop:'1px solid var(--border-subtle)', marginTop:20,
      }}>
        <p style={{
          fontFamily:'var(--font-body)', fontSize:13, color:'var(--text-tertiary)', fontWeight:300,
        }}>
          Chapter 7 &mdash; Radical &amp; Rational Expressions
        </p>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
