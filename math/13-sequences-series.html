<style>

  :root {

    --bg-primary: #0a0a12;
    --bg-card: rgba(255, 255, 255, 0.03);
    --bg-card-hover: rgba(255, 255, 255, 0.06);
    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-hover: rgba(255, 255, 255, 0.12);
    --text-primary: #e8e6f0;
    --text-secondary: rgba(232, 230, 240, 0.55);
    --text-tertiary: rgba(232, 230, 240, 0.3);
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;

    --accent-bright: #a78bfa;
    --accent-dim: #6d28d9;
    --accent-glow: rgba(139, 92, 246, 0.3);
    --accent-bg: rgba(139, 92, 246, 0.06);
    --accent2: #7c3aed;
    --accent3: #c084fc;
    --success: #4ade80;
    --warning: #fbbf24;
    --error: #f87171;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);

    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  html {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    scroll-behavior: smooth;
  }

  body {
    min-height: 100vh;
    overflow-x: hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(139, 92, 246, 0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 50%, rgba(124, 58, 237, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 20% 80%, rgba(192, 132, 252, 0.03) 0%, transparent 50%),
      var(--bg-deep);
  }

  #root { min-height: 100vh; }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.3;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

  ::selection { background: rgba(139, 92, 246, 0.3); color: #fff; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseGlow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.1); }
    50% { box-shadow: 0 0 30px rgba(139, 92, 246, 0.25); }
  }

  button { cursor: pointer; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>

/* ================================================================

/* ================================================================
   STEP 1 — WHAT IS A SEQUENCE?
   ================================================================ */
function Step1WhatIsSequence() {
  return (
    <div style={{ animation:'fadeInUp 0.7s var(--ease-out-expo) both' }}>
      <SectionHeader
        title="What Is a Sequence?"
        subtitle="An ordered list of numbers, governed by a rule."
      />

      <Card>
        <P>
          A <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>sequence</strong> is simply an ordered list of numbers that follows some pattern or rule. Unlike a set, where order does not matter, the position of each number in a sequence is essential. The first term, the second term, the hundredth term -- each has a definite place.
        </P>

        <P>
          We write sequences using subscript notation: <M>a{'\u2081'}, a{'\u2082'}, a{'\u2083'}, ...</M> or more compactly as <M>{'{'}a{'\u2099'}{'}'}</M>, where <M>n</M> indicates the term's position. The three dots (an ellipsis) signal that the pattern continues indefinitely. Some sequences are finite -- a list of your exam scores, for instance -- but the most interesting ones in mathematics go on forever.
        </P>

        <P>
          Consider these examples. The sequence <M>2, 4, 6, 8, ...</M> adds 2 each time. The sequence <M>3, 9, 27, 81, ...</M> multiplies by 3 each time. The sequence <M>1, 4, 9, 16, 25, ...</M> lists the perfect squares. Each obeys a different rule, but all three are perfectly well-defined: given any position <M>n</M>, you can determine exactly which number belongs there.
        </P>

        <KeyInsight>
          There are two ways to define a sequence. An <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>explicit formula</strong> gives any term directly from its position: <M>a{'\u2099'} = 2n</M> produces 2, 4, 6, 8, ... You plug in <M>n</M> and get the answer immediately. A <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>recursive formula</strong> defines each term from the one before it: <M>a{'\u2081'} = 2</M>, <M>a{'\u2099'} = a{'\u2099\u208B\u2081'} + 2</M>. To find the 50th term recursively, you must compute all 49 terms before it. Explicit formulas are faster; recursive formulas sometimes feel more natural.
        </KeyInsight>

        <P>
          Some of the most famous sequences in mathematics are defined recursively. The <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>Fibonacci sequence</strong> begins <M>1, 1, 2, 3, 5, 8, 13, 21, ...</M> where each term is the sum of the two before it. Triangular numbers <M>1, 3, 6, 10, 15, ...</M> count the dots in growing triangular arrangements. The prime numbers <M>2, 3, 5, 7, 11, 13, ...</M> have no simple formula at all -- they are defined by a property (divisible only by 1 and themselves) rather than by a rule for generating the next one from the last.
        </P>

        <MathBlock>
          Explicit: a{'\u2099'} = 2n {'\u2192'} 2, 4, 6, 8, 10, ...
          <br/>
          Recursive: a{'\u2081'} = 2, {'  '}a{'\u2099'} = a{'\u2099\u208B\u2081'} + 2
        </MathBlock>

        <TodoPlaceholder text="Interactive -- enter a rule, see the sequence generate term by term" />
      </Card>
    </div>
  );
}


/* ================================================================

   ================================================================ */
function Step2Arithmetic() {
  return (
    <div style={{ animation:'fadeInUp 0.7s var(--ease-out-expo) both' }}>
      <SectionHeader
        title="Arithmetic Sequences"
        subtitle="A constant difference between every pair of consecutive terms."

      <Card>
        <P>
          An <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>arithmetic sequence</strong> is one where each term differs from the previous term by a fixed amount <M>d</M>, called the <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>common difference</strong>. Start at any value <M>a{'\u2081'}</M>, add <M>d</M> to get the next term, add <M>d</M> again for the one after that, and so on. This produces a perfectly regular staircase of numbers, each step the same height.
        </P>

        <P>
          The explicit formula captures this pattern concisely: <M>a{'\u2099'} = a{'\u2081'} + (n - 1)d</M>. From the first term, you take <M>(n - 1)</M> steps of size <M>d</M> to reach the <M>n</M>th term. Finding the common difference is straightforward: pick any two consecutive terms and subtract. If <M>d = a{'\u2099'} - a{'\u2099\u208B\u2081'}</M> gives the same value everywhere, you have an arithmetic sequence.
        </P>

        <MathBlock>
          a{'\u2099'} = a{'\u2081'} + (n - 1)d
        </MathBlock>

        <P>
          For example, consider <M>5, 8, 11, 14, ...</M> Here <M>a{'\u2081'} = 5</M> and <M>d = 3</M>, so the explicit formula is <M>a{'\u2099'} = 5 + 3(n - 1) = 3n + 2</M>. Want the 100th term? Just compute <M>a{'\u2081\u2080\u2080'} = 5 + 3(99) = 302</M>. No need to write out all 100 terms. That is the power of an explicit formula.
        </P>

        <KeyInsight>
          An arithmetic sequence is a <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>linear function sampled at the integers</strong>. If you plot the terms of <M>a{'\u2099'} = 3n + 2</M>, you get points that lie perfectly on the line <M>y = 3x + 2</M>. The common difference <M>d</M> is the slope, and the sequence is just the graph of a linear function viewed one integer at a time. This connection to linear functions makes arithmetic sequences the simplest and most predictable type.
        </KeyInsight>

        <P>
          Arithmetic sequences appear everywhere in daily life. Seats in a theater often follow an arithmetic pattern: if the first row has 20 seats and each subsequent row adds 2 more, the rows form the sequence 20, 22, 24, 26, ... A salary that increases by a fixed amount each year -- say $2,000 -- is arithmetic. Even house numbers on one side of a street (1, 3, 5, 7, ...) form an arithmetic sequence with <M>d = 2</M>.
        </P>

        <MathBlock>
          Example: 5, 8, 11, 14, ...
          <br/>
          a{'\u2081'} = 5, {'  '}d = 3, {'  '}a{'\u2099'} = 3n + 2
          <br/>
          a{'\u2081\u2080\u2080'} = 3(100) + 2 = 302
        </MathBlock>

        <TodoPlaceholder text="Interactive -- slider for a_1 and d, see sequence on number line" />
      </Card>
    </div>
  );
}


/* ================================================================
   STEP 3 — GEOMETRIC SEQUENCES
   ================================================================ */
function Step3Geometric() {
  return (
    <div style={{ animation:'fadeInUp 0.7s var(--ease-out-expo) both' }}>
      <SectionHeader
        title="Geometric Sequences"
        subtitle="A constant ratio between every pair of consecutive terms."
      />

      <Card>
        <P>
          A <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>geometric sequence</strong> is one where each term is obtained by multiplying the previous term by a fixed value <M>r</M>, called the <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>common ratio</strong>. Where arithmetic sequences grow by addition, geometric sequences grow by multiplication. This seemingly small difference produces dramatically different behavior.
        </P>

        <P>
          The explicit formula is <M>a{'\u2099'} = a{'\u2081'} {'\u00B7'} r{'\u207F\u207B\u00B9'}</M>. Starting from <M>a{'\u2081'}</M>, you multiply by <M>r</M> a total of <M>(n - 1)</M> times. For example, the sequence <M>4, 12, 36, 108, ...</M> has <M>a{'\u2081'} = 4</M> and <M>r = 3</M>, giving <M>a{'\u2099'} = 4 {'\u00B7'} 3{'\u207F\u207B\u00B9'}</M>. The 10th term is <M>4 {'\u00B7'} 3{'\u2079'} = 4 {'\u00B7'} 19683 = 78,732</M>. Notice how quickly the numbers explode compared to arithmetic growth.
        </P>

        <MathBlock>
          a{'\u2099'} = a{'\u2081'} {'\u00B7'} r{'\u207F\u207B\u00B9'}
        </MathBlock>

        <P>
          The behavior of a geometric sequence depends entirely on <M>r</M>. When <M>|r| {'>'} 1</M>, the terms grow explosively -- doubling, tripling, or worse with every step. When <M>|r| {'<'} 1</M>, the terms shrink toward zero, getting tinier and tinier but never quite reaching it. When <M>r</M> is negative, the terms alternate in sign: <M>4, -8, 16, -32, 64, ...</M> produces a wild zigzag between positive and negative values.
        </P>

        <KeyInsight>
          A geometric sequence is an <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>exponential function sampled at the integers</strong>, just as an arithmetic sequence is a linear function sampled at the integers. Plotting <M>a{'\u2099'} = 4 {'\u00B7'} 3{'\u207F\u207B\u00B9'}</M> gives points on the exponential curve <M>y = 4 {'\u00B7'} 3{'\u02E3\u207B\u00B9'}</M>. This is why geometric sequences model exponential growth and decay so naturally.
        </KeyInsight>

        <P>
          Geometric sequences model many real-world phenomena. Compound interest is geometric: if your investment grows by 5% annually, each year's balance is <M>1.05{'\u00D7'}</M> the previous year's, giving <M>r = 1.05</M>. Population growth in an unconstrained environment is geometric. Moore's Law -- the observation that transistor counts on chips roughly double every two years -- describes a geometric sequence with <M>r {'\u2248'} 2</M>. Even folding a piece of paper doubles the thickness each time: 1, 2, 4, 8, 16, ... layers.
        </P>

        <P>
          Geometric decay (<M>|r| {'<'} 1</M>) is equally important. A radioactive substance loses a fixed fraction of its atoms each half-life. A bouncing ball reaches a fraction of its previous height with each bounce. A drug's concentration in the bloodstream drops by a percentage each hour. In all these cases, the values shrink but never actually reach zero -- they approach it asymptotically.
        </P>

        <MathBlock>
          Example: 4, 12, 36, 108, ...
          <br/>
          a{'\u2081'} = 4, {'  '}r = 3, {'  '}a{'\u2099'} = 4 {'\u00B7'} 3{'\u207F\u207B\u00B9'}
        </MathBlock>

        <TodoPlaceholder text="Interactive -- slider for a_1 and r, see sequence plotted" />
      </Card>
    </div>
  );
}


/* ================================================================
   STEP 4 — SERIES & SIGMA NOTATION
   ================================================================ */
function Step4Series() {
  return (
    <div style={{ animation:'fadeInUp 0.7s var(--ease-out-expo) both' }}>
      <SectionHeader
        title="Series & Sigma Notation"
        subtitle="What happens when you add up the terms of a sequence."
      />

      <Card>
        <P>
          A <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>series</strong> is what you get when you add the terms of a sequence together. If the sequence is <M>a{'\u2081'}, a{'\u2082'}, a{'\u2083'}, ...</M> then the series is <M>S{'\u2099'} = a{'\u2081'} + a{'\u2082'} + a{'\u2083'} + ... + a{'\u2099'}</M>. The distinction matters: a sequence is a list; a series is a sum. The sequence 1, 2, 3, 4, 5 and the series 1 + 2 + 3 + 4 + 5 = 15 are related but fundamentally different objects.
        </P>

        <P>
          Mathematicians use <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>sigma notation</strong> to write series compactly. The uppercase Greek letter <M>{'\u03A3'}</M> (sigma) means "sum." We write <M>{'\u03A3'}(i=1 to n) a{'\u1D62'}</M> to mean "add up <M>a{'\u1D62'}</M> for every value of <M>i</M> from 1 to <M>n</M>." The variable <M>i</M> is called the index of summation, the 1 below is where we start, and the <M>n</M> above is where we stop. This notation is not just a shorthand -- it makes complicated sums manageable and reveals their structure.
        </P>

        <MathBlock>
          {'\u03A3'}(i=1 to n) a{'\u1D62'} = a{'\u2081'} + a{'\u2082'} + ... + a{'\u2099'}
        </MathBlock>

        <P>
          For an <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>arithmetic series</strong>, there is an elegant closed-form formula. The sum of the first <M>n</M> terms is <M>S{'\u2099'} = n(a{'\u2081'} + a{'\u2099'})/2</M>, or equivalently <M>S{'\u2099'} = n/2 {'\u00B7'} (2a{'\u2081'} + (n-1)d)</M>. The intuition behind this formula traces back to a famous story about the young Carl Friedrich Gauss.
        </P>

        <KeyInsight>
          As a schoolboy, Gauss was asked to add the numbers from 1 to 100. Instead of summing tediously, he noticed that he could pair the terms: <M>1 + 100 = 101</M>, <M>2 + 99 = 101</M>, <M>3 + 98 = 101</M>, and so on. There are 50 such pairs, so the answer is <M>50 {'\u00D7'} 101 = 5050</M>. This pairing trick works for any arithmetic series. You are averaging the first and last term, then multiplying by the number of terms: <M>S{'\u2099'} = n {'\u00B7'} (first + last) / 2</M>.
        </KeyInsight>

        <P>
          For a <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>geometric series</strong>, the formula looks different but is equally powerful: <M>S{'\u2099'} = a{'\u2081'}(1 - r{'\u207F'})/(1 - r)</M> when <M>r {'\u2260'} 1</M>. This formula comes from a clever algebraic trick: multiply the sum by <M>r</M>, then subtract the original sum from the result. Most terms cancel, leaving only the first and last. The derivation is short but the result is indispensable in mathematics, finance, and computer science.
        </P>

        <MathBlock>
          Arithmetic: S{'\u2099'} = n(a{'\u2081'} + a{'\u2099'}) / 2
          <br/>
          Geometric: S{'\u2099'} = a{'\u2081'}(1 - r{'\u207F'}) / (1 - r), {'  '}r {'\u2260'} 1
        </MathBlock>

        <TodoPlaceholder text="Interactive -- build a sum term by term, see running total" />
      </Card>
    </div>
  );
}


/* ================================================================
   STEP 5 — INFINITE GEOMETRIC SERIES
   ================================================================ */
function Step5Infinite() {
  return (
    <div style={{ animation:'fadeInUp 0.7s var(--ease-out-expo) both' }}>
      <SectionHeader
        title="Infinite Geometric Series"
        subtitle="When infinitely many terms add up to a finite number."
      />

      <Card>
        <P>
          Something remarkable happens with geometric series when <M>|r| {'<'} 1</M>. The terms get smaller and smaller, shrinking toward zero, and the partial sums creep toward a definite limit. Even though you are adding infinitely many numbers, the total converges to a finite value. This is one of the most beautiful and counterintuitive results in all of mathematics.
        </P>

        <P>
          The formula for an infinite geometric series is breathtakingly simple. Take the finite formula <M>S{'\u2099'} = a{'\u2081'}(1 - r{'\u207F'})/(1 - r)</M> and observe that when <M>|r| {'<'} 1</M>, the term <M>r{'\u207F'}</M> approaches zero as <M>n</M> grows. In the limit, <M>r{'\u207F'} {'\u2192'} 0</M>, and we are left with:
        </P>

        <MathBlock>
          S = a{'\u2081'} / (1 - r), {'  '}when |r| {'<'} 1
        </MathBlock>

        <P>
          Consider <M>1 + 1/2 + 1/4 + 1/8 + 1/16 + ...</M> Here <M>a{'\u2081'} = 1</M> and <M>r = 1/2</M>. The formula gives <M>S = 1/(1 - 1/2) = 1/(1/2) = 2</M>. Infinitely many terms, and they add up to exactly 2. The partial sums are 1, 1.5, 1.75, 1.875, 1.9375, ... creeping closer and closer to 2 but never overshooting it.
        </P>

        <KeyInsight>
          This result explains <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>repeating decimals</strong>. The number <M>0.333...</M> is actually a geometric series in disguise: <M>3/10 + 3/100 + 3/1000 + ...</M> with <M>a{'\u2081'} = 3/10</M> and <M>r = 1/10</M>. Applying the formula: <M>S = (3/10)/(1 - 1/10) = (3/10)/(9/10) = 3/9 = 1/3</M>. Every repeating decimal can be converted to a fraction this way. The infinite geometric series formula is the bridge between the decimal and fractional representations of rational numbers.
        </KeyInsight>

        <P>
          When <M>|r| {'\u2265'} 1</M>, the series <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>diverges</strong> -- the partial sums grow without bound, and there is no finite answer. The series <M>1 + 2 + 4 + 8 + ...</M> has partial sums 1, 3, 7, 15, 31, 63, ... exploding toward infinity. Even <M>r = 1</M> fails: the series <M>5 + 5 + 5 + 5 + ...</M> obviously has no finite sum. The condition <M>|r| {'<'} 1</M> is not a technicality; it is the boundary between convergence and divergence.
        </P>

        <P>
          <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>Zeno's paradox</strong>, posed by the Greek philosopher around 450 BC, finds its resolution here. To walk across a room, Zeno argued, you must first walk halfway, then half the remaining distance, then half of that, and so on -- infinitely many steps. How can you complete infinitely many tasks in finite time? The answer: the total distance is a convergent geometric series. If the room is 10 meters long, you walk <M>5 + 2.5 + 1.25 + 0.625 + ... = 10/(1 - 1/2) = 10</M> meters. Infinite steps, finite distance, no paradox.
        </P>

        <MathBlock>
          1 + 1/2 + 1/4 + 1/8 + ... = 1/(1 - 1/2) = 2
          <br/>
          0.333... = 3/10 + 3/100 + ... = (3/10)/(9/10) = 1/3
        </MathBlock>

        <TodoPlaceholder text="Interactive -- visual of partial sums converging to limit" />
      </Card>
    </div>
  );
}


/* ================================================================
   STEP 6 — APPLICATIONS
   ================================================================ */
function Step6Applications() {
  return (
    <div style={{ animation:'fadeInUp 0.7s var(--ease-out-expo) both' }}>
      <SectionHeader
        title="Applications"
        subtitle="Sequences and series at work in the real world."
      />

      <Card>
        <P>
          <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>Finance.</strong> Sequences and series are the mathematical engine behind personal finance. When you make regular deposits into a savings account that earns compound interest, each deposit grows as a geometric sequence, and the total savings is a geometric series. Annuities, loan amortization tables, and mortgage calculations all rely on the geometric series formula. The present value of a stream of future payments -- a concept central to investing -- is an infinite geometric series when the payments continue forever (a "perpetuity").
        </P>

        <P>
          <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>Computer science.</strong> Algorithm analysis is saturated with series. The sum <M>1 + 2 + 4 + ... + 2{'\u1D4F'} = 2{'\u1D4F\u207A\u00B9'} - 1</M> appears constantly in the analysis of divide-and-conquer algorithms and binary data structures. A binary tree with <M>k</M> levels has at most <M>2{'\u1D4F\u207A\u00B9'} - 1</M> nodes -- a geometric series. The arithmetic series <M>1 + 2 + 3 + ... + n = n(n+1)/2</M> explains why naive sorting algorithms take <M>O(n{'\u00B2'})</M> time.
        </P>

        <P>
          <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>Physics.</strong> A bouncing ball provides a tangible model of geometric decay. If a ball is dropped from height <M>h</M> and reaches a fraction <M>r</M> of its previous height on each bounce, the heights form the geometric sequence <M>h, hr, hr{'\u00B2'}, hr{'\u00B3'}, ...</M> The total distance traveled (up and down) is a geometric series: <M>h + 2hr + 2hr{'\u00B2'} + ... = h + 2hr/(1 - r) = h(1 + r)/(1 - r)</M>. A ball dropped from 10 meters with <M>r = 0.6</M> travels a total of <M>10 {'\u00D7'} 1.6/0.4 = 40</M> meters before coming to rest.
        </P>

        <KeyInsight>
          The <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>harmonic series</strong> <M>1 + 1/2 + 1/3 + 1/4 + 1/5 + ...</M> is one of the great surprises in mathematics. Its terms shrink toward zero, so you might expect it to converge -- but it does not. It diverges, growing without bound, though incredibly slowly. This was proven by Nicole Oresme around 1350 by grouping terms: <M>(1/3 + 1/4) {'>'} 1/2</M>, <M>(1/5 + 1/6 + 1/7 + 1/8) {'>'} 1/2</M>, and so on. Each group exceeds 1/2, so the sum exceeds any multiple of 1/2. Shrinking terms do not guarantee a finite sum -- the rate of shrinking matters.
        </KeyInsight>

        <P>
          <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>Biology.</strong> Cell division produces geometric growth: one cell becomes 2, then 4, then 8, then 16. After <M>n</M> divisions, there are <M>2{'\u207F'}</M> cells. Bacterial colonies in ideal conditions double at regular intervals, making population modeling a direct application of geometric sequences. Pharmacokinetics -- the study of how drugs move through the body -- uses geometric decay to model drug concentration after repeated doses.
        </P>

        <P>
          <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>Bridge to calculus.</strong> The idea of an infinite series culminates in one of the most powerful tools in all of mathematics: the <strong style={{ color:'var(--text-primary)', fontWeight:500 }}>Taylor series</strong>. Any "well-behaved" function can be expressed as an infinite polynomial -- an infinite series of terms involving powers of <M>x</M>. For instance, <M>e{'\u02E3'} = 1 + x + x{'\u00B2'}/2! + x{'\u00B3'}/3! + ...</M> This transforms calculus from a theory of curves into a theory of infinite sums, and it is the foundation of numerical computation in everything from scientific calculators to weather prediction.
        </P>

        <TodoPlaceholder text="Interactive -- bouncing ball simulation with geometric series" />
      </Card>
    </div>
  );
}

        }}>
