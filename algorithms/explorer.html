   DATA STRUCTURES
   ======================================================================== */

function buildLinkedListSteps() {
  const steps = [];
  steps.push({ nodes: [], arrows: [], action: "init", highlight: null, deleteIdx: null, insertIdx: null, traverseIdx: null, desc: "Empty linked list. head = null." });
  steps.push({ nodes: [{ id: "A", val: "A" }], arrows: [], action: "append", highlight: 0, deleteIdx: null, insertIdx: null, traverseIdx: null, desc: 'Append "A". head now points to A. A.next = null.' });
  steps.push({ nodes: [{ id: "A", val: "A" }, { id: "B", val: "B" }], arrows: [[0, 1]], action: "append", highlight: 1, deleteIdx: null, insertIdx: null, traverseIdx: null, desc: 'Append "B". A.next now points to B. B.next = null.' });
  steps.push({ nodes: [{ id: "A", val: "A" }, { id: "B", val: "B" }, { id: "C", val: "C" }], arrows: [[0, 1], [1, 2]], action: "append", highlight: 2, deleteIdx: null, insertIdx: null, traverseIdx: null, desc: 'Append "C". B.next now points to C. C.next = null.' });
  steps.push({ nodes: [{ id: "A", val: "A" }, { id: "X", val: "X" }, { id: "B", val: "B" }, { id: "C", val: "C" }], arrows: [[0, 1], [1, 2], [2, 3]], action: "insert", highlight: null, deleteIdx: null, insertIdx: 1, traverseIdx: null, desc: 'Insert "X" at position 1. Rewire: A.next = X, X.next = B. No shifting needed!' });
  steps.push({ nodes: [{ id: "A", val: "A" }, { id: "X", val: "X" }, { id: "C", val: "C" }], arrows: [[0, 1], [1, 2]], action: "delete", highlight: null, deleteIdx: null, insertIdx: null, traverseIdx: null, deletedVal: "B", desc: 'Delete "B" (was at position 2). Rewire: X.next = C, bypassing B. B is freed.' });
  const traverseList = [{ id: "A", val: "A" }, { id: "X", val: "X" }, { id: "C", val: "C" }];
  const traverseArrows = [[0, 1], [1, 2]];
  steps.push({ nodes: traverseList, arrows: traverseArrows, action: "traverse", highlight: null, deleteIdx: null, insertIdx: null, traverseIdx: 0, desc: "Traverse: visiting A (index 0). Follow head pointer." });
  steps.push({ nodes: traverseList, arrows: traverseArrows, action: "traverse", highlight: null, deleteIdx: null, insertIdx: null, traverseIdx: 1, desc: "Traverse: visiting X (index 1). Follow A.next pointer." });
  steps.push({ nodes: traverseList, arrows: traverseArrows, action: "traverse", highlight: null, deleteIdx: null, insertIdx: null, traverseIdx: 2, desc: "Traverse: visiting C (index 2). Follow X.next pointer." });
  steps.push({ nodes: traverseList, arrows: traverseArrows, action: "traverse", highlight: null, deleteIdx: null, insertIdx: null, traverseIdx: 3, desc: "Traverse complete: C.next = null. Reached end of list." });
  return steps;
}

const LL_ALL_STEPS = buildLinkedListSteps();

function LinkedListTab() {
  const [step, setStep] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [speed, setSpeed] = useState(DEFAULT_SPEED);

  const maxStep = LL_ALL_STEPS.length - 1;
  const current = LL_ALL_STEPS[Math.min(step, maxStep)];

  useEffect(() => {
    if (!playing) return;
    if (step >= maxStep) { setPlaying(false); return; }
    const t = setTimeout(() => setStep((s) => s + 1), 3000 / speed);
    return () => clearTimeout(t);
  }, [playing, step, maxStep, speed]);

  const getExplainPhase = () => {
    const a = current.action;
    if (a === "init") return 0;
    if (a === "append") return 1;
    if (a === "insert") return 2;
    if (a === "delete") return 3;
    if (a === "traverse") return 4;
    return 0;
  };

  const nodeW = 80, nodeH = 44, gapX = 60, startX = 70, nodeY = 60, svgW = 560, svgH = 150;

  const nodeColor = (idx) => {
    if (current.insertIdx !== null && idx === current.insertIdx) return "var(--violet)";
    if (current.highlight !== null && idx === current.highlight) return "var(--amber)";
    if (current.traverseIdx !== null) {
      if (idx < current.traverseIdx) return "var(--teal)";
      if (idx === current.traverseIdx) return "var(--amber)";
      return "var(--text-faint)";
    }
    if (current.action === "delete" || current.action === "traverse") return "var(--teal)";
    if (current.highlight !== null && idx < current.highlight) return "var(--teal)";
    return "var(--text-faint)";
  };

  const nodeOpacity = (idx) => {
    if (current.traverseIdx !== null && idx > current.traverseIdx) return 0.4;
    return 0.9;
  };

  const renderSvg = () => {
    const { nodes, arrows } = current;
    if (nodes.length === 0) {
      return (
        <svg viewBox={`0 0 ${svgW} ${svgH}`} style={{ width: "100%", height: "auto" }}>
          <text x={20} y={nodeY + nodeH / 2 + 4} fill="var(--text-muted)" fontSize={11} fontFamily="var(--font-mono)" fontWeight={600}>head</text>
          <text x={80} y={nodeY + nodeH / 2 + 4} fill="var(--text-faint)" fontSize={13} fontFamily="var(--font-mono)">= null</text>
        </svg>
      );
    }
    return (
      <svg viewBox={`0 0 ${svgW} ${svgH}`} style={{ width: "100%", height: "auto" }}>
        <defs>
          <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="var(--amber)" /></marker>
          <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="var(--teal)" /></marker>
          <marker id="arrowViolet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="var(--violet)" /></marker>
          <marker id="arrowFaint" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="var(--text-faint)" /></marker>
        </defs>
        <text x={6} y={nodeY - 10} fill="var(--amber)" fontSize={10} fontFamily="var(--font-mono)" fontWeight={600}>head</text>
        <line x1={30} y1={nodeY - 4} x2={startX - 4} y2={nodeY + nodeH / 2} stroke="var(--amber)" strokeWidth={1.5} markerEnd="url(#arrowAmber)" style={{ transition: "all 0.3s" }} />
        {nodes.map((node, i) => {
          const x = startX + i * (nodeW + gapX);
          const color = nodeColor(i);
          return (
            <g key={node.id + "-" + i} style={{ transition: "all 0.4s ease" }}>
              <rect x={x} y={nodeY} width={nodeW} height={nodeH} rx={8} fill="var(--bg-elevated)" stroke={color} strokeWidth={2} opacity={nodeOpacity(i)} style={{ transition: "all 0.3s ease" }} />
              <line x1={x + nodeW * 0.6} y1={nodeY + 4} x2={x + nodeW * 0.6} y2={nodeY + nodeH - 4} stroke={color} strokeWidth={1} opacity={0.3} style={{ transition: "all 0.3s" }} />
              <text x={x + nodeW * 0.3} y={nodeY + nodeH / 2 + 5} fill={color} fontSize={16} fontFamily="var(--font-mono)" fontWeight={700} textAnchor="middle" opacity={nodeOpacity(i)} style={{ transition: "all 0.3s" }}>{node.val}</text>
              <text x={x + nodeW * 0.8} y={nodeY + nodeH / 2 + 4} fill={color} fontSize={8} fontFamily="var(--font-mono)" fontWeight={400} textAnchor="middle" opacity={0.6} style={{ transition: "all 0.3s" }}>next</text>
              <text x={x + nodeW / 2} y={nodeY + nodeH + 16} fill="var(--text-faint)" fontSize={9} fontFamily="var(--font-mono)" textAnchor="middle">[{i}]</text>
            </g>
          );
        })}
        {arrows.map(([from, to], i) => {
          const x1 = startX + from * (nodeW + gapX) + nodeW;
          const x2 = startX + to * (nodeW + gapX);
          const y = nodeY + nodeH / 2;
          const fromColor = nodeColor(from);
          const markerId = fromColor === "var(--violet)" ? "url(#arrowViolet)" : fromColor === "var(--teal)" ? "url(#arrowTeal)" : fromColor === "var(--amber)" ? "url(#arrowAmber)" : "url(#arrowFaint)";
          return (<line key={`arrow-${i}`} x1={x1 + 2} y1={y} x2={x2 - 4} y2={y} stroke={fromColor} strokeWidth={2} markerEnd={markerId} opacity={0.8} style={{ transition: "all 0.3s ease" }} />);
        })}
        {nodes.length > 0 && (
          <>
            <line x1={startX + (nodes.length - 1) * (nodeW + gapX) + nodeW + 2} y1={nodeY + nodeH / 2} x2={startX + (nodes.length - 1) * (nodeW + gapX) + nodeW + 28} y2={nodeY + nodeH / 2} stroke="var(--text-faint)" strokeWidth={1.5} strokeDasharray="4,3" style={{ transition: "all 0.3s" }} />
            <text x={startX + (nodes.length - 1) * (nodeW + gapX) + nodeW + 32} y={nodeY + nodeH / 2 + 4} fill="var(--text-faint)" fontSize={11} fontFamily="var(--font-mono)" fontStyle="italic">null</text>
          </>
        )}
      </svg>
    );
  };

  const renderMemoryLayout = () => {
    const { nodes } = current;
    if (nodes.length === 0) return (<div style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--text-faint)", fontStyle: "italic", padding: "8px 0" }}>No nodes allocated.</div>);
    return (
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
        {nodes.map((node, i) => {
          const color = nodeColor(i);
          const nextVal = i < nodes.length - 1 ? nodes[i + 1].val : "null";
          return (
            <div key={node.id + "-mem-" + i} style={{ display: "flex", alignItems: "center", gap: 0 }}>
              <div style={{ display: "flex", border: `1.5px solid ${color}`, borderRadius: 6, overflow: "hidden", opacity: nodeOpacity(i), transition: "all 0.3s ease" }}>
                <div style={{ padding: "6px 12px", background: `${color}12`, fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 600, color, borderRight: `1px solid ${color}40` }}>{node.val}</div>
                <div style={{ padding: "6px 10px", background: "var(--bg-elevated)", fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-secondary)", display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{ color: "var(--text-faint)", fontSize: 9 }}>next:</span>
                  <span style={{ color: nextVal === "null" ? "var(--text-faint)" : color, fontWeight: 500 }}>{nextVal === "null" ? "null" : `*${nextVal}`}</span>
                </div>
              </div>
              {i < nodes.length - 1 && (<span style={{ color: "var(--text-faint)", fontSize: 14, margin: "0 2px", fontFamily: "var(--font-mono)" }}>{"\u2192"}</span>)}
            </div>
          );
        })}
      </div>
    );
  };

  const viz = (
    <div>
      <h3 style={S.sectionTitle}>Singly Linked List</h3>
      <p style={S.subtitle}>A linear data structure where each node stores a value and a pointer to the next node. Unlike arrays, elements are not stored contiguously in memory.</p>
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        <span style={S.complexityBadge("var(--teal)")}>O(1) insert at head</span>
        <span style={S.complexityBadge("var(--amber)")}>O(n) access by index</span>
        <span style={S.complexityBadge("var(--rose)")}>O(n) search</span>
        <span style={S.complexityBadge("var(--violet)")}>Dynamic size</span>
      </div>
      <Controls step={step} maxStep={maxStep} playing={playing} setPlaying={setPlaying} setStep={setStep} speed={speed} setSpeed={setSpeed} />
      <div style={S.vizBox}>
        <div style={S.vizLabel}>Linked List Structure</div>
        {renderSvg()}
        <div style={{ marginTop: 8, padding: "8px 12px", background: "var(--bg)", borderRadius: 8, fontFamily: "var(--font-mono)", fontSize: 11,
          color: current.action === "insert" ? "var(--violet)" : current.action === "delete" ? "var(--rose)" : current.action === "traverse" ? "var(--teal)" : "var(--text-secondary)",
          fontWeight: current.action !== "init" ? 500 : 400 }}>{current.desc}</div>
      </div>
      <div style={S.vizBox}>
        <div style={S.vizLabel}>Memory Layout</div>
        {renderMemoryLayout()}
        {current.action === "delete" && current.deletedVal && (
          <div style={{ marginTop: 10, padding: "6px 10px", borderRadius: 6, background: "var(--rose-glow)", border: "1px solid var(--rose)", fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--rose)" }}>
            Node "{current.deletedVal}" removed from memory (garbage collected)
          </div>
        )}
        {current.action === "insert" && (
          <div style={{ marginTop: 10, padding: "6px 10px", borderRadius: 6, background: "var(--violet-dim)", border: "1px solid var(--violet)", fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--violet)" }}>
            New node allocated and linked into position {current.insertIdx}
          </div>
        )}
      </div>
    </div>
  );

  const phase = getExplainPhase();
  const explanation = (
    <div>
      <div style={{ marginBottom: 16 }}><div style={S.vizLabel}>How it works</div></div>
      <ExplainStep number={1} title="Create node" active={phase === 0 || phase === 1} desc="Allocate a new node in memory with a value field and a next pointer set to null." />
      <ExplainStep number={2} title="Link pointers" active={phase === 1} color="var(--amber)" desc="Set the previous node's next pointer to the new node. The new node becomes the tail with next = null." />
      <ExplainStep number={3} title="Insert (pointer rewiring)" active={phase === 2} color="var(--violet)" desc="To insert at position i: find node at i-1, set new.next = node[i-1].next, then node[i-1].next = new. No shifting!" />
      <ExplainStep number={4} title="Delete (bypass node)" active={phase === 3} color="var(--rose)" desc="To delete node at position i: find node at i-1, set node[i-1].next = node[i].next. The deleted node is freed." />
      <ExplainStep number={5} title="Traverse" active={phase === 4} color="var(--teal)" desc="Start at head, follow each next pointer until null. This is the only way to reach a specific node." />
      <div style={{ ...S.insight("var(--amber)"), marginTop: 16 }}>
        <p style={S.insightTitle("var(--amber)")}>O(1) insert at head</p>
        <p style={S.insightBody}>Inserting at the head of a linked list is O(1): create a node, point it to the old head, update head. Arrays require shifting every element right, making head insertion O(n). This makes linked lists ideal for stacks and queues.</p>
      </div>
      <div style={{ ...S.insight("var(--rose)"), marginTop: 10 }}>
        <p style={S.insightTitle("var(--rose)")}>No random access</p>
        <p style={S.insightBody}>To access element i, you must traverse from head through i nodes. Arrays give O(1) access via pointer arithmetic (base + i * size). This tradeoff is fundamental: linked lists trade fast random access for fast insertion and deletion anywhere.</p>
      </div>
    </div>
  );

  return <AlgoLayout viz={viz} explanation={explanation} />;
}

function StackTab() {
  const [step, setStep] = useState(0);
  const steps = [
    { stack: [], top: -1, action: "init", actionLabel: null, highlight: -1, highlightType: null, desc: "Empty stack. No elements yet." },
    { stack: ["A"], top: 0, action: "push", actionLabel: 'push("A")', highlight: 0, highlightType: "push", desc: 'Push "A" onto the empty stack. A is now the top element.' },
    { stack: ["A", "B"], top: 1, action: "push", actionLabel: 'push("B")', highlight: 1, highlightType: "push", desc: 'Push "B". It goes on top of A. B is now the top element.' },
    { stack: ["A", "B", "C"], top: 2, action: "push", actionLabel: 'push("C")', highlight: 2, highlightType: "push", desc: 'Push "C". Stack grows upward. C is now the top.' },
    { stack: ["A", "B", "C", "D"], top: 3, action: "push", actionLabel: 'push("D")', highlight: 3, highlightType: "push", desc: 'Push "D". Stack is now [A, B, C, D] with D on top.' },
    { stack: ["A", "B", "C", "D"], top: 3, action: "peek", actionLabel: "peek() \u2192 D", highlight: 3, highlightType: "peek", desc: 'Peek returns "D" (the top element) without removing it. Stack unchanged.' },
    { stack: ["A", "B", "C"], top: 2, action: "pop", actionLabel: "pop() \u2192 D", highlight: -1, highlightType: "pop", popValue: "D", desc: 'Pop removes and returns "D". C is now the new top.' },
    { stack: ["A", "B"], top: 1, action: "pop", actionLabel: "pop() \u2192 C", highlight: -1, highlightType: "pop", popValue: "C", desc: 'Pop removes and returns "C". B is now the new top.' },
    { stack: ["A", "B", "E"], top: 2, action: "push", actionLabel: 'push("E")', highlight: 2, highlightType: "push", desc: 'Push "E". Stack is now [A, B, E] with E on top.' },
    { stack: ["A", "B", "E"], top: 2, action: "done", actionLabel: "complete", highlight: -1, highlightType: null, desc: "Final state: [A, B, E]. Stack supports O(1) push, pop, and peek." },
  ];

  const current = steps[Math.min(step, steps.length - 1)];
  const [playing, setPlaying] = useState(false);
  const [speed, setSpeed] = useState(DEFAULT_SPEED);
  useEffect(() => {
    if (!playing) return;
    if (step >= steps.length - 1) { setPlaying(false); return; }
    const t = setTimeout(() => setStep((s) => s + 1), 2400 / speed);
    return () => clearTimeout(t);
  }, [playing, step]);

  const getPhase = () => {
    if (current.action === "init") return 0;
    if (current.action === "push") return 1;
    if (current.action === "peek") return 2;
    if (current.action === "pop") return 3;
    if (current.action === "done") return 4;
    return 0;
  };

  const poppingValue = current.highlightType === "pop" ? current.popValue : null;
  const BOX_W = 80, BOX_H = 44, GAP = 6, MAX_ITEMS = 5;
  const SVG_W = 200, SVG_H = (BOX_H + GAP) * MAX_ITEMS + 80;

  const viz = (
    <div>
      <h3 style={S.sectionTitle}>Stack (LIFO)</h3>
      <p style={S.subtitle}>A <strong style={{ color: "var(--amber)" }}>Last-In, First-Out</strong> data structure. The most recently added element is always the first to be removed. Think of a stack of plates: you add and remove from the top.</p>
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        <span style={S.complexityBadge("var(--teal)")}>O(1) push</span>
        <span style={S.complexityBadge("var(--teal)")}>O(1) pop</span>
        <span style={S.complexityBadge("var(--teal)")}>O(1) peek</span>
        <span style={S.complexityBadge("var(--amber)")}>O(n) space</span>
      </div>
      <Controls step={step} maxStep={steps.length - 1} playing={playing} setPlaying={setPlaying} setStep={setStep} speed={speed} setSpeed={setSpeed} />
      <div style={S.vizBox}>
        <div style={S.vizLabel}>Stack Visualization</div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 32, justifyContent: "center" }}>
          <svg viewBox={`0 0 ${SVG_W} ${SVG_H}`} style={{ width: 200, height: "auto" }}>
            <rect x={SVG_W / 2 - BOX_W / 2 - 10} y={SVG_H - 20} width={BOX_W + 20} height={4} rx={2} fill="var(--text-faint)" opacity={0.4} />
            <text x={SVG_W / 2} y={SVG_H - 6} fill="var(--text-faint)" fontSize={9} fontFamily="var(--font-mono)" textAnchor="middle">BOTTOM</text>
            {current.stack.map((val, i) => {
              const yBase = SVG_H - 24;
              const y = yBase - (i + 1) * (BOX_H + GAP);
              const isTop = i === current.top;
              const isHighlightPush = current.highlightType === "push" && i === current.highlight;
              const isHighlightPeek = current.highlightType === "peek" && i === current.highlight;
              let fill = "var(--teal-glow)", stroke = "var(--teal-dim)", textColor = "var(--teal)";
              if (isHighlightPush) { fill = "var(--violet-dim)"; stroke = "var(--violet)"; textColor = "var(--violet)"; }
              else if (isHighlightPeek) { fill = "var(--amber-glow)"; stroke = "var(--amber)"; textColor = "var(--amber)"; }
              else if (isTop) { fill = "var(--amber-glow)"; stroke = "var(--amber)"; textColor = "var(--amber)"; }
              return (
                <g key={`item-${i}`} style={{ transition: "all 0.4s cubic-bezier(0.4, 0, 0.2, 1)" }}>
                  {isHighlightPush && (<rect x={SVG_W / 2 - BOX_W / 2 - 4} y={y - 4} width={BOX_W + 8} height={BOX_H + 8} rx={12} fill={stroke} opacity={0.15} style={{ transition: "all 0.4s" }} />)}
                  <rect x={SVG_W / 2 - BOX_W / 2} y={y} width={BOX_W} height={BOX_H} rx={8} fill={fill} stroke={stroke} strokeWidth={isTop || isHighlightPush || isHighlightPeek ? 2 : 1} style={{ transition: "all 0.4s cubic-bezier(0.4, 0, 0.2, 1)" }} />
                  <text x={SVG_W / 2} y={y + BOX_H / 2 + 5} fill={textColor} fontSize={16} fontFamily="var(--font-mono)" fontWeight={600} textAnchor="middle" style={{ transition: "all 0.4s" }}>{val}</text>
                  <text x={SVG_W / 2 - BOX_W / 2 - 14} y={y + BOX_H / 2 + 4} fill="var(--text-faint)" fontSize={9} fontFamily="var(--font-mono)" textAnchor="end">[{i}]</text>
                </g>
              );
            })}
            {current.top >= 0 && (() => {
              const yBase = SVG_H - 24;
              const topY = yBase - (current.top + 1) * (BOX_H + GAP) + BOX_H / 2;
              return (
                <g style={{ transition: "all 0.4s cubic-bezier(0.4, 0, 0.2, 1)" }}>
                  <line x1={SVG_W / 2 + BOX_W / 2 + 10} y1={topY} x2={SVG_W / 2 + BOX_W / 2 + 30} y2={topY} stroke="var(--amber)" strokeWidth={2} style={{ transition: "all 0.4s" }} />
                  <polygon points={`${SVG_W / 2 + BOX_W / 2 + 10},${topY - 4} ${SVG_W / 2 + BOX_W / 2 + 10},${topY + 4} ${SVG_W / 2 + BOX_W / 2 + 4},${topY}`} fill="var(--amber)" style={{ transition: "all 0.4s" }} />
                  <text x={SVG_W / 2 + BOX_W / 2 + 34} y={topY + 4} fill="var(--amber)" fontSize={11} fontFamily="var(--font-mono)" fontWeight={600}>TOP</text>
                </g>
              );
            })()}
            {poppingValue && (() => {
              const yBase = SVG_H - 24;
              const popY = yBase - (current.stack.length + 1) * (BOX_H + GAP);
              return (
                <g opacity={0.5}>
                  <rect x={SVG_W / 2 - BOX_W / 2} y={popY} width={BOX_W} height={BOX_H} rx={8} fill="var(--rose-glow)" stroke="var(--rose)" strokeWidth={2} strokeDasharray="4 3" />
                  <text x={SVG_W / 2} y={popY + BOX_H / 2 + 5} fill="var(--rose)" fontSize={16} fontFamily="var(--font-mono)" fontWeight={600} textAnchor="middle">{poppingValue}</text>
                  <text x={SVG_W / 2} y={popY - 8} fill="var(--rose)" fontSize={14} textAnchor="middle" fontFamily="var(--font-mono)">{"\u2191"} removed</text>
                </g>
              );
            })()}
            {current.stack.length === 0 && (<text x={SVG_W / 2} y={SVG_H / 2} fill="var(--text-faint)" fontSize={12} fontFamily="var(--font-mono)" textAnchor="middle" fontStyle="italic">empty stack</text>)}
          </svg>
        </div>
        <div style={{ marginTop: 14, padding: "10px 14px", background: "var(--bg)", borderRadius: 8, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <span style={{ fontSize: 10, color: "var(--text-muted)", fontFamily: "var(--font-mono)", textTransform: "uppercase", letterSpacing: 1 }}>Last operation</span>
          <span style={{ padding: "3px 10px", background: current.action === "pop" ? "var(--rose-glow)" : current.action === "push" ? "var(--violet-dim)" : current.action === "peek" ? "var(--amber-glow)" : "var(--bg-elevated)",
            border: `1px solid ${current.action === "pop" ? "var(--rose)" : current.action === "push" ? "var(--violet)" : current.action === "peek" ? "var(--amber)" : "var(--border)"}`,
            borderRadius: 6, fontSize: 12, fontFamily: "var(--font-mono)",
            color: current.action === "pop" ? "var(--rose)" : current.action === "push" ? "var(--violet)" : current.action === "peek" ? "var(--amber)" : "var(--text-muted)", fontWeight: 600 }}>
            {current.actionLabel || "\u2014"}
          </span>
        </div>
        <div style={{ marginTop: 8, padding: "8px 12px", background: "var(--bg)", borderRadius: 8, fontFamily: "var(--font-mono)", fontSize: 11,
          color: current.action === "pop" ? "var(--rose)" : current.action === "push" ? "var(--violet)" : current.action === "peek" ? "var(--amber)" : current.action === "done" ? "var(--teal)" : "var(--text-secondary)",
          fontWeight: current.action !== "init" ? 500 : 400 }}>{current.desc}</div>
      </div>
      <div style={S.vizBox}>
        <div style={S.vizLabel}>Array Representation</div>
        <div style={{ display: "flex", gap: 4, alignItems: "center", flexWrap: "wrap" }}>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--text-faint)" }}>[</span>
          {current.stack.length === 0 ? (<span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-faint)", fontStyle: "italic" }}>empty</span>) : (
            current.stack.map((val, i) => {
              const isTop = i === current.top;
              const isHighlightPush = current.highlightType === "push" && i === current.highlight;
              let bg = "var(--bg-elevated)", border = "var(--border)", color = "var(--text-secondary)";
              if (isHighlightPush) { bg = "var(--violet-dim)"; border = "var(--violet)"; color = "var(--violet)"; }
              else if (isTop) { bg = "var(--amber-glow)"; border = "var(--amber)"; color = "var(--amber)"; }
              else { bg = "var(--teal-glow)"; border = "var(--teal-dim)"; color = "var(--teal)"; }
              return (
                <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 2 }}>
                  <span style={{ padding: "4px 10px", background: bg, border: `1px solid ${border}`, borderRadius: 6, fontFamily: "var(--font-mono)", fontSize: 12, color, fontWeight: isTop || isHighlightPush ? 600 : 400, transition: "all 0.3s" }}>{val}</span>
                  {i < current.stack.length - 1 && (<span style={{ color: "var(--text-faint)", fontSize: 10 }}>,</span>)}
                </span>
              );
            })
          )}
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--text-faint)" }}>]</span>
          {current.top >= 0 && (<span style={{ fontSize: 9, color: "var(--amber)", fontFamily: "var(--font-mono)", marginLeft: 4 }}>{"\u2190"} top = {current.top}</span>)}
        </div>
      </div>
    </div>
  );

  const explanation = (
    <div>
      <div style={{ marginBottom: 16 }}><div style={S.vizLabel}>How it works</div></div>
      <ExplainStep number={1} title="Initialize" active={getPhase() === 0} desc="Create an empty stack. The top pointer starts at -1, indicating no elements." />
      <ExplainStep number={2} title="Push (add to top)" active={getPhase() === 1} color="var(--violet)" desc="Place the new element on top of the stack. Increment the top pointer. O(1) operation." />
      <ExplainStep number={3} title="Peek (read top)" active={getPhase() === 2} color="var(--amber)" desc="Return the top element without removing it. The stack remains unchanged. O(1) operation." />
      <ExplainStep number={4} title="Pop (remove from top)" active={getPhase() === 3} color="var(--rose)" desc="Remove and return the top element. Decrement the top pointer. O(1) operation." />
      <ExplainStep number={5} title="Complete" active={getPhase() === 4} color="var(--teal)" desc="All operations demonstrated. The stack supports push, pop, and peek in constant time." />
      <div style={{ ...S.insight("var(--amber)"), marginTop: 16 }}>
        <p style={S.insightTitle("var(--amber)")}>LIFO Principle</p>
        <p style={S.insightBody}>Last-In, First-Out: the most recently added element is always removed first. Unlike a queue (FIFO), a stack only allows access to the top element. You cannot reach elements below without popping everything above them.</p>
      </div>
      <div style={{ ...S.insight("var(--teal)"), marginTop: 10 }}>
        <p style={S.insightTitle("var(--teal)")}>Real-world stacks</p>
        <p style={S.insightBody}>Call stacks track function execution in every programming language. Undo history in editors reverses the most recent action first. Browser back button navigates a stack of visited pages. Expression evaluation uses stacks to handle operator precedence and parentheses.</p>
      </div>
    </div>
  );

  return <AlgoLayout viz={viz} explanation={explanation} />;
}

    { items: ["C", "D", "E"], ghost: null, action: "enqueue", value: "E", adding: "E", desc: 'Enqueue "E" — enters at the back.' },

              if (isAdding) color = "var(--violet)";
              else if (isFront) color = "var(--amber)";
              return (
                <span key={`${item}-${i}`} style={{ display: "inline-flex", alignItems: "center", gap: 4 }}>
                  <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "4px 10px", borderRadius: 6, background: `${color}12`, border: `1px solid ${color}30`, fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 600, color }}>
                    {item}
                    {isFront && <span style={{ fontSize: 8, opacity: 0.7, fontWeight: 400 }}>front</span>}
                    {isBack && !isFront && <span style={{ fontSize: 8, opacity: 0.7, fontWeight: 400 }}>back</span>}
                  </span>
                  {i < current.items.length - 1 && (<span style={{ color: "var(--text-faint)", fontSize: 11 }}>→</span>)}
                </span>
              );
            })
          )}
        </div>
        <div style={{ marginTop: 8, fontSize: 11, fontFamily: "var(--font-mono)", color: "var(--text-muted)" }}>size: {current.items.length}</div>
      </div>
    </div>
  );

  const explanation = (
    <div>
      <div style={{ marginBottom: 16 }}><div style={S.vizLabel}>How it works</div></div>
      <ExplainStep number={1} title="Initialize" active={getPhase() === 0} desc="Create an empty queue. No elements yet — front and back are undefined." />
      <ExplainStep number={2} title="Enqueue (add to back)" active={getPhase() === 1} color="var(--violet)" desc={`Add "${current.value || "..."}" to the back of the queue. The back pointer advances. O(1) operation.`} />
      <ExplainStep number={3} title="Peek (read front)" active={getPhase() === 2} color="var(--amber)" desc="Return the front element without removing it. The queue remains unchanged. O(1)." />
      <ExplainStep number={4} title="Dequeue (remove front)" active={getPhase() === 3} color="var(--rose)" desc={`Remove "${current.value || "..."}" from the front. The next element becomes the new front. O(1).`} />
      <ExplainStep number={5} title="Complete" active={getPhase() === 4} color="var(--teal)" desc="The queue has been built and manipulated. Elements always exit in the order they entered." />
      <div style={{ ...S.insight("var(--amber)"), marginTop: 16 }}>
        <p style={S.insightTitle("var(--amber)")}>FIFO Principle</p>
        <p style={S.insightBody}>First-In, First-Out. The element that has been waiting the longest is served first. Unlike a stack (LIFO), a queue preserves the original insertion order for removal.</p>
      </div>
      <div style={{ ...S.insight("var(--teal)"), marginTop: 10 }}>
        <p style={S.insightTitle("var(--teal)")}>Where queues appear</p>
        <p style={S.insightBody}>BFS traversal uses a queue to explore nodes level by level. Task schedulers, print queues, message brokers (Kafka, RabbitMQ), and buffered I/O all rely on FIFO semantics.</p>
      </div>
    </div>
  );

  return <AlgoLayout viz={viz} explanation={explanation} />;
}

/* ── Binary Search Tree ── */

const BST_POSITIONS = {
  50: { x: 240, y: 45 }, 30: { x: 140, y: 120 }, 70: { x: 340, y: 120 },
  20: { x: 80, y: 200 }, 40: { x: 200, y: 200 }, 60: { x: 280, y: 200 }, 80: { x: 400, y: 200 },
};
const BST_EDGES_MAP = { 30: 50, 70: 50, 20: 30, 40: 30, 60: 70, 80: 70 };

function buildBSTSteps() {
  const steps = [];
  const makeNodes = (ins) => ins.map((v) => ({ value: v, x: BST_POSITIONS[v].x, y: BST_POSITIONS[v].y, visible: true }));
  const makeEdges = (ins) => ins.filter((v) => BST_EDGES_MAP[v] !== undefined && ins.includes(BST_EDGES_MAP[v])).map((v) => ({ from: BST_EDGES_MAP[v], to: v, visible: true }));

  steps.push({ nodes: [], edges: [], highlight: [], highlightEdges: [], comparisons: [], desc: "Empty tree. We will insert values one by one to build a BST.", action: "init" });
  steps.push({ nodes: makeNodes([50]), edges: [], highlight: [50], highlightEdges: [], comparisons: [], desc: "Insert 50 \u2192 tree is empty, so 50 becomes the root.", action: "insert" });
  steps.push({ nodes: makeNodes([50, 30]), edges: makeEdges([50, 30]), highlight: [50, 30], highlightEdges: [{ from: 50, to: 30 }], comparisons: [{ from: 50, to: 30, label: "<" }], desc: "Insert 30 \u2192 30 < 50, go left. Place as left child of 50.", action: "insert" });
  steps.push({ nodes: makeNodes([50, 30, 70]), edges: makeEdges([50, 30, 70]), highlight: [50, 70], highlightEdges: [{ from: 50, to: 70 }], comparisons: [{ from: 50, to: 70, label: ">" }], desc: "Insert 70 \u2192 70 > 50, go right. Place as right child of 50.", action: "insert" });
  steps.push({ nodes: makeNodes([50, 30, 70, 20]), edges: makeEdges([50, 30, 70, 20]), highlight: [50, 30, 20], highlightEdges: [{ from: 50, to: 30 }, { from: 30, to: 20 }], comparisons: [{ from: 50, to: 30, label: "<" }, { from: 30, to: 20, label: "<" }], desc: "Insert 20 \u2192 20 < 50, go left. 20 < 30, go left. Place as left child of 30.", action: "insert" });
  steps.push({ nodes: makeNodes([50, 30, 70, 20, 40]), edges: makeEdges([50, 30, 70, 20, 40]), highlight: [50, 30, 40], highlightEdges: [{ from: 50, to: 30 }, { from: 30, to: 40 }], comparisons: [{ from: 50, to: 30, label: "<" }, { from: 30, to: 40, label: ">" }], desc: "Insert 40 \u2192 40 < 50, go left. 40 > 30, go right. Place as right child of 30.", action: "insert" });
  steps.push({ nodes: makeNodes([50, 30, 70, 20, 40, 60]), edges: makeEdges([50, 30, 70, 20, 40, 60]), highlight: [50, 70, 60], highlightEdges: [{ from: 50, to: 70 }, { from: 70, to: 60 }], comparisons: [{ from: 50, to: 70, label: ">" }, { from: 70, to: 60, label: "<" }], desc: "Insert 60 \u2192 60 > 50, go right. 60 < 70, go left. Place as left child of 70.", action: "insert" });
  steps.push({ nodes: makeNodes([50, 30, 70, 20, 40, 60, 80]), edges: makeEdges([50, 30, 70, 20, 40, 60, 80]), highlight: [50, 70, 80], highlightEdges: [{ from: 50, to: 70 }, { from: 70, to: 80 }], comparisons: [{ from: 50, to: 70, label: ">" }, { from: 70, to: 80, label: ">" }], desc: "Insert 80 \u2192 80 > 50, go right. 80 > 70, go right. Place as right child of 70.", action: "insert" });
  const allN = makeNodes([50, 30, 70, 20, 40, 60, 80]), allE = makeEdges([50, 30, 70, 20, 40, 60, 80]);
  steps.push({ nodes: allN, edges: allE, highlight: [50, 30, 40], highlightEdges: [{ from: 50, to: 30 }, { from: 30, to: 40 }], comparisons: [{ from: 50, to: 30, label: "<" }, { from: 30, to: 40, label: ">" }], found: 40, desc: "Search 40 \u2192 40 < 50, go left. 40 > 30, go right. 40 = 40 \u2014 found!", action: "search_found" });
  steps.push({ nodes: allN, edges: allE, highlight: [50, 70, 60], highlightEdges: [{ from: 50, to: 70 }, { from: 70, to: 60 }], comparisons: [{ from: 50, to: 70, label: ">" }, { from: 70, to: 60, label: "<" }], missAt: 60, desc: "Search 55 \u2192 55 > 50, go right. 55 < 70, go left. 55 < 60, go left \u2014 null, not found!", action: "search_miss" });
  return steps;
}

const BST_ALL_STEPS = buildBSTSteps();

function BinarySearchTreeTab() {
  const [step, setStep] = useState(0);

    return null;
  };
  const edgeColor = (from, to) => { const m = current.highlightEdges.find((e) => e.from === from && e.to === to); if (!m) return null; if (current.action === "insert") return "var(--amber)"; if (current.action === "search_found") return "var(--teal)"; if (current.action === "search_miss") return "var(--rose)"; return null; };
  const comparisonLabel = (from, to) => { const m = current.comparisons.find((c) => c.from === from && c.to === to); return m ? m.label : null; };
  const NODE_R = 22;

  const viz = (
    <div>

      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        <span style={S.complexityBadge("var(--teal)")}>O(log n) avg</span>
        <span style={S.complexityBadge("var(--rose)")}>O(n) worst</span>
        <span style={S.complexityBadge("var(--amber)")}>O(n) space</span>
      </div>
      <Controls step={step} maxStep={BST_ALL_STEPS.length - 1} playing={playing} setPlaying={setPlaying} setStep={setStep} speed={speed} setSpeed={setSpeed}
        extra={current.action === "search_found" ? (<span style={{ fontSize: 11, fontFamily: "var(--font-mono)", color: "var(--text-muted)" }}>search = <span style={{ color: "var(--teal)" }}>40</span></span>) : current.action === "search_miss" ? (<span style={{ fontSize: 11, fontFamily: "var(--font-mono)", color: "var(--text-muted)" }}>search = <span style={{ color: "var(--rose)" }}>55</span></span>) : null} />
      <div style={S.vizBox}>
        <div style={S.vizLabel}>Tree Structure</div>
        <svg viewBox="0 0 480 260" style={{ width: "100%", height: "auto" }}>
          {[0, 1, 2].map((lvl) => { const yP = [45, 120, 200]; return (<g key={`lvl${lvl}`}><line x1={10} y1={yP[lvl]} x2={470} y2={yP[lvl]} stroke="var(--border-subtle)" strokeWidth={0.5} strokeDasharray="4,8" /><text x={470} y={yP[lvl] - 6} fill="var(--text-faint)" fontSize={8} fontFamily="var(--font-mono)" textAnchor="end" opacity={0.5}>depth {lvl}</text></g>); })}
          {current.edges.map((edge, i) => {
            const fp = BST_POSITIONS[edge.from], tp = BST_POSITIONS[edge.to];
            const color = edgeColor(edge.from, edge.to);

          })}
          {current.nodes.map((node, i) => {
            const color = nodeColor(node.value);
            const isFound = current.action === "search_found" && current.found === node.value;
            const isMissNode = current.action === "search_miss" && current.missAt === node.value;
            const isHL = color !== null;
            let fill = "var(--bg-elevated)", stroke = "var(--border)", textColor = "var(--text-secondary)", r = NODE_R;
            if (isFound) { fill = "var(--teal-glow)"; stroke = "var(--teal)"; textColor = "var(--teal)"; r = NODE_R + 3; }
            else if (isMissNode) { fill = "var(--rose-glow)"; stroke = "var(--rose)"; textColor = "var(--rose)"; }
            else if (isHL) { fill = `${color}18`; stroke = color; textColor = color; }
            return (<g key={`n${i}`}>{(isFound || (isHL && current.highlight[current.highlight.length - 1] === node.value)) && (<circle cx={node.x} cy={node.y} r={r + 8} fill={`${color || "var(--amber)"}10`} style={{ transition: "all 0.4s ease" }} />)}<circle cx={node.x} cy={node.y} r={r} fill={fill} stroke={stroke} strokeWidth={isHL ? 2.5 : 1.5} style={{ transition: "all 0.4s cubic-bezier(0.4, 0, 0.2, 1)" }} /><text x={node.x} y={node.y + 5} fill={textColor} fontSize={14} fontFamily="var(--font-mono)" fontWeight={isHL ? 700 : 500} textAnchor="middle" style={{ transition: "all 0.4s" }}>{node.value}</text>{isFound && (<text x={node.x} y={node.y + r + 16} fill="var(--teal)" fontSize={10} fontFamily="var(--font-mono)" fontWeight={600} textAnchor="middle">FOUND</text>)}{isMissNode && (<text x={node.x} y={node.y + r + 16} fill="var(--rose)" fontSize={10} fontFamily="var(--font-mono)" fontWeight={600} textAnchor="middle">null left</text>)}</g>);
          })}

          color: current.action === "search_found" ? "var(--teal)" : current.action === "search_miss" ? "var(--rose)" : current.action === "insert" ? "var(--amber)" : "var(--text-secondary)",
          fontWeight: current.action !== "init" ? 500 : 400 }}>{current.desc}</div>
      </div>
      <div style={{ display: "flex", gap: 16, marginBottom: 18, flexWrap: "wrap" }}>

      </div>

      <ExplainStep number={1} title="Insert at root" active={getPhase() === 0 || (getPhase() === 1 && current.highlight.length === 1)} desc="If the tree is empty, the new value becomes the root node." />
      <ExplainStep number={2} title="Compare & traverse" active={getPhase() === 1 && current.highlight.length > 1} color="var(--amber)" desc="Compare the value with the current node. Go left if smaller, right if larger. Repeat until reaching an empty spot." />
      <ExplainStep number={3} title="Search (success)" active={getPhase() === 2} color="var(--teal)" desc="Follow the same compare-and-traverse logic. When we find a matching node, the search succeeds." />
      <ExplainStep number={4} title="Search (miss)" active={getPhase() === 3} color="var(--rose)" desc="If we reach a null child before finding the value, it does not exist in the tree." />
      <div style={{ ...S.insight("var(--amber)"), marginTop: 16 }}>
        <p style={S.insightTitle("var(--amber)")}>BST property</p>
        <p style={S.insightBody}>For every node: all values in the left subtree are smaller, and all values in the right subtree are larger. This invariant is what makes O(log n) search possible.</p>
      </div>
      <div style={{ ...S.insight("var(--violet)"), marginTop: 10 }}>
        <p style={S.insightTitle("var(--violet)")}>Balance matters</p>
        <p style={S.insightBody}>If values are inserted in sorted order, the tree degenerates into a linked list with O(n) operations. Self-balancing trees (AVL, Red-Black) maintain O(log n) by rebalancing after each insertion.</p>
      </div>
    </div>
  );

  return <AlgoLayout viz={viz} explanation={explanation} />;
}

/* ── Heap ── */

const HEAP_TREE_POS = [
  { x: 240, y: 45 }, { x: 140, y: 120 }, { x: 340, y: 120 },
  { x: 80, y: 200 }, { x: 200, y: 200 }, { x: 280, y: 200 }, { x: 400, y: 200 },
];

function getHeapEdges(heapSize) {
  const edges = [];
  for (let i = 1; i < heapSize; i++) edges.push([Math.floor((i - 1) / 2), i]);
  return edges;
}

const HEAP_STEPS = [
  { heap: [], highlight: [], swapping: null, action: "init", desc: "Empty min-heap. We will insert values and watch the heap property maintained." },
  { heap: [40], highlight: [0], swapping: null, action: "insert", desc: "Insert 40. It becomes the root (only element)." },
  { heap: [40, 20], highlight: [1], swapping: null, action: "insert", desc: "Insert 20 at next position (index 1). Parent is 40 at index 0." },
  { heap: [20, 40], highlight: [0, 1], swapping: [0, 1], action: "bubble_up", desc: "20 < 40 — swap! 20 bubbles up to root. Heap property restored." },
  { heap: [20, 40, 50], highlight: [2], swapping: null, action: "insert", desc: "Insert 50 at index 2. Parent is 20. 50 > 20, no swap needed." },
  { heap: [20, 40, 50, 10], highlight: [3], swapping: null, action: "insert", desc: "Insert 10 at index 3. Parent is 40 at index 1. 10 < 40, must bubble up." },
  { heap: [20, 10, 50, 40], highlight: [1, 3], swapping: [1, 3], action: "bubble_up", desc: "Swap 10 and 40. Now check parent: 10 at index 1, parent 20 at index 0." },
  { heap: [10, 20, 50, 40], highlight: [0, 1], swapping: [0, 1], action: "bubble_up", desc: "10 < 20 — swap again! 10 reaches the root. Heap property restored." },
  { heap: [10, 20, 50, 40, 30], highlight: [4], swapping: null, action: "insert", desc: "Insert 30 at index 4. Parent is 20 at index 1. 30 > 20, no swap needed." },
  { heap: [10, 20, 50, 40, 30], highlight: [0], swapping: null, action: "extract", desc: "Extract-min: remove root (10). Replace root with last element (30)." },
  { heap: [30, 20, 50, 40], highlight: [0, 1, 2], swapping: null, action: "sift_down", desc: "30 is now root. Compare with children: 20 (left), 50 (right). Smallest child is 20." },
  { heap: [20, 30, 50, 40], highlight: [0, 1], swapping: [0, 1], action: "sift_down", desc: "30 > 20 — swap! 20 moves to root, 30 sifts down to index 1. Children of 30: only 40." },
  { heap: [20, 30, 50, 40], highlight: [1, 3], swapping: null, action: "done", desc: "30 < 40, no swap needed. Heap property fully restored after extract-min." },
  { heap: [20, 30, 50, 40], highlight: [0], swapping: null, action: "extract", desc: "Extract-min again: remove root (20). Replace root with last element (40)." },
  { heap: [40, 30, 50], highlight: [0, 1, 2], swapping: null, action: "sift_down", desc: "40 is now root. Compare with children: 30 (left), 50 (right). Smallest child is 30." },
  { heap: [30, 40, 50], highlight: [0, 1], swapping: [0, 1], action: "sift_down", desc: "40 > 30 — swap! Final heap: [30, 40, 50]. Min-heap property holds." },
  { heap: [30, 40, 50], highlight: [], swapping: null, action: "done", desc: "Complete! Each parent is smaller than its children. The min is always at the root." },
];

function HeapTab() {
  const [step, setStep] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [speed, setSpeed] = useState(DEFAULT_SPEED);
  const current = HEAP_STEPS[Math.min(step, HEAP_STEPS.length - 1)];

  useEffect(() => {
    if (!playing) return;
    if (step >= HEAP_STEPS.length - 1) { setPlaying(false); return; }
    const t = setTimeout(() => setStep((s) => s + 1), 2700 / speed);
    return () => clearTimeout(t);
  }, [playing, step, speed]);

  const getPhase = () => { const a = current.action; if (a === "init") return 0; if (a === "insert" || a === "bubble_up") return 1; if (a === "extract" || a === "sift_down") return 2; if (a === "done") return 3; return 0; };

  function nodeStyle(index) {
    const isHL = current.highlight.includes(index), isSw = current.swapping && current.swapping.includes(index), isEx = current.action === "extract" && index === 0;
    let fill = "var(--bg-elevated)", stroke = "var(--border)", textColor = "var(--text-muted)", r = 22, glow = false;
    if (isSw) { fill = "var(--amber-glow)"; stroke = "var(--amber)"; textColor = "var(--amber)"; r = 25; glow = true; }
    else if (isEx) { fill = "var(--rose-glow)"; stroke = "var(--rose)"; textColor = "var(--rose)"; r = 25; glow = true; }
    else if (current.action === "insert" && isHL) { fill = "var(--violet-dim)"; stroke = "var(--violet)"; textColor = "var(--violet)"; r = 25; glow = true; }
    else if (isHL) { fill = "var(--teal-glow)"; stroke = "var(--teal)"; textColor = "var(--teal)"; }
    else if (current.action === "done" && current.highlight.length === 0) { fill = "var(--teal-glow)"; stroke = "var(--teal-dim)"; textColor = "var(--teal)"; }
    return { fill, stroke, textColor, r, glow };
  }

  function arrayCellStyle(index) {
    const isHL = current.highlight.includes(index), isSw = current.swapping && current.swapping.includes(index), isEx = current.action === "extract" && index === 0;
    if (isSw) return { bg: "var(--amber-glow)", border: "var(--amber)", color: "var(--amber)", fontWeight: 700 };
    if (isEx) return { bg: "var(--rose-glow)", border: "var(--rose)", color: "var(--rose)", fontWeight: 700 };
    if (current.action === "insert" && isHL) return { bg: "var(--violet-dim)", border: "var(--violet)", color: "var(--violet)", fontWeight: 700 };
    if (isHL) return { bg: "var(--teal-glow)", border: "var(--teal)", color: "var(--teal)", fontWeight: 600 };
    if (current.action === "done" && current.highlight.length === 0) return { bg: "var(--teal-glow)", border: "var(--teal-dim)", color: "var(--teal)", fontWeight: 500 };
    return { bg: "var(--bg-elevated)", border: "var(--border)", color: "var(--text-secondary)", fontWeight: 400 };
  }

  const edges = getHeapEdges(current.heap.length);

  const viz = (
    <div>
      <h3 style={S.sectionTitle}>Min-Heap / Priority Queue</h3>
      <p style={S.subtitle}>A <strong style={{ color: "var(--amber)" }}>min-heap</strong> keeps the smallest element at the root. Insert bubbles up, extract-min sifts down. Both are <strong style={{ color: "var(--teal)" }}>O(log n)</strong>.</p>
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        <span style={S.complexityBadge("var(--teal)")}>O(log n) insert</span>
        <span style={S.complexityBadge("var(--amber)")}>O(log n) extract</span>
        <span style={S.complexityBadge("var(--violet)")}>O(1) find-min</span>
      </div>
      <Controls step={step} maxStep={HEAP_STEPS.length - 1} playing={playing} setPlaying={setPlaying} setStep={setStep} speed={speed} setSpeed={setSpeed}
        extra={<span style={{ fontSize: 11, fontFamily: "var(--font-mono)", color: "var(--text-muted)" }}>
          {current.action === "insert" && <span style={{ color: "var(--violet)" }}>INSERT</span>}
          {current.action === "bubble_up" && <span style={{ color: "var(--amber)" }}>BUBBLE UP</span>}
          {current.action === "extract" && <span style={{ color: "var(--rose)" }}>EXTRACT</span>}
          {current.action === "sift_down" && <span style={{ color: "var(--amber)" }}>SIFT DOWN</span>}
          {current.action === "done" && <span style={{ color: "var(--teal)" }}>DONE</span>}
        </span>} />
      <div style={S.vizBox}>
        <div style={S.vizLabel}>Tree View</div>
        <svg viewBox="0 0 480 240" style={{ width: "100%", height: "auto" }}>
          {edges.map(([from, to], i) => {
            const p1 = HEAP_TREE_POS[from], p2 = HEAP_TREE_POS[to];
            const bothHL = current.highlight.includes(from) && current.highlight.includes(to);
            const isSwE = current.swapping && ((current.swapping[0] === from && current.swapping[1] === to) || (current.swapping[0] === to && current.swapping[1] === from));
            return (<line key={`edge-${i}`} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke={isSwE ? "var(--amber)" : bothHL ? "var(--teal-dim)" : "var(--border)"} strokeWidth={isSwE ? 2.5 : 1.5} strokeDasharray={isSwE ? "6,3" : "none"} style={{ transition: "all 0.4s" }} />);
          })}
          {current.heap.map((value, i) => {
            const pos = HEAP_TREE_POS[i], ns = nodeStyle(i);
            return (<g key={`node-${i}`}>{ns.glow && (<circle cx={pos.x} cy={pos.y} r={ns.r + 6} fill={ns.fill} opacity={0.4} style={{ transition: "all 0.4s" }} />)}<circle cx={pos.x} cy={pos.y} r={ns.r} fill={ns.fill} stroke={ns.stroke} strokeWidth={ns.glow ? 2.5 : 1.5} style={{ transition: "all 0.4s cubic-bezier(0.4, 0, 0.2, 1)" }} /><text x={pos.x} y={pos.y + 5} fill={ns.textColor} fontSize={15} fontFamily="var(--font-mono)" fontWeight={700} textAnchor="middle" style={{ transition: "all 0.4s" }}>{value}</text><text x={pos.x} y={pos.y - ns.r - 6} fill="var(--text-faint)" fontSize={8} fontFamily="var(--font-mono)" textAnchor="middle">[{i}]</text></g>);
          })}
          {current.heap.length === 0 && (<text x={240} y={130} fill="var(--text-faint)" fontSize={13} fontFamily="var(--font-mono)" textAnchor="middle" fontStyle="italic">empty heap</text>)}
          {current.swapping && (<>
            <defs><marker id="heapArrowHead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="var(--amber)" /></marker></defs>
            {(() => { const [a, b] = current.swapping, pA = HEAP_TREE_POS[a], pB = HEAP_TREE_POS[b], midX = (pA.x + pB.x) / 2, midY = (pA.y + pB.y) / 2, oX = (pB.y - pA.y) * 0.2, oY = -(pB.x - pA.x) * 0.2;
              return (<path d={`M${pA.x + 25},${pA.y} Q${midX + oX},${midY + oY} ${pB.x - 25},${pB.y}`} fill="none" stroke="var(--amber)" strokeWidth={1.5} strokeDasharray="4,3" markerEnd="url(#heapArrowHead)" opacity={0.7} style={{ transition: "all 0.4s" }} />);
            })()}
          </>)}
        </svg>
      </div>
      <div style={S.vizBox}>
        <div style={S.vizLabel}>Array Representation</div>
        {current.heap.length === 0 ? (<div style={{ padding: "12px 16px", fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--text-faint)", fontStyle: "italic" }}>[ ]</div>) : (
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "flex-end" }}>
            {current.heap.map((value, i) => {
              const cs = arrayCellStyle(i);
              const parent = i === 0 ? null : Math.floor((i - 1) / 2);
              return (<div key={`arr-${i}`} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                <span style={{ fontSize: 8, fontFamily: "var(--font-mono)", color: "var(--text-faint)" }}>{i}</span>
                <div style={{ width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center", background: cs.bg, border: `1.5px solid ${cs.border}`, borderRadius: 8, fontFamily: "var(--font-mono)", fontSize: 15, fontWeight: cs.fontWeight, color: cs.color, transition: "all 0.3s" }}>{value}</div>
                <span style={{ fontSize: 7, fontFamily: "var(--font-mono)", color: "var(--text-faint)", textAlign: "center", lineHeight: 1.2 }}>{i === 0 ? "root" : `p:${parent}`}</span>
              </div>);
            })}
          </div>
        )}
        <div style={{ marginTop: 12, padding: "8px 12px", background: "var(--bg)", borderRadius: 8, fontFamily: "var(--font-mono)", fontSize: 11, lineHeight: 1.5,
          color: current.action === "extract" ? "var(--rose)" : current.action === "bubble_up" || current.action === "sift_down" ? "var(--amber)" : current.action === "done" ? "var(--teal)" : "var(--text-secondary)",
          fontWeight: current.action !== "init" ? 500 : 400 }}>{current.desc}</div>
      </div>
      <div style={{ display: "flex", gap: 14, marginBottom: 18, flexWrap: "wrap" }}>
        {[{ color: "var(--violet)", label: "Inserted" }, { color: "var(--amber)", label: "Swapping" }, { color: "var(--rose)", label: "Extracting" }, { color: "var(--teal)", label: "Settled" }].map((item, i) => (<div key={i} style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 10, height: 10, borderRadius: "50%", background: item.color, opacity: 0.7 }} /><span style={{ fontSize: 10, color: "var(--text-muted)", fontFamily: "var(--font-mono)" }}>{item.label}</span></div>))}
      </div>
    </div>
  );

  const explanation = (
    <div>
      <div style={{ marginBottom: 16 }}><div style={S.vizLabel}>How it works</div></div>
      <ExplainStep number={1} title="Insert & bubble up" active={getPhase() === 1} desc="Add the new element at the end of the array (next open leaf). Then compare with parent and swap upward until the min-heap property holds." color="var(--violet)" />
      <ExplainStep number={2} title="Heap property" active={getPhase() === 1 || getPhase() === 3} desc="Every parent must be smaller than or equal to its children. This invariant is maintained after every insert and extract." color="var(--teal)" />
      <ExplainStep number={3} title="Extract-min & sift down" active={getPhase() === 2} desc="Remove the root (minimum). Move the last element to the root, then swap it down with the smaller child until the heap property is restored." color="var(--rose)" />
      <ExplainStep number={4} title="Array representation" active={getPhase() === 3} desc="A heap is stored as a flat array. For index i: parent = floor((i-1)/2), left child = 2i+1, right child = 2i+2. No pointers needed!" color="var(--amber)" />
      <div style={{ ...S.insight("var(--teal)"), marginTop: 16 }}>
        <p style={S.insightTitle("var(--teal)")}>Complete binary tree</p>
        <p style={S.insightBody}>Heaps are complete binary trees stored as arrays. No wasted space, no pointers. Parent of index i is at (i-1)/2. Children of i are at 2i+1 and 2i+2. This compact layout gives excellent cache performance.</p>
      </div>
      <div style={{ ...S.insight("var(--amber)"), marginTop: 10 }}>
        <p style={S.insightTitle("var(--amber)")}>Priority queues</p>
        <p style={S.insightBody}>Heaps power priority queues used in Dijkstra's shortest path, A* search, task scheduling, and event-driven simulation. Any time you need "give me the smallest/largest item fast," reach for a heap.</p>
      </div>
    </div>
  );

  return <AlgoLayout viz={viz} explanation={explanation} />;
}

/* ========================================================================
   ALGO EXPLORER SHELL
   ======================================================================== */

const SLUG_MAP = {
  'bubble-sort': ['algo', 0], 'merge-sort': ['algo', 1], 'binary-search': ['algo', 2],
  'bfs': ['algo', 3], 'dfs': ['algo', 4], 'dijkstra': ['algo', 5], 'hash-table': ['algo', 6],
  'linked-list': ['ds', 0], 'stack': ['ds', 1], 'queue': ['ds', 2],
  'binary-search-tree': ['ds', 3], 'heap': ['ds', 4],
};
const SLUG_REVERSE_ALGO = ['bubble-sort', 'merge-sort', 'binary-search', 'bfs', 'dfs', 'dijkstra', 'hash-table'];
const SLUG_REVERSE_DS = ['linked-list', 'stack', 'queue', 'binary-search-tree', 'heap'];

const ALGO_TABS = [
  { label: "Bubble Sort", icon: "01", category: "sort" },
  { label: "Merge Sort", icon: "02", category: "sort" },
  { label: "Binary Search", icon: "03", category: "search" },
  { label: "BFS", icon: "04", category: "graph" },
  { label: "DFS", icon: "05", category: "graph" },
  { label: "Dijkstra's", icon: "06", category: "graph" },
  { label: "Hash Table", icon: "07", category: "data" },
];
const ALGO_COMPONENTS = [BubbleSortTab, MergeSortTab, BinarySearchTab, BFSTab, DFSTab, DijkstraTab, HashTableTab];

const DS_TABS = [
  { label: "Linked List", icon: "01", category: "linear" },
  { label: "Stack", icon: "02", category: "linear" },
  { label: "Queue", icon: "03", category: "linear" },
  { label: "Binary Search Tree", icon: "04", category: "tree" },
  { label: "Heap", icon: "05", category: "tree" },
];
const DS_COMPONENTS = [LinkedListTab, StackTab, QueueTab, BinarySearchTreeTab, HeapTab];

const algoCategoryColors = { sort: "var(--amber)", search: "var(--teal)", graph: "var(--violet)", data: "var(--rose)" };
const dsCategoryColors = { linear: "var(--teal)", tree: "var(--violet)" };

function AlgoExplorer() {
  const hash = window.location.hash.slice(1);
  const initial = SLUG_MAP[hash];
  const [mode, setMode] = useState(initial ? initial[0] : "algo");
  const [algoTab, setAlgoTab] = useState(initial && initial[0] === "algo" ? initial[1] : 0);
  const [dsTab, setDsTab] = useState(initial && initial[0] === "ds" ? initial[1] : 0);

  useEffect(() => {
    const slug = mode === "algo" ? SLUG_REVERSE_ALGO[algoTab] : SLUG_REVERSE_DS[dsTab];
    if (slug) history.replaceState(null, "", "#" + slug);
  }, [mode, algoTab, dsTab]);

  const isAlgo = mode === "algo";
  const tabs = isAlgo ? ALGO_TABS : DS_TABS;
  const components = isAlgo ? ALGO_COMPONENTS : DS_COMPONENTS;
  const activeTab = isAlgo ? algoTab : dsTab;
  const setActiveTab = isAlgo ? setAlgoTab : setDsTab;
  const categoryColors = isAlgo ? algoCategoryColors : dsCategoryColors;
  const TabContent = components[activeTab];

  return (
    <div style={{ background: "var(--bg-deep)", minHeight: "100vh", fontFamily: "var(--font-body)", padding: "32px 20px" }}>
      <style>{`
        .algo-shell { max-width: 720px; margin: 0 auto; }
        @media (min-width: 900px) { .algo-shell { max-width: 1060px; } }
        .tab-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        @media (min-width: 640px) { .tab-grid { grid-template-columns: repeat(${tabs.length}, 1fr); } }
        .mode-link { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.5px; padding: 0; transition: all 0.25s ease; }
        .mode-link:hover { gap: 10px; }
        .mode-link:hover .mode-arrow { transform: translateX(2px); }
      `}</style>
      <div style={{ position: "fixed", inset: 0, pointerEvents: "none", opacity: 0.03, zIndex: 0,
        backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")` }} />
      <div className="algo-shell" style={{ position: "relative", zIndex: 1 }}>
        <a href="index.html" style={{ display: "inline-flex", alignItems: "center", gap: 6, fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-faint)", textDecoration: "none", letterSpacing: "0.03em", marginBottom: 16, transition: "color 0.2s" }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          {"Algorithms & Data Structures"}
        </a>
        <div style={{ marginBottom: 28 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 6 }}>
            <h1 style={{ fontFamily: "var(--font-display)", fontSize: 38, fontWeight: 400, fontStyle: "italic", margin: 0, letterSpacing: "-0.02em", color: "var(--text)" }}>
              {isAlgo ? "Algorithm Explorer" : "Data Structure Explorer"}
            </h1>
            <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--text-faint)", textTransform: "uppercase", letterSpacing: "2px" }}>Interactive</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <p style={{ color: "var(--text-muted)", fontSize: 14, margin: 0, fontFamily: "var(--font-body)" }}>
              {isAlgo ? "Step through classic algorithms with live visualizations." : "Explore fundamental data structures and their operations."}
            </p>
            <button className="mode-link" onClick={() => setMode(isAlgo ? "ds" : "algo")} style={{ color: isAlgo ? "var(--teal)" : "var(--amber)", marginLeft: "auto", whiteSpace: "nowrap" }}>
              {isAlgo ? "Data Structures" : "Algorithms"}
              <span className="mode-arrow" style={{ transition: "transform 0.25s ease", fontSize: 14 }}>→</span>
            </button>
          </div>
          <div style={{ marginTop: 12, height: 1, background: `linear-gradient(90deg, ${isAlgo ? "var(--amber)" : "var(--teal)"} 0%, var(--border) 40%, transparent 100%)` }} />
        </div>
        <div style={{ marginBottom: 24, background: "var(--bg-card)", borderRadius: 14, border: "1px solid var(--border)", padding: 4 }}>
          <div className="tab-grid">
            {tabs.map((tab, i) => {
              const catColor = categoryColors[tab.category];
              return (
                <button key={tab.label} onClick={() => setActiveTab(i)} style={{
                  padding: "10px 6px", background: activeTab === i ? "var(--bg-elevated)" : "transparent",
                  border: "none", borderRadius: 10, color: activeTab === i ? "var(--text)" : "var(--text-muted)",
                  fontSize: 11, fontFamily: "var(--font-body)", fontWeight: activeTab === i ? 600 : 400,
                  cursor: "pointer", transition: "all 0.25s ease",
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 3, position: "relative",
                }}>
                  <span style={{ fontFamily: "var(--font-mono)", fontSize: 8, color: activeTab === i ? catColor : "var(--text-faint)", letterSpacing: "1px", transition: "all 0.25s" }}>{tab.icon}</span>
                  {tab.label}
                  {activeTab === i && (<div style={{ position: "absolute", bottom: 2, left: "20%", right: "20%", height: 2, borderRadius: 1, background: catColor }} />)}
                </button>
              );
            })}
          </div>
        </div>
        <div style={{ background: "var(--bg-card)", borderRadius: 16, padding: "20px 20px", border: "1px solid var(--border)" }}>
          <TabContent />
        </div>
        <div style={{ marginTop: 24, textAlign: "center", color: "var(--text-faint)", fontSize: 11, fontFamily: "var(--font-mono)", letterSpacing: "0.5px" }}>
          {"Interactive algorithm & data structure explorer."}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AlgoExplorer />);

</script>
</body>
</html>
